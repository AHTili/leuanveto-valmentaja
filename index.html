<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>LeVe Coach</title>
  <style>
    :root {
      --bg: #0b1220; --card: #121d33; --card2: #182744;
      --border: #26385d; --border2: #314976;
      --txt: #e8eefc; --muted: #8899bb; --dim: #5a6a8a;
      --acc: #4f8cff; --acc2: #3a6fd8;
      --ok: #22c55e; --ok2: #166534;
      --warn: #f59e0b; --warn2: #92400e;
      --bad: #ef4444; --bad2: #991b1b;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--txt);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      user-select: none; -webkit-user-select: none;
    }
    input, textarea, select { user-select: auto; -webkit-user-select: auto; }
    a { color: var(--acc); }
    /* ── Layout ── */
    .app { max-width: 600px; margin: 0 auto; padding: 12px; padding-bottom: 90px; }
    /* ── Nav ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13, 22, 40, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav button {
      background: none; border: none; color: var(--muted); font-size: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 10px; cursor: pointer; min-width: 60px; min-height: 48px;
    }
    .nav button.active { color: var(--acc); }
    .nav button .icon { font-size: 22px; }
    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .card-title { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--acc); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
      min-height: 48px; transition: background 0.15s;
    }
    .btn:active { background: var(--acc2); }
    .btn-full { width: 100%; }
    .btn-big { padding: 16px 24px; font-size: 18px; border-radius: var(--radius); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--txt); }
    .btn-outline:active { background: var(--card2); }
    .btn-danger { background: var(--bad); }
    .btn-danger:active { background: var(--bad2); }
    .btn-ok { background: var(--ok); }
    .btn-ok:active { background: var(--ok2); }
    .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 36px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    /* ── Inputs ── */
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2); background: #0f1a31; color: var(--txt);
      font-size: 16px; min-height: 44px;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--acc); }
    textarea { min-height: 80px; resize: vertical; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
    /* ── Grid ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    /* ── Tags / Chips ── */
    .chip {
      display: inline-flex; align-items: center; padding: 6px 12px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border2); background: var(--card2);
    }
    .chip-green { color: var(--ok); border-color: var(--ok); }
    .chip-yellow { color: var(--warn); border-color: var(--warn); }
    .chip-red { color: var(--bad); border-color: var(--bad); }
    /* ── KPI ── */
    .kpi { font-size: 28px; font-weight: 700; }
    .kpi-label { font-size: 12px; color: var(--muted); }
    .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .kpi-box { flex: 1; min-width: 80px; }
    /* ── Set buttons (touch-friendly) ── */
    .set-btns {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .set-btn {
      min-width: 56px; height: 56px; border-radius: var(--radius-sm);
      border: 2px solid var(--border2); background: var(--card);
      color: var(--txt); font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.1s; flex: 1;
    }
    .set-btn:active, .set-btn.selected {
      background: var(--acc); border-color: var(--acc); color: #fff;
      transform: scale(0.95);
    }
    .set-btn-vara { font-size: 15px; }
    /* ── Readiness indicator ── */
    .readiness-dot {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block;
    }
    .readiness-dot.green { background: var(--ok); }
    .readiness-dot.yellow { background: var(--warn); }
    .readiness-dot.red { background: var(--bad); }
    .readiness-dot.none { background: var(--dim); }
    /* ── Progress bar ── */
    .progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--acc); transition: width 0.3s; }
    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
    /* ── Accordion ── */
    .accordion-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; cursor: pointer; color: var(--muted); font-size: 13px;
    }
    .accordion-body { display: none; padding: 8px 0; }
    .accordion-body.open { display: block; }
    /* ── Helpers ── */
    .muted { color: var(--muted); font-size: 12px; }
    .dim { color: var(--dim); }
    .text-ok { color: var(--ok); }
    .text-warn { color: var(--warn); }
    .text-bad { color: var(--bad); }
    .text-center { text-align: center; }
    .mt { margin-top: 12px; }
    .mb { margin-bottom: 12px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-sm { gap: 6px; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* ── Notification toast ── */
    .toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--card2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 12px 20px; z-index: 200;
      font-size: 14px; max-width: 90%; text-align: center;
      animation: fadeIn 0.2s ease-in;
    }
    .toast.warn { border-color: var(--warn); }
    .toast.bad { border-color: var(--bad); }
    .toast.ok { border-color: var(--ok); }
    /* ── Section header ── */
    .section-header { font-size: 18px; font-weight: 700; margin: 16px 0 10px; }
    /* ── Exercise card in workout ── */
    .exercise-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .exercise-name {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
      cursor: pointer;
    }
    .exercise-meta { font-size: 12px; color: var(--muted); }
    .set-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }
    .set-number { font-size: 12px; color: var(--dim); width: 24px; text-align: center; }
    .load-display {
      background: var(--card2); border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 18px 28px; font-weight: 700; font-size: 44px;
      cursor: pointer; min-width: 100px; text-align: center;
      letter-spacing: -0.5px;
      display: inline-block;
    }
    .load-display:active { background: var(--border); }
    .load-up { color: var(--ok); border-color: var(--ok); }
    /* ── Program slot ── */
    .program-slot {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .program-slot:last-child { border-bottom: none; }
    .program-slot-num { color: var(--dim); font-size: 13px; width: 20px; }
    .program-slot-name { font-weight: 600; font-size: 14px; flex: 1; }
    .program-slot-detail { text-align: right; font-size: 13px; }
    .program-slot-load { font-weight: 700; color: var(--acc); }
    .program-slot-sets { color: var(--muted); }
    /* ── Scrollable ── */
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* ── Workout set buttons row ── */
    .set-btns-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    @media (max-width: 360px) {
      .set-btns-row { grid-template-columns: repeat(4, 1fr); }
    }
    /* ── Bottom Sheet Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.15s ease-out;
    }
    .modal-sheet {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
      max-height: 80dvh; overflow-y: auto; padding: 16px 16px 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--dim); border-radius: 2px; margin: 0 auto 12px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .modal-option {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 6px; cursor: pointer; min-height: 48px;
      transition: background 0.1s;
    }
    .modal-option:active { background: var(--card2); }
    .modal-option.selected { border-color: var(--acc); background: rgba(79,140,255,0.1); }
    .modal-option-icon { font-size: 18px; width: 28px; text-align: center; }
    .modal-option-text { flex: 1; }
    .modal-option-label { font-weight: 600; font-size: 14px; }
    .modal-option-desc { font-size: 12px; color: var(--muted); }
    .modal-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .modal-input-row input { flex: 1; }
    .modal-input-row .btn { min-width: 80px; }
    .modal-category { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }

    /* ── Progress view ── */
    .kpi-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .kpi-card-p { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
    .kpi-card-p .k { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
    .kpi-card-p .k small { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: 2px; letter-spacing: 0; }
    .kpi-card-p .kl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; font-weight: 600; }
    .kpi-card-p.ok .k { color: var(--ok); }
    .kpi-card-p.warn .k { color: var(--warn); }
    .range-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 10px; }
    .range-tabs button { background: transparent; border: none; color: var(--muted); font-size: 11px; font-weight: 600; padding: 6px 4px; border-radius: 5px; cursor: pointer; letter-spacing: 0.3px; }
    .range-tabs button.active { background: var(--card2); color: var(--fg); }
    .move-card { padding: 12px 14px 4px; }
    .move-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; gap: 8px; }
    .move-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .move-name .star { color: var(--warn); font-size: 11px; }
    .move-cat { font-size: 10px; color: var(--dim); margin-top: 1px; }
    .move-cur { text-align: right; flex-shrink: 0; }
    .move-cur .v { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .move-cur .v small { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: 2px; letter-spacing: 0; }
    .move-cur .d { font-size: 10px; font-weight: 700; margin-top: 2px; white-space: nowrap; }
    .move-cur .d.up { color: var(--ok); }
    .move-cur .d.down { color: var(--bad); }
    .sparkline-wrap { margin: 6px -4px 2px; position: relative; }
    .sparkline-wrap svg { display: block; width: 100%; }
    .spark-x-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--dim); padding: 0 4px; margin-top: 2px; }
    .spark-stats { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; padding: 6px 0 0; border-top: 1px solid var(--border); }
    .spark-stats b { color: var(--fg); font-weight: 700; }
    .vol-card { padding: 12px 14px 14px; }
    .vol-legend { display: flex; flex-wrap: wrap; gap: 6px 10px; margin-top: 10px; font-size: 10px; color: var(--muted); }
    .vol-legend .lg { display: inline-flex; align-items: center; gap: 4px; }
    .vol-legend .sw { width: 10px; height: 10px; border-radius: 2px; }
    .vol-filter { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; margin: 2px -2px 8px; scrollbar-width: none; }
    .vol-filter::-webkit-scrollbar { display: none; }
    .vol-filter button { flex-shrink: 0; background: var(--card2); border: 1px solid var(--border2); color: var(--muted); padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .vol-filter button.active { background: var(--acc); border-color: var(--acc); color: #fff; }

    /* ── Dashboard redesign v4.17 ─────────────────────────────── */
    .dash-topline { display: flex; justify-content: space-between; align-items: flex-start; padding: 2px 2px 14px; gap: 10px; }
    .dash-topline-left .date { font-size: 11px; color: var(--muted); letter-spacing: 0.3px; text-transform: uppercase; font-weight: 600; }
    .dash-topline-left .hello { font-size: 18px; font-weight: 700; margin-top: 1px; line-height: 1.2; }
    .dash-topline-right { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: flex-end; max-width: 55%; }
    .dash-topline-right .chip { font-size: 11px; }

    .hero { background: linear-gradient(165deg, var(--card2) 0%, var(--card) 100%); border: 1px solid var(--border2); border-radius: 20px; padding: 18px 18px 16px; margin-bottom: 14px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; background: radial-gradient(circle, rgba(79,140,255,0.18) 0%, transparent 70%); pointer-events: none; }
    .hero.deload { background: linear-gradient(165deg, rgba(245,158,11,0.12) 0%, var(--card) 100%); border-color: var(--warn2); }
    .hero.deload::before { background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%); }
    .hero-eyebrow { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .hero-eyebrow .phase { font-size: 10px; font-weight: 700; color: var(--acc); letter-spacing: 0.7px; text-transform: uppercase; }
    .hero.deload .hero-eyebrow .phase { color: var(--warn); }
    .hero-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 4px; }
    .hero-sub { font-size: 12px; color: var(--muted); line-height: 1.45; }
    .hero-sub b { color: var(--txt); font-weight: 700; }

    .slot-list { margin: 14px 0 16px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .warmup-line { display: flex; gap: 6px; align-items: baseline; font-size: 11px; color: var(--warn); font-weight: 600; letter-spacing: 0.3px; margin-bottom: 10px; flex-wrap: wrap; }
    .warmup-line .dots { color: var(--dim); font-weight: 400; }

    .slot-row { display: grid; grid-template-columns: 22px 1fr auto; gap: 10px; padding: 7px 0; align-items: center; }
    .slot-row + .slot-row { border-top: 1px dashed #1e2a45; }
    .slot-role { font-size: 13px; text-align: center; }
    .slot-body { min-width: 0; }
    .slot-name { font-size: 14px; font-weight: 700; line-height: 1.2; display: flex; gap: 4px; align-items: baseline; flex-wrap: wrap; }
    .slot-name .info { color: var(--acc); font-size: 12px; font-weight: 400; cursor: pointer; }
    .slot-variant { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 500; line-height: 1.3; }
    .slot-detail { text-align: right; font-variant-numeric: tabular-nums; }
    .slot-sets { font-size: 11px; color: var(--muted); font-weight: 600; }
    .slot-load { font-size: 14px; font-weight: 800; color: var(--acc); letter-spacing: -0.2px; }
    .slot-load.backoff { color: var(--muted); }
    .slot-load.opener { color: var(--ok); }
    .slot-load.attempt2 { color: var(--warn); }
    .slot-load.attempt3 { color: var(--bad); }
    .slot-load.deload { color: var(--warn); }

    .primary-cta { width: 100%; min-height: 64px; background: var(--acc); color: #fff; border: none; cursor: pointer; border-radius: 14px; font-size: 20px; font-weight: 800; letter-spacing: 0.2px; box-shadow: 0 10px 30px rgba(79,140,255,0.35); display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform .1s, box-shadow .15s; }
    .primary-cta:active { transform: scale(0.98); }
    .primary-cta .duration { font-size: 11px; font-weight: 600; opacity: 0.75; padding-left: 10px; margin-left: 8px; border-left: 1px solid rgba(255,255,255,0.25); letter-spacing: 0.3px; }
    .primary-cta.deload { background: var(--warn); box-shadow: 0 10px 30px rgba(245,158,11,0.35); }

    .phase-timeline { display: flex; gap: 3px; align-items: center; padding: 12px 2px 0; }
    .phase-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--border); min-width: 6px; }
    .phase-dot.done { background: var(--acc); opacity: 0.5; }
    .phase-dot.active { background: var(--acc); height: 6px; border-radius: 3px; box-shadow: 0 0 8px rgba(79,140,255,0.6); }
    .phase-dot.deload { background: var(--warn); opacity: 0.6; }
    .phase-dot.deload.active { background: var(--warn); opacity: 1; box-shadow: 0 0 8px rgba(245,158,11,0.6); }
    .phase-legend { display: flex; justify-content: space-between; font-size: 9px; color: var(--dim); padding: 4px 2px 0; letter-spacing: 0.3px; text-transform: uppercase; }
    .phase-legend span.current { color: var(--acc); font-weight: 700; }
    .phase-legend span.current.deload { color: var(--warn); }

    .secondary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
    .secondary-row .btn-outline { min-height: 40px; font-size: 12px; padding: 8px 10px; }

    .stim-card { padding: 12px 14px; margin-bottom: 10px; }
    .stim-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
    .stim-cell { text-align: center; padding: 6px 4px; }
    .stim-cell .v { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
    .stim-cell .v.ok { color: var(--ok); }
    .stim-cell .v.warn { color: var(--warn); }
    .stim-cell .l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; font-weight: 600; line-height: 1.2; }
    .stim-warn-line { font-size: 11px; color: var(--warn); padding: 8px 0 0; margin-top: 6px; border-top: 1px dashed var(--border); line-height: 1.35; }

    .dash-collapsible { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .dash-collapsible summary { padding: 12px 14px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
    .dash-collapsible summary::-webkit-details-marker { display: none; }
    .dash-collapsible summary .arrow { color: var(--muted); font-size: 12px; transition: transform .2s; }
    .dash-collapsible[open] summary .arrow { transform: rotate(180deg); }
    .dash-collapsible .body { padding: 10px 14px 14px; border-top: 1px solid var(--border); }

    .future-row { display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; align-items: center; padding: 7px 0; }
    .future-row + .future-row { border-top: 1px dashed #1e2a45; }
    .future-day { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; line-height: 1.1; }
    .future-day b { display: block; font-size: 13px; color: var(--txt); font-weight: 800; }
    .future-desc { font-size: 12px; line-height: 1.35; color: var(--muted); min-width: 0; }
    .future-desc b { color: var(--txt); font-weight: 600; }
    .future-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--card2); color: var(--muted); white-space: nowrap; }
    .future-tag.deload { color: var(--warn); }

    .trace-row { padding: 6px 0; font-size: 12px; line-height: 1.4; border-bottom: 1px dashed #1e2a45; }
    .trace-row:last-child { border-bottom: none; }
    .trace-row .rule { color: var(--acc); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 1px; }
    .trace-row .why { color: var(--muted); }

    /* ── Density selector in Settings ────────────────────────── */
    .btn-group [data-density] { padding: 8px 6px; font-size: 12px; min-height: 36px; }
    .btn-group [data-density].active { background: var(--acc); color: #fff; border-color: var(--acc); }

    /* ── Focus / Compact density modes (v4.23 P4.2) ──────────── */
    /* Focus: salikäyttö — isommat targetit, vähemmän kohinaa. */
    body.density-focus .pill-ticker,
    body.density-focus .completed-list .vel-mini,
    body.density-focus .util-row,
    body.density-focus .ex-sub { display: none; }
    body.density-focus .load-hero .load-main .val { font-size: 56px; }
    body.density-focus .reps-row button { height: 68px; font-size: 24px; }
    body.density-focus .vara-row button { height: 56px; font-size: 17px; }
    body.density-focus .submit-btn { min-height: 64px; font-size: 18px; }

    /* Compact: pieni viewport (iPad split view) — tiukempi. */
    body.density-compact .load-hero .load-main .val { font-size: 36px; }
    body.density-compact .hero-title { font-size: 20px; }
    body.density-compact .reps-row button { height: 48px; font-size: 17px; }
    body.density-compact .vara-row button { height: 40px; font-size: 12px; }
    body.density-compact .submit-btn { min-height: 48px; font-size: 14px; }
    body.density-compact .ex-head,
    body.density-compact .load-hero,
    body.density-compact .input-section { padding: 10px 12px; }
    body.density-compact .slot-row { padding: 5px 0; }

    /* ── sRPE scale (v4.23 P3.2) ─────────────────────────────── */
    .srpe-scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 6px; }
    .srpe-scale .srpe-btn {
      height: 44px; border-radius: 6px; border: 2px solid var(--border2);
      background: var(--card2); color: var(--txt); font-size: 14px; font-weight: 800;
      cursor: pointer; font-variant-numeric: tabular-nums;
    }
    .srpe-scale .srpe-btn.selected {
      background: var(--acc); border-color: var(--acc); color: #fff;
    }
    .srpe-scale .srpe-btn[data-srpe="1"].selected,
    .srpe-scale .srpe-btn[data-srpe="2"].selected,
    .srpe-scale .srpe-btn[data-srpe="3"].selected,
    .srpe-scale .srpe-btn[data-srpe="4"].selected { background: var(--ok); border-color: var(--ok); }
    .srpe-scale .srpe-btn[data-srpe="7"].selected,
    .srpe-scale .srpe-btn[data-srpe="8"].selected { background: var(--warn); border-color: var(--warn); color: #1a1a1a; }
    .srpe-scale .srpe-btn[data-srpe="9"].selected,
    .srpe-scale .srpe-btn[data-srpe="10"].selected { background: var(--bad); border-color: var(--bad); }

    /* ── Readiness primer (v4.21) ────────────────────────────── */
    .primer-card {
      background: linear-gradient(165deg, var(--card2) 0%, var(--card) 100%);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    .primer-card::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(34,197,94,0.16) 0%, transparent 70%);
      pointer-events: none;
    }
    .primer-instruction {
      font-size: 14px; line-height: 1.45; color: var(--txt);
      margin-bottom: 14px; text-align: center;
      padding: 10px 12px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: var(--radius-sm);
    }
    .primer-instruction b { color: var(--ok); font-weight: 800; }
    .primer-load {
      text-align: center; margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
      position: relative; z-index: 1;
    }
    .primer-load-val {
      font-size: 44px; font-weight: 800; letter-spacing: -1.5px;
      line-height: 1; color: var(--txt);
    }
    .primer-load-val .primer-load-unit {
      font-size: 18px; color: var(--muted); font-weight: 600; letter-spacing: 0;
    }
    .primer-load-sub {
      font-size: 11px; color: var(--muted); margin-top: 4px;
      letter-spacing: 0.3px; text-transform: uppercase; font-weight: 600;
    }
    .primer-rep-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 14px;
    }
    .primer-rep label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px; text-align: center;
    }
    .primer-rep input {
      width: 100%; padding: 14px 8px; font-size: 18px; font-weight: 800;
      text-align: center; font-variant-numeric: tabular-nums;
      background: var(--card2); border: 2px solid var(--border2);
      color: var(--txt); border-radius: var(--radius-sm);
      min-height: 52px;
    }
    .primer-rep input:focus {
      outline: none; border-color: var(--acc);
      background: var(--card);
    }
    .primer-result {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      margin-bottom: 14px; min-height: 56px;
      font-size: 12px; line-height: 1.45;
    }
    .primer-result-placeholder { color: var(--muted); text-align: center; padding: 6px 0; }
    .primer-best { font-size: 14px; color: var(--txt); }
    .primer-best b { color: var(--ok); font-weight: 800; font-variant-numeric: tabular-nums; }
    .primer-reps-list { margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .primer-rep-val {
      font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;
      padding: 2px 6px; background: var(--card2); border-radius: 4px;
    }
    .primer-rep-val.best { color: var(--ok); font-weight: 700; background: rgba(34,197,94,0.12); }
    .primer-class {
      margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
      font-size: 12px; font-weight: 700;
    }
    .primer-class.primer-ok { color: var(--ok); }
    .primer-class.primer-warn { color: var(--warn); }
    .primer-class.primer-bad { color: var(--bad); }
    .primer-class.primer-muted { color: var(--dim); font-weight: 500; font-size: 11px; }
    .primer-ref-hint {
      font-size: 10px; color: var(--dim); margin-top: 4px;
      letter-spacing: 0.2px; font-weight: 500;
    }
    .primer-load-hint {
      margin-top: 6px; padding: 6px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; line-height: 1.35;
    }
    .primer-load-hint.ok { color: var(--ok); background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.30); }
    .primer-load-hint.info { color: var(--acc); background: rgba(79,140,255,0.10); border: 1px solid rgba(79,140,255,0.30); }
    .primer-load-hint.warn { color: var(--warn); background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.30); }

    /* ── Plan override (v4.20) ───────────────────────────────── */
    .hero-eyebrow { flex-wrap: wrap; gap: 6px 10px; }
    .plan-override-link {
      margin-left: auto; background: none; border: none; color: var(--muted);
      font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      cursor: pointer; padding: 2px 6px; border-radius: 6px;
    }
    .plan-override-link:active { background: var(--card2); color: var(--txt); }
    .plan-override-chip {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--warn); background: rgba(245,158,11,0.14);
      padding: 2px 8px; border-radius: 6px;
    }
    .plan-override-reset {
      margin-left: auto; background: none; border: 1px solid var(--border2);
      color: var(--warn); font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer; padding: 3px 8px; border-radius: 6px;
    }
    .plan-override-reset:active { background: var(--card2); }
    .hero.plan-override { border-color: rgba(245,158,11,0.45); }
    .hero.plan-override::before {
      background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%);
    }

    /* ── Missed prior session banner (v4.19) ─────────────────── */
    .missed-banner {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 12px;
      background: linear-gradient(165deg, rgba(245,158,11,0.10) 0%, var(--card) 100%);
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: var(--radius);
      margin-bottom: 10px;
    }
    .missed-banner .missed-icon {
      font-size: 20px; flex-shrink: 0; line-height: 1;
    }
    .missed-banner .missed-body { flex: 1; min-width: 0; }
    .missed-banner .missed-title {
      font-size: 13px; font-weight: 700; color: var(--warn); letter-spacing: -0.1px;
    }
    .missed-banner .missed-sub {
      font-size: 11px; color: var(--muted); margin-top: 1px; line-height: 1.3;
    }
    .missed-banner .missed-sub b { color: var(--txt); font-weight: 600; }
    .missed-banner .missed-actions {
      display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    }
    .missed-banner .missed-actions .btn {
      padding: 6px 10px; font-size: 11px; font-weight: 700; min-height: 30px;
      border-radius: var(--radius-sm);
    }
    .missed-banner .missed-actions .btn-warn {
      background: var(--warn); color: #1a1a1a; border: none;
    }
    .missed-banner .missed-actions .btn-warn:active { background: var(--warn2); color: #fff; }
    .missed-banner .missed-actions .btn-outline {
      font-size: 10px; min-height: 26px; padding: 4px 8px;
    }

    /* ── Workout redesign v4.18 ──────────────────────────────── */
    .w-top-bar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; margin-bottom: 10px; }
    .w-ex-progress { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; }
    .w-ex-progress b { color: var(--txt); font-size: 13px; font-weight: 700; }
    .icon-btn { width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--border2); background: var(--card2); color: var(--txt); font-size: 16px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
    .icon-btn:active { background: var(--border); }
    .icon-btn.danger { color: var(--bad); border-color: var(--bad2); }
    .icon-btn.danger:active { background: rgba(239,68,68,0.1); }

    /* Pill ticker */
    .pill-ticker { display: flex; gap: 3px; margin-bottom: 10px; flex-wrap: wrap; }
    .pill-ticker .pill { flex: 1 1 0; min-width: 44px; height: 22px; border-radius: 11px; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all .15s; padding: 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pill-ticker .pill.done { background: transparent; border-color: var(--ok); color: var(--ok); }
    .pill-ticker .pill.done::before { content: "✓ "; font-weight: 800; }
    .pill-ticker .pill.active { background: var(--acc); border-color: var(--acc); color: #fff; flex: 2 1 0; }

    /* Exercise head */
    .ex-head { padding: 12px 14px 10px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; }
    .ex-role { font-size: 10px; font-weight: 700; letter-spacing: 0.7px; color: var(--acc); text-transform: uppercase; margin-bottom: 2px; }
    .ex-role.deload { color: var(--warn); }
    .ex-role .text-ok { color: var(--ok); margin-left: 6px; }
    .ex-role .text-warn { color: var(--warn); margin-left: 6px; }
    .ex-name { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ex-name .info { color: var(--acc); font-size: 15px; cursor: pointer; }
    .ex-name .lock { font-size: 14px; cursor: pointer; opacity: 0.8; }
    .ex-name .swap { color: var(--muted); font-size: 14px; cursor: pointer; opacity: 0.6; }
    .ex-name .swap:active { opacity: 1; }
    .ex-sub { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .ex-sub .tempo { color: var(--warn); font-weight: 600; }
    .ex-sub .slot-source { color: var(--acc); }

    /* Hero load card */
    .load-hero { background: linear-gradient(165deg, var(--card2) 0%, var(--card) 100%); border: 1px solid var(--border2); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 14px 16px 18px; position: relative; overflow: hidden; }
    .load-hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 999px; background: radial-gradient(circle, rgba(79,140,255,0.22) 0%, transparent 70%); pointer-events: none; }
    .load-hero .set-line { display: flex; justify-content: space-between; align-items: baseline; font-size: 11px; color: var(--muted); margin-bottom: 6px; position: relative; z-index: 1; }
    .load-hero .set-line b { color: var(--txt); font-weight: 700; font-size: 12px; }
    .load-hero .load-main { display: flex; align-items: baseline; gap: 8px; font-variant-numeric: tabular-nums; position: relative; z-index: 1; flex-wrap: wrap; }
    .load-hero .load-main .val { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; color: var(--txt); cursor: pointer; line-height: 1; }
    .load-hero .load-main .val.load-up { color: var(--ok); }
    .load-hero .load-main .unit { font-size: 14px; color: var(--muted); font-weight: 600; }
    .load-hero .delta-chip { margin-left: auto; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; background: rgba(34,197,94,0.14); color: var(--ok); white-space: nowrap; }
    .load-hero .delta-chip.down { background: rgba(239,68,68,0.14); color: var(--bad); }
    .load-hero .load-edit-hint { font-size: 10px; color: var(--dim); margin-top: 6px; letter-spacing: 0.2px; position: relative; z-index: 1; }
    .load-hero .load-edit-hint::before { content: "✎ "; }
    .load-hero .prev-ghost { margin-top: 12px; padding: 8px 10px; border: 1px dashed var(--border2); border-radius: var(--radius-sm); background: rgba(13,21,40,0.5); display: flex; justify-content: space-between; align-items: center; font-size: 11px; position: relative; z-index: 1; gap: 8px; }
    .load-hero .prev-ghost .label { color: var(--dim); letter-spacing: 0.3px; font-weight: 600; text-transform: uppercase; font-size: 9px; }
    .load-hero .prev-ghost .vals { color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 600; margin-top: 2px; }
    .load-hero .prev-ghost .vals b { color: var(--txt); }
    .load-hero .prev-ghost .mark { color: var(--ok); font-size: 14px; flex-shrink: 0; }
    .load-hero .target-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 10px 12px; border-radius: var(--radius-sm); background: rgba(79,140,255,0.08); border: 1px solid rgba(79,140,255,0.2); font-size: 12px; position: relative; z-index: 1; }
    .load-hero .target-row .label { color: var(--acc); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; }
    .load-hero .target-row .vals { font-weight: 700; letter-spacing: -0.2px; font-variant-numeric: tabular-nums; }

    /* Input section */
    .input-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 10px; }
    .input-label { font-size: 10px; font-weight: 700; letter-spacing: 0.7px; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; display: flex; align-items: center; justify-content: space-between; }
    .input-label .hint { color: var(--dim); font-weight: 500; letter-spacing: 0.2px; text-transform: none; font-size: 10px; }
    .reps-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .reps-row button { height: 56px; border-radius: var(--radius-sm); border: 2px solid var(--border2); background: var(--card2); color: var(--txt); font-size: 20px; font-weight: 800; cursor: pointer; font-variant-numeric: tabular-nums; position: relative; }
    .reps-row button.selected { background: var(--acc); border-color: var(--acc); color: #fff; }
    .reps-row button.target::after { content: '◆'; position: absolute; top: 3px; right: 4px; font-size: 8px; color: var(--acc); opacity: 0.6; }
    .reps-row button.selected.target::after { color: #fff; opacity: 1; }
    .vara-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 10px; }
    .vara-row button { height: 48px; border-radius: var(--radius-sm); border: 2px solid var(--border2); background: var(--card2); color: var(--txt); font-size: 14px; font-weight: 700; cursor: pointer; position: relative; }
    .vara-row button.selected { background: var(--acc); border-color: var(--acc); color: #fff; }
    .vara-row button.target { border-color: rgba(79,140,255,0.5); }
    .vara-row button.target::after { content: '◆'; position: absolute; top: 3px; right: 4px; font-size: 7px; color: var(--acc); opacity: 0.6; }
    .vara-row button.selected.target::after { color: #fff; opacity: 1; }
    @media (max-width: 360px) {
      .reps-row { grid-template-columns: repeat(5, 1fr); }
      .vara-row { grid-template-columns: repeat(6, 1fr); }
    }

    /* Submit button */
    .submit-btn { width: 100%; margin-top: 12px; min-height: 56px; border-radius: var(--radius); background: var(--acc); border: none; color: #fff; font-size: 16px; font-weight: 800; letter-spacing: -0.2px; cursor: pointer; box-shadow: 0 6px 18px rgba(79,140,255,0.28); transition: background .15s, box-shadow .15s, transform .08s; }
    .submit-btn:disabled { opacity: 0.4; box-shadow: none; cursor: not-allowed; background: var(--card2); color: var(--muted); }
    .submit-btn.ready { background: var(--ok); box-shadow: 0 6px 18px rgba(34,197,94,0.28); }
    .submit-btn.ready:active { transform: scale(0.99); }

    /* Attempted-reps (failure) — inline */
    #attempted-reps-container { margin-top: 10px; padding: 10px 12px; background: var(--card2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    #attempted-reps-container label { margin-top: 0; }

    /* Completed list */
    .completed-list { margin-top: 10px; padding: 8px 10px; background: var(--card2); border-radius: var(--radius-sm); font-size: 11px; line-height: 1.6; }
    .completed-list .row { display: flex; gap: 8px; color: var(--muted); font-variant-numeric: tabular-nums; align-items: center; }
    .completed-list .row + .row { margin-top: 3px; }
    .completed-list .row b { color: var(--txt); font-weight: 700; }
    .completed-list .row .done-mark { color: var(--ok); font-weight: 800; }
    .completed-list .row.completed-row-editable { cursor: pointer; transition: background .15s; border-radius: 4px; padding: 2px 4px; margin-left: -4px; }
    .completed-list .row.completed-row-editable:active { background: var(--card); }
    .completed-list .completed-edit-hint { margin-left: auto; opacity: 0.4; font-size: 11px; }
    .completed-list .vel-mini { margin-top: 8px; }
    .completed-list .vel-mini-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }

    /* Velocity panel (collapsible) */
    .vel-panel { margin-top: 10px; padding: 10px 12px; background: var(--card2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .vel-panel label { margin-top: 0; font-size: 11px; }
    .vel-panel input { margin-top: 4px; }

    /* Utility row */
    .util-row { display: flex; justify-content: space-between; gap: 4px; margin-top: 10px; padding: 0 4px; }
    .util-row button { flex: 1; padding: 8px 4px; font-size: 10px; font-weight: 600; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: var(--radius-sm); text-align: center; }
    .util-row button:active { background: var(--card2); }
    .util-row button.on { color: var(--acc); }

    /* Rest timer — inline card */
    .rest-inline { margin-top: 12px; padding: 14px 16px; background: linear-gradient(165deg, rgba(79,140,255,0.12), rgba(79,140,255,0.04)); border: 1px solid rgba(79,140,255,0.3); border-radius: var(--radius); position: relative; overflow: hidden; }
    .rest-inline.overtime { background: linear-gradient(165deg, rgba(245,158,11,0.14), rgba(245,158,11,0.04)); border-color: rgba(245,158,11,0.35); }
    .rest-inline::before { content: ''; position: absolute; bottom: 0; left: 0; height: 3px; background: var(--acc); border-radius: 0 3px 0 0; width: var(--rest-progress, 0%); transition: width 1s linear; }

<script type="module">
import {

  createHypertrofiaMesocycle, createMaksimivoimaMesocycle, createEksenterinenMesocycle,

  exportFullBackup, importFullBackup,

  getMovementProgress, getAllMovementProgress, saveMovementProgress,

} from "./data.js";

import {

// ═══════════════════════════════════════════════════════════════
// APP STATE

const state = {
  view: "dashboard",
  settings: null,
  movements: [],
  sessions: [],
  allSets: [],
  mesocycle: null,
  recommendation: null,
  readiness: { combined: "GREEN", capLevel: 0, channels: {} },
  // Active workout state
  workout: null, // { sessionId, dayType, exercises: [...], currentExerciseIdx, currentSetIdx, startedAt }
  // HRV & velocity readiness inputs for today
  todayHRV: null,
  todayVelocity: null,

  latestBodyweight: null,
  // All bodyweight measurements (for progress sparkline)
  allBodyweights: [],

  prs: [],

  allMesocycles: [],

  // viikon päivän planiä. Nollautuu refresh()-kutsussa ja startWorkout()-hetkellä.
  planOverrideDateISO: null,

};

// ═══════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════

async function init() {
  await initDB();
  // v4.26.0: backup-status dashboard-indikaattoria varten
  state.backupStatus = await getBackupStatus();
  state.settings = await getSettings();
  state.movements = await getAllMovements();
  state.sessions = await getAllSessions();
  state.allSets = await getAllSets();
  state.latestBodyweight = await getLatestBodyweight(state.settings);
  state.allBodyweights = await getMeasurementsByType("bodyweight");
  await seedHistoricalPRsIfNeeded();
  state.prs = await getAllPRs();
  state.allMesocycles = await getAllMesocycles();
  state.mesocycle = await getActiveMesocycle();
  if (!state.mesocycle) {
    state.mesocycle = createDefaultMesocycle(todayISO());
    assignVariantRotation(state.mesocycle.weekPlans);
    await saveMesocycle(state.mesocycle);
  } else if (!["peaking", "eksentrinen", "siirtyma"].includes(state.mesocycle.type)) {
    // Migrate existing mesocycle: add variants if missing
    const hasVariants = state.mesocycle.weekPlans?.some(wp =>
      wp.days?.some(d => d.slots?.some(s => s.variantName))
    );
    if (!hasVariants && state.mesocycle.weekPlans) {
      assignVariantRotation(state.mesocycle.weekPlans);
      await saveMesocycle(state.mesocycle);
    }
  }
  await computeReadiness();
  await computeRecommendation();
  applyDensityClass();
  render();
}

// v4.23 P4.2: apply density class to body. Kutsutaan settings-tallennuksessa
// ja init-vaiheessa.
function applyDensityClass() {
  const mode = state.settings?.workoutDensity;
  document.body.classList.remove("density-focus", "density-compact");
  if (mode === "focus") document.body.classList.add("density-focus");
  else if (mode === "compact") document.body.classList.add("density-compact");
}

async function refresh() {
  state.movements = await getAllMovements();
  state.sessions = await getAllSessions();
  state.allSets = await getAllSets();
  state.latestBodyweight = await getLatestBodyweight(state.settings);
  state.allBodyweights = await getMeasurementsByType("bodyweight");
  state.prs = await getAllPRs();
  state.allMesocycles = await getAllMesocycles();
  state.mesocycle = await getActiveMesocycle();
  // Plan-override on transient — refresh palauttaa aina normaalille tänään-päivälle
  state.planOverrideDateISO = null;
  await computeReadiness();
  await computeRecommendation();
}

// ═══════════════════════════════════════════════════════════════
// READINESS COMPUTATION
// ═══════════════════════════════════════════════════════════════

async function computeReadiness() {
  const settings = state.settings;
  const bw = settings.bodyweightKg || 91;

  // Velocity baseline: readiness test velocities
  const readinessTestSets = state.allSets
    .filter(s => s.setRole === "readiness_test" && s.velocityRep1 !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const velValues = readinessTestSets.map(s => s.velocityRep1);
  const velR = velocityReadiness(state.todayVelocity, velValues, settings.readinessVelocityWindowN || 10);

  // HRV baseline
  const hrvMeasurements = await getMeasurementsByType("HRV");
  const lnRmssdValues = hrvMeasurements
    .sort((a, b) => (a.dateISO || "").localeCompare(b.dateISO || ""))
    .map(m => m.valueTransformed)
    .filter(v => v !== null && v !== undefined);
  const todayLn = state.todayHRV ? ouraHRVtoLnRMSSD(state.todayHRV) : null;
  const hrvR = hrvReadiness(todayLn, lnRmssdValues, settings.readinessHrvWindowN || 14);

  // Vara baseline: recent top sets
  const topSets = state.allSets
    .filter(s => s.setRole === "top" && s.actualVx !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const varaR = varaReadiness(topSets, settings.readinessVaraWindowN || 5);

  state.readiness = combineReadiness(velR, hrvR, varaR);
}

async function computeRecommendation(forDateISO = null) {
  const settings = state.settings;
  const dateISO = forDateISO || todayISO();
  let primaryMov = state.movements.find(m => m.isPrimary);
  // Multi-lift mesocycles: primary movement changes each day — käytä forDateISO:ta
  // kun backfillataan mennyttä päivää, jotta saadaan oikea pv:n primary.
  if (state.mesocycle?.type === "streetlifting_16w") {
    primaryMov = getStreetliftingPrimaryMovement(state, dateISO) || primaryMov;
  }
  state.recommendation = await recommend({
    settings,
    bodyweightKg: state.latestBodyweight || settings.bodyweightKg || 91,
    dateISO,
    mesocycle: state.mesocycle,
    sessions: state.sessions,
    allSets: state.allSets,
    readiness: state.readiness,
    primaryMovementId: primaryMov?.movementId || null,
    dryRun: true,
  });
}

function showToast(message, type = "", duration = 3000) {
  const container = document.getElementById("toast-container");

}

// ═══════════════════════════════════════════════════════════════
// MODAL SYSTEM (replaces all prompt() calls)
// ═══════════════════════════════════════════════════════════════

/** Close any open modal */
function closeModal() {
  const existing = document.querySelector(".modal-overlay");
  if (existing) existing.remove();
}

/**
 * Show a list of options as a bottom sheet.
 * Returns a Promise that resolves to the selected index (0-based) or null if cancelled.
 * @param {string} title — modal title
 * @param {Array<{label:string, desc?:string, icon?:string}>} options
 * @param {number|null} selectedIdx — currently selected index (highlight)
 */
function showListModal(title, options, selectedIdx = null) {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <div class="modal-options-list"></div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const list = overlay.querySelector(".modal-options-list");
    options.forEach((opt, i) => {
      const el = document.createElement("div");
      el.className = `modal-option${i === selectedIdx ? " selected" : ""}`;
      el.innerHTML = `${opt.icon ? `<span class="modal-option-icon">${opt.icon}</span>` : ""}
        <div class="modal-option-text">
          <div class="modal-option-label">${opt.label}</div>
          ${opt.desc ? `<div class="modal-option-desc">${opt.desc}</div>` : ""}
        </div>`;
      el.addEventListener("click", () => { closeModal(); resolve(i); });
      list.appendChild(el);
    });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
  });
}

/**
 * Show an input modal (replaces prompt() for numeric/text input).
 * Returns a Promise that resolves to the entered string or null if cancelled.
 * @param {string} title — modal title
 * @param {string} placeholder — placeholder / label
 * @param {string} defaultValue — pre-filled value
 * @param {string} inputType — "number"|"text"
 */
function showInputModal(title, placeholder, defaultValue = "", inputType = "number") {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <label style="margin-top:0">${placeholder}</label>
        <div class="modal-input-row">
          <input type="${inputType}" inputmode="${inputType === "number" ? "decimal" : "text"}" value="${defaultValue}" autofocus />
          <button class="btn btn-ok" data-modal-ok>OK</button>
        </div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const inp = overlay.querySelector("input");
    const submit = () => { const v = inp.value.trim(); closeModal(); resolve(v || null); };
    overlay.querySelector("[data-modal-ok]").addEventListener("click", submit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
    setTimeout(() => inp.focus(), 50);
  });
}

/**
 * Calibration modal (v4.23 P4.3) — yksi-näkymäinen onboarding-wizard
 * streetlifting_16w:n aloitukselle. Käyttäjä syöttää kaikki 1RM-arviot

 *

 */
function showCalibrationModal(defaultBw = 91) {
  return new Promise(resolve => {
    closeModal();

    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:480px">
        <div class="modal-handle"></div>
        <div class="modal-title">🏋️ Streetlifting 16 vk — Kalibrointi</div>

          <input type="number" inputmode="decimal" id="cal-leuka" value="" placeholder="esim. 85 — paras kolmen viime kk leuka" step="0.5" min="0" max="300">

          <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)">Lisäpainodippi 1RM (+kg)</label>
          <input type="number" inputmode="decimal" id="cal-dippi" value="" placeholder="esim. 75 — arvio ok jos et ole testannut" step="0.5" min="0" max="300">

          <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)">Takakyykky 1RM (kg tanko)</label>
          <input type="number" inputmode="decimal" id="cal-kyykky" value="" placeholder="esim. 160 — todellinen 1RM tai 3RM × 1.1" step="2.5" min="0" max="400">

          <div class="muted" style="font-size:11px;margin:12px 0;padding:10px;background:rgba(79,140,255,0.08);border-radius:6px;line-height:1.5">
            💡 <b>Suositus:</b> jos et ole testannut 1RM:ää viimeiseen 3 kk, anna konservatiivinen arvio (-2.5–5 kg). Viikko 4:n deload + 3RM-testi kalibroi tarkkaan. Viikko 8:n välitesti ja viikko 12:n RPE9-testi päivittävät 1RM:n uudelleen.

          <button class="btn-sm" id="cal-use-defaults" style="background:none;border:none;color:var(--muted);font-size:11px;margin-top:10px;width:100%;cursor:pointer;padding:6px">Käytä oletusarvoja (85 / 75 / 160) — testaan ensi viikolla</button>
        </div>

      const bwVal = parseFloat(overlay.querySelector("#cal-bw")?.value) || defaultBw;

      const dippiVal = useDefaults ? 75 : parseFloat(overlay.querySelector("#cal-dippi")?.value);
      const kyykkyVal = useDefaults ? 160 : parseFloat(overlay.querySelector("#cal-kyykky")?.value);
      if (!useDefaults) {
        if (!leukaVal || leukaVal < 0 || leukaVal > 300) { showToast("Leuka 1RM puuttuu tai epärealistinen", "warn"); return; }
        if (!dippiVal || dippiVal < 0 || dippiVal > 300) { showToast("Dippi 1RM puuttuu tai epärealistinen", "warn"); return; }
        if (!kyykkyVal || kyykkyVal < 0 || kyykkyVal > 400) { showToast("Kyykky 1RM puuttuu tai epärealistinen", "warn"); return; }
      }
      closeModal();
      resolve({
        bwKg: bwVal,

        dippiExtKg: dippiVal || 75,

    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    // Autofocus first input
    setTimeout(() => overlay.querySelector("#cal-leuka")?.focus(), 50);
  });
}

/**
 * Plan-override modal — listaa tämän viikon suunnitellut päivät ja palauttaa
 * valitun päivän { dateISO, label, dayType } tai null jos peruutus.
 * Käytetään "Vaihda päivä" -toiminnossa: käyttäjä valitsee minkä viikonpäivän
 * planin haluaa tehdä tänään.
 */
async function showPlanOverrideModal() {
  const meso = state.mesocycle;
  if (!meso || !meso.weekPlans) {
    showToast("Ei aktiivista mesosykliä", "warn");
    return null;
  }
  const today = todayISO();
  const todayDow = new Date(today).getDay() || 7;
  const currentWeek = getMesocycleWeek(meso, today);
  if (!currentWeek) {
    showToast("Mesosykli ei ole aktiivinen tänään", "warn");
    return null;
  }
  const weekPlan = meso.weekPlans.find(w => w.week === currentWeek);
  if (!weekPlan?.days?.length) return null;

  // Laske ISO-päivä kullekin viikon planille (Ma = tämän viikon Ma, Ke = Ke jne.)
  // Todayn dayOfWeek käytetään ankkurina; siirto (targetDow - todayDow) päivää.
  const base = new Date(today);
  const dayNamesShort = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
  const DAY_TYPE_LABELS_MAP = { heavy: "Maksimivoima", volume: "Perusvoima", speed: "Nopeusvoima", competition: "Kilpailu", rest: "Lepo" };
  const options = [];
  for (const d of weekPlan.days) {
    const offset = d.dayOfWeek - todayDow;
    const date = new Date(base);
    date.setDate(date.getDate() + offset);
    const iso = date.toISOString().slice(0, 10);
    const dayLabel = d.label || DAY_TYPE_LABELS_MAP[d.dayType] || d.dayType || "?";
    const isToday = d.dayOfWeek === todayDow;
    const descBits = [];
    if (isToday) descBits.push("alkuperäinen (tänään)");
    if (offset < 0) descBits.push(`${Math.abs(offset)} pv sitten`);
    else if (offset > 0) descBits.push(`${offset} pv eteenpäin`);
    options.push({
      icon: isToday ? "📍" : "📅",
      label: `${dayNamesShort[d.dayOfWeek]} · ${dayLabel}`,
      desc: descBits.join(" · "),
      _dateISO: iso,
      _dayOfWeek: d.dayOfWeek,
      _dayType: d.dayType,
      _isToday: isToday,
    });
  }
  if (options.length === 0) return null;

  const idx = await showListModal("Vaihda tämän päivän plani", options.map(o => ({ icon: o.icon, label: o.label, desc: o.desc })));
  if (idx === null || idx < 0 || idx >= options.length) return null;
  const chosen = options[idx];
  if (chosen._isToday) {
    // Käyttäjä valitsi oman päivänsä — ei tarvita overrideä, palauta null
    showToast("Tämä on jo tämän päivän plani", "");
    return null;
  }
  return { dateISO: chosen._dateISO, label: chosen.label, dayType: chosen._dayType };
}

function formatDate(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric", year: "numeric" });
  } catch { return iso; }
}

const DAY_TYPE_LABELS = { heavy: "Maksimivoima", volume: "Perusvoima", speed: "Nopeusvoima", competition: "Kilpailu", rest: "Lepo" };
function dayTypeLabel(dt) { return DAY_TYPE_LABELS[dt] || dt; }

// Helper: find primary movement for multi-lift mesocycles (streetlifting_16w).
// Optional forDateISO — default "now"; käytetään mennyt-päivän backfillissä.
function getStreetliftingPrimaryMovement(state, forDateISO = null) {
  if (!state.mesocycle?.weekPlans || !state.mesocycle.startDateISO) return null;
  const start = new Date(state.mesocycle.startDateISO);
  const now = forDateISO ? new Date(forDateISO) : new Date();
  const weekNum = Math.floor((now - start) / (7 * 24 * 3600 * 1000)) + 1;
  if (weekNum < 1 || weekNum > 16) return null;
  const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
  if (!weekPlan) return null;
  const dow = now.getDay() || 7;
  const days = weekPlan.days || [];
  const dayPlan = days.find(d => d.dayOfWeek === dow) ||
    days.reduce((best, d) => {
      const dist = Math.min(Math.abs(d.dayOfWeek - dow), 7 - Math.abs(d.dayOfWeek - dow));
      const bestDist = best ? Math.min(Math.abs(best.dayOfWeek - dow), 7 - Math.abs(best.dayOfWeek - dow)) : Infinity;
      return dist < bestDist ? d : best;
    }, null);
  if (!dayPlan) return null;
  const primarySlot = dayPlan.slots?.find(s => s.role === "primary");
  if (!primarySlot?.defaultMovementName) return null;
  return state.movements.find(m => m.name === primarySlot.defaultMovementName) || null;
}

function formatDateShort(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric" });
  } catch { return iso; }
}

function dayOfWeekFi(iso) {
  if (!iso) return "";
  const days = ["Su", "Ma", "Ti", "Ke", "To", "Pe", "La"];
  return days[new Date(iso).getDay()];
}

// v4.23 P3.3: Error boundary. Render-virheet (template-literaali rikki,
// puuttuva state-kenttä, engine-kaatuminen) eivät saa tuottaa tyhjää sivua
// vaan diagnostiikkaruudun josta käyttäjä voi toipua. Tunnettu rajoitus:
// vain top-level render-virheet napataan — if-statement-haaran sisällä
// kaatuva expression tulee näkyviin normaalisti, minkä jälkeen tämä polku
// ei ehdi toimia.
function renderErrorBoundary(err, viewName) {
  const app = document.getElementById("app");
  const errMsg = (err && err.message) || String(err || "Tuntematon virhe");
  const errStack = (err && err.stack) ? err.stack.toString().slice(0, 800) : "";
  app.innerHTML = `<div class="fade-in">
    <div class="card" style="border-color:var(--bad)">
      <div class="card-title" style="color:var(--bad)">⚠ Renderöintivirhe — ${viewName}</div>
      <div style="font-family:monospace;font-size:12px;margin-bottom:12px;color:var(--warn);word-wrap:break-word">${errMsg}</div>
      ${errStack ? `<details style="margin-bottom:12px"><summary class="muted" style="font-size:11px;cursor:pointer">Tekninen stack trace</summary><pre style="font-size:10px;overflow-x:auto;color:var(--dim);white-space:pre-wrap;margin-top:8px">${errStack}</pre></details>` : ""}
      <div class="muted" style="font-size:12px;margin-bottom:10px">
        Tämä on vakava virhe. Data IndexedDB:ssä on yhä tallessa — pelkkä näkymän renderöinti epäonnistui. Voit yrittää:
      </div>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="state.view='dashboard'; render();">🏠 Etusivu</button>
        <button class="btn btn-sm btn-outline" onclick="location.reload()">🔄 Uudelleenlataus</button>
        <button class="btn btn-sm btn-outline" onclick="state.view='settings'; render();">⚙ Asetukset (backup)</button>
      </div>
    </div>
  </div>`;
}

function render() {
  const app = document.getElementById("app");
  const viewName = state.view || "dashboard";
  try {
    switch (viewName) {
      case "dashboard": app.innerHTML = renderDashboard(); break;
      case "workout": app.innerHTML = renderWorkout(); break;
      case "readiness": app.innerHTML = renderReadiness(); break;
      case "mesocycle": app.innerHTML = renderMesocycle(); break;
      case "movements": app.innerHTML = renderMovements(); break;
      case "history": app.innerHTML = renderHistory(); break;
      case "prs": app.innerHTML = renderPRs(); break;
      case "trends": app.innerHTML = renderTrends(); break;
      case "progress": app.innerHTML = renderProgress(); break;
      case "settings": app.innerHTML = renderSettingsView(); break;
      default: app.innerHTML = renderDashboard();
    }
  } catch (err) {
    console.error(`[render:${viewName}] crashed:`, err);
    renderErrorBoundary(err, viewName);
  }
  try {
    renderNav();
    bind();
  } catch (err) {
    console.error(`[render:${viewName}] bind failed:`, err);
    showToast(`Bindausvirhe — tarkista konsoli`, "bad", 5000);
  }
  // Rest-timer dock: re-attach observer to the (possibly freshly rendered) inline card
  // and re-evaluate dock visibility for the current view.
  if (state.restTimerInterval !== null) {
    ensureRestDock();
    updateRestTimerUI();
    attachRestInlineObserver();
    updateRestDockVisibility();
  }
}

function estimateDurationMin(slots) {
  if (!slots || !slots.length) return null;
  const restByRole = {
    primary: 180, backoff: 150, accessory: 75, support: 90,
    warmup: 90, opener: 240, attempt2: 300, attempt3: 300,
  };
  const sec = slots.reduce((acc, s) => {
    const setSec = (restByRole[s.role] ?? 90) + 25;
    return acc + (s.sets || 1) * setSec;
  }, 0);
  return Math.max(15, Math.round((sec + 10 * 60) / 60));
}

function buildPhaseTimelineHTML(meso, currentWeek, isDeloadActive) {
  if (!meso || !meso.weekCount || meso.weekCount < 2) return "";
  const dots = [];
  for (let w = 1; w <= meso.weekCount; w++) {
    const def = meso.weekDefs?.find(wd => wd.week === w);
    const isDeloadWeek = (def?.label || "").toLowerCase().includes("deload");
    const classes = ["phase-dot"];
    if (isDeloadWeek) classes.push("deload");
    if (typeof currentWeek === "number") {
      if (w < currentWeek) classes.push("done");
      if (w === currentWeek) classes.push("active");
    }
    dots.push(`<div class="${classes.join(" ")}"></div>`);
  }
  let legendHTML = "";
  if (meso.type === "streetlifting_16w" && meso.weekCount === 16) {
    const phases = [
      { name: "Hypertrofia", start: 1, end: 4 },
      { name: "Voima", start: 5, end: 8 },
      { name: "Intensifikaatio", start: 9, end: 12 },
      { name: "Peak", start: 13, end: 16 },
    ];
    legendHTML = `<div class="phase-legend">${phases.map(p => {
      const isCurrent = typeof currentWeek === "number" && currentWeek >= p.start && currentWeek <= p.end;
      return `<span class="${isCurrent ? (isDeloadActive ? "current deload" : "current") : ""}">${p.name}${isCurrent ? " ▲" : ""}</span>`;
    }).join("")}</div>`;
  }
  return `<div class="phase-timeline">${dots.join("")}</div>${legendHTML}`;
}

function renderDashboard() {
  const rec = state.recommendation;
  const r = state.readiness;
  const today = todayISO();
  const meso = state.mesocycle;
  const weekNum = rec?.weekNum ?? null;
  const weekLabel = rec?.weekLabel || "";
  const dayType = rec?.dayType || "heavy";

  const isDeloadOverride = meso ? isDeloadOverrideWeek(meso, today) : false;
  const isDeloadLabel = weekLabel.toLowerCase().includes("deload");
  const deloadMode = isDeloadOverride || isDeloadLabel;

  const readinessClass = r.combined === "GREEN" ? "chip-green" : r.combined === "YELLOW" ? "chip-yellow" : "chip-red";
  const readinessEmoji = r.combined === "GREEN" ? "🟢" : r.combined === "YELLOW" ? "🟡" : "🔴";

  const mt = meso?.type || null;
  const tpl = mt ? MESOCYCLE_TEMPLATES.find(t => t.id === mt) : null;
  const mesoChipClass = deloadMode ? "chip-yellow" : (mt === "peaking" ? "chip-yellow" : "chip-acc");
  const mesoChipIcon = deloadMode ? "🌿" : (tpl?.icon || "⭐");
  const mesoChipHTML = meso
    ? `<span class="chip ${mesoChipClass}">${mesoChipIcon} Vk ${weekNum ?? "?"}/${meso.weekCount}</span>`
    : "";

  const dayTypeFi = dayTypeLabel(dayType);
  const phaseEyebrow = (() => {
    if (deloadMode) return "Kevennys · palautuminen";
    if (meso?.type === "streetlifting_16w" && typeof weekNum === "number") {
      const block = weekNum <= 4 ? "Hypertrofia" : weekNum <= 8 ? "Voima" : weekNum <= 12 ? "Intensifikaatio" : "Peak";
      return `${block} · ${dayTypeFi}`;
    }
    if (weekLabel) return `${weekLabel} · ${dayTypeFi}`;
    return dayTypeFi;
  })();

  // Plan-override: kun käyttäjä on valinnut toisen päivän planin tänään
  const overrideISO = state.planOverrideDateISO;
  const isPlanOverridden = !!overrideISO && overrideISO !== today;
  const dayNamesShort = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
  const overrideDow = isPlanOverridden ? (new Date(overrideISO).getDay() || 7) : null;
  const overrideEyebrowHTML = isPlanOverridden
    ? `<span class="plan-override-chip">🔀 Vaihdettu · ${dayNamesShort[overrideDow]}</span>`
    : "";

  const heroTitle = rec?.dayPlan?.label || dayTypeFi;
  const slots = rec?.dayPlan?.slots || [];
  const workSlotCount = slots.filter(s => s.role !== "warmup").length || slots.length;
  const estDur = estimateDurationMin(slots);
  const heroSubParts = [];
  if (workSlotCount > 0) heroSubParts.push(`<b>${workSlotCount} työliikettä</b>`);
  if (estDur) heroSubParts.push(`arvioitu kesto <b>~${estDur} min</b>`);
  if (deloadMode) heroSubParts.push("kuormat pienennetty");
  const heroSub = heroSubParts.length ? heroSubParts.join(" · ") : "Ei ohjelmaa tänään";

// v4.26.0: renderöi snapshot-lista asetus-sivulle
async function renderBackupSnapshotsList() {
  const container = document.getElementById("backup-snapshots-list");
  if (!container) return;
  try {
    const snaps = await getAllBackupSnapshots();
    if (!snaps.length) {
      container.innerHTML = `<div style="color:var(--muted)">Ei snapshoteja vielä.</div>`;
      return;
    }
    const rowsHTML = snaps.map(s => {
      const d = new Date(s.createdAtISO);
      const dateStr = d.toLocaleString("fi-FI", { dateStyle: "short", timeStyle: "short" });
      const sizeKB = Math.round((s.sizeBytes || 0) / 1024);
      const reasonLabels = {
        "weekly-auto": "🗓 Auto",
        "manual": "👆 Käsin",
        "pre-import": "🛡 Ennen tuontia",
        "pre-restore": "🛡 Ennen restorea",
      };
      const reason = reasonLabels[s.triggerReason] || s.triggerReason || "?";
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);gap:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px">${dateStr}</div>
          <div style="font-size:10px;color:var(--muted)">${reason} · ${sizeKB} KB</div>
        </div>
        <button class="btn btn-sm btn-outline" data-restore-snapshot="${s.snapshotId}" title="Palauta tästä snapshotista">↻</button>
        <button class="btn btn-sm btn-outline" data-download-snapshot="${s.snapshotId}" title="Lataa snapshot JSONina">⬇</button>
      </div>`;
    }).join("");
    container.innerHTML = rowsHTML;

    // Wire restore & download buttons
    container.querySelectorAll("[data-restore-snapshot]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const sid = e.currentTarget.getAttribute("data-restore-snapshot");
        if (!confirm("Palauta tästä snapshotista? Nykyisestä datasta luodaan automaattisesti varmuussnapshot ennen palautusta.")) return;
        try {
          await restoreFromSnapshot(sid);
          await refresh();
          state.backupStatus = await getBackupStatus();
          showToast("Snapshot palautettu ✓", "ok");
          render();
        } catch (err) {
          showToast("Palautus epäonnistui: " + err.message, "bad");
        }
      });
    });
    container.querySelectorAll("[data-download-snapshot]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const sid = e.currentTarget.getAttribute("data-download-snapshot");
        const snap = snaps.find(x => x.snapshotId === sid);
        if (!snap) return;
        const blob = new Blob([JSON.stringify(snap.data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const iso = snap.createdAtISO.slice(0, 10);
        a.href = url; a.download = `leve-coach-snapshot-${iso}.json`;
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        showToast("Snapshot ladattu", "ok");
      });
    });
  } catch (e) {
    container.innerHTML = `<div style="color:var(--bad)">Virhe ladatessa snapshoteja</div>`;
  }
}

  const bs = state.backupStatus;

  if (bs.status === "fresh") return ""; // hiljaa OK-tilassa

  let icon = "📦";

    title = "Backupia ei ole vielä luotu";
    body = "Viikottainen auto-backup käynnistyy seuraavalla sovelluksen avauksella. Voit myös luoda sen nyt käsin asetuksista.";

function renderMissedBanner(missed, totalCount) {

    ? (diffDays === 1 ? "Eilisen alkuperäinen plan tekemättä" : `${dayNamesFull[missed.dayOfWeek] || "Aiempi"} alkuperäinen plan tekemättä`)
    : (diffDays === 1 ? "Eilinen treeni tekemättä" : `${dayNamesFull[missed.dayOfWeek] || "Aiempi"} tekemättä`);

    const session = state.sessions.find(ses => ses.sessionId === s.sessionId);

    ? `<div class="stim-warn-line">⚠ ${warn.message}${check.warnings.length > 1 ? ` · +${check.warnings.length - 1}` : ""}</div>`
