    // v4.27 Räätälöity ohjelma — wizard-pohjainen generaattori
    // v4.34.44: lisätty 1RM-kalibrointi (showGenericCalibrationModal) wizardin
    // jälkeen. Tulos tallennetaan mesocycle.movementCfg-tauluun, josta engine
    // (getCfgBaselineForMovement TASO 1) lukee baseline-arvon CFG-DRIFT + cap-
    // laskentaan. Streetlifting_16w säilyy täysin koskemattomana (oma flow).
    if (template.id === "custom") {
      const answers = await showProgramWizardModal();
      if (!answers) return;

      // Resolvoi uniikit primaryt — kysy 1RM kullekin
      const uniquePrimaries = [];
      const seen = new Set();
      for (const p of answers.primaries) {
        if (!seen.has(p.name)) { seen.add(p.name); uniquePrimaries.push(p); }
      }
      const defaultBw = state.settings?.bodyweightKg || 80;
      const cal = await showGenericCalibrationModal(uniquePrimaries, defaultBw);
      if (cal === null) return; // käyttäjä peruutti

      try {
        const customMeso = generateCustomMesocycle(answers, todayISO());
        // Tallenna 1RM-kalibrointi mesocycle.movementCfg-tauluun
        if (cal.movementCfg && Object.keys(cal.movementCfg).length > 0) {
          customMeso.movementCfg = cal.movementCfg;
        }
        assignVariantRotation(customMeso.weekPlans);
        await saveMesocycle(customMeso);
        await setActiveMesocycle(customMeso.mesocycleId);
        state.mesocycle = customMeso;
        // Päivitä BW jos käyttäjä muutti sitä kalibroinnissa
        if (cal.bwKg && cal.bwKg !== state.settings.bodyweightKg) {
          state.settings.bodyweightKg = cal.bwKg;
          await saveSettings(state.settings);
        }
        // v4.34.45: säilytä vanhat ohjelmat (preserveUserChoices=true) Historia-välilehdellä
        try {
          const cleanup = await cleanupOrphanMesocycles(customMeso.mesocycleId, { preserveUserChoices: true });
          if (cleanup.deleted > 0) {
            console.info(`[LeVe] Vaihda ohjelma: poistettu ${cleanup.deleted} orphan-mesosyklia`);
          }
        } catch (e) { console.warn("cleanupOrphanMesocycles failed:", e); }
        await computeRecommendation();
        const primaries = answers.primaries.map(p => p.name).join(" + ");
        const calMsg = cal.movementCfg && Object.keys(cal.movementCfg).length > 0
          ? `🎯 Räätälöity ohjelma aloitettu (${primaries}, kalibroitu)!`
          : `🎯 Räätälöity ohjelma aloitettu (${primaries})!`;
        showToast(calMsg, "ok", 4500);
        render();
      } catch (err) {
        console.error("generateCustomMesocycle failed:", err);
        showToast("Ohjelman luonti epäonnistui: " + err.message, "bad", 5000);
      }
      return;
    }

    // All other templates
    const factory = MESO_FACTORIES[template.id];
    if (!factory) { showToast("Tuntematon malli", "bad"); return; }

    const meso = factory(todayISO());
    // Assign variant rotation (except templates with hardcoded variants like eksentrinen/siirtyma/streetlifting_16w)
    if (!["eksentrinen", "siirtyma", "streetlifting_16w"].includes(template.id)) {

    await saveMesocycle(meso);

    // v4.34.45: säilytä vanhat ohjelmat (preserveUserChoices=true) Historia-välilehdellä
    try {

      if (cleanup.deleted > 0) {

      }

  // Edit day plan slots
  $$("[data-edit-day]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const [weekStr, dayStr] = btn.dataset.editDay.split("-");
      const weekNum = parseInt(weekStr);
      const dayOfWeek = parseInt(dayStr);
      const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
      if (!weekPlan) return;
      const day = weekPlan.days.find(d => d.dayOfWeek === dayOfWeek);
      if (!day) return;

      const dayNames = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };

      // Step 1: Choose action
      const action = await showListModal(
        `${dayNames[dayOfWeek]} — ${stripRedundantDayPrefix(day.label) || dayTypeLabel(day.dayType)}`,
        [
          { icon: "🔄", label: "Vaihda liike", desc: "Korvaa olemassa oleva liike toisella" },
          { icon: "➕", label: "Lisää liike", desc: "Lisää uusi liike päivään" },
          { icon: "🗑️", label: "Poista liike", desc: "Poista liike päivästä" },
          { icon: "✏️", label: "Muuta sarjoja/toistoja", desc: "Muokkaa sarjojen tai toistojen määrää" },
        ]
      );
      if (action === null) return;

      if (action === 0) {
        // Swap movement: choose which slot
        const slotIdx = await showListModal(
          "Minkä liikkeen vaihdat?",
          day.slots.map((s, i) => ({ icon: s.role === "primary" ? "🎯" : "🔸", label: s.defaultMovementName, desc: `${s.sets}×${s.reps} — ${s.category}` }))
        );
        if (slotIdx === null || slotIdx < 0 || slotIdx >= day.slots.length) return;
        const slot = day.slots[slotIdx];
        const sameCat = state.movements.filter(m => m.category === slot.category);
        const others = state.movements.filter(m => m.category !== slot.category);
        const options = [...sameCat, ...others];
        const movIdx = await showListModal(
          `Vaihda ${slot.defaultMovementName}`,
          options.map(m => ({ icon: sameCat.includes(m) ? "✅" : "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          slot.defaultMovementName = options[movIdx].name;
          slot.category = options[movIdx].category;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`Vaihdettu: ${options[movIdx].name}`, "ok");
          render();
        }
      } else if (action === 1) {
        // Add movement
        const options = state.movements;
        const movIdx = await showListModal(
          "Lisää liike",
          options.map(m => ({ icon: "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          const m = options[movIdx];
          const sr = await showSetsRepsModal(`${m.name} — Sarjat & toistot`);
          if (!sr) return;
          day.slots.push({
            role: "accessory",
            category: m.category,
            defaultMovementName: m.name,
            sets: sr.sets,
            reps: sr.reps,
            targetVx: null,
          });
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${m.name} lisätty`, "ok");
          render();
        }
      } else if (action === 2) {
        // Remove movement
        const removable = day.slots.map((s, i) => ({ s, i })).filter(x => x.s.role !== "primary");
        if (removable.length === 0) { showToast("Pääliikettä ei voi poistaa", "warn"); return; }
        const rIdx = await showListModal(
          "Poista liike",
          removable.map(x => ({ icon: "🗑️", label: x.s.defaultMovementName, desc: `${x.s.sets}×${x.s.reps}` }))

        if (rIdx !== null && rIdx >= 0 && rIdx < removable.length) {
          const removed = day.slots.splice(removable[rIdx].i, 1);
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${removed[0].defaultMovementName} poistettu`, "ok");
          render();
        }
      } else if (action === 3) {
        // Edit sets/reps
        const slotIdx = await showListModal(
          "Muokkaa liikettä",
          day.slots.map(s => ({ icon: "✏️", label: s.defaultMovementName, desc: `${s.sets}×${s.reps}` }))
        );
        if (slotIdx !== null && slotIdx >= 0 && slotIdx < day.slots.length) {
          const slot = day.slots[slotIdx];
          const sr = await showSetsRepsModal(`${slot.defaultMovementName}`, slot.sets, slot.reps);
          if (!sr) return;
          slot.sets = sr.sets;
          slot.reps = sr.reps;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast("Päivitetty", "ok");
          render();

      ? (meso.name || meso.type || "ohjelma").replace(/[^\wäöåÄÖÅ-]+/g, "-")

        ? `aikavali-${fromISO || "alku"}_${toISO || "loppu"}`
        : "kaikki-data";
    downloadFile(`leve-${baseName}-${todayISO()}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");

      const pkg = generateBlockTuningPackage({
        mesocycle: meso,
        sessions: state.sessions,
        allSets: state.allSets,
        measurements: state.measurements || [],
        prs: state.prs || [],
        currentWeekNum: wk,
        settings: state.settings,
        decisionTraces: state.decisionTraces || [],
      });
      if (pkg.error) {
        showToast(pkg.error, "warn", 5000);

      }
      // Tallenna historiaan (localStorage)
      saveBlockTuningSnapshot(pkg);
      // Renderöi modal
      renderBlockTuningModal(pkg);
    } catch (e) {
      console.error("[BlockTuning] error:", e);
      showToast("Virhe analyysipaketin generoinnissa: " + (e.message || "tuntematon"), "bad");
    }
  });

  // v4.34.27: End-of-Cycle Tuning generaattori (sisko AI-Block-Tuningille,

      showToast(`Import: ${result.sessionsImported} sessiota, ${result.setsImported} sarjaa`, "ok");

      showToast("CSV import epäonnistui: " + err.message, "bad");

  // Wipe

  if (wipeBtn) wipeBtn.addEventListener("click", async () => {
    if (!confirm("Poistetaanko kaikki data pysyvästi?")) return;
    if (!confirm("Oletko varma? Tätä ei voi perua.")) return;

    await refresh();
    showToast("Data poistettu", "ok");

  });

  // v4.26.0: Auto-backup -osio asetuksissa (snapshot-lista + manuaalinen luonti)

  if (manualSnapBtn) manualSnapBtn.addEventListener("click", async () => {
    manualSnapBtn.disabled = true;
    manualSnapBtn.textContent = "Luodaan…";
    try {
      await createBackupSnapshot("manual");
      state.backupStatus = await getBackupStatus();
      showToast("Snapshot luotu ✓", "ok");
      renderBackupSnapshotsList();
      manualSnapBtn.disabled = false;
      manualSnapBtn.textContent = "📦 Luo snapshot nyt";

      showToast("Snapshotin luonti epäonnistui", "bad");
      manualSnapBtn.disabled = false;
      manualSnapBtn.textContent = "📦 Luo snapshot nyt";

  });

  // v4.34.20: Pakota mesocycle-rebuild — manuaalinen ohitus auto-rebuildin tilalle
  // jos versiot eivät triggeröi (esim. backup-restore palautti vanhan version,
  // tai catalog-poistot eivät näy ohjelmassa). Pre-rebuild-snapshot luodaan
  // automaattisesti varmuuskopioksi. Edistys + treenihistoria säilyy.
  const forceRebuildBtn = $("#btn-force-rebuild");
  if (forceRebuildBtn) forceRebuildBtn.addEventListener("click", async () => {
    if (!state.mesocycle || state.mesocycle.type !== "streetlifting_16w") {
      showToast("Pakota rebuild toimii vain streetlifting_16w -mesosyklillä", "warn", 4000);
      return;
    }
    if (!confirm(
      "Pakota mesocycle-rebuild?\n\n" +
      "Tämä rakentaa nykyisen streetlifting_16w-ohjelman UUDESTAAN catalog-version mukaan. " +
      "Treenihistoria + sarjat + edistys SÄILYY. Vain ohjelman rakenne (slotit, accessoryt) päivittyy.\n\n" +
      "Pre-rebuild snapshot luodaan automaattisesti varmuuskopioksi.\n\n" +
      "Jatketaanko?"
    )) return;
    forceRebuildBtn.disabled = true;
    forceRebuildBtn.textContent = "Rebuildataan…";
    try {
      const oldVersion = state.mesocycle.programVersion || "unknown";
      // Pre-rebuild snapshot
      try {

      } catch (e) {
        console.warn("[ForceRebuild] Pre-rebuild snapshot failed:", e);
      }
      // Force rebuild
      state.mesocycle = rebuildStreetlifting16WMesocycle(state.mesocycle);
      await saveMesocycle(state.mesocycle);
      showToast(`✓ Rebuild onnistui (${oldVersion} → ${PROGRAM_BUILD_VERSION}). Sovellus ladataan uudelleen…`, "ok", 3000);
      setTimeout(() => location.reload(), 2000);
    } catch (err) {
      console.error("[ForceRebuild] error:", err);
      showToast("Rebuild epäonnistui: " + (err.message || "tuntematon"), "bad", 5000);
      forceRebuildBtn.disabled = false;
      forceRebuildBtn.textContent = "🔧 Pakota rebuild nyt";

    const url = new URL(window.location.href);
    url.searchParams.set("test", "1");
    window.location.href = url.toString();
  });
}

// WORKOUT ENGINE
// ═══════════════════════════════════════════════════════════════

async function startWorkout(backfillDateISO = null) {
  // Kun backfillDateISO on annettu, recomputataan suositus tuon päivän planille
  // ja session saa tuon päivämäärän. Normaali tänään-startissa käytetään nykyistä
  // state.recommendation'ia (joka voi olla planOverride-tilassa).
  if (backfillDateISO) {
    await computeRecommendation(backfillDateISO);
    // v4.22: jos backfill-päivä on ennen mesosyklin alkua, recommend() palauttaa
    // error-objektin. Estä workoutin luonti väärällä datalla ja palautu tänään.
    if (state.recommendation?.error === "before-start") {
      const msg = state.recommendation.errorMessage || "Päivämäärä on ennen mesosyklin alkua";
      showToast(msg, "bad", 5000);
      await computeRecommendation(); // palauta tänään
      throw new Error(`startWorkout: ${msg}`);
    }
  }
  const rec = state.recommendation;
  const bw = state.settings?.bodyweightKg || 91;
  const exercises = [];

  // Lukitaan mahdollinen plan-override workout-tilaan, sitten nollataan transient-kenttä
  const planSourceISO = backfillDateISO || state.planOverrideDateISO || todayISO();
  const usingPlanOverride = !backfillDateISO && !!state.planOverrideDateISO;
  state.planOverrideDateISO = null;

  // Build warm-up sets for primary movement (prepended to primary exercise below)
  const isPeakingMeso = state.mesocycle?.type === "peaking";
  let warmupSets = [];
  if (!isPeakingMeso) {
    const wuLoad = rec?.targetExternalLoad;
    const warmupPcts = wuLoad && wuLoad >= 60
      ? [0, 0.30, 0.55, 0.75, 0.90]
      : wuLoad && wuLoad >= 30
        ? [0, 0.50, 0.80]
        : wuLoad && wuLoad >= 20
          ? [0, 0.60]
          : null;
    if (warmupPcts) {
      warmupSets = warmupPcts.map((pct, i) => ({
        idx: i,
        targetReps: pct === 0 ? 5 : pct < 0.7 ? 3 : 2,
        targetVx: null,
        loadKg: roundToHalf(wuLoad * pct),
        reps: null,
        actualVx: null,
        velocity: null,
        completed: false,
        isWarmup: true,
      }));
    } else {
      // v4.22: Fallback — ensimmäisessä sessiossa rec.targetExternalLoad on
      // tyypillisesti null koska e1RM-historiaa ei ole. Generoi silti yleinen
      // kehonpaino-pohjainen ramp-up jotta käyttäjä ei heti hyppää työsarjoihin
      // kylmänä. Käytetään liikkeen primary-slotin defaultMovementNamea
      // tunnistamaan onko kyseessä lisäpainoliike (BW-based) vai tangolla
      // tehtävä (vanity rep warmup).
      const primarySlot = rec?.dayPlan?.slots?.find(s => s.role === "primary");
      const isBodyweightAdded = primarySlot && (
        primarySlot.category === "vertikaaliveto" ||
        primarySlot.category === "horisontaalityöntö" && primarySlot.defaultMovementName?.toLowerCase().includes("dippi")
      );
      warmupSets = isBodyweightAdded
        ? [
            { idx: 0, targetReps: 5, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Kehonpaino × 5" },
            { idx: 1, targetReps: 3, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Kehonpaino × 3 räjähtävästi" },
          ]
        : [
            { idx: 0, targetReps: 8, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Tyhjä tanko × 8" },
            { idx: 1, targetReps: 5, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Tee liike rauhassa, tunnustele" },
          ];
    }
  }

  // Build exercises from day plan
  if (rec?.dayPlan?.slots) {
    for (const slot of rec.dayPlan.slots) {
      const mov = state.movements.find(m => m.name === slot.defaultMovementName);
      const movId = mov?.movementId || null;
      const isPrimary = slot.role === "primary";
      const isAttempt = ["warmup", "opener", "attempt2", "attempt3"].includes(slot.role);

      let loadKg;
      const isBackoff = slot.role === "backoff";
      const isSecondary = slot.role === "secondary";

      // Competition day: use computed attempt loads
      if (isAttempt && rec.attemptLoads) {
        if (slot.role === "warmup" && Array.isArray(slot.loadPctE1RM)) {
          // Warmup sets use slot-level percentages (handled per-set below)
          loadKg = rec.attemptLoads.warmupLoads[0] || 0;
        } else if (slot.role === "opener") {
          loadKg = rec.attemptLoads.opener;
        } else if (slot.role === "attempt2") {
          loadKg = rec.attemptLoads.second;
        } else if (slot.role === "attempt3") {
          loadKg = rec.attemptLoads.third;
        }
      } else if (isPrimary && rec.targetExternalLoad !== null) {
        // Apply variant load modifier (with athlete overrides)
        const vMod = variantLoadModifier(slot.variantName, state.settings?.variantModifiers);
        loadKg = roundToHalf(rec.targetExternalLoad * (1 + vMod));
      } else if ((isBackoff || isSecondary || slot.role === "calibration") && typeof slot.resolvedLoadKg === "number") {
        // v4.27.13: Engine-resolvoitu loadPct-kuorma backoff/secondary-slotille.
        // v4.34.15: Lisätty calibration-rooli — cal-päivän slotit saavat nyt loadPct-resolution
        // engineltä (Fix #2: cal-load = pct × current e1RM, capped PR × 1.025).
        const vMod = variantLoadModifier(slot.variantName, state.settings?.variantModifiers);
        loadKg = roundToHalf(slot.resolvedLoadKg * (1 + vMod));
      } else if (isBackoff && rec.targetExternalLoad !== null) {
        // Fallback: slot ei määrittele loadPct:tä (legacy default-mesosykli) →
        // käytä vanhaa primary × 0.85 -sääntöä.
        const vMod = variantLoadModifier(slot.variantName, state.settings?.variantModifiers);
        loadKg = roundToHalf(rec.targetExternalLoad * 0.85 * (1 + vMod));
      } else if (mov) {
        // Get movement progress for accessory
        const progress = await getMovementProgress(movId);
        if (progress?.suggestedLoadKg) {
          loadKg = progress.suggestedLoadKg;
        } else if (progress?.lastLoadKg) {
          loadKg = progress.lastLoadKg;
        } else {
          loadKg = null; // New movement — user will enter
        }
      } else {
        loadKg = null;
      }

      const progressInfo = mov ? await getMovementProgress(movId) : null;
      const progressSuggestion = progressInfo?.suggestedAction || "hold";

      // Variant tempo override
      const vOverride = variantRepOverride(slot.variantName);

      // Build per-set loads (warmup sets have different loads)
      const setsList = Array.from({ length: slot.sets }, (_, i) => {
        let setLoad = loadKg;
        if (isAttempt && slot.role === "warmup" && rec.attemptLoads) {
          setLoad = rec.attemptLoads.warmupLoads[i] || loadKg;
        }
        return {
          idx: i,
          targetReps: slot.reps,
          targetVx: slot.targetVx,
          loadKg: setLoad,
          reps: null,
          actualVx: null,
          velocity: null,
          completed: false,
        };
      });

      // Prepend warmup sets to primary exercise (not a separate exercise)
      const finalSets = (isPrimary && warmupSets.length > 0)
        ? [...warmupSets, ...setsList].map((s, i) => ({ ...s, idx: i }))
        : setsList;
      if (isPrimary && warmupSets.length > 0) warmupSets = []; // consume once

      exercises.push({
        movementId: movId,
        name: slot.defaultMovementName || slot.category,
        category: slot.category,
        originalCategory: slot.category,
        role: slot.role,
        variantName: slot.variantName || null,
        tempoNote: vOverride?.tempoNote || null,
        loadKg,
        // v4.27.9: exposataan targetVx + reps exercise-tasolle jotta
        // pickRestForExercise voi erotella compound-loaded (2-3 min) isolation-
        // työstä (1-1.5 min). Ilman näitä accessory-haara pudotti KAIKKI tuki-
        // liikkeet isolation-lokeroon (undefined reps → !hasLoadedTarget → isolation).
        targetVx: slot.targetVx ?? null,
        reps: slot.reps ?? null,
        progressSuggestion,
        sets: finalSets,
        // Slot metadata (v4.11) for smart swap/lock UI
        slotId: slot.slotId || null,
        slotFunction: slot._resolvedFrom?.slotFunction || null,
        slotSource: slot._resolvedFrom?.source || null,
        slotVariantIndex: slot._resolvedFrom?.variantIndex ?? null,
        slotVariants: slot._resolvedFrom?.availableVariants || null,
        // v4.25.1 (Enode): velocity-ankkuripisteet ja zone-kynnys
        allowVelocityInput: slot.allowVelocityInput === true,
        velocityStop: slot.velocityStop ?? null,
        // v4.27.15: AMRAP-kalibrointi-slotin metadata UI:n renderöintiä varten
        isCalibration: slot.isCalibration === true || slot.role === "calibration",
        amrapTargetRange: slot.amrapTargetRange || null,
      });
    }
  } else {
    // Fallback: just primary movement
    exercises.push({
      movementId: null,
      name: "Lisäpainoleuanveto",
      category: "vertikaaliveto",
      originalCategory: "vertikaaliveto",
      role: "primary",
      loadKg: rec?.targetExternalLoad,
      targetVx: rec?.targetVx ?? null,
      reps: rec?.targetReps ?? null,
      progressSuggestion: "hold",
      sets: Array.from({ length: rec?.setCount || 3 }, (_, i) => ({
        idx: i,
        targetReps: rec?.targetReps || 3,
        targetVx: rec?.targetVx || 2,
        loadKg: rec?.targetExternalLoad,
        reps: null,
        actualVx: null,
        velocity: null,
        completed: false,
      })),
    });
  }

  state.workout = {
    sessionId: uid(),
    dateISO: backfillDateISO || todayISO(),
    isBackfill: !!backfillDateISO,
    planSourceDateISO: planSourceISO,
    isPlanOverride: usingPlanOverride,
    dayType: rec?.dayType || "heavy",
    exercises,
    currentExerciseIdx: 0,
    currentSetIdx: 0,
    startedAt: new Date().toISOString(),
    warmupProtocol: rec?.dayPlan?.warmup || [],
    warmupProtocolDone: false,
    // Readiness primer (v4.21): ennen ensimmäistä työsarjaa pääliikkeellä
    // Rakenne kun primer tehty: { done:true, skipped:false, velocities:[...],
    //   best, loadKg, movementId, timestamp }
    // Kun käyttäjä ohittaa: { done:false, skipped:true }
    primer: null,
  };

  // v4.22: hanki Wake Lock koko treenin ajaksi (näyttö pysyy auki).
  // AudioContext alustetaan käyttäjäinteraktion (tämä nappi) jälkeen jotta
  // rest-timer-beep voi soida ilman autoplay-blokkausta.
  ensureAudioCtx();
  ensureWakeLock();

  // v4.28.1: autosave heti alusta — jos käyttäjä keskeyttää ennen ensimmäistäkään
  // sarjaa, sovellus muistaa että treeni oli käynnissä ja tarjoaa jatkoa.
  savePendingWorkoutLocal(state.workout);

  render();
}

function bindWorkoutEvents() {
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const w = state.workout;
  if (!w) return;

  let selectedReps = null;
  let selectedVara = null;

  // Reps buttons
  $$("[data-reps]").forEach(btn => {
    btn.addEventListener("click", () => {
      $$("[data-reps]").forEach(b => b.classList.remove("selected"));
      $$("[data-reps-more]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedReps = parseInt(btn.dataset.reps);
      checkNextSetEnabled();
    });
  });

  // "…" manual-reps button: prompt for arbitrary integer (supports AMRAP / 15+)
  $$("[data-reps-more]").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = window.prompt("Syötä toistomäärä (1–50):", selectedReps ? String(selectedReps) : "");
      if (input === null) return;
      const n = parseInt(input, 10);
      if (!Number.isFinite(n) || n < 1 || n > 50) {
        alert("Anna kokonaisluku välillä 1–50.");
        return;
      }
      $$("[data-reps]").forEach(b => b.classList.remove("selected"));
      $$("[data-reps-more]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      btn.textContent = String(n);
      selectedReps = n;
      checkNextSetEnabled();
    });
  });

  // Vara buttons
  $$("[data-vara]").forEach(btn => {
    btn.addEventListener("click", () => {
      $$("[data-vara]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedVara = parseInt(btn.dataset.vara);
      // Näytä attemptedReps-kenttä vain kun V0 (failure)
      const attemptedContainer = $("#attempted-reps-container");
      if (attemptedContainer) {
        if (selectedVara === 0) {
          attemptedContainer.classList.remove("hidden");
        } else {
          attemptedContainer.classList.add("hidden");
        }
      }
      checkNextSetEnabled();
    });
  });

  function checkNextSetEnabled() {
    const nextBtn = $("#btn-next-set");
    if (!nextBtn) return;
    const ready = selectedReps !== null && selectedVara !== null;
    nextBtn.disabled = !ready;
    nextBtn.classList.toggle("ready", ready);
    if (ready) {
      nextBtn.textContent = `✓ Tallenna sarja · ${selectedReps} × V${selectedVara}`;
    } else if (selectedReps !== null) {
      nextBtn.textContent = "Valitse vara";
    } else if (selectedVara !== null) {
      nextBtn.textContent = "Valitse toistot";
    } else {
      nextBtn.textContent = "Valitse toistot ja vara";
    }
  }

  // Warmup done — advance to next warmup set (or first work set)
  const warmupDoneBtn = $("#btn-warmup-done");
  if (warmupDoneBtn) warmupDoneBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;
    currentSet.completed = true;
    currentSet.reps = currentSet.targetReps;
    currentSet.actualVx = null; // warmup — no Vara tracking
    // Capture readiness velocity from last warmup of primary lift
    const velInput = document.getElementById("input-warmup-velocity");
    if (velInput && velInput.value) {
      const vv = parseFloat(velInput.value);
      if (!isNaN(vv) && vv > 0.1 && vv < 2.0) {
        state.todayVelocity = vv;
        currentSet.velocity = vv;
        currentSet.setRole = "readiness_test";
      }
    }
    w.currentSetIdx++;
    selectedReps = null;
    selectedVara = null;
    savePendingWorkoutLocal(state.workout);
    render();
  });

  // Skip all remaining warmup sets
  const skipWarmupBtn = $("#btn-skip-warmup");
  if (skipWarmupBtn) skipWarmupBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    // Mark all warmup sets as completed and skip to first work set
    exercise.sets.forEach(s => {
      if (s.isWarmup && !s.completed) {
        s.completed = true;
        s.reps = s.targetReps;
        s.actualVx = null;
      }
    });
    const firstWorkIdx = exercise.sets.findIndex(s => !s.isWarmup);
    w.currentSetIdx = firstWorkIdx >= 0 ? firstWorkIdx : exercise.sets.length;
    selectedReps = null;
    selectedVara = null;
    savePendingWorkoutLocal(state.workout);
    render();
  });

  // Edit load
  const loadBtn = $("#btn-edit-load");
  if (loadBtn) loadBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;
    const input = await showInputModal("Muokkaa painoa", "Paino (kg)", String(currentSet.loadKg || ""), "number");
    if (input !== null) {
      const v = parseNumericInput(input);
      if (v !== null) {
        currentSet.loadKg = v;
        // Update all remaining sets too
        exercise.sets.forEach((s, i) => { if (i >= w.currentSetIdx) s.loadKg = v; });
        render();
      }
    }
  });

  // v4.34.24: prev-ghost (Edellinen kerta) klikkaus → modal viim. 3 session detaljilla
  $$("[data-prior-sessions]").forEach(el => {
    el.addEventListener("click", () => {
      const movementId = el.getAttribute("data-prior-sessions");
      const movementName = el.getAttribute("data-prior-name") || "Liike";
      openPriorSessionsModal(movementId, w.sessionId, movementName);
    });
  });

  // Next set
  const nextSetBtn = $("#btn-next-set");
  if (nextSetBtn) nextSetBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;

    const velocity = parseNumericInput($("#input-set-velocity")?.value);

    currentSet.reps = selectedReps;
    currentSet.actualVx = selectedVara;
    currentSet.velocity = velocity;
    currentSet.completed = true;

    // Tallenna attemptedReps (failure-tilanteessa)
    if (selectedVara === 0) {
      const attemptedInput = $("#input-attempted-reps");
      const attemptedVal = attemptedInput ? parseInt(attemptedInput.value) : null;
      currentSet.attemptedReps = (attemptedVal && attemptedVal > 0) ? attemptedVal : (selectedReps + 1);
    } else {
      currentSet.attemptedReps = null;
    }

    // Failure reaction (v4.32.8: block-aware — phase parametri)
    // v4.34.25: + isolation-luokitus (estää yli-suojaus hauis/pohje/sivunostossa)
    if (selectedVara === 0) {
      const isPrimary = exercise.role === "primary";
      const consecutiveFailures = exercise.sets.slice(0, w.currentSetIdx + 1).filter(s => s.actualVx === 0).length;
      // Block-phase haetaan rec:istä (recommend()-output) tai mesocyclen weekDef:istä
      const weekNum = state.recommendation?.weekNum;
      const blockPhase = weekNum ? phaseForWeek(weekNum) : null;
      // v4.34.25: tunnista isolation-liikkeet (hauis/pohje/sivunosto/leg curl/scapular/core)
      // jotta last-set V0 EI laukaise -2.5% ensi vk:lle. Hypertrofian normaali stimulus.
      const isIsolation = isIsolationMovement(exercise.category);
      const workSets = exercise.sets.filter(s => !s.isWarmup);
      const currentWorkSetIdx = workSets.findIndex(s => s === currentSet);
      const isLastSet = currentWorkSetIdx >= 0 && currentWorkSetIdx === workSets.length - 1;
      // v4.34.28: kerää aiempien sarjojen Vx-arvot multi-set V0 -tunnistukseen
      // (cowork-audit kohta 4.4 vaihtoehto c). Soft-warning jos 2+ peräkkäistä V0
      // isolaatiossa — atleetti näkee ilmoituksen mutta valinta säilyy.
      const previousSetVxs = workSets
        .filter((s, i) => i < currentWorkSetIdx && s.completed)
        .map(s => s.actualVx);
      const reaction = failureReaction(currentSet.loadKg || 0, currentSet.targetReps, isPrimary, consecutiveFailures, blockPhase, { isIsolation, isLastSet, previousSetVxs });

      if (reaction.shouldStop) {
        showToast(reaction.message || "Failure — lopetatko liikkeeseen?", "bad", 6000);
      } else {
        showToast(reaction.message, "warn");
      }
      // v4.34.28: Multi-set V0 -varoitus näkyy lisätoasti-ilmoituksena (4 sek)
      if (reaction.warning) {
        setTimeout(() => showToast(reaction.warning, "warn", 4000), 500);
      }

      // Adjust remaining sets
      exercise.sets.forEach((s, i) => {
        if (i > w.currentSetIdx && !s.completed) {
          s.loadKg = reaction.nextSetLoad;
          s.targetReps = reaction.nextSetReps;
        }
      });
    } else if (currentSet.targetVx !== null && currentSet.targetVx !== undefined &&
               selectedVara >= currentSet.targetVx + 2) {
      // v4.34.41: INTRA-SESSION CAPACITY BUMP — käänteinen near-failure-varoitukselle.
      // Jos ekka työsarja meni HELPPOA target+2 luokkaa (V5 vs V3), ehdotetaan
      // kuorman nostoa seuraaviin sarjoihin. Käyttäjäpalaute 2026-05-07: "haluan
      // oikean ärsykkeen jos ekan sarjan V5 fresh osoittaa kuorman alikuorman".
      // Konservatiivinen +2.5-5 % bump, freshness-suoja sisäänrakennettu.
      const isPrimary = exercise.role === "primary";
      const isFirstWorkSet = exercise.sets.filter((s, i) => !s.isWarmup && s.completed && i <= w.currentSetIdx).length === 1;
      const dayType = state.workout?.dayType || state.recommendation?.dayType;
      if (isPrimary && isFirstWorkSet) {
        const bump = intraSessionLoadAdjustSuggestion({
          firstSetVx: selectedVara,
          targetVx: currentSet.targetVx,
          currentLoadKg: currentSet.loadKg || 0,
          isPrimary, dayType, setRole: "top"
        });
        if (bump?.shouldAdjust) {
          const remainingSets = exercise.sets.slice(w.currentSetIdx + 1).filter(s => !s.isWarmup && !s.completed);
          if (remainingSets.length > 0) {
            const ok = confirm(
              `Ekka sarja V${selectedVara} (target V${currentSet.targetVx}) — kuorma näyttää alle kapasiteetin.\n\n` +
              `Nosta seuraavat ${remainingSets.length} sarjaa kuormaan ${bump.suggestedLoadKg} kg?\n` +
              `${currentSet.loadKg} kg → ${bump.suggestedLoadKg} kg (+${bump.bumpKg.toFixed(1)} kg / +${bump.bumpPct.toFixed(1)} %)\n\n` +
              `Freshness-suoja: ekka V${selectedVara} fresh ei takaa että V${currentSet.targetVx} kestää loppuun. Konservatiivinen nosto.`
            );
            if (ok) {
              exercise.sets.forEach((s, i) => {
                if (i > w.currentSetIdx && !s.isWarmup && !s.completed) s.loadKg = bump.suggestedLoadKg;
              });
              showToast(`🚀 Kuorma nostettu ${bump.suggestedLoadKg} kg seuraaviin sarjoihin`, "ok", 3500);
            } else {
              showToast(`Pidätetty — V${selectedVara} kirjattu, kuorma ${currentSet.loadKg} kg säilyy`, "warn", 3000);
            }
          }
        }
      }
    } else if (currentSet.targetVx !== null && currentSet.targetVx !== undefined &&
               selectedVara <= currentSet.targetVx - 2) {
      // v4.22: Near-failure in-session varoitus. Jos todellinen Vx on 2+
      // luokkaa tavoitetta alempi (esim. tavoite V3 → todellinen V1),
      // kuorma on liian raskas. Kysy käyttäjältä: laskenko 5 % seuraavalle?
      const deltaVx = currentSet.targetVx - selectedVara;
      const isPrimary = exercise.role === "primary" || exercise.role === "backoff";
      // Vain primary/backoff skaalautuu — accessory-liikkeet eivät ole niin
      // kriittisiä ja saattavat olla tarkoituksella "lähellä failurea"
      if (isPrimary) {
        const suggestedDrop = deltaVx >= 3 ? 0.90 : 0.95;
        const remainingSets = exercise.sets.slice(w.currentSetIdx + 1).filter(s => !s.completed);
        const affectedCount = remainingSets.length;
        if (affectedCount > 0) {
          const newLoad = roundToHalf((currentSet.loadKg || 0) * suggestedDrop);
          const dropPct = Math.round((1 - suggestedDrop) * 100);
          const ok = confirm(
            `Tämä sarja meni V${selectedVara} (tavoite V${currentSet.targetVx}) — ${deltaVx} luokkaa liian lähellä failurea.\n\n` +
            `Laske kuorma ${dropPct} % seuraavissa ${affectedCount} sarjassa?\n` +
            `${currentSet.loadKg} kg → ${newLoad} kg`
          );
          if (ok) {
            exercise.sets.forEach((s, i) => {
              if (i > w.currentSetIdx && !s.completed) s.loadKg = newLoad;
            });
            showToast(`Kuorma laskettu ${newLoad} kg seuraaviin sarjoihin`, "ok");
          } else {
            showToast(`Pidätetty — V${selectedVara} kirjattu sellaisenaan`, "warn");
          }
        } else {
          showToast(`V${selectedVara} (tavoite V${currentSet.targetVx}) — paina paremmin seuraavana sessiona`, "warn");
        }
      }
    }

    // VL% calculation (prosenttipohjainen — laskee suhteessa 1. sarjan velocityyn)
    if (velocity && exercise.sets[0]?.velocity) {
      const vl = velocityLossPercent(exercise.sets[0].velocity, velocity);
      if (vl !== null && vl > (state.settings?.vlStopPercent || 20)) {
        showToast(`VL% = ${vl.toFixed(1)}% — yli rajan!`, "warn");
      }
    }

    // v4.23 P2.2: Absolute velocityStop per slot. Kun ohjelma-tekijä on
    // asettanut slot.velocityStop:n (esim. 0.50 m/s peaking-setille), ja
    // käyttäjä kirjaa sen ALITTAVAN velocityn, varoitetaan: seuraava sarja
    // olisi tehokkaampi kevyemmällä kuormalla. Eri kuin VL% — tämä on
    // absoluuttinen raja ohjelma-tekijän ennakoima "hyvä sarja" vs.
    // "rasittaa liikaa".
    const slotVelocityStop = (() => {
      // Hae slot jolta exercise muodostettu — matchataan dayPlanissa
      const rec = state.recommendation;
      const slot = rec?.dayPlan?.slots?.find(s =>
        s.role === exercise.role &&
        (s.defaultMovementName === exercise.name || s.category === exercise.category)
      );
      return slot?.velocityStop;
    })();
    if (velocity && slotVelocityStop && velocity < slotVelocityStop) {
      showToast(
        `⚠ Velocity ${velocity.toFixed(2)} m/s alittaa tavoitteen ${slotVelocityStop.toFixed(2)} m/s — harkitse kuorman laskua tai sarjan lopettamista`,
        "warn", 4500
      );
    }

    // Start rest timer
    startRestTimer();

    w.currentSetIdx++;
    selectedReps = null;
    selectedVara = null;
    savePendingWorkoutLocal(state.workout);
    render();
  });

  // Add extra set to current exercise
  const addSetBtn = $("#btn-add-set");
  if (addSetBtn) addSetBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const lastSet = exercise.sets[exercise.sets.length - 1];
    const maxIdx = exercise.sets.reduce((max, s) => Math.max(max, s.idx || 0), 0);
    exercise.sets.push({
      idx: maxIdx + 1,
      targetReps: lastSet?.targetReps || 3,
      targetVx: lastSet?.targetVx || 2,
      loadKg: lastSet?.loadKg || null,
      reps: null,
      actualVx: null,
      velocity: null,
      completed: false,
    });
    showToast("Lisäsarja lisätty", "ok");
    render();
  });

  // Add extra exercise (v4.32.0 — eliittitason älykkyys)
  const addExBtn = $("#btn-add-exercise");
  if (addExBtn) addExBtn.addEventListener("click", async () => {
    const optionsRaw = state.movements.filter(m => !w.exercises.some(ex => ex.movementId === m.movementId));
    if (optionsRaw.length === 0) { showToast("Kaikki liikkeet jo mukana", "warn"); return; }

    // v4.32.0 TASO 1 — Listausjärjestys: saman kategorian liikkeet ensin (kuten swap)
    const primary = w.exercises.find(ex => ex.role === "primary");
    const currentEx = w.exercises[w.currentExerciseIdx];
    const refCategory = currentEx?.category || primary?.category || null;
    const sameCategory = refCategory ? optionsRaw.filter(m => m.category === refCategory) : [];
    const otherCategory = refCategory ? optionsRaw.filter(m => m.category !== refCategory) : optionsRaw;
    const options = [...sameCategory, ...otherCategory];

    // v4.32.0 TASO 2+3 — Suositukset jokaiselle liikkeelle: historia → slot-katalogi → default
    // Lasketaan vain kerran cache-arvona koska iso lista voisi muuten olla hidasta.
    const phase = (() => {
      const meso = state.mesocycle;
      const wk = state.recommendation?.weekNum;
      if (meso?.type === "streetlifting_16w" && typeof wk === "number") {
        return wk <= 4 ? "foundation" : wk <= 8 ? "strength" : wk <= 12 ? "intensity" : "peaking";
      }
      return "foundation";
    })();
    const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;
    const suggestParamsForMovement = (m) => {
      // 1. Käyttäjän aiempi historia — etsi viimeisin sessio jossa liikettä tehtiin
      // v4.32.2 BUGIKORJAUS: filtteröi primer- (readiness_test) ja calibration-rivit
      // pois — ne ovat erityismittauksia eivätkä edusta normaalia treenisarja-rakennetta.
      // Aiemmin sets-määrä saattoi olla 1 (jos viimeinen sessio oli pelkkä primer).
      const movementSets = (state.allSets || [])
        .filter(s =>
          s.movementId === m.movementId &&
          s.setRole !== "readiness_test" &&
          s.setRole !== "calibration" &&
          !s.isWarmup
        )
        .sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
      if (movementSets.length > 0) {
        const lastSet = movementSets[0];
        const lastSessionSets = movementSets.filter(s => s.sessionId === lastSet.sessionId);
        if (lastSessionSets.length > 0) {
          // Mediaani-paino jotta yksittäinen anomalia ei vinouta suositusta
          const loads = lastSessionSets.map(s => s.externalLoadKg).filter(v => v != null && v > 0);
          const medianLoad = loads.length ? loads.sort((a,b) => a-b)[Math.floor(loads.length/2)] : null;
          return {
            sets: lastSessionSets.length,
            reps: lastSet.reps || lastSet.targetReps || 10,
            targetVx: lastSet.targetVx,
            loadKg: medianLoad,
            source: "history",
            sourceDetail: `Edellinen treeni · ${lastSessionSets.length}×${lastSet.reps}${lastSet.targetVx != null ? ` V${lastSet.targetVx}` : ""}${medianLoad ? ` @ ${medianLoad} kg` : ""}`,
          };
        }
      }
      // 2. ACCESSORY_SLOT_CATALOG — etsi slot jonka variantti tämä on
      try {
        for (const [slotId, slotDef] of Object.entries(ACCESSORY_SLOT_CATALOG || {})) {
          const variants = slotDef.phaseVariants?.[phase] || [];
          if (variants.includes(m.name)) {
            const rs = slotDef.repScheme?.[phase];
            if (rs) {
              return {
                sets: rs.sets || 3,
                reps: rs.reps || 10,
                targetVx: rs.targetVx ?? null,
                loadKg: null,
                source: "catalog",
                sourceDetail: `Slot ${slotId} (${phase}) · ${rs.sets}×${rs.reps}${rs.targetVx != null ? ` V${rs.targetVx}` : ""}`,
              };
            }
          }
        }
      } catch (e) { /* fallback to default */ }
      // 3. TASO 3 — Painosuositus e1RM-historian perusteella jos kuormitettu
      //    Lisäpainoleuanveto / Lisäpainodippi / Takakyykky / Maastaveto / Penkkipunnerrus
      // v4.32.4 (D): jos sets-historia tyhjä, fallback PR-rekisteriin (state.prs)
      //   → käyttäjä näkee 60 % paino­suosituksen heti vk 1:llä, ei vasta 3+ treenin jälkeen
      const KUORMITETUT = ["Lisäpainoleuanveto", "Lisäpainodippi", "Takakyykky", "Maastaveto", "Penkkipunnerrus"];
      let suggestedLoad = null;
      let loadDetail = "";
      if (KUORMITETUT.includes(m.name)) {
        try {
          const allLiftSets = (state.allSets || []).filter(s => s.movementId === m.movementId);
          let currentE1RM = null;
          let e1rmSource = "history"; // "history" tai "PR"
          if (allLiftSets.length > 0) {
            // v4.34.34 BUG 1 -fix: anna m-objekti (sisältää loadType:n)
            const history = computeMovementE1RMHistory(allLiftSets, state.sessions, m, bw);
            if (history.length > 0 && history[history.length - 1].e1rm > 0) {
              currentE1RM = history[history.length - 1].e1rm;
            }
          }
          // v4.32.4: PR-fallback jos historiaa ei ole
          if (!currentE1RM) {
            const prs = (state.prs || []).filter(p => p.movementName === m.name && p.value > 0);
            if (prs.length > 0) {
              // Otetaan korkein PR-arvo (paras 1RM)
              currentE1RM = Math.max(...prs.map(p => p.value));
              e1rmSource = "PR";
            }
          }
          if (currentE1RM && currentE1RM > 0) {
            // 60 % e1RM = standardin accessory-kuorma
            const isBarbell = m.category === "alaraaja";
            const raw = currentE1RM * 0.60;
            suggestedLoad = isBarbell ? Math.round(raw / 2.5) * 2.5 : Math.round(raw * 2) / 2;
            loadDetail = e1rmSource === "PR"
              ? ` @ ${suggestedLoad} kg (60 % PR ${currentE1RM} kg)`
              : ` @ ${suggestedLoad} kg (60 % e1RM)`;
          }
        } catch (e) { /* ignore */ }
      }
      // 4. Default 3×10 (yleinen accessory)
      return {
        sets: 3,
        reps: 10,
        targetVx: null,
        loadKg: suggestedLoad,
        source: "default",
        sourceDetail: `Default 3×10${loadDetail}`,
      };
    };

    // Esivalmistele suositukset listamodaalille
    const optionsWithSugg = options.map(m => ({ m, sugg: suggestParamsForMovement(m) }));

    // v4.32.4 (A): Lyhennetty Top 5 -lista oletuksena, "📋 Näytä kaikki..." -toggle.
    // Vähennetään UX-kuormaa kun listalla on 100+ liikettä. Top N = saman kategorian
    // liikkeet (slot-suositukset etusijalla) + "Näytä kaikki" -optio.
    const TOP_N = 5;
    const showTopN = optionsWithSugg.length > TOP_N + 1;
    let chosenIdx = null;
    let chosenItem = null;
    if (showTopN) {
      const topItems = optionsWithSugg.slice(0, TOP_N);
      const showAllOptionIdx = topItems.length;
      const movIdx = await showListModal(
        "Lisää liike",
        [
          ...topItems.map(({ m, sugg }, i) => ({
            icon: i < sameCategory.length ? "✅" : "🔹",
            label: m.name,
            desc: `${m.category} · ${sugg.sourceDetail}`,
          })),
          { icon: "📋", label: "Näytä kaikki...", desc: `${optionsWithSugg.length - TOP_N} muuta liikettä` },
        ]
      );
      if (movIdx === null) return;
      if (movIdx === showAllOptionIdx) {
        // Käyttäjä halusi koko listan
        const fullIdx = await showListModal(
          "Lisää liike — kaikki liikkeet",
          optionsWithSugg.map(({ m, sugg }, i) => ({
            icon: i < sameCategory.length ? "✅" : "🔹",
            label: m.name,
            desc: `${m.category} · ${sugg.sourceDetail}`,
          }))
        );
        if (fullIdx === null || fullIdx < 0 || fullIdx >= optionsWithSugg.length) return;
        chosenIdx = fullIdx;
      } else if (movIdx >= 0 && movIdx < topItems.length) {
        chosenIdx = movIdx;
      } else {
        return;
      }
    } else {
      // < 6 vaihtoehtoa: näytetään suoraan koko lista (ei tarvetta toggleen)
      const movIdx = await showListModal(
        "Lisää liike",
        optionsWithSugg.map(({ m, sugg }, i) => ({
          icon: i < sameCategory.length ? "✅" : "🔹",
          label: m.name,
          desc: `${m.category} · ${sugg.sourceDetail}`,
        }))
      );
      if (movIdx === null || movIdx < 0 || movIdx >= optionsWithSugg.length) return;
      chosenIdx = movIdx;
    }
    chosenItem = optionsWithSugg[chosenIdx];
    if (chosenItem) {
      const { m, sugg } = chosenItem;
      const sr = await showSetsRepsModal(
        `${m.name} — ${sugg.sourceDetail}`,
        sugg.sets,
        sugg.reps
      );
      if (!sr) return;

      // v4.31.3: Sijaintivalinta primaryn perään / loppuun
      const sameCatAsPrimary = primary && primary.category === m.category;
      let insertAt = w.exercises.length;
      if (sameCatAsPrimary) {
        const positionIdx = await showListModal(
          `Mihin ${m.name} lisätään?`,
          [
            { icon: "⬆", label: "Heti pääliikkeen perään", desc: `${primary.name} → ${m.name} → muut accessoryt` },
            { icon: "⬇", label: "Treenin loppuun", desc: "Viimeiseksi liikkeeksi (oletus)" },
          ]
        );
        if (positionIdx === null) return;
        if (positionIdx === 0) {
          const primaryIdx = w.exercises.findIndex(ex => ex.role === "primary");
          insertAt = primaryIdx >= 0 ? primaryIdx + 1 : 1;
          while (insertAt < w.exercises.length &&
                 (w.exercises[insertAt].role === "backoff" || w.exercises[insertAt].role === "secondary") &&
                 w.exercises[insertAt].movementId === primary.movementId) {
            insertAt++;
          }
        }
      }

      // v4.32.0: käytä suositusta Vx + paino -arvoille (kun käyttäjä syötti vain sets+reps)
      // v4.34.2: userAdded:true -lippu jotta UI voi tarjota selvemmän valmiiksi-merkinnän
      const newExercise = {
        movementId: m.movementId,
        name: m.name,
        category: m.category,
        originalCategory: m.category,
        role: "accessory",
        userAdded: true,
        loadKg: sugg.loadKg,
        targetVx: sugg.targetVx,
        reps: sr.reps,
        progressSuggestion: "hold",
        sets: Array.from({ length: sr.sets }, (_, i) => ({
          idx: i,
          targetReps: sr.reps,
          targetVx: sugg.targetVx,
          loadKg: sugg.loadKg,
          reps: null,
          actualVx: null,
          velocity: null,
          completed: false,
        })),
      };
      w.exercises.splice(insertAt, 0, newExercise);
      if (insertAt <= w.currentExerciseIdx) {
        w.currentExerciseIdx++;
      }
      const positionLabel = insertAt < w.exercises.length - 1 ? ` (${insertAt + 1}. liikkeeksi)` : "";
      const suggSummary = sugg.source !== "default" ? ` · ${sugg.source === "history" ? "📜 historia" : "🎯 katalogi"}` : "";
      showToast(`${m.name} lisätty${positionLabel}${suggSummary}`, "ok");
      render();
    }

  // Swap variant
  const swapVarBtn = $("#btn-swap-variant");
  if (swapVarBtn) swapVarBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];

    const allVariantNames = ["Kilpaveto (leveä vastaote)", "Korokeveto", "Nopeusveto kuminauhalla", "Myötäoteveto", "Neutraaliote", "2s ylipito", "1.5-toisto hiissaus"];
    const variantDescs = {
      "Kilpaveto (leveä vastaote)": "Kilpailuote, perusveto",
      "Korokeveto": "Supramaksimaalinen, peaking",
      "Nopeusveto kuminauhalla": "Nopeusvoima, räjähtävä",
      "Myötäoteveto": "Otevariaatio, volyymi/raskas",
      "Neutraaliote": "Otevariaatio, volyymi",
      "2s ylipito": "Isometrinen, yläasento 2s",
      "1.5-toisto hiissaus": "Tempo, eksentrisesti kontrolloitu",
    };
    const currentIdx = allVariantNames.indexOf(exercise.variantName);
    const idx = await showListModal(
      "Vaihda variaatio",
      allVariantNames.map(v => ({
        icon: v === exercise.variantName ? "✅" : "🔸",

        desc: `${variantDescs[v] || ""} — kuorma ${(variantLoadModifier(v, state.settings?.variantModifiers) * 100) > 0 ? "+" : ""}${Math.round(variantLoadModifier(v, state.settings?.variantModifiers) * 100)}%`,
      })),
      currentIdx >= 0 ? currentIdx : null
    );
    if (idx !== null && idx >= 0 && idx < allVariantNames.length) {
      const newVariant = allVariantNames[idx];
      exercise.variantName = newVariant;
      const vOverride = variantRepOverride(newVariant);
      exercise.tempoNote = vOverride?.tempoNote || null;
      // Recalculate remaining set loads with new variant modifier
      const vMod = variantLoadModifier(newVariant, state.settings?.variantModifiers);
      const rec = state.recommendation;
      if (rec?.targetExternalLoad !== null && (exercise.role === "primary" || exercise.role === "backoff")) {
        const basePct = exercise.role === "backoff" ? 0.85 : 1.0;
        const newLoad = roundToHalf(rec.targetExternalLoad * basePct * (1 + vMod));
        exercise.sets.forEach(s => { if (!s.completed) s.loadKg = newLoad; });
        exercise.loadKg = newLoad;
      }
      showToast(`Variaatio: ${newVariant}`, "ok");
      render();

  // v4.34.12: helper — onko keskeneräisiä työsarjoja jotka eivät ole skipattuja
  function hasIncompleteWorkSets(exercise) {
    if (!exercise) return false;
    return exercise.sets.some(s => !s.completed && !s.skipped && !s.isWarmup);
  }

  // v4.34.12: helper — laske completed + skipped + remaining työsarjat
  function getWorkSetCounts(exercise) {
    if (!exercise) return { completed: 0, skipped: 0, remaining: 0, total: 0 };
    const work = exercise.sets.filter(s => !s.isWarmup);
    return {
      completed: work.filter(s => s.completed).length,
      skipped: work.filter(s => s.skipped).length,
      remaining: work.filter(s => !s.completed && !s.skipped).length,
      total: work.length,
    };
  }

  // Skip exercise (⏩ icon in topbar)
  // v4.34.12: confirmation-dialog jos olet vielä työsarjoissa (estää vahinkoja)
  const skipBtn = $("#btn-skip-exercise");
  if (skipBtn) skipBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const counts = getWorkSetCounts(exercise);
    // Confirmation jos sarjoja vielä jäljellä
    if (counts.remaining > 0 && counts.completed > 0) {
      const idx = await showListModal(
        `${exercise.name} — olet tehnyt ${counts.completed}/${counts.total} sarjaa`,
        [
          { icon: "⏭", label: "Ohita loput sarjat (merkitse skipatuiksi)", desc: `${counts.remaining} sarjaa skipataan, jo tehdyt säilyvät` },
          { icon: "⏩", label: "Hyppää suoraan seuraavaan liikkeeseen (älä merkitse)", desc: "Tehdyt sarjat säilyvät, loput jäävät epäselviksi" },
          { icon: "✗", label: "Peruuta", desc: "Pysy tässä liikkeessä" },
        ]
      );
      if (idx === 2 || idx === null) return;
      if (idx === 0) {
        // Merkitse loput skipatuiksi
        exercise.sets.forEach(s => {
          if (!s.completed && !s.skipped && !s.isWarmup) {
            s.skipped = true;
            s.reps = null; s.actualVx = null;
          }
        });
      }
    }
    w.currentExerciseIdx++;
    w.currentSetIdx = 0;
    stopRestTimer();
    savePendingWorkoutLocal(state.workout);
    render();
  });

  // v4.34.2: Liike valmis (selvä tekstipainike util-rivissä).
  // v4.34.12: confirmation jos sarjoja vielä jäljellä.
  const finishExBtn = $("#btn-finish-exercise");
  if (finishExBtn) finishExBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const counts = getWorkSetCounts(exercise);
    // Confirmation jos sarjoja vielä jäljellä
    if (counts.remaining > 0 && counts.completed > 0) {
      const idx = await showListModal(
        `${exercise.name} — olet tehnyt ${counts.completed}/${counts.total} sarjaa`,
        [
          { icon: "✓", label: `Valmis — riittää ${counts.completed}/${counts.total} sarjaa`, desc: `Loput ${counts.remaining} sarjaa poistuu listalta (et tehnyt niitä)` },
          { icon: "⏭", label: "Ohita loput sarjat (merkitse skipatuiksi)", desc: `${counts.remaining} sarjaa kirjataan skipatuksi historiaan` },
          { icon: "✗", label: "Peruuta", desc: "Pysy tässä liikkeessä" },
        ]
      );
      if (idx === 2 || idx === null) return;
      if (idx === 1) {
        // Skipataan loput, ei poisteta
        exercise.sets.forEach(s => {
          if (!s.completed && !s.skipped && !s.isWarmup) {
            s.skipped = true;
            s.reps = null; s.actualVx = null;
          }
        });
      } else {
        // idx === 0: poista keskeneräiset (vanha "Liike valmis" -käyttäytyminen)
        exercise.sets = exercise.sets.filter(s => s.completed || s.skipped);
      }
    } else {
      // Ei sarjoja tehty, ei jäljellä — vain poista keskeneräiset
      exercise.sets = exercise.sets.filter(s => s.completed || s.skipped);
    }
    w.currentExerciseIdx++;
    w.currentSetIdx = 0;
    stopRestTimer();
    savePendingWorkoutLocal(state.workout);
    showToast(`${exercise.name} merkitty valmiiksi`, "ok");
    render();
  });

  // v4.34.12: Skip-set explicit — kirjaa skipped:true ilman reps/Vx
  const skipSetBtn = $("#btn-skip-set");
  if (skipSetBtn) skipSetBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;
    currentSet.skipped = true;
    currentSet.completed = false;
    currentSet.reps = null;
    currentSet.actualVx = null;
    currentSet.velocity = null;
    w.currentSetIdx++;
    selectedReps = null;
    selectedVara = null;
    stopRestTimer();
    savePendingWorkoutLocal(state.workout);
    showToast("Sarja ohitettu", "warn", 2000);
    render();
  });

  // Warmup protocol done / skip
  const wupDoneBtn = $("#btn-warmup-protocol-done");
  if (wupDoneBtn) wupDoneBtn.addEventListener("click", () => {
    w.warmupProtocolDone = true;
    render();
  });
  // v4.34.12: per-elementti skip-toggle yleislämmittelyssä
  $$("[data-warmup-skip-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.warmupSkipToggle);
      if (!w.warmupSkipped) w.warmupSkipped = [];
      const set = new Set(w.warmupSkipped);
      if (set.has(idx)) set.delete(idx);
      else set.add(idx);
      w.warmupSkipped = [...set];
      savePendingWorkoutLocal(state.workout);
      render();
    });
  });
  const wupSkipBtn = $("#btn-skip-warmup-protocol");
  if (wupSkipBtn) wupSkipBtn.addEventListener("click", () => {
    w.warmupProtocolDone = true;
    render();
  });

  // Jump to exercise via clickable chips
  $$("[data-jump-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.jumpIdx);
      if (isNaN(idx) || idx < 0 || idx >= w.exercises.length) return;
      w.currentExerciseIdx = idx;
      // Go to first non-completed set, or first set if all done
      const ex = w.exercises[idx];
      const firstIncomplete = ex.sets.findIndex(s => !s.completed);
      w.currentSetIdx = firstIncomplete >= 0 ? firstIncomplete : 0;
      stopRestTimer();
      render();
    });
  });

  // Next exercise
  const nextExBtn = $("#btn-next-exercise");
  if (nextExBtn) nextExBtn.addEventListener("click", () => {
    w.currentExerciseIdx++;
    w.currentSetIdx = 0;

    render();
  });

  // Notes char counter
  const notesInput = $("#input-session-notes");
  const notesCount = $("#notes-char-count");
  if (notesInput && notesCount) {
    notesInput.addEventListener("input", () => { notesCount.textContent = notesInput.value.length; });
  }

  // v4.23 P3.2: sRPE (session-level 1–10) — klikattava asteikko.
  // Tallennetaan state.workout.sRPE:hen josta saveWorkoutToDb() lukee.
  $$("#srpe-scale .srpe-btn").forEach(btn => {
    const val = parseInt(btn.dataset.srpe, 10);
    if (state.workout?.sRPE === val) btn.classList.add("selected");
    btn.addEventListener("click", () => {
      $$("#srpe-scale .srpe-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      if (state.workout) state.workout.sRPE = val;
    });

  // Save workout
  const saveBtn = $("#btn-save-workout");
  if (saveBtn) saveBtn.addEventListener("click", async () => {
    const sessionNotes = ($("#input-session-notes")?.value || "").trim().slice(0, 500);
    await saveWorkoutToDb(sessionNotes);
    clearPendingWorkoutLocal();
    showToast("Treeni tallennettu!", "ok");
    state.workout = null;
    releaseWakeLock();
    await refresh();
    state.view = "dashboard";
    render();
  });

  // Discard workout
  const discardBtn = $("#btn-discard-workout");
  if (discardBtn) discardBtn.addEventListener("click", async () => {
    if (!confirm("Hylätäänkö treeni?")) return;
    const wasBackfill = !!state.workout?.isBackfill;
    const wasPlanOverride = !!state.workout?.isPlanOverride;
    state.workout = null;
    clearPendingWorkoutLocal();
    state.view = "dashboard";
    releaseWakeLock();
    if (wasBackfill || wasPlanOverride) await computeRecommendation();

  // End workout early — open confirmation overlay
  const endBtn = $("#btn-end-workout");
  if (endBtn) endBtn.addEventListener("click", () => showEndWorkoutConfirm());

  // Rest timer action buttons (inline card)
  const restAdd30 = $("#btn-rest-add30");
  if (restAdd30) restAdd30.addEventListener("click", () => addRestSeconds(30));
  const restAdd60 = $("#btn-rest-add60");
  if (restAdd60) restAdd60.addEventListener("click", () => addRestSeconds(60));
  const restSkip = $("#btn-rest-skip");
  if (restSkip) restSkip.addEventListener("click", () => stopRestTimer());

  // Velocity panel toggle
  const velToggle = $("#btn-velocity-toggle");
  if (velToggle) velToggle.addEventListener("click", () => {
    const panel = $("#vel-panel");
    if (!panel) return;
    const isHidden = panel.style.display === "none" || !panel.style.display;
    panel.style.display = isHidden ? "block" : "none";
    velToggle.classList.toggle("on", isHidden);
    if (isHidden) {
