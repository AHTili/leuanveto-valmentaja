const KISALIIKKEET_NAMES = ["Lisäpainoleuanveto", "Muscle-up", "Lisäpainodippi", "Takakyykky"];

function isoWeekKey(dateISO) {
  if (!dateISO) return null;
  const d = new Date(dateISO.slice(0, 10) + "T00:00:00Z");
  const day = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - day + 3);
  const firstThu = d.getTime();
  const yStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const yDay = (yStart.getUTCDay() + 6) % 7;
  yStart.setUTCDate(yStart.getUTCDate() - yDay + 3);
  const week = 1 + Math.round((firstThu - yStart.getTime()) / 604800000);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2, "0")}`;
}

function daysAgoISO(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function linearRegressionSlope(ys) {
  const n = ys.length;
  if (n < 2) return 0;
  const xs = ys.map((_, i) => i);
  const mx = xs.reduce((a, b) => a + b, 0) / n;
  const my = ys.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (ys[i] - my); den += (xs[i] - mx) ** 2; }
  return den === 0 ? 0 : num / den;
}

function resampleWeeklyMaxE1RM(history) {
  const byWeek = new Map();
  for (const p of history) {
    const wk = isoWeekKey(p.dateISO);
    if (!wk) continue;
    const cur = byWeek.get(wk);
    if (!cur || p.e1rm > cur.e1rm) byWeek.set(wk, { wk, e1rm: p.e1rm, dateISO: p.dateISO });
  }
  return [...byWeek.values()].sort((a, b) => a.wk.localeCompare(b.wk));
}

function annotatePRs(weekly) {
  let max = -Infinity;
  return weekly.map(p => {
    const isPR = p.e1rm > max;
    if (isPR) max = p.e1rm;
    return { ...p, isPR };
  });
}

/**
 * Piirrä e1RM sparkline SVG inline. Series: [{ e1rm, isPR }], opts: { height, downturn }
 */
function drawE1RMSparkline(series, opts = {}) {
  const w = 362, h = opts.height || 110, padL = 6, padR = 6, padT = 16, padB = 10;
  const iw = w - padL - padR, ih = h - padT - padB;
  if (series.length < 2) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei riittävästi dataa</text></svg>`;
  }
  const vals = series.map(p => p.e1rm);
  const min = Math.min(...vals) * 0.97;
  const max = Math.max(...vals) * 1.03;
  const range = max - min || 1;
  const xStep = iw / (series.length - 1);

  const points = series.map((p, i) => ({
    x: padL + i * xStep,
    y: padT + ih - ((p.e1rm - min) / range) * ih,
    isPR: p.isPR,
  }));
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(padT+ih)} L${padL},${padT+ih} Z`;

  // 4-week moving avg
  const avgPts = points.map((p, i) => {
    const s = Math.max(0, i - 3);
    const slice = vals.slice(s, i + 1);
    const avg = slice.reduce((a, b) => a + b, 0) / slice.length;
    return { x: p.x, y: padT + ih - ((avg - min) / range) * ih };
  });
  const avgD = avgPts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");

  const downturn = !!opts.downturn;
  const line = downturn ? "var(--bad)" : "var(--acc)";
  const fill0 = downturn ? "#ef4444" : "#4f8cff";
  const gid = "spark-grad-" + Math.random().toString(36).slice(2, 8);
  const prPts = points.filter(p => p.isPR);
  const last = points[points.length - 1];

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${fill0}" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="${fill0}" stop-opacity="0"/>
    </linearGradient></defs>
    ${[0.25, 0.5, 0.75].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1"/>`).join("")}
    <path d="${areaD}" fill="url(#${gid})"/>
    <path d="${avgD}" fill="none" stroke="var(--dim)" stroke-width="1.3" stroke-dasharray="3 3"/>
    <path d="${pathD}" fill="none" stroke="${line}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${prPts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--ok)" stroke="var(--bg)" stroke-width="1.5"/>`).join("")}
    <circle cx="${last.x}" cy="${last.y}" r="4" fill="${line}" stroke="var(--bg)" stroke-width="2"/>
  </svg>`;
}

/**
 * Piirrä kehonpaino-sparkline (ei PR-merkkejä, pelkkä trendi)
 */
function drawBodyweightSparkline(series) {
  const w = 362, h = 86, padL = 6, padR = 6, padT = 10, padB = 10;
  const iw = w - padL - padR, ih = h - padT - padB;
  if (series.length < 2) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei riittävästi dataa</text></svg>`;
  }
  const vals = series.map(p => p.v);
  const mn = Math.min(...vals) - 0.3, mx = Math.max(...vals) + 0.3;
  const range = mx - mn || 1;
  const xStep = iw / (series.length - 1);
  const pts = series.map((p, i) => ({ x: padL + i * xStep, y: padT + ih - ((p.v - mn) / range) * ih }));
  const pathD = pts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    ${[0.5].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 3"/>`).join("")}
    <path d="${pathD}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="3.5" fill="var(--acc)" stroke="var(--bg)" stroke-width="2"/>
  </svg>`;
}

/**
 * Stack-palkkikaavio viikkovolyymille. volByWeek: [{ wk, byCat: {cat: sets} }]
 * filter: "all" tai kategorian nimi. Jos yksittäinen, näyttää MRV-viivan.
 */
function drawVolumeStack(volByWeek, filter) {
  const w = 362, h = 170, padL = 18, padR = 6, padT = 10, padB = 18;
  const iw = w - padL - padR, ih = h - padT - padB;
  const n = volByWeek.length;
  if (n === 0) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei dataa</text></svg>`;
  }
  const isAll = filter === "all";
  const cats = Object.keys(CATEGORY_COLORS);

  const totals = volByWeek.map(wk => isAll
    ? cats.reduce((a, c) => a + (wk.byCat[c] || 0), 0)
    : (wk.byCat[filter] || 0));
  const mrv = isAll ? 0 : (MRV_SETS_PER_CATEGORY[filter] || 20);
  const barMax = isAll
    ? Math.max(...totals, 1) * 1.08
    : Math.max(mrv * 1.25, Math.max(...totals, 1) * 1.1);

  const xStep = iw / n;
  const barW = Math.min(22, xStep * 0.72);

  const bars = volByWeek.map((wk, i) => {
    let yCursor = padT + ih;
    const x = padL + i * xStep + (xStep - barW) / 2;
    const segs = isAll ? cats : [filter];
    const stacks = segs.map(cat => {
      const v = wk.byCat[cat] || 0;
      if (v === 0) return "";
      const segH = (v / barMax) * ih;
      yCursor -= segH;
      let color = CATEGORY_COLORS[cat] || "#5a6a8a";
      if (!isAll && v > mrv) color = "var(--bad)";
      return `<rect x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${barW}" height="${segH.toFixed(1)}" fill="${color}" rx="1"/>`;
    }).join("");
    const isLast = i === n - 1;
    const topLabel = isLast && totals[i] > 0
      ? `<text x="${(padL + i * xStep + xStep/2).toFixed(1)}" y="${(yCursor - 3).toFixed(1)}" font-size="10" fill="var(--fg)" font-weight="700" text-anchor="middle">${totals[i]}</text>`
      : "";
    const lbl = i % 2 === 0
      ? `<text x="${(padL + i * xStep + xStep/2).toFixed(1)}" y="${h - 4}" font-size="9" fill="var(--dim)" text-anchor="middle">${i + 1}</text>`
      : "";
    return stacks + topLabel + lbl;
  }).join("");

  let mrvLine = "", mrvLabel = "";
  if (!isAll && mrv > 0) {
    const mrvY = padT + ih - (mrv / barMax) * ih;
    mrvLine = `<line x1="${padL}" x2="${w-padR}" y1="${mrvY}" y2="${mrvY}" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="4 3"/>`;
    mrvLabel = `<text x="${w-padR-2}" y="${mrvY - 4}" font-size="9" fill="var(--warn)" text-anchor="end" font-weight="700">MRV ${mrv}</text>`;
  }

  const yTicks = [
    { v: 0, y: padT + ih },
    { v: Math.round(barMax), y: padT },
  ];
  const yAxis = yTicks.map(t => `<text x="${padL - 3}" y="${(t.y + 3).toFixed(1)}" font-size="9" fill="var(--dim)" text-anchor="end">${t.v}</text>`).join("");

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${[0.25, 0.5, 0.75].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1"/>`).join("")}
    ${yAxis}
    ${bars}
    ${mrvLine}${mrvLabel}
    <line x1="${padL}" x2="${w-padR}" y1="${padT+ih}" y2="${padT+ih}" stroke="var(--border2)" stroke-width="1"/>
    <text x="${padL}" y="${h-4}" font-size="9" fill="var(--dim)">vk</text>
  </svg>`;
}

function renderProgress() {
  const range = state.progressRange || "16";
  const rangeWeeks = range === "all" ? 999 : parseInt(range);
  const filter = state.progressVolFilter || "all";
  const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;

  // ── KPI strip ──
  const weekAgo = daysAgoISO(7);
  const prs7 = (state.prs || []).filter(p => (p.dateISO || "") >= weekAgo).length;
  const sessionMap = new Map(state.sessions.map(s => [s.sessionId, s]));
  const recentSets = state.allSets.filter(s => {
    const sess = sessionMap.get(s.sessionId);
    return sess && (sess.dateISO || "") >= weekAgo;
  });
  const sessionsSet = new Set(recentSets.map(s => s.sessionId));
  const sessions7 = sessionsSet.size;
  const tonnage7 = recentSets.reduce((sum, s) => sum + (s.externalLoadKg || 0) * (s.reps || 0), 0);
  const tonnageStr = tonnage7 >= 1000 ? `${(tonnage7/1000).toFixed(1)}t` : `${Math.round(tonnage7)}kg`;

  // ── e1RM sparklines for kisaliike ──
  const moveCards = KISALIIKKEET_NAMES.map(name => {
    const mov = state.movements.find(m => m.name === name);
    if (!mov) return null;
    const sets = state.allSets.filter(s => s.movementId === mov.movementId);
    if (sets.length === 0) return null;
    const history = computeMovementE1RMHistory(sets, state.sessions, mov.isPrimary, bw);
    if (history.length === 0) return null;
    const weekly = resampleWeeklyMaxE1RM(history);
    const sliced = rangeWeeks >= weekly.length ? weekly : weekly.slice(-rangeWeeks);
    const annotated = annotatePRs(sliced);
    return { mov, sets, annotated, fullWeekly: weekly };
  }).filter(Boolean);

  const moveCardsHTML = moveCards.map(({ mov, sets, annotated, fullWeekly }) => {
    const n = annotated.length;
    const current = n > 0 ? annotated[n-1].e1rm : 0;
    const first = n > 0 ? annotated[0].e1rm : 0;
    const delta = current - first;
    const allVals = annotated.map(p => p.e1rm);
    const minV = allVals.length ? Math.min(...allVals) : 0;
    const maxV = allVals.length ? Math.max(...allVals) : 0;

    // PR: find last isPR across entire history (not just range)
    const fullAnn = annotatePRs(fullWeekly);
    const lastPR = [...fullAnn].reverse().find(p => p.isPR);

    // Stagnation: weeks since last PR
    let stagnWeeks = 0;
    if (lastPR) {
      const lastPRIdx = fullAnn.lastIndexOf(lastPR);
      stagnWeeks = fullAnn.length - 1 - lastPRIdx;
    }
    const isStagnated = stagnWeeks >= 3;
    const trendDown = n >= 2 && annotated[n-1].e1rm < annotated[Math.max(0, n-3)].e1rm;
    const showRed = isStagnated || trendDown;

    const deltaHTML = isStagnated
      ? `<div class="d down">↓ stagnaatio ${stagnWeeks} vk</div>`
      : delta > 0.1
        ? `<div class="d up">↑ +${delta.toFixed(1)} kg</div>`
        : delta < -0.1
          ? `<div class="d down">↓ ${delta.toFixed(1)} kg</div>`
          : `<div class="d" style="color:var(--muted)">±0</div>`;

    const prStr = lastPR
      ? `PR <b class="text-ok">${lastPR.e1rm.toFixed(1)} kg</b>`
      : `PR <b class="muted">–</b>`;

    return `<div class="card move-card">
      <div class="move-head">
        <div>
          <div class="move-name"><span class="star">⭐</span>${mov.name}</div>
          <div class="move-cat">${mov.category} · ${sets.length} sarjaa</div>
        </div>
        <div class="move-cur">
          <div class="v">${current.toFixed(1)}<small>kg</small></div>
          ${deltaHTML}
        </div>
      </div>
      <div class="sparkline-wrap">${drawE1RMSparkline(annotated, { downturn: showRed })}</div>
      <div class="spark-x-labels"><span>Vk 1</span><span>Vk ${Math.ceil(n/2)}</span><span>Vk ${n}</span></div>
      <div class="spark-stats">
        <span>Min <b>${minV.toFixed(1)}</b></span>
        <span>${prStr}</span>
        <span>Viim. <b>${current.toFixed(1)}</b></span>
      </div>
    </div>`;
  }).join("");

  // ── Volume stack ──
  // Group sets by ISO week + category. Count only non-warmup sets.
  const movementMap = new Map(state.movements.map(m => [m.movementId, m]));
  const volMap = new Map(); // wk -> { cat: sets }
  for (const s of state.allSets) {
    if (s.isWarmup) continue;
    const sess = sessionMap.get(s.sessionId);
    if (!sess) continue;
    const wk = isoWeekKey(sess.dateISO);
    if (!wk) continue;
    const mov = movementMap.get(s.movementId);
    const cat = mov?.category || "muu";
    if (!volMap.has(wk)) volMap.set(wk, {});
    const byCat = volMap.get(wk);
    byCat[cat] = (byCat[cat] || 0) + 1;
  }
  const allWeeks = [...volMap.entries()].map(([wk, byCat]) => ({ wk, byCat })).sort((a, b) => a.wk.localeCompare(b.wk));
  const volWeeks = rangeWeeks >= allWeeks.length ? allWeeks : allWeeks.slice(-rangeWeeks);

  const volFilterBtns = ["all", ...Object.keys(CATEGORY_COLORS)].map(cat => {
    const label = cat === "all" ? "Kaikki" : CATEGORY_LABELS_SHORT[cat] || cat;
    const active = filter === cat ? "active" : "";
    return `<button class="${active}" data-vol-filter="${cat}">${label}</button>`;
  }).join("");

  const volSvg = drawVolumeStack(volWeeks, filter);

  let volLegend = "";
  if (filter === "all") {
    volLegend = Object.keys(CATEGORY_COLORS).map(cat =>
      `<span class="lg"><span class="sw" style="background:${CATEGORY_COLORS[cat]}"></span>${CATEGORY_LABELS_SHORT[cat] || cat}</span>`
    ).join("");
  } else {
    const mrv = MRV_SETS_PER_CATEGORY[filter] || 20;
    volLegend = `<span class="lg"><span class="sw" style="background:${CATEGORY_COLORS[filter]}"></span>${CATEGORY_LABELS_SHORT[filter]} (MRV ${mrv})</span>
      <span class="lg"><span class="sw" style="background:var(--bad)"></span>Yli MRV</span>`;
  }

  const latestTotals = volWeeks.length ? volWeeks[volWeeks.length - 1].byCat : {};
  const overCount = Object.keys(CATEGORY_COLORS).filter(cat => (latestTotals[cat] || 0) > (MRV_SETS_PER_CATEGORY[cat] || 99)).length;
  const overChip = overCount > 0
    ? `<span class="chip" style="color:var(--bad);border-color:var(--bad)">⚠ ${overCount} yli MRV</span>`
    : "";

  // ── Bodyweight card ──
  const bwMeasurements = (state.allBodyweights || []).filter(m => m.dateISO && m.value)
    .sort((a, b) => a.dateISO.localeCompare(b.dateISO));
  let bwHTML = "";
  if (bwMeasurements.length >= 2) {
    const bwByWeek = new Map();
    for (const m of bwMeasurements) {
      const wk = isoWeekKey(m.dateISO);
      if (!bwByWeek.has(wk)) bwByWeek.set(wk, []);
      bwByWeek.get(wk).push(m.value);
    }
    const bwWeekly = [...bwByWeek.entries()]
      .map(([wk, vals]) => ({ wk, v: vals.reduce((a, b) => a + b, 0) / vals.length }))
      .sort((a, b) => a.wk.localeCompare(b.wk));
    const bwSliced = rangeWeeks >= bwWeekly.length ? bwWeekly : bwWeekly.slice(-rangeWeeks);
    const current = bwSliced[bwSliced.length - 1].v;
    const first = bwSliced[0].v;
    const dlt = current - first;
    const slope = linearRegressionSlope(bwSliced.map(p => p.v));
    const slopeCls = slope < -0.02 ? "text-ok" : slope > 0.02 ? "text-bad" : "";
    const last7 = bwMeasurements.slice(-7).map(m => m.value);
    const avg7 = last7.reduce((a, b) => a + b, 0) / last7.length;
    const variance = Math.sqrt(last7.reduce((a, b) => a + (b - avg7) ** 2, 0) / last7.length);

    bwHTML = `<div class="section-header">Kehonpaino</div>
      <div class="card" style="padding:12px 14px">
        <div class="flex-between" style="align-items:baseline">
          <div>
            <div class="card-title" style="margin-bottom:0">KEHONPAINO · ${bwSliced.length} VK</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${first.toFixed(1)} → ${current.toFixed(1)} kg · <span class="${dlt < 0 ? 'text-ok' : dlt > 0 ? 'text-bad' : ''}">${dlt > 0 ? '+' : ''}${dlt.toFixed(1)} kg</span></div>
          </div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">${current.toFixed(1)}<small style="font-size:11px;color:var(--muted);font-weight:600;margin-left:2px">kg</small></div>
        </div>
        <div class="sparkline-wrap">${drawBodyweightSparkline(bwSliced)}</div>
        <div class="spark-stats">
          <span>7pv ka <b>${avg7.toFixed(1)}</b></span>
          <span>Vaihtelu <b>±${variance.toFixed(1)}</b></span>
          <span>Trend <b class="${slopeCls}">${slope >= 0 ? '↑' : '↓'} ${Math.abs(slope).toFixed(2)} kg/vk</b></span>
        </div>
      </div>`;
  }

  return `<div class="fade-in">
    <div class="section-header">📈 Edistyminen</div>

    <div class="kpi-strip">
      <div class="kpi-card-p ${prs7 >= 1 ? 'ok' : ''}">
        <div class="k">${prs7}</div>
        <div class="kl">PR · 7 pv</div>
      </div>
      <div class="kpi-card-p ${sessions7 >= 3 ? 'ok' : sessions7 >= 1 ? 'warn' : ''}">
        <div class="k">${sessions7}<small>tr</small></div>
        <div class="kl">Treenit · 7 pv</div>
      </div>
      <div class="kpi-card-p">
        <div class="k">${tonnageStr}</div>
        <div class="kl">Tonnage · 7 pv</div>
      </div>
    </div>

    <div class="range-tabs" id="progress-range-tabs">
      ${["4", "8", "16", "all"].map(r =>
        `<button class="${range === r ? 'active' : ''}" data-range="${r}">${r === "all" ? "Kaikki" : r + " vk"}</button>`
      ).join("")}
    </div>

    ${moveCardsHTML || '<div class="card"><div class="muted">Ei e1RM-dataa kisaliikkeille. Tee sarjoja nähdäksesi trendit.</div></div>'}

    <div class="section-header">Viikkovolyymi (hard sets)</div>
    <div class="card vol-card">
      <div class="flex-between" style="margin-bottom:6px">
        <div class="card-title" style="margin:0">SARJAT KATEGORIOITTAIN</div>
        ${overChip}
      </div>
      <div class="vol-filter" id="progress-vol-filter">${volFilterBtns}</div>
      ${volSvg}
      <div class="vol-legend">${volLegend}</div>
    </div>

    ${bwHTML}

    <div class="muted" style="text-align:center;margin-top:14px;font-size:11px">
      Per-liike-detalji: <button class="btn btn-sm btn-outline" data-nav="trends" style="font-size:11px">Trendit per liike →</button>
    </div>
  </div>`;
}

// TRENDS VIEW (placeholder)
// ═══════════════════════════════════════════════════════════════

function renderTrends() {
  const bw = state.settings?.bodyweightKg || 91;

  // Compute e1RM for all movements that have data
  const movementTrends = [];
  for (const m of state.movements) {
    const sets = state.allSets.filter(s => s.movementId === m.movementId);
    if (sets.length === 0) continue;
    const history = computeMovementE1RMHistory(sets, state.sessions, m.isPrimary, bw);
    if (history.length === 0) continue;
    const current = history[history.length - 1].e1rm;
    const first = history[0].e1rm;
    const change = history.length > 1 ? current - first : 0;
    movementTrends.push({ movement: m, history, current, change, totalSets: sets.length });
  }

  // Sort: primary first, then by total sets descending
  movementTrends.sort((a, b) => {
    if (a.movement.isPrimary && !b.movement.isPrimary) return -1;
    if (!a.movement.isPrimary && b.movement.isPrimary) return 1;
    return b.totalSets - a.totalSets;
  });

  return `<div class="fade-in">
    <div class="section-header">Trendit</div>

    ${movementTrends.length === 0 ? '<div class="card"><div class="muted">Ei dataa — tee treenejä nähdäksesi trendit</div></div>' : ""}

    ${movementTrends.map(mt => {
      const changeStr = mt.change > 0 ? `<span class="text-ok">+${mt.change.toFixed(1)}</span>` : mt.change < 0 ? `<span class="text-bad">${mt.change.toFixed(1)}</span>` : `<span class="dim">±0</span>`;
      const isPrimary = mt.movement.isPrimary;
      const label = isPrimary ? "e1RM system (kg)" : "e1RM (kg)";

      return `<div class="card">
        <div class="flex-between">
          <div>
            <div style="font-weight:600">${isPrimary ? "⭐ " : ""}${mt.movement.name}</div>
            <div class="muted" style="font-size:11px">${mt.movement.category} | ${mt.totalSets} sarjaa</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700">${mt.current.toFixed(1)}</div>
            <div class="muted" style="font-size:11px">${label} ${changeStr}</div>
          </div>
        </div>
        ${mt.history.length > 1 ? renderMiniChart(mt.history) : ""}
        <div class="accordion-header" data-toggle="trend-${mt.movement.movementId}">
          <span class="muted">Historia (${mt.history.length})</span><span>▼</span>
        </div>
        <div class="accordion-body" id="trend-${mt.movement.movementId}">
          <table>
            <tr><th>Pvm</th><th>Paino</th><th>Toistot</th><th>e1RM</th></tr>
            ${mt.history.slice(-10).map(p => `<tr><td>${formatDateShort(p.dateISO)}</td><td>${p.load} kg</td><td>${p.reps}</td><td>${p.e1rm.toFixed(1)}</td></tr>`).join("")}
          </table>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderMiniChart(history) {
  // Simple CSS bar chart
  if (history.length < 2) return "";
  const values = history.slice(-12).map(h => h.e1rm);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  return `<div style="display:flex;align-items:end;gap:2px;height:40px;margin:8px 0">
    ${values.map(v => {
      const pct = ((v - min) / range) * 100;
      const h = Math.max(4, pct * 0.4);
      return `<div style="flex:1;height:${h}px;background:var(--acc);border-radius:2px 2px 0 0;min-width:4px" title="${v.toFixed(1)}"></div>`;
    }).join("")}
  </div>`;
}

const PR_MOVEMENT_OPTIONS = [
  "Lisäpainoleuanveto",
  "Muscle-up",
  "Lisäpainodippi",
  "Takakyykky",
  "Etukyykky",
  "Penkkipunnerrus",
  "Maastaveto",
  "Pystypunnerrus",
  "Muu",
];

function renderPRs() {
  const prs = [...(state.prs || [])].sort((a, b) => (b.dateISO || "").localeCompare(a.dateISO || ""));

  // Ryhmittele liikkeen mukaan, laske kunkin "best" (suurin value)
  const byMovement = {};
  for (const pr of prs) {
    const key = pr.movementName || "Muu";
    if (!byMovement[key]) byMovement[key] = [];
    byMovement[key].push(pr);
  }

// ═══════════════════════════════════════════════════════════════

function csvEscape(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (/[",\n;]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function dayOfWeekShort(iso) {
  if (!iso) return "";
  const d = ["Su","Ma","Ti","Ke","To","Pe","La"];
  return d[new Date(iso).getDay()];
}

function filterSessionsForExport(scope, mesocycleId, fromISO, toISO) {
  let sessions = [...state.sessions];
  if (scope === "mesocycle" && mesocycleId) {
    sessions = sessions.filter(s => s.mesocycleId === mesocycleId);
  } else if (scope === "range") {
    if (fromISO) sessions = sessions.filter(s => (s.dateISO || "") >= fromISO);
    if (toISO)   sessions = sessions.filter(s => (s.dateISO || "") <= toISO);
  }
  return sessions.sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
}

function buildCSVExport({ scope, mesocycleId, fromISO, toISO }) {
  const sessions = filterSessionsForExport(scope, mesocycleId, fromISO, toISO);
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));
  const mesoById = new Map((state.allMesocycles || []).map(m => [m.mesocycleId, m]));
  const sessById = new Map(sessions.map(s => [s.sessionId, s]));

  const header = [
    "Pvm","Vk","Mesosykli","Päivä","Päivätyyppi","Liike","Rooli",
    "Sarja #","Toistot","Toistotavoite","Kuorma (kg)","BW (kg)","System load",
    "Vx tavoite","Vx toteutunut","Velocity (m/s)",
    "e1RM ext","e1RM sys","Readiness cap","Muistiinpano","Aikaleima",
  ];
  const rows = [header.map(csvEscape).join(",")];

  // Sarjat päivä+sessio+timestamp-järjestyksessä, sarjanumerointi per (sessio, liike)
  const sortedSets = [...sets].sort((a,b) => {
    const sa = sessById.get(a.sessionId), sb = sessById.get(b.sessionId);
    const da = (sa?.dateISO || ""), db = (sb?.dateISO || "");
    if (da !== db) return da.localeCompare(db);
    return (a.timestamp || "").localeCompare(b.timestamp || "");
  });

  const setCounter = new Map(); // key = sessionId+movementId
  for (const set of sortedSets) {
    const sess = sessById.get(set.sessionId);
    if (!sess) continue;
    const mov = movById.get(set.movementId);
    const meso = mesoById.get(sess.mesocycleId);
    const key = `${set.sessionId}|${set.movementId}`;
    const n = (setCounter.get(key) || 0) + 1;
    setCounter.set(key, n);
    const isPrimary = mov?.isPrimary;
    const bw = sess.bodyweightKg || state.latestBodyweight || 91;
    const load = set.externalLoadKg || 0;
    const systemLoad = isPrimary ? (bw + load) : load;
    const e1rmExt = isPrimary ? e1rmExternal(bw, load, set.reps, set.actualVx)
                              : e1rmAccessory(load, set.reps, set.actualVx);
    const e1rmSys = isPrimary ? e1rmSystem(bw, load, set.reps, set.actualVx)
                              : e1rmAccessory(load, set.reps, set.actualVx);
    const readinessLabel = sess.readinessCapLevel === 2 ? "RED"
                         : sess.readinessCapLevel === 1 ? "YELLOW"
                         : sess.readinessCapLevel === 0 ? "GREEN" : "";

    const row = [
      sess.dateISO || "",
      sess.mesocycleWeek ?? "",
      meso?.name || meso?.type || "",
      dayOfWeekShort(sess.dateISO),
      sess.plannedDayType || "",
      mov?.name || "",
      set.setRole || "",
      n,
      set.reps ?? "",
      set.targetReps ?? "",
      load,
      bw,
      systemLoad.toFixed(1),
      set.targetVx ?? "",
      set.actualVx ?? "",
      set.velocityMean ?? set.velocityRep1 ?? "",
      e1rmExt !== null ? e1rmExt.toFixed(2) : "",
      e1rmSys !== null ? e1rmSys.toFixed(2) : "",
      readinessLabel,
      (sess.sessionNotes || "").replace(/\n/g, " "),
      set.timestamp || "",
    ];
    rows.push(row.map(csvEscape).join(","));
  }
  return rows.join("\n");
}

function buildMesocycleMarkdown(mesocycleId) {
  const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
  if (!meso) return "# Ohjelmaa ei löytynyt\n";
  const sessions = state.sessions
    .filter(s => s.mesocycleId === mesocycleId)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));

  const firstDate = sessions[0]?.dateISO || meso.startDateISO || "?";
  const lastDate = sessions[sessions.length - 1]?.dateISO || "?";
  const plannedWeeks = (meso.weekPlans || []).length || null;
  const plannedSessions = (meso.weekPlans || []).reduce((n, wp) => n + (wp.days?.length || 0), 0);

  // Tonnage per liike
  const byMov = new Map();
  for (const set of sets) {
    const mov = movById.get(set.movementId);
    if (!mov) continue;
    if (!byMov.has(mov.movementId)) byMov.set(mov.movementId, { mov, sets: [], tonnage: 0 });
    const rec = byMov.get(mov.movementId);
    rec.sets.push(set);
    rec.tonnage += (set.externalLoadKg || 0) * (set.reps || 0);
  }

  // e1RM first vs last per primary movement
  const e1rmLines = [];
  for (const { mov, sets: ms } of byMov.values()) {
    if (ms.length < 2) continue;
    const isPrimary = mov.isPrimary;
    const sorted = [...ms].sort((a,b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
    const compute = (s) => {
      const sess = sessions.find(ss => ss.sessionId === s.sessionId);
      const bw = sess?.bodyweightKg || 91;
      return isPrimary ? e1rmExternal(bw, s.externalLoadKg || 0, s.reps, s.actualVx)
                       : e1rmAccessory(s.externalLoadKg || 0, s.reps, s.actualVx);
    };
    const firstE = compute(sorted[0]);
    const lastE = compute(sorted[sorted.length - 1]);
    const maxE = Math.max(...sorted.map(s => compute(s) ?? 0));
    if (firstE === null || lastE === null) continue;
    const delta = lastE - firstE;
    const sign = delta > 0 ? "+" : "";
    e1rmLines.push(`- **${mov.name}**: ${firstE.toFixed(1)} → ${lastE.toFixed(1)} kg (${sign}${delta.toFixed(1)}), huippu ${maxE.toFixed(1)} kg`);
  }

  // PR:t aikavälillä
  const prs = (state.prs || [])
    .filter(p => (p.dateISO || "") >= firstDate && (p.dateISO || "") <= lastDate)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));

  // Readiness-jakauma
  const rCounts = { GREEN: 0, YELLOW: 0, RED: 0 };
  for (const s of sessions) {
    const l = s.readinessCapLevel;
    if (l === 2) rCounts.RED++;
    else if (l === 1) rCounts.YELLOW++;
    else rCounts.GREEN++;
  }

  const totalSets = sets.length;
  const totalTonnage = [...byMov.values()].reduce((n, r) => n + r.tonnage, 0);

  const lines = [];
  lines.push(`# ${meso.name || meso.type || "Ohjelma"}`);
  lines.push("");
  lines.push(`**Aikaväli:** ${firstDate} → ${lastDate}`);
  lines.push(`**Treenit:** ${sessions.length}${plannedSessions ? ` / ${plannedSessions} suunniteltu` : ""}`);
  lines.push(`**Viikot:** ${plannedWeeks || "?"}`);
  lines.push(`**Sarjat yhteensä:** ${totalSets}`);
  lines.push(`**Tonnage (external):** ${(totalTonnage / 1000).toFixed(1)} t`);
  lines.push("");
  lines.push(`## Readiness-jakauma`);
  lines.push(`- 🟢 GREEN: ${rCounts.GREEN}`);
  lines.push(`- 🟡 YELLOW: ${rCounts.YELLOW}`);
  lines.push(`- 🔴 RED: ${rCounts.RED}`);
  lines.push("");
  if (e1rmLines.length > 0) {
    lines.push(`## e1RM-kehitys per liike`);
    lines.push(...e1rmLines);
    lines.push("");
  }
  if (prs.length > 0) {
    lines.push(`## PR:t ohjelman aikana`);
    for (const pr of prs) {
      const comp = pr.isCompetition ? " 🏅" : "";
      const bw = pr.bodyweightKg ? ` @ ${pr.bodyweightKg} kg BW` : "";
      const ctx = pr.context ? ` — ${pr.context}` : "";
      lines.push(`- **${pr.dateISO}**${comp} ${pr.movementName}: ${pr.value} kg${bw}${ctx}`);
    }
    lines.push("");
  }

  // Muistiinpanot (jos on)
  const notes = sessions.filter(s => s.sessionNotes && s.sessionNotes.trim());
  if (notes.length > 0) {
    lines.push(`## Treenimuistiinpanot`);
    for (const s of notes) {
      lines.push(`- **${s.dateISO}** (${dayOfWeekShort(s.dateISO)}): ${s.sessionNotes.trim()}`);
    }
    lines.push("");
  }

  // Sarjat per liike tiiviisti
  lines.push(`## Sarjat per liike`);
  const movRows = [...byMov.values()]
    .sort((a,b) => b.tonnage - a.tonnage)
    .map(r => `- ${r.mov.name}: ${r.sets.length} sarjaa, ${(r.tonnage/1000).toFixed(2)} t`);
  lines.push(...movRows);
  lines.push("");
  lines.push(`---`);
  lines.push(`*Luotu LeVe Coach -sovelluksesta ${todayISO()}*`);
  return lines.join("\n");
}
