// v4.23 P3.3: Error boundary. Render-virheet (template-literaali rikki,
// puuttuva state-kenttä, engine-kaatuminen) eivät saa tuottaa tyhjää sivua
// vaan diagnostiikkaruudun josta käyttäjä voi toipua. Tunnettu rajoitus:
// vain top-level render-virheet napataan — if-statement-haaran sisällä
// kaatuva expression tulee näkyviin normaalisti, minkä jälkeen tämä polku
// ei ehdi toimia.
function renderErrorBoundary(err, viewName) {
  const app = document.getElementById("app");
  const errMsg = (err && err.message) || String(err || "Tuntematon virhe");
  const errStack = (err && err.stack) ? err.stack.toString().slice(0, 800) : "";
  app.innerHTML = `<div class="fade-in">
    <div class="card" style="border-color:var(--bad)">
      <div class="card-title" style="color:var(--bad)">⚠ Renderöintivirhe — ${viewName}</div>
      <div style="font-family:monospace;font-size:12px;margin-bottom:12px;color:var(--warn);word-wrap:break-word">${errMsg}</div>
      ${errStack ? `<details style="margin-bottom:12px"><summary class="muted" style="font-size:11px;cursor:pointer">Tekninen stack trace</summary><pre style="font-size:10px;overflow-x:auto;color:var(--dim);white-space:pre-wrap;margin-top:8px">${errStack}</pre></details>` : ""}
      <div class="muted" style="font-size:12px;margin-bottom:10px">
        Tämä on vakava virhe. Data IndexedDB:ssä on yhä tallessa — pelkkä näkymän renderöinti epäonnistui. Voit yrittää:
      </div>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="state.view='dashboard'; render();">🏠 Etusivu</button>
        <button class="btn btn-sm btn-outline" onclick="location.reload()">🔄 Uudelleenlataus</button>
        <button class="btn btn-sm btn-outline" onclick="state.view='settings'; render();">⚙ Asetukset (backup)</button>
      </div>
    </div>
  </div>`;
}

function render() {
  const app = document.getElementById("app");
  const viewName = state.view || "dashboard";
  try {
    switch (viewName) {
      case "dashboard": app.innerHTML = renderDashboard(); break;
      case "workout": app.innerHTML = renderWorkout(); break;
      case "readiness": app.innerHTML = renderReadiness(); break;
      case "mesocycle":
        app.innerHTML = renderMesocycle();
        // v4.34.42: lazy-populoi Sykli-sivun ohjelma-yleiskatsauksen kuormat taustalla.
        // Cache-pohjainen → seuraavat renderit saavat datan heti, vain ekka latauskerta
        // kestää ~1-2 s (64 recommend()-kutsua).
        if (state.mesocycle && state.mesocycle.type === "streetlifting_16w") {
          setTimeout(() => {
            populateProgramOverviewTargets(state.mesocycle).then(() => {
              // Re-render jos käyttäjä on edelleen mesocycle-näkymässä — solut
              // päivittyvät DOMissa suoraan applyProgramTargetsToDOM:n kautta,
              // mutta tämä varmistaa että renderöinti on persistent (esim. nav-vaihdon jälkeen).
            }).catch(err => console.warn("[populateProgramOverviewTargets] failed:", err?.message || err));
          }, 0);
        }
        break;
      case "movements": app.innerHTML = renderMovements(); break;
      case "history": app.innerHTML = renderHistory(); break;
      case "prs": app.innerHTML = renderPRs(); break;
      case "trends": app.innerHTML = renderTrends(); break;
      case "progress": app.innerHTML = renderProgress(); break;
      case "settings": app.innerHTML = renderSettingsView(); break;
      default: app.innerHTML = renderDashboard();
    }
  } catch (err) {
    console.error(`[render:${viewName}] crashed:`, err);
    renderErrorBoundary(err, viewName);
  }
  try {
    renderNav();
    bind();
  } catch (err) {
    console.error(`[render:${viewName}] bind failed:`, err);
    showToast(`Bindausvirhe — tarkista konsoli`, "bad", 5000);
  }
  // Rest-timer dock: re-attach observer to the (possibly freshly rendered) inline card
  // and re-evaluate dock visibility for the current view.
  if (state.restTimerInterval !== null) {
    ensureRestDock();
    updateRestTimerUI();
    attachRestInlineObserver();
    updateRestDockVisibility();
  }
}

function renderNav() {
  const navItems = [
    { id: "dashboard", icon: "🏠", label: "Koti" },
    { id: "mesocycle", icon: "📅", label: "Sykli" },
    { id: "movements", icon: "💪", label: "Liikkeet" },
    { id: "history", icon: "📊", label: "Historia" },
    { id: "progress", icon: "📈", label: "Edistyminen" },
    { id: "settings", icon: "⚙️", label: "Asetukset" },
  ];
  document.getElementById("nav").innerHTML = navItems.map(n =>
    `<button data-nav="${n.id}" class="${state.view === n.id ? 'active' : ''}">
      <span class="icon">${n.icon}</span>${n.label}
    </button>`
  ).join("");
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD VIEW
// ═══════════════════════════════════════════════════════════════

function estimateDurationMin(slots) {
  if (!slots || !slots.length) return null;
  const restByRole = {
    primary: 180, backoff: 150, accessory: 75, support: 90,
    warmup: 90, opener: 240, attempt2: 300, attempt3: 300,
  };
  const sec = slots.reduce((acc, s) => {
    const setSec = (restByRole[s.role] ?? 90) + 25;
    return acc + (s.sets || 1) * setSec;
  }, 0);
  return Math.max(15, Math.round((sec + 10 * 60) / 60));
}

function buildPhaseTimelineHTML(meso, currentWeek, isDeloadActive) {
  if (!meso || !meso.weekCount || meso.weekCount < 2) return "";
  const dots = [];
  for (let w = 1; w <= meso.weekCount; w++) {
    const def = meso.weekDefs?.find(wd => wd.week === w);
    const isDeloadWeek = (def?.label || "").toLowerCase().includes("deload");
    const classes = ["phase-dot"];
    if (isDeloadWeek) classes.push("deload");
    if (typeof currentWeek === "number") {
      if (w < currentWeek) classes.push("done");
      if (w === currentWeek) classes.push("active");
    }
    dots.push(`<div class="${classes.join(" ")}"></div>`);
  }
  let legendHTML = "";
  if (meso.type === "streetlifting_16w" && meso.weekCount === 16) {
    const phases = [
      { name: "Hypertrofia", start: 1, end: 4 },
      { name: "Voima", start: 5, end: 8 },
      { name: "Intensifikaatio", start: 9, end: 12 },
      { name: "Peak", start: 13, end: 16 },
    ];
    legendHTML = `<div class="phase-legend">${phases.map(p => {
      const isCurrent = typeof currentWeek === "number" && currentWeek >= p.start && currentWeek <= p.end;
      return `<span class="${isCurrent ? (isDeloadActive ? "current deload" : "current") : ""}">${p.name}${isCurrent ? " ▲" : ""}</span>`;
    }).join("")}</div>`;
  }
  return `<div class="phase-timeline">${dots.join("")}</div>${legendHTML}`;
}

function renderDashboard() {
  const rec = state.recommendation;
  const r = state.readiness;
  const today = todayISO();
  const meso = state.mesocycle;

  // v4.27.3: Mesosykli on päättynyt → näytä ilmoitus käyttäjälle eikä anna
  // sovelluksen hiljaisesti vaihtaa oletukseen. Käyttäjä valitsee seuraavan
  // ohjelman Mesosykli-näkymästä.
  //
  // v4.27.10 DEFENSIIVINEN TARKISTUS: Ennen "päättynyt"-kortin renderointia
  // ristiintarkastetaan `state.mesocycle` suoraan. Jos sykli on rakenteeltaan
  // vielä voimassa (startDateISO + weekCount asettavat tänään ohjelma-vk:lle),
  // KIELLETÄÄN ejektio — tämä estää virhe-eliksiinin jossa jokin välissä kääntää
  // rec.error=="mesocycle-ended" vaikka state.mesocycle on edelleen pätevä
  // (esim. refresh() palauttaa eri meson kuin mitä recommend()-kutsun aikana
  // oli). Jos epäkonsistenssia ilmenee, lokitetaan konsoliin ja yritetään
  // computeRecommendation uudelleen jotta UI synkkaa itsensä.
  if (rec?.error === "mesocycle-ended") {
    let trulyEnded = true;
    if (meso && meso.startDateISO && meso.weekCount) {
      const pos = resolveMesocyclePosition(meso, today);
      if (pos && pos.programWeek !== null && pos.reason === "in-range") {
        trulyEnded = false;
        // Inconsistency: engine says ended, but state.mesocycle says in-range.
        // Log and schedule a re-sync without blocking rendering.
        console.warn("[LeVe] Mesocycle-ended inconsistency — state says in-range (vk", pos.programWeek, "/", meso.weekCount, "), ignoring engine ejection");
        // Kick off a background re-sync. computeRecommendation reuses state.mesocycle.
        queueMicrotask(() => {
          computeRecommendation().then(() => render()).catch(() => {});
        });
      }
    }
    if (trulyEnded) {
      const prevType = rec.prevMesocycleType || "edellinen";
      const prevTpl = MESOCYCLE_TEMPLATES.find(t => t.id === prevType);
      const prevLabel = prevTpl?.label || prevType;
      return `<div class="card" style="padding:20px;margin:16px;background:linear-gradient(135deg,rgba(139,92,246,0.12),rgba(59,130,246,0.08));border:1px solid rgba(139,92,246,0.3)">
        <div style="font-size:28px;margin-bottom:8px">🏁</div>
        <h2 style="margin:0 0 8px 0;font-size:20px">Mesosykli on päättynyt</h2>
        <p style="margin:0 0 16px 0;line-height:1.5;color:var(--muted)">
          Edellinen ohjelmasi <b>${prevLabel}</b> on suoritettu loppuun. Valitse seuraava jakso itse — emme vaihda ohjelmaa puolestasi.
        </p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn-primary" data-nav="mesocycle" style="padding:12px">📋 Valitse uusi ohjelma</button>
          <div style="font-size:12px;color:var(--muted);text-align:center;margin-top:4px">Aiemmat tuloksesi + e1RM säilyvät.</div>
        </div>
      </div>`;
    }
    // Fall-through: render normally using state.mesocycle. rec may be missing
    // dayPlan etc. — downstream code gracefully handles rec-less paths.
  }

  const weekNum = rec?.weekNum ?? null;
  const weekLabel = rec?.weekLabel || "";
  const dayType = rec?.dayType || "heavy";

  const isDeloadOverride = meso ? isDeloadOverrideWeek(meso, today) : false;
  const isDeloadLabel = weekLabel.toLowerCase().includes("deload");
  const deloadMode = isDeloadOverride || isDeloadLabel;

  const readinessClass = r.combined === "GREEN" ? "chip-green" : r.combined === "YELLOW" ? "chip-yellow" : "chip-red";
  const readinessEmoji = r.combined === "GREEN" ? "🟢" : r.combined === "YELLOW" ? "🟡" : "🔴";

  const mt = meso?.type || null;
  const tpl = mt ? MESOCYCLE_TEMPLATES.find(t => t.id === mt) : null;
  const mesoChipClass = deloadMode ? "chip-yellow" : (mt === "peaking" ? "chip-yellow" : "chip-acc");
  const mesoChipIcon = deloadMode ? "🌿" : (tpl?.icon || "⭐");
  const mesoChipHTML = meso
    ? `<span class="chip ${mesoChipClass}">${mesoChipIcon} Vk ${weekNum ?? "?"}/${meso.weekCount}</span>`
    : "";

  const dayTypeFi = dayTypeLabel(dayType);
  const phaseEyebrow = (() => {
    if (deloadMode) return "Kevennys · palautuminen";
    if (meso?.type === "streetlifting_16w" && typeof weekNum === "number") {
      const block = weekNum <= 4 ? "Hypertrofia" : weekNum <= 8 ? "Voima" : weekNum <= 12 ? "Intensifikaatio" : "Peak";
      return `${block} · ${dayTypeFi}`;
    }
    if (weekLabel) return `${weekLabel} · ${dayTypeFi}`;
    return dayTypeFi;
  })();

  // Plan-override: kun käyttäjä on valinnut toisen päivän planin tänään
  const overrideISO = state.planOverrideDateISO;
  const isPlanOverridden = !!overrideISO && overrideISO !== today;
  const dayNamesShort = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
  const overrideDow = isPlanOverridden ? (new Date(overrideISO).getDay() || 7) : null;
  const overrideEyebrowHTML = isPlanOverridden
    ? `<span class="plan-override-chip">🔀 Vaihdettu · ${dayNamesShort[overrideDow]}</span>`
    : "";

  const heroTitle = stripRedundantDayPrefix(rec?.dayPlan?.label) || dayTypeFi;
  const slots = rec?.dayPlan?.slots || [];
  const workSlotCount = slots.filter(s => s.role !== "warmup").length || slots.length;
  const estDur = estimateDurationMin(slots);
  const heroSubParts = [];
  if (workSlotCount > 0) heroSubParts.push(`<b>${workSlotCount} työliikettä</b>`);
  if (estDur) heroSubParts.push(`arvioitu kesto <b>~${estDur} min</b>`);
  if (deloadMode) heroSubParts.push("kuormat pienennetty");
  const heroSub = heroSubParts.length ? heroSubParts.join(" · ") : "Ei ohjelmaa tänään";

  const warmupItems = rec?.dayPlan?.warmup || [];
  const warmupLineHTML = warmupItems.length > 0
    ? `<div class="warmup-line">🔥 LÄMMITTELY <span class="dots">· ${warmupItems.slice(0, 3).map(w => w.desc ? `${w.name} ${w.desc}` : w.name).join(" · ")}${warmupItems.length > 3 ? ` · +${warmupItems.length - 3}` : ""}</span></div>`
    : "";

  let slotRowsHTML = "";
  if (slots.length > 0) {
    slotRowsHTML = slots.map((slot, i) => {
      const movName = slot.defaultMovementName || slot.category || "?";
      const isPrimary = slot.role === "primary";
      const isBackoff = slot.role === "backoff";
      const isAttempt = ["warmup", "opener", "attempt2", "attempt3"].includes(slot.role);

      let roleIcon = "•";
      if (isPrimary) roleIcon = "⭐";
      else if (isBackoff) roleIcon = "↩";
      else if (slot.role === "support") roleIcon = "🎯";
      else if (slot.role === "accessory") roleIcon = "💪";
      else if (isAttempt) roleIcon = "🏆";
      // v4.34.33: secondary + calibration ikonit
      else if (slot.role === "secondary") roleIcon = "🎯";
      else if (slot.role === "calibration") roleIcon = "🎯";

      let loadStr = "";
      let loadCls = "";
      if (isAttempt && rec.attemptLoads) {
        const loads = rec.attemptLoads;
        if (slot.role === "warmup") { loadStr = "Lämmittely"; loadCls = "backoff"; }
        else if (slot.role === "opener") { loadStr = `+${loads.opener} kg`; loadCls = "opener"; }
        else if (slot.role === "attempt2") { loadStr = `+${loads.second} kg`; loadCls = "attempt2"; }
        else if (slot.role === "attempt3") { loadStr = `+${loads.third} kg 🎯`; loadCls = "attempt3"; }
      } else if (isPrimary && rec?.targetExternalLoad !== null && rec?.targetExternalLoad !== undefined) {
        loadStr = `+${rec.targetExternalLoad} kg`;
        if (deloadMode) loadCls = "deload";
      } else if (isBackoff && typeof slot.resolvedLoadKg === "number") {
        // v4.34.33 BUG-FIX 5.1: engine resolvoi backoff-kuorman slot.loadPct × current e1RM:llä.
        // Aiempi 0.85 × primary -hardcode ei tunnista slot-spesifiä loadPct:tä (esim.
        // foundation backoff loadPct=0.55, mutta dashboard näytti 0.85). Workout-flow
        // (rivi 8414) lukee resolvedLoadKg:n oikein, dashboard ei aiemmin.
        loadStr = `+${slot.resolvedLoadKg} kg`;
        loadCls = deloadMode ? "deload" : "backoff";
      } else if (isBackoff && rec?.targetExternalLoad !== null && rec?.targetExternalLoad !== undefined) {
        // Fallback: legacy default-mesosykli ilman loadPct-arvoa → primary × 0.85
        loadStr = `+${roundToHalf(rec.targetExternalLoad * 0.85)} kg`;
        loadCls = deloadMode ? "deload" : "backoff";
      } else if (slot.role === "secondary" && typeof slot.resolvedLoadKg === "number") {
        // v4.34.33 RISK 5.3: secondary-slot näkyväksi dashboardilla. Streetlifting_16w
        // käyttää secondary-slottia mm. vk 8/12/13/14 top-singletteihin (loadPct
        // 0.85-0.92). Workout-flow renderöi ne, dashboard ei aiemmin.
        loadStr = `+${slot.resolvedLoadKg} kg`;
        loadCls = deloadMode ? "deload" : "secondary";
      } else if (slot.role === "calibration" && typeof slot.resolvedLoadKg === "number") {
        // Cal-slot näkyväksi dashboardilla
        loadStr = `+${slot.resolvedLoadKg} kg`;
        loadCls = "cal";
      }

      const setsReps = `${slot.sets}×${slot.reps}`;
      const vxStr = slot.targetVx !== null && slot.targetVx !== undefined ? ` · V${slot.targetVx}` : "";
      const variantStr = slot.variantName && (isPrimary || isBackoff)
        ? `<div class="slot-variant">${slot.variantName}</div>`
        : "";
      const infoBtn = (MOVEMENT_DESCRIPTIONS?.[movName] || slot.slotId)
        ? ` <span class="preview-info-btn info" data-preview-info-idx="${i}" title="Tietoja liikkeestä">ⓘ</span>`
        : "";

      return `<div class="slot-row">
        <div class="slot-role">${roleIcon}</div>
        <div class="slot-body">
          <div class="slot-name">${movName}${infoBtn}</div>
          ${variantStr}
        </div>
        <div class="slot-detail">
          <div class="slot-sets">${setsReps}${vxStr}</div>
          <div class="slot-load ${loadCls}">${loadStr}</div>
        </div>
      </div>`;
    }).join("");
  }

  const breakHTML = rec?.breakInfo
    ? `<div class="card" style="border-color:var(--warn);margin-bottom:10px">
        <div class="text-warn" style="font-weight:600">${rec.breakInfo.message}</div>
      </div>`
    : "";

  // Missed prior session banner — näytä uusin (eilinen) ensin
  const missedSessions = meso ? findMissedPriorSessions(meso, state.sessions, today, 3) : [];
  const missedBannerHTML = renderMissedBanner(missedSessions[0], missedSessions.length);

  const phaseTimelineHTML = buildPhaseTimelineHTML(meso, typeof weekNum === "number" ? weekNum : null, deloadMode);

  // v4.32.4 (C): Variant-rotaation tilarivi — kertoo missä ME-rotaation vaiheessa
  // käyttäjä on. Vain streetlifting_16w-mesosyklillä, ei riko olemassa olevaa
  // phaseTimelineHTML-rakennetta. Pelkkä informaatio-rivi sen alle.
  const meRotationHTML = (() => {
    if (meso?.type !== "streetlifting_16w") return "";
    if (typeof weekNum !== "number" || weekNum < 1 || weekNum > 16) return "";
    let label = "";
    if (weekNum >= 1 && weekNum <= 3) label = "ME-leuka: Vastaote-leuanveto (kapea ote, hauis-overload)";
    else if (weekNum === 4) label = "Deload — kalibrointi";
    else if (weekNum === 5 || weekNum === 6) label = "ME-leuka: Paused pull-up (lockout-statiikka)";
    else if (weekNum === 7) label = "ME-leuka: Tempo pull-up (eccentric-volyymi)";
    else if (weekNum === 8) label = "Deload — RPE9-test";
    else if (weekNum >= 9 && weekNum <= 11) label = "ME-rotaatio päättynyt — kilpaote lukko";
    else if (weekNum === 12) label = "Deload — RPE9-test";
    else if (weekNum >= 13 && weekNum <= 14) label = "Realization + taper";
    else if (weekNum >= 15 && weekNum <= 16) label = "Kisaviikko — opener-rehearsal";
    if (!label) return "";
    return `<div style="font-size:11px;color:var(--muted);text-align:center;padding:6px 0;margin-top:-6px;line-height:1.4">📍 ${label}</div>`;
  })();

  // v4.29.0 (P2): Streetlifting opener-strategia peaking-vaiheessa (vk 13–16).
  // Laskee per kilpailuliike opener (88 %) / 2nd (95 %) / 3rd (102 %) viimeisimmän
  // e1RM:n perusteella. Tarkoitus: käyttäjä voi suunnitella kisapäivän nostot ennalta.
  const openerStrategyHTML = (() => {
    if (meso?.type !== "streetlifting_16w") return "";
    if (typeof weekNum !== "number" || weekNum < 13) return "";
    // v4.32.7 bugfix: aiemmin virheellinen lista [Leuka, Dippi, Kyykky, Maastaveto] —
    // streetlifting-kisaliikkeet ovat MU + Leuka + Dippi + Takakyykky (ei maavetoa, MU mukana).
    // Käytetään kanonista KISALIIKKEET_NAMES-listaa joka on muutenkin sivun käytössä.
    const COMP_LIFTS = KISALIIKKEET_NAMES;
    const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;
    const e1rms = {};
    for (const liftName of COMP_LIFTS) {
      const mov = state.movements.find(m => m.name === liftName);
      if (!mov) continue;
      const sets = state.allSets.filter(s => s.movementId === mov.movementId);
      // v4.34.34 BUG 1 -fix: anna mov-objekti (sisältää loadType:n)
      const history = computeMovementE1RMHistory(sets, state.sessions, mov, bw);
      if (history.length > 0) {
        const lastE1rm = history[history.length - 1].e1rm;
        if (lastE1rm > 0) e1rms[liftName] = lastE1rm;
      }
    }
    const strategy = computeStreetliftingOpenerStrategy(e1rms);
    if (!strategy) return "";
    const liftLabels = {
      "Lisäpainoleuanveto": "Leuanveto",
      "Muscle-up": "MU",
      "Lisäpainodippi": "Dippi",
      "Takakyykky": "Kyykky",
    };
    const rowsHTML = Object.entries(strategy).map(([liftName, s]) => `
      <div style="display:grid;grid-template-columns:1fr repeat(3, 1fr);gap:6px;padding:6px 0;border-top:1px solid var(--border);font-size:13px">
        <div style="font-weight:600">${liftLabels[liftName] || liftName}</div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--muted)">opener</div><div style="font-weight:700">${s.opener} kg</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--muted)">2.</div><div style="font-weight:600">${s.second} kg</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:var(--muted)">3. PR</div><div style="font-weight:700;color:var(--acc)">${s.third} kg</div></div>
      </div>`).join("");
    return `<div class="card" style="margin-top:10px;border-color:rgba(245, 158, 11, 0.4);background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(239,68,68,0.04))">
      <div class="card-title">🏆 Kisapäivän opener-strategia (peak vk ${weekNum}/16)</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">88 % / 95 % / 102 % e1RM — IPF World Classic 2021 -voittaja-aineistoon perustuva (Helms, Bromley)</div>
      ${rowsHTML}
      <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4">
        💡 Opener = "viimeisin treenisingle prep-blokin lopussa". 2. yritys = ~95 % (RPE 9). 3. yritys = PR-yritys.<br>
        Viimeinen raskas single ~92–95 % avattavasta vk 14:llä. Maaveto pois viim. 10–14 vrk, kyykky 7–10 vrk, leuka/dippi 5–7 vrk.
      </div>
    </div>`;
  })();

  const ctaDurationPill = estDur ? `<span class="duration">~${estDur} min</span>` : "";
  // v4.30.3 (bugi): tarkista onko tänään jo tehty sessio. Jos on, CTA muuttuu
  // "tänään tehty"-tilaan eikä päivän treeniä esitetä uudelleen aloitettavaksi.
  // v4.32.2 (bugi): jos plan-override on aktiivinen (käyttäjä klikkasi "Vaihda päivä"),
  // CTA aktivoidaan vaikka tänään olisi tehty oma plani — käyttäjä haluaa nyt eri päivän
  // plania tehdä. Aiemmin disabled CTA jätti käyttäjän jumiin override-tilaan.
  // v4.34.11 (KÄYTTÄJÄPALAUTE): plan-override-sessio (käyttäjä teki tänään mennyttä päivän
  // plania) EI saa blokata oman päivän todellista treeniä. Käyttäjä raportoi: täytti TODAY:nä
  // Ma-päivän plania → CTA lukittui "TÄNÄÄN TEHTY" → ei voinut tehdä todellista TO-treeniä.
  // Korjaus: jos session.isPlanOverride === true, sitä EI lasketa "oman päivän tehdyksi".
  const todaySession = (state.sessions || []).find(s =>
    (s.dateISO || "") === today && !s.isPlanOverride
  );
  const dayAlreadyDone = !!todaySession && !state.planOverrideDateISO;
  const ctaLabel = dayAlreadyDone
    ? "✅ TÄNÄÄN TEHTY"
    : (deloadMode ? "▶ ALOITA KEVENNYS" : "▶ ALOITA TREENI");
  // v4.31.2: label heijastaa painikkeen todellista toimintaa
  // - Kevennysviikolla: peruuttaa nykyisen kevennyksen
  // - Tuleva vk merkitty kevennykseksi: peruuttaa vahingossa-merkityn
  // - Muuten: lisää kevennyksen seuraavalle viikolle
  const futureDeloadMarked = meso && (meso.replacedWithDeload || []).some(r => {
    const week = typeof r === "number" ? r : r.programWeek;
    return week > (rec?.weekNum ?? 0);
  });
  const deloadBtnLabel = isDeloadOverride
    ? "↩ Peru nykyinen kevennys"
    : (futureDeloadMarked ? "↩ Peru tuleva kevennys" : "🌿 Kevennys");

  return `<div class="fade-in">
    <div class="dash-topline">
      <div class="dash-topline-left">
        <div class="date">${formatDate(today)}</div>
        <div class="hello">${deloadMode ? "🌿 Kevennysviikko" : (meso?.type === "streetlifting_16w" && typeof weekNum === "number" ? (weekNum <= 4 ? "📚 Hypertrofia" : weekNum <= 8 ? "💪 Voima" : weekNum <= 12 ? "📈 Intensifikaatio" : "🏆 Peak") : dayTypeFi)}</div>
      </div>
      <div class="dash-topline-right">
        ${mesoChipHTML}
        <span class="chip ${readinessClass}">${readinessEmoji} ${r.combined || "?"}</span>
        ${renderVBTStatusChip()}
      </div>
    </div>

    ${breakHTML}
    ${renderMaintenanceBanner()}
    ${renderPeakingDecisionTreeCard()}
    ${missedBannerHTML}
    ${renderExternalBackupReminderBanner()}

    <div class="hero${deloadMode ? " deload" : ""}${isPlanOverridden ? " plan-override" : ""}">
      <div class="hero-eyebrow">
        <span class="phase">${phaseEyebrow}</span>
        ${overrideEyebrowHTML}
        ${meso ? (isPlanOverridden
            ? `<button class="plan-override-reset" id="btn-plan-override-reset" title="Palauta tämän päivän alkuperäinen plani">↩ Palauta</button>`
            : `<button class="plan-override-link" id="btn-plan-override" title="Vaihda tänään toisen päivän plani">🔀 Vaihda päivä</button>`) : ""}
      </div>
      <div class="hero-title">${heroTitle}</div>
      <div class="hero-sub">${heroSub}</div>

      ${slots.length > 0
        ? `<div class="slot-list">${warmupLineHTML}${slotRowsHTML}</div>`
        : '<div class="slot-list"><div class="muted" style="text-align:center;padding:8px 0">Ei ohjelmaa — aloita mesosykli</div></div>'}

      <button class="primary-cta${deloadMode ? " deload" : ""}${dayAlreadyDone ? " done" : ""}" id="btn-start-workout"${slots.length === 0 || dayAlreadyDone ? " disabled" : ""}>
        ${ctaLabel}${dayAlreadyDone ? "" : ctaDurationPill}
      </button>
      ${dayAlreadyDone ? `<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px">Päivän treeni on tallennettu. Voit tarkastella sitä Historia-välilehdellä.</div>` : ""}

      ${phaseTimelineHTML}
      ${meRotationHTML}
    </div>

    <div class="secondary-row">
      <button class="btn btn-outline" id="btn-readiness">📊 Readiness</button>
      ${meso ? `<button class="btn btn-outline" id="btn-insert-deload">${deloadBtnLabel}</button>` : ""}
    </div>

    ${openerStrategyHTML}

    ${renderStimCard(deloadMode)}

    ${renderBackupStatusCard()}

    ${renderFutureCollapsible()}

    ${renderTraceCollapsible(rec)}
  </div>`;
}

// v4.26.0: renderöi snapshot-lista asetus-sivulle
async function renderBackupSnapshotsList() {
  const container = document.getElementById("backup-snapshots-list");
  if (!container) return;
  try {
    const snaps = await getAllBackupSnapshots();
    if (!snaps.length) {
      container.innerHTML = `<div style="color:var(--muted)">Ei snapshoteja vielä.</div>`;
      return;
    }
    const rowsHTML = snaps.map(s => {
      const d = new Date(s.createdAtISO);
      const dateStr = d.toLocaleString("fi-FI", { dateStyle: "short", timeStyle: "short" });
      const sizeKB = Math.round((s.sizeBytes || 0) / 1024);
      const reasonLabels = {
        "weekly-auto": "🗓 Auto",
        "manual": "👆 Käsin",
        "pre-import": "🛡 Ennen tuontia",
        "pre-restore": "🛡 Ennen restorea",
      };
      const reason = reasonLabels[s.triggerReason] || s.triggerReason || "?";
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);gap:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px">${dateStr}</div>
          <div style="font-size:10px;color:var(--muted)">${reason} · ${sizeKB} KB</div>
        </div>
        <button class="btn btn-sm btn-outline" data-restore-snapshot="${s.snapshotId}" title="Palauta tästä snapshotista">↻</button>
        <button class="btn btn-sm btn-outline" data-download-snapshot="${s.snapshotId}" title="Lataa snapshot JSONina">⬇</button>
      </div>`;
    }).join("");
    container.innerHTML = rowsHTML;

    // Wire restore & download buttons
    container.querySelectorAll("[data-restore-snapshot]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const sid = e.currentTarget.getAttribute("data-restore-snapshot");
        if (!confirm("Palauta tästä snapshotista? Nykyisestä datasta luodaan automaattisesti varmuussnapshot ennen palautusta.")) return;
        try {
          await restoreFromSnapshot(sid);
          await refresh();
          state.backupStatus = await getBackupStatus();
          showToast("Snapshot palautettu ✓", "ok");
          render();
        } catch (err) {
          showToast("Palautus epäonnistui: " + err.message, "bad");
        }
      });
    });
    container.querySelectorAll("[data-download-snapshot]").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const sid = e.currentTarget.getAttribute("data-download-snapshot");
        const snap = snaps.find(x => x.snapshotId === sid);
        if (!snap) return;
        const blob = new Blob([JSON.stringify(snap.data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const iso = snap.createdAtISO.slice(0, 10);
        a.href = url; a.download = `leve-coach-snapshot-${iso}.json`;
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        showToast("Snapshot ladattu", "ok");
      });
    });
  } catch (e) {
    container.innerHTML = `<div style="color:var(--bad)">Virhe ladatessa snapshoteja</div>`;
  }
}

      ${dp.hrvAvg7d !== null ? `<div>· HRV 7 pv keskiarvo: <b>${dp.hrvAvg7d} ms</b></div>` : ""}

      ${Object.keys(dp.ruleFreqRecent).length > 0 ? `<div>· Engine-rule-laukenema: ${Object.entries(dp.ruleFreqRecent).map(([k, v]) => `${k}: ${v}×`).join(", ")}</div>` : ""}

// v4.34.27: VBT (Velocity-Based Training) -status -chip Koti-näkymässä.
// Näytetään hero-otsikon vieressä kun n ≥ 10 ankkuripistettä ON kerätty.
// promoted = velocity-pohjainen e1RM käytössä primary-haarana (vihreä chip)
// candidate = data riittää mutta diff > 5% (keltainen chip)
// not-eligible = piilossa (ei näytetä mitään, ei häiritse normaalia UI:ta)
function renderVBTStatusChip() {
  const vbt = state.recommendation?.vbtStatus;
  if (!vbt || vbt.status === "not-eligible") return "";
  // v4.34.33 BUG-FIX 5.4: deferred-tila näkyy "VBT viivästetty" -chipinä — käyttäjä tietää
  // että VBT-data on ok mutta plan-based on aktivoitu (suunnitelma-uskollisuus voittaa).
  const isPromoted = vbt.status === "promoted";
  const isDeferred = vbt.status === "deferred";
  const cls = isPromoted ? "chip-green" : isDeferred ? "chip-acc" : "chip-yellow";
  const icon = isPromoted ? "📊" : isDeferred ? "📊" : "🟡";
  const label = isPromoted ? "VBT primary" : isDeferred ? "VBT viivästetty" : "VBT candidate";
  const diffStr = vbt.diffPct
    ? (typeof vbt.diffPct === "number" ? `±${(vbt.diffPct * 100).toFixed(1)}%` : `±${vbt.diffPct}`)
    : "n/a";
  const tooltip = isPromoted
    ? `Velocity-pohjainen e1RM käytössä · ${vbt.anchorCount} ankkuripistettä · ${diffStr} diff Vx-arvioon`
    : isDeferred
    ? `VBT on valmis (${vbt.anchorCount} ankkuripistettä) mutta plan-based aktivoitu — suunnitelma-uskollisuus voittaa yksittäiset velocity-mittaukset`
    : `${vbt.anchorCount} ankkuripistettä kerätty · diff Vx-arvioon ${diffStr} (kynnys 5%)`;
  return `<span class="chip ${cls}" title="${tooltip}" style="font-size:10px;padding:3px 8px">${icon} ${label}</span>`;
}

// v4.34.26: External backup reminder — bus-factor 1 → 2-3 -suoja.
// OneDrive + GitHub + IndexedDB ovat kaikki yhden tilini takana. 2 vk välein
// vapaaehtoinen muistutus jakaa backup ulkoiseen pilveen (sähköposti/Telegram/
// Drive Web Share API:n kautta). Lataaminen ei pakollista — käyttäjä voi
// snoozata "Muistuta 2 vk päästä" tai sulkea bannerin.
const LS_LAST_EXT_EXPORT = "leve_last_external_export_iso";
const LS_BACKUP_SNOOZE = "leve_backup_snooze_until_iso";

function renderExternalBackupReminderBanner() {
  const today = todayISO();
  const lastExport = localStorage.getItem(LS_LAST_EXT_EXPORT);
  const snooze = localStorage.getItem(LS_BACKUP_SNOOZE);
  if (!shouldShowBackupReminder(lastExport, today, snooze)) return "";

  const daysSinceLabel = lastExport
    ? (() => {
        const days = Math.floor((new Date(today).getTime() - new Date(lastExport).getTime()) / (24 * 3600 * 1000));
        if (days < 14) return `${days} pv vanha`;
        const wks = Math.round(days / 7);
        return `${wks} vk vanha`;
      })()
    : "ei vielä jaettu";

  return `<div class="card backup-reminder" style="margin:8px 0;padding:10px 12px;background:linear-gradient(135deg,rgba(99,102,241,0.10),rgba(59,130,246,0.05));border:1px solid rgba(99,102,241,0.3);display:flex;align-items:center;gap:10px">
    <div style="font-size:20px;flex-shrink:0">📦</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13px">Backup pilveen · ${daysSinceLabel}</div>
      <div class="muted" style="font-size:11px;margin-top:2px;line-height:1.35">Vapaaehtoinen viikkomuistutus — jaa data ulkoiseen tallennukseen (sähköposti/Drive/Telegram).</div>
    </div>
    <button class="btn btn-sm btn-primary" id="btn-share-backup" style="flex-shrink:0">Jaa</button>
    <button class="btn btn-sm btn-ghost" id="btn-snooze-backup" title="Muistuta 2 vk päästä" style="flex-shrink:0;padding:6px 8px">✕</button>
  </div>`;
}

function snoozeBackupReminder() {
  const today = todayISO();
  const d = new Date(today);
  d.setDate(d.getDate() + 14);
  const until = d.toISOString().slice(0, 10);
  localStorage.setItem(LS_BACKUP_SNOOZE, until);
}

function markExternalBackupExported() {
  localStorage.setItem(LS_LAST_EXT_EXPORT, todayISO());
  // Snooze auto-reset: kun export tehty, snooze ei tarvita
  localStorage.removeItem(LS_BACKUP_SNOOZE);
}

async function showBackupShareModal() {
  const data = await exportFullBackup();
  const json = JSON.stringify(data, null, 2);
  const filename = `leve-ai-backup-${todayISO()}.json`;
  const blob = new Blob([json], { type: "application/json" });

  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";

  // Web Share API tuettu? (file-jako vaatii navigator.canShare)
  const file = new File([blob], filename, { type: "application/json" });
  const canShareFile = typeof navigator.canShare === "function" && navigator.canShare({ files: [file] });

  overlay.innerHTML = `
    <div class="modal-sheet" style="max-width:480px">
      <div class="modal-handle"></div>
      <div class="modal-title">📦 Jaa backup pilveen</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5">Backup-tiedosto sisältää treenihistorian, e1RM:n, asetukset ja mesocyclen. Tallenna se sähköpostiisi, Driveen tai Telegramiin että data säilyy vaikka puhelin häviäisi.</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${canShareFile ? `<button class="btn btn-primary btn-full" id="btn-share-via-os" style="padding:14px"><b>📤 Jaa puhelimen jako-menüllä</b><div style="font-size:11px;font-weight:400;margin-top:2px;opacity:0.85">Sähköposti · Telegram · Drive · ym.</div></button>` : ""}
        <button class="btn btn-outline btn-full" id="btn-download-backup" style="padding:12px">📥 Lataa puhelimeen (${Math.round(blob.size / 1024)} KB)</button>
        <button class="btn btn-ghost btn-full" data-modal-cancel style="padding:10px;font-size:13px;color:var(--muted)">Peruuta</button>
      </div>
    </div>`;

  // Web Share API
  const shareBtn = overlay.querySelector("#btn-share-via-os");
  if (shareBtn) {
    shareBtn.addEventListener("click", async () => {
      try {
        await navigator.share({
          files: [file],
          title: "LeVe AI backup",
          text: `LeVe AI backup ${todayISO()}`,
        });
        markExternalBackupExported();
        closeModal();
        showToast("Backup jaettu · muistutus snoozattu 2 vk", "ok");
      } catch (e) {
        // User cancelled tai virhe
        if (e.name !== "AbortError") {
          showToast("Jako epäonnistui — kokeile latausta", "warn");
        }
      }
    });
  }

  // Fallback download
  overlay.querySelector("#btn-download-backup").addEventListener("click", () => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    markExternalBackupExported();
    closeModal();
    showToast("Backup ladattu · siirrä pilveen → muistutus snoozattu", "ok");
    render();
  });

  overlay.querySelector("[data-modal-cancel]").addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function renderBackupStatusCard() {
  const bs = state.backupStatus;
  if (!bs) return "";
  if (bs.status === "fresh") return ""; // hiljaa OK-tilassa

  let icon = "📦";
  let color = "var(--warn)";
  let title = "";
  let body = "";

  if (bs.status === "missing") {
    icon = "⚠️";
    color = "var(--warn)";
    title = "Backupia ei ole vielä luotu";
    body = "Viikottainen auto-backup käynnistyy seuraavalla sovelluksen avauksella. Voit myös luoda sen nyt käsin asetuksista.";
  } else if (bs.status === "stale") {
    icon = "📦";

  const dayNames = { 1: "MA", 2: "TI", 3: "KE", 4: "TO", 5: "PE", 6: "LA", 7: "SU" };

  const rows = futureWorkouts.slice(0, 5).map(fw => {

    const primaries = fw.slots.filter(s => s.role === "primary" || s.role === "backoff" || ["opener", "attempt2", "attempt3"].includes(s.role)).slice(0, 2);

// Compute the most recent prior-session set for this movement — used for delta chip + first-set ghost
function computePriorSet(movementId, excludeSessionId) {
  if (!movementId) return null;
  const candidates = state.allSets
    .filter(s => s.movementId === movementId && !s.isWarmup && s.completed)
    .filter(s => {
      const sess = state.sessions.find(x => x.sessionId === s.sessionId);
      return sess && sess.sessionId !== excludeSessionId;
    });
  if (!candidates.length) return null;
  candidates.sort((a, b) => {
    const sa = state.sessions.find(x => x.sessionId === a.sessionId);
    const sb = state.sessions.find(x => x.sessionId === b.sessionId);
    return (sb?.dateISO || "").localeCompare(sa?.dateISO || "");
  });
  return candidates[0];
}

// v4.34.24: täydellinen edellisen session yhteenveto liikkeestä — näyttää KAIKKI sarjat,
// ei vain viimeinen. Käyttäjäpalaute: "Voisiko liikekohtaisiset muistiinpanot näkyä
// edellisistä treenistä treenin aikana? Ehkä jopa fiksu katsaus aikaisempiin treeneihin?"
function computePriorSessionSummary(movementId, excludeSessionId) {
  if (!movementId) return null;
  const completedSets = state.allSets
    .filter(s => s.movementId === movementId && !s.isWarmup && s.completed)
    .filter(s => {
      const sess = state.sessions.find(x => x.sessionId === s.sessionId);
      return sess && sess.sessionId !== excludeSessionId;
    });
  if (!completedSets.length) return null;
  // Ryhmitä sessionId:n mukaan, etsi uusin
  const sessionMap = {};
  for (const s of completedSets) {
    if (!sessionMap[s.sessionId]) sessionMap[s.sessionId] = [];
    sessionMap[s.sessionId].push(s);
  }
  const sessions = Object.entries(sessionMap)
    .map(([sid, sets]) => ({
      sessionId: sid,
      dateISO: state.sessions.find(x => x.sessionId === sid)?.dateISO || "",
      sets: sets.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || "")),
    }))
    .sort((a, b) => b.dateISO.localeCompare(a.dateISO));
  const latestSession = sessions[0];
  const sets = latestSession.sets;
  // Tunnista heaviest setti (max load × reps tonnage proxy)
  const heaviest = sets.reduce((max, s) => {
    const tonn = (s.externalLoadKg || 0) * (s.reps || 0);
    const maxTonn = (max?.externalLoadKg || 0) * (max?.reps || 0);
    return tonn > maxTonn ? s : max;
  }, sets[0]);
  // Tunnista yhdenmukainen kuorma (kaikki sets sama load) vs. vaihteleva
  const loads = sets.map(s => s.externalLoadKg);
  const uniformLoad = loads.every(l => l === loads[0]);
  return {
    dateISO: latestSession.dateISO,
    setCount: sets.length,
    sets,
    heaviest,
    uniformLoad,
    avgLoad: loads.reduce((a,b) => a + b, 0) / loads.length,
  };
}

function priorSetDaysAgoLabel(priorSet) {
  if (!priorSet) return "";
  const sess = state.sessions.find(x => x.sessionId === priorSet.sessionId);
  if (!sess?.dateISO) return "";
  const today = new Date();
  const then = new Date(sess.dateISO);
  const days = Math.max(0, Math.round((today - then) / (24 * 3600 * 1000)));
  if (days === 0) return "tänään";
  if (days === 1) return "eilen";
  if (days < 14) return `${days} pv sitten`;
  const weeks = Math.round(days / 7);
  return `${weeks} vk sitten`;
}

// v4.34.24: Effort-score laskee sarjan suhteellisen rasituksen yhdistäen
// load × reps × Vx-painokerroin. Tonnage (load×reps) on raaka volyymi mutta
// Vx kertoo todellisesta intensiteetistä — sama tonnage V0:lla on RIIPPUMATTA
// kovempaa kuin V4:llä. Kerroin: V0 = 1.10 (failure, max), V5 = 0.85 (fresh).
// Käytetään trend-vertailussa (tämän session target vs. edellinen heaviest).
function effortScore(loadKg, reps, vx) {
  const l = loadKg ?? 0;
  const r = reps ?? 0;
  const v = (vx === null || vx === undefined) ? 3 : vx;
  const intensityFactor = 1.10 - (v * 0.05);
  return l * r * intensityFactor;
}

// v4.34.24: Hae N viimeisintä sessiota joissa tämä liike on tehty,
// uusin ensin. Käyttöä: prior-sessions-modal näyttää 3 viim. sessiota
// per-sarja-detaljilla.
function computeRecentSessionsForMovement(movementId, excludeSessionId, n = 3) {
  if (!movementId) return [];
  // v4.34.36 BUG-FIX: poistettu `s.completed === true` -ehto. Tallennetut setit
  // ovat aina valmiita (saveSets ei persistoi `completed`-kenttää, joka on vain
  // workout-flow:n sisäinen tila). Aiempi filtteri sulki KAIKKI tallennetut sarjat
  // pois → 📊-historia-modali näytti aina "Ei aikaisempia treenejä".
  // Filtteröi sen sijaan skipped-sarjat (= setRole "skipped" tai reps null).
  const completed = state.allSets
    .filter(s => s.movementId === movementId && !s.isWarmup)
    .filter(s => s.setRole !== "skipped" && s.reps !== null && s.reps !== undefined)
    .filter(s => s.sessionId !== excludeSessionId);
  if (!completed.length) return [];
  const sessionMap = {};
  for (const s of completed) {
    if (!sessionMap[s.sessionId]) sessionMap[s.sessionId] = [];
    sessionMap[s.sessionId].push(s);
  }
  return Object.entries(sessionMap)
    .map(([sid, sets]) => ({
      sessionId: sid,
      dateISO: state.sessions.find(x => x.sessionId === sid)?.dateISO || "",
      sets: sets.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || "")),
    }))
    .sort((a, b) => b.dateISO.localeCompare(a.dateISO))
    .slice(0, n);
}

// v4.34.24: Modal näyttää viim. 3 session per-sarja-detaljit (kuorma×toistot×Vx, pvm).
// v4.34.40: etsi seuraava päivä mesocyclesta jossa annettu movement on primary.
// Käytetään modaalin engine-suosituksen näyttämiseen ei-primary-päivinä
// (esim. KE → näytetään tulevan TO-treenin Lisäpainodippi-ennuste).
// HUOM: käytetään lokaalia päivämäärä-formattia (ei toISOString()), koska UTC-
// shifti aiheuttaa Suomessa "2026-05-07" → "2026-05-06" -konversion.
function findNextPrimaryDayForMovement(mesocycle, movementName, fromDateISO, maxDays = 14) {
  if (!mesocycle?.weekPlans || !movementName || !fromDateISO) return null;
  const start = new Date(fromDateISO + "T12:00:00"); // klo 12 keskellä päivää → ei DST-issuja
  for (let i = 0; i < maxDays; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const checkISO = `${yyyy}-${mm}-${dd}`;
    const wk = getMesocycleWeek(mesocycle, checkISO);
    if (!wk) continue;
    const dow = d.getDay() || 7;
    const dayPlan = mesocycle.weekPlans[wk - 1]?.days?.find(dd2 => dd2.dayOfWeek === dow);
    if (!dayPlan) continue;
    const primarySlot = dayPlan.slots?.find(s => s.role === "primary");
    if (primarySlot?.defaultMovementName === movementName) {
      return { dateISO: checkISO, weekNum: wk, dayOfWeek: dow };
    }
  }
  return null;
}

// v4.34.38 (Claude Design): kolmen tason layout — Header trio (e1RM, Vx-trend,
// engine-suositus), Primary/Accessory-välilehdet ja "Miksi tämä kuorma?" -drilldown.
// v4.34.40: jos avattu liike ei ole tämän päivän primary, etsi seuraava primary-
// päivä mesocyclesta + aja recommend() siihen päivään → näytä future-rec.
// Avataan klikkaamalla prev-ghost-laatikkoa tai 📊-nappia workout-näkymässä.
async function openPriorSessionsModal(movementId, excludeSessionId, movementName) {
  const allSessions = computeRecentSessionsForMovement(movementId, excludeSessionId, 5);
  const stats = await computeMovementStatsForModal(movementId, allSessions);
  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";

  // Tyhjä tila: ei kategoriaa, vain header + viesti
  if (!allSessions.length && !stats.hasE1RM) {
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="lh-head">
          <div class="lh-title-row">
            <div class="lh-title-icon">📊</div>
            <div>
              <div class="lh-title-h">${escapeHTML(movementName || "Liike")}</div>
              <div class="lh-title-s">${escapeHTML(stats.categoryLabel || "")}</div>
            </div>
          </div>
        </div>
        <div class="lh-empty">Ei aikaisempia treenejä tästä liikkeestä.</div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Sulje</button>
      </div>`;
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", closeModal);
    overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
    document.body.appendChild(overlay);
    return;
  }

  // Header — 1) e1RM 2) Vx-trendi 3) Engine-ehdotus full-width
  const e1rmCard = stats.hasE1RM
    ? `<div class="lh-trio-card">
        <div class="lh-lbl">e1RM (ext.)</div>
        <div class="lh-e1rm-row">
          <span class="lh-e1rm-num">${stats.e1rm.toFixed(1)}</span>
          <span class="lh-e1rm-unit">kg</span>
        </div>
        ${stats.e1rmDeltaText ? `<span class="lh-delta ${stats.e1rmDeltaClass}">${stats.e1rmDeltaIcon} ${stats.e1rmDeltaText}</span>` : ""}
      </div>`
    : `<div class="lh-trio-card">
        <div class="lh-lbl">e1RM</div>
        <div style="font-size:13px;color:var(--muted);padding:6px 0">Ei mittauksia</div>
      </div>`;

  const vxCard = stats.vxTrend
    ? `<div class="lh-trio-card">
        <div class="lh-lbl">Vx-trendi</div>
        <div class="lh-vx-row">
          <span class="lh-vx-from">V${stats.vxTrend.from}</span>
          <span class="lh-vx-arrow ${stats.vxTrend.cssMod}">→</span>
          <span class="lh-vx-to ${stats.vxTrend.cssMod}">V${stats.vxTrend.to}</span>
        </div>
        <div class="lh-vx-note">${escapeHTML(stats.vxTrend.note)}</div>
      </div>`
    : `<div class="lh-trio-card">
        <div class="lh-lbl">Vx-trendi</div>
        <div style="font-size:13px;color:var(--muted);padding:6px 0">Tarvitaan 2+ sessiota</div>
      </div>`;

  // v4.34.40: jos rec on tulevasta päivästä, otsikko muuttuu "Seuraava primary: TO 7.5.26"
  const engineLbl = stats.engineRec && stats.futureRecDate
    ? (() => {
        const d = new Date(stats.futureRecDate + "T00:00:00");
        const dows = { 1: "MA", 2: "TI", 3: "KE", 4: "TO", 5: "PE", 6: "LA", 0: "SU" };
        const dow = dows[d.getDay()] || "";
        const dateStr = `${d.getDate()}.${d.getMonth() + 1}.${String(d.getFullYear()).slice(-2)}`;
        return `📅 Seuraava primary · ${dow} ${dateStr}`;
      })()
    : "⚡ Engine ehdottaa tänään";
  const engineCard = stats.engineRec
    ? `<div class="lh-engine-card">
        <div class="lh-engine-lbl">${engineLbl}</div>
        <div class="lh-engine-load">
          <span class="num">${stats.engineRec.loadStr}</span>
          <span class="unit">kg</span>
          <span class="scheme">${escapeHTML(stats.engineRec.scheme)}</span>
        </div>
        ${stats.engineRec.deltaText ? `<div class="lh-engine-delta ${stats.engineRec.deltaClass}">${stats.engineRec.deltaIcon} ${stats.engineRec.deltaText}</div>` : ""}
      </div>`
    : "";

  // TASO 2: tabs + sessio-kortit
  const primSessions = allSessions.filter(s => sessionIsPrimaryRole(s));
  const accSessions = allSessions.filter(s => !sessionIsPrimaryRole(s));
  const tabsHTML = `<div class="lh-tabs" id="lh-tabs">
    <button class="active" data-tab="primary">
      <span class="dot primary"></span>Primary <span style="opacity:.55;margin-left:2px">· ${primSessions.length}</span>
    </button>
    <button data-tab="accessory">
      <span class="dot accessory"></span>Accessory <span style="opacity:.55;margin-left:2px">· ${accSessions.length}</span>
    </button>
  </div>`;

  // TASO 3: drilldown
  const whyHTML = stats.engineRec && stats.engineRec.traces && stats.engineRec.traces.length > 0
    ? `<div class="lh-why" id="lh-why">
        <button class="lh-why-toggle" id="lh-why-toggle">
          <span class="lh-why-l">💡 Miksi engine ehdottaa <strong style="color:var(--acc)">${stats.engineRec.loadStr} kg</strong>?</span>
          <span class="chev">▼</span>
        </button>
        <div class="lh-why-body">
          <div class="lh-why-inner">
            ${stats.engineRec.traces.map(t => `<div class="lh-trace ${t.final ? 'final' : ''}">
              <div class="lh-trace-icon ${t.cls}">${t.icon}</div>
              <div class="lh-trace-msg">${t.html}</div>
              <div class="lh-trace-val">${escapeHTML(t.val || "")}</div>
            </div>`).join("")}
          </div>
        </div>
      </div>`
    : "";

  overlay.innerHTML = `
    <div class="modal-sheet" style="max-height:90vh;overflow-y:auto">
      <div class="modal-handle"></div>
      <div class="lh-head">
        <div class="lh-title-row">
          <div class="lh-title-icon">📊</div>
          <div>
            <div class="lh-title-h">${escapeHTML(movementName || "Liike")}</div>
            <div class="lh-title-s">${escapeHTML(stats.categoryLabel || "")}</div>
          </div>
        </div>
      </div>
      <div class="lh-trio">
        ${e1rmCard}
        ${vxCard}
        ${engineCard}
      </div>
      ${tabsHTML}
      <div id="lh-sess-list"></div>
      ${whyHTML}
      <button class="btn btn-outline btn-full" style="margin-top:12px" data-modal-cancel>Sulje</button>
    </div>`;

  // Tabs
  const renderList = (filter) => {
    const list = overlay.querySelector("#lh-sess-list");
    const filtered = filter === "primary" ? primSessions : accSessions;
    if (!filtered.length) {
      list.innerHTML = `<div class="lh-empty">Ei ${filter === "primary" ? "primary" : "accessory"}-sessioita.</div>`;
      return;
    }
    list.innerHTML = filtered.map(renderModalSession).join("");
  };
  overlay.querySelectorAll("#lh-tabs button").forEach(b => b.addEventListener("click", () => {
    overlay.querySelectorAll("#lh-tabs button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    renderList(b.dataset.tab);
  }));
  // Default: primary jos on, muuten accessory
  const initialTab = primSessions.length > 0 ? "primary" : "accessory";
  if (initialTab === "accessory") {
    overlay.querySelectorAll("#lh-tabs button").forEach(x => x.classList.remove("active"));
    overlay.querySelector('[data-tab="accessory"]').classList.add("active");
  }
  renderList(initialTab);

  // Why-accordion
  const whyEl = overlay.querySelector("#lh-why");
  const whyToggle = overlay.querySelector("#lh-why-toggle");
  if (whyToggle) whyToggle.addEventListener("click", () => whyEl.classList.toggle("open"));

  overlay.querySelector("[data-modal-cancel]").addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

// v4.34.38: HTML-escape modaalin renderointiin
function escapeHTML(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// Onko sessio primary-rooli? Logiikka: yksikin sarja jossa setRole === "top"
// JA load > 0 (= ei BW-only-tertiary). Tämä matchaa kuvaa "atletti teki TI:llä
// kovan kyykkysession" vs "atletti teki MA:lla BW-dippejä accessoryna".
function sessionIsPrimaryRole(sess) {
  if (!sess.sets || !sess.sets.length) return false;
  return sess.sets.some(s => s.setRole === "top" && (s.externalLoadKg || 0) > 0);
}

// v4.34.40: Per-liike-tilastot modaalin headerille (e1RM, Vx-trendi, engine-rec, traces).
// Async koska future-rec-laskenta (kun avattu liike ei ole tämän päivän primary)
// vaatii recommend()-kutsun mesocyclen seuraavaan primary-päivään tällä liikkeellä.
async function computeMovementStatsForModal(movementId, sessions) {
  const mov = state.movements?.find(m => m.movementId === movementId);
  const bw = state.settings?.bodyweightKg || 91;
  const stats = {
    movement: mov,
    categoryLabel: mov ? (CATEGORY_LABELS_SHORT?.[mov.category] || mov.category) : "",
    e1rm: null, hasE1RM: false, e1rmDeltaText: null, e1rmDeltaClass: "flat", e1rmDeltaIcon: "→",
    vxTrend: null,
    engineRec: null,
    futureRecDate: null, // v4.34.40: jos rec on tulevasta päivästä, näytä päivämäärä
  };

  // e1RM-history (movement-pohjalta, ottaa system/external loadType:n huomioon)
  if (mov) {
    const allSets = state.allSets.filter(s => s.movementId === movementId && (s.externalLoadKg || 0) > 0 && s.reps >= 1);
    const history = computeMovementE1RMHistory(allSets, state.sessions, mov, bw);
    if (history.length > 0) {
      stats.hasE1RM = true;
      stats.e1rm = history[history.length - 1].e1rm;
      // 3 vk:n trendi: vertaa nyt vs n. 21 pv sitten
      const cutoffMs = Date.now() - 21 * 86400000;
      const olderPoint = history.find(p => new Date(p.dateISO).getTime() >= cutoffMs - 7 * 86400000) || history[0];
      if (olderPoint && olderPoint !== history[history.length - 1]) {
        const delta = stats.e1rm - olderPoint.e1rm;
        if (Math.abs(delta) >= 0.5) {
          stats.e1rmDeltaText = `${delta > 0 ? "+" : ""}${delta.toFixed(1)} kg · 3 vk`;
          stats.e1rmDeltaClass = delta > 0 ? "up" : "down";
          stats.e1rmDeltaIcon = delta > 0 ? "▲" : "▼";
        }
      }
    }
  }

  // Vx-trendi: vertaa viim. session ja sitä edeltävän session mean Vx
  if (sessions.length >= 2) {
    const meanVx = (sets) => {
      const vx = sets.map(s => s.actualVx).filter(v => v !== null && v !== undefined);
      return vx.length ? vx.reduce((a, b) => a + b, 0) / vx.length : null;
    };
    const prevVx = meanVx(sessions[1].sets);
    const lastVx = meanVx(sessions[0].sets);
    if (prevVx !== null && lastVx !== null) {
      const fromR = Math.round(prevVx);
      const toR = Math.round(lastVx);
      const diff = lastVx - prevVx;
      let cssMod = "flat";
      let note = "Sama vaikeustaso";
      if (diff >= 0.5) { cssMod = ""; note = "Helpottuu · sama kuorma, enemmän varaa"; }
      else if (diff <= -0.5) { cssMod = "harder"; note = "Vaikeutuu · grindi alkaa"; }
      stats.vxTrend = { from: fromR, to: toR, cssMod, note };
    }
  }

  // Engine-suositus: hae state.recommendation (mikäli liike matchaa primary-slot:ia)
  // ja decisionTraces jotka selittävät kuorman.
  // v4.34.39 BUG-FIX: tarkista että rec.primaryMovementId === movementId.
  // v4.34.40: jos primary ei matchaa, etsi MESOCYCLESTA seuraava primary-päivä
  // tälle liikkeelle JA aja recommend() siihen päivään (async). Tämä antaa
  // atletille mahdollisuuden tarkistaa tulevan TO-treenin target esim. KE-lepopäivänä.
  let rec = state.recommendation;
  let isPrimaryToday = rec?.primaryMovementId === movementId;
  if (!isPrimaryToday && state.mesocycle && mov?.name) {
    try {
      const today = todayISO();
      const next = findNextPrimaryDayForMovement(state.mesocycle, mov.name, today, 14);
      if (next && next.dateISO !== today) {
        // Aja recommend() tulevan primary-päivän kontekstilla
        const futureRec = await recommend({
          mesocycle: state.mesocycle,
          sessions: state.sessions || [],
          allSets: state.allSets || [],
          movements: state.movements || [],
          measurements: state.measurements || [],
          decisionTraces: [],
          primaryMovementId: movementId,
          dateISO: next.dateISO,
          bodyweightKg: bw,
          settings: state.settings || {},
          options: { readiness: { combined: "GREEN", capLevel: 0, channels: {} } }
        });
        if (futureRec && futureRec.targetExternalLoad) {
          rec = futureRec;
          isPrimaryToday = true;
          stats.futureRecDate = next.dateISO;
        }
      }
    } catch (e) {
      // Future-rec failed (esim. ei ole valid mesosykli) → fallback olemassa olevaan rec:iin
      console.warn("[Modal future-rec] failed:", e?.message || e);
    }
  }
  const slot = isPrimaryToday
    ? (rec?.dayPlan?.slots?.find(s => s.movementId === movementId)
       || rec?.dayPlan?.slots?.find(s => s.role === "primary"))
    : null;
  if (slot && (slot.role === "primary" || slot.role === "backoff")) {
    const targetLoad = slot.role === "primary" ? rec.targetExternalLoad : (slot.resolvedLoadKg ?? slot.suggestedLoadKg);
    if (targetLoad) {
      const scheme = `${slot.sets || "?"} × ${slot.reps || "?"} · V${slot.targetVx ?? "?"}`;
      // Edellisen vastaavan session medianLoad (sama setRole) → delta
      const prevSimSession = sessions.find(s => s.sets.some(x => x.setRole === slot.role));
      let deltaText = null, deltaClass = "flat", deltaIcon = "→";
      if (prevSimSession) {
        const prevLoads = prevSimSession.sets.filter(x => x.setRole === slot.role).map(x => x.externalLoadKg).filter(v => v > 0);
        if (prevLoads.length) {
          const prevMed = median(prevLoads);
          const dKg = targetLoad - prevMed;
          const dPct = prevMed > 0 ? (dKg / prevMed) * 100 : 0;
          if (Math.abs(dKg) >= 0.5) {
            deltaText = `${dKg > 0 ? "+" : ""}${dKg.toFixed(1)} kg · ${dPct > 0 ? "+" : ""}${dPct.toFixed(0)} %`;
            deltaClass = dKg > 0 ? "" : "down";
            deltaIcon = dKg > 0 ? "▲" : "▼";
          } else { deltaText = "sama kuorma"; deltaClass = "flat"; deltaIcon = "→"; }
        }
      }
      // Decision-traces: suodata informatiivisimmat
      const traces = [];
      const allTraces = (rec.traces || []).filter(t => ["LOAD_PCT_RESOLVED","PROGRESSION_RATE_LIMIT","PLAN_BASED_E1RM","FIRST_SET_CAPACITY_BONUS","E1RM_INFLATION_CAP","PROGRESSION_FLOOR_CAP","SLOT_LOAD_RESOLVED"].includes(t.ruleId));
      const planT = allTraces.find(t => t.ruleId === "LOAD_PCT_RESOLVED");
      if (planT) traces.push({
        cls: "plan", icon: "📋",
        html: `<strong>Suunnitelma:</strong> ${(planT.after?.pct * 100)?.toFixed(0) ?? "?"} % × 1RM-arvio ${planT.after?.currentE1RMExternal?.toFixed?.(1) ?? "?"} kg`,
        val: `${planT.after?.targetExternalLoad?.toFixed?.(1) ?? "?"} kg`,
      });
      const planBased = allTraces.find(t => t.ruleId === "PLAN_BASED_E1RM");
      if (planBased) traces.push({
        cls: "bonus", icon: "🚀",
        html: `<strong>Engine luotti suoritukseesi:</strong> 1RM-arvio nostettu ${planBased.after?.e1rmExternal} kg`,
        val: planBased.after?.diffPct || "+",
      });
      const fcb = allTraces.find(t => t.ruleId === "FIRST_SET_CAPACITY_BONUS");
      if (fcb) traces.push({
        cls: "bonus", icon: "⚡",
        html: `<strong>Ekan sarjan bonus (V${fcb.after?.overshoot}):</strong> kapasiteettia varaa`,
        val: `+${(fcb.after?.bonus * 100).toFixed(1)} %`,
      });
      const cap = allTraces.find(t => t.ruleId === "PROGRESSION_RATE_LIMIT");
      if (cap) traces.push({
        cls: "cap", icon: "🛡",
        html: `<strong>Yläraja:</strong> max ${(cap.after?.weeklyCap * 100).toFixed(0)} % / vk`,
        val: `${cap.after?.targetExternalLoad?.toFixed?.(1) ?? "?"} kg`,
      });
      const floor = allTraces.find(t => t.ruleId === "PROGRESSION_FLOOR_CAP");
      if (floor) traces.push({
        cls: "cap", icon: "⬆",
        html: `<strong>Suoja edelliseen:</strong> ei laske kuormaa`,
        val: `${floor.after?.targetExternalLoad?.toFixed?.(1) ?? "?"} kg`,
      });
      // Lopullinen ehdotus
      traces.push({
        cls: "final", icon: "✓",
        html: `<strong>Lopullinen suositus</strong>`,
        val: `${roundToHalf(targetLoad)} kg`,
        final: true,
      });
      stats.engineRec = {
        loadStr: roundToHalf(targetLoad).toFixed(1).replace(/\.0$/, ""),
        scheme, deltaText, deltaClass, deltaIcon,
        traces: traces.length > 1 ? traces : null,
      };
    }
  }

  return stats;
}

// v4.34.38: yksittäisen session kortin renderointi modaaliin
function renderModalSession(sess) {
  const today = new Date();
  const then = new Date(sess.dateISO);
  const days = Math.max(0, Math.round((today - then) / 86400000));
  const relStr = days === 0 ? "tänään" : days === 1 ? "eilen" : days < 14 ? `${days} pv sitten` : `${Math.round(days / 7)} vk sitten`;
  const dateStr = then.toLocaleDateString("fi-FI", { day: "numeric", month: "numeric", year: "2-digit" });
  const dayLabels = { 1: "MA", 2: "TI", 3: "KE", 4: "TO", 5: "PE", 6: "LA", 0: "SU" };
  const sessionObj = state.sessions.find(x => x.sessionId === sess.sessionId);
  const dow = sessionObj?.dayOfWeek ?? then.getDay();
  const wk = sessionObj?.mesocycleWeek ?? "?";
  const isPrimary = sessionIsPrimaryRole(sess);
  const role = isPrimary ? "primary" : "accessory";

  // Per-sarja-rivit
  const setsHTML = sess.sets.map((s, i) => {
    const isBW = !s.externalLoadKg || s.externalLoadKg === 0;
    const loadStr = isBW ? "BW" : `${s.externalLoadKg} kg`;
    const repsStr = s.reps ?? "?";
    let vxCls = "";
    if (s.actualVx !== null && s.actualVx !== undefined && s.targetVx !== null && s.targetVx !== undefined) {
      if (s.actualVx === s.targetVx) vxCls = "target";
      else if (s.actualVx > s.targetVx) vxCls = "over";
      else vxCls = "under";
    }
    const vxLbl = s.actualVx !== null && s.actualVx !== undefined ? `V${s.actualVx}` : "V?";
    const tgtLbl = s.targetVx !== null && s.targetVx !== undefined && s.actualVx !== s.targetVx ? ` · t${s.targetVx}` : "";
    return `<div class="lh-set-row ${isBW ? "bw" : ""}">
      <span class="sn">S${i + 1}</span>
      <span><span class="load">${loadStr}</span><span class="reps">× ${repsStr}</span></span>
      <span class="lh-vx ${vxCls}">${vxLbl}${tgtLbl}</span>
    </div>`;
  }).join("");

  // Summary
  let summaryHTML = "";
  if (isPrimary) {
    const tops = sess.sets.filter(s => s.setRole === "top" && (s.externalLoadKg || 0) > 0);
    if (tops.length) {
      const meanVx = (tops.reduce((a, s) => a + (s.actualVx ?? 0), 0) / tops.length).toFixed(1);
      const maxLoad = Math.max(...tops.map(s => s.externalLoadKg));
      const first = tops[0]?.actualVx ?? 0;
      const last = tops[tops.length - 1]?.actualVx ?? 0;
      const fatigue = last - first;
      const fatigueStr = fatigue === 0 ? "fatique +0" : fatigue > 0 ? `fatique +${fatigue}` : `fatique ${fatigue}`;
      const tail = sess.sets.filter(s => s.setRole !== "top" || (s.externalLoadKg || 0) === 0);
      const tailStr = tail.length ? ` · ${tail.length} accessory-sarja${tail.length > 1 ? "a" : ""}` : "";
      summaryHTML = `<div class="lh-sess-summary">Mean V${meanVx}, paras <strong>${maxLoad} kg</strong>, ${fatigueStr}${tailStr}</div>`;
    }
  } else {
    const reps = sess.sets.reduce((a, s) => a + (s.reps || 0), 0);
    const firstSet = sess.sets[0];
    const isBW = !firstSet?.externalLoadKg;
    const loadStr = isBW ? "BW" : `${firstSet.externalLoadKg} kg`;
    summaryHTML = `<div class="lh-sess-summary">Volyymi <strong>${loadStr}</strong> · ${reps} reps · skill / volume</div>`;
  }

  return `<div class="lh-sess ${role}">
    <div class="lh-sess-head">
      <div>
        <div class="lh-sess-date">${dateStr}</div>
        <div class="lh-sess-rel">${relStr}</div>
      </div>
      <div class="lh-sess-tags">
        <span class="lh-tag day">${dayLabels[dow] || ""} · vk ${wk}</span>
        <span class="lh-tag ${role}">${isPrimary ? "Primary" : "Accessory"}</span>
      </div>
    </div>
    <div>${setsHTML}</div>
    ${summaryHTML}
  </div>`;
}

function renderActiveWorkout() {
  const w = state.workout;
  if (!w) return "";

  // Pre-workout: general warmup protocol screen
  if (!w.warmupProtocolDone && w.warmupProtocol && w.warmupProtocol.length > 0) {
    return renderWorkoutWarmupIntro();
  }

  const totalExercises = w.exercises.length;
  const currentExIdx = w.currentExerciseIdx;
  const exercise = w.exercises[currentExIdx];
  if (!exercise) return renderWorkoutSummary();

  const totalSets = exercise.sets.length;
  const currentSetIdx = w.currentSetIdx;
  const currentSet = exercise.sets[currentSetIdx];

  if (!currentSet) {
    // Move to next exercise
    return renderWorkoutExerciseComplete(exercise);
  }

  const progressPct = ((currentExIdx * 100 + (currentSetIdx / totalSets) * 100) / totalExercises).toFixed(0);

  // Warmup detection
  const isWarmupSet = currentSet.isWarmup === true;
  const warmupCount = exercise.sets.filter(s => s.isWarmup).length;
  const workSetCount = exercise.sets.filter(s => !s.isWarmup).length;
  const warmupSetIdx = isWarmupSet ? exercise.sets.filter((s, i) => s.isWarmup && i <= currentSetIdx).length : 0;
  const currentWorkSetNum = currentSetIdx + 1 - warmupCount; // 1-indexed work set number

  // Readiness primer (v4.21 + v4.24 fix): lämmittelyn jälkeen, ennen
  // ensimmäistä työsarjaa, vain pääliikkeellä.
  // v4.24: korjattu "primer ei triggeröidy ensimmäisessä sessiossa" -bugi.
  // Nyt: jos e1RM-historia puuttuu, käytetään seed-kalibrointia
  // (streetliftingConfig.calibration) primer-kuormalaskentaan. Tämä
  // varmistaa että primer toimii sessio 1:stä alkaen — baseline-
  // velocity alkaa kertyä ensimmäisestä rep:stä.
  const rec = state.recommendation;
  const primerEnabled = state.settings?.readinessPrimerEnabled !== false;
  const primerE1rm = (() => {
    const fromHistory = rec?.e1rmExternal;
    if (typeof fromHistory === "number" && fromHistory > 0) return fromHistory;
    // Fallback streetlifting-kalibrointiin
    const cal = state.mesocycle?.streetliftingConfig?.calibration;
    if (!cal || !exercise?.name) return null;
    // v4.32.5 (bugi): aiemmin tunnistettiin VAIN kilpa­liikkeet — ME-rotaation
    // varianteille (Vastaote-leuanveto, Paused pull-up, Tempo pull-up vk 1-7)
    // primer ei näkynyt → velocity ei tallentunut. Nyt kaikki vertikaaliveto-
    // primaryt mappaavat leukaExtKg:hen, koska ne ovat saman MU-rakenteen ME-
    // variantteja (sama lihasryhmä, sama kuormitus­pohja).
    const PULL_VARIANTS = ["Lisäpainoleuanveto", "Vastaote-leuanveto", "Paused pull-up", "Tempo pull-up"];
    const DIP_VARIANTS = ["Lisäpainodippi"]; // ei dippi-rotaatiota tällä hetkellä
    const SQUAT_VARIANTS = ["Takakyykky", "Paused squat", "Etukyykky"];
    if (PULL_VARIANTS.includes(exercise.name)) return cal.leukaExtKg;
    if (DIP_VARIANTS.includes(exercise.name)) return cal.dippiExtKg;
    if (SQUAT_VARIANTS.includes(exercise.name)) return cal.kyykkyExtKg;
    if (exercise.name === "Muscle-up") return null; // MU ei e1RM-pohjainen
    return null;
  })();
  const needsPrimer = !isWarmupSet &&
    currentSetIdx === warmupCount &&     // juuri ennen ensimmäistä työsarjaa
    exercise.role === "primary" &&
    !w.primer &&                         // primer ei vielä tehty eikä ohitettu
    primerEnabled &&
    typeof primerE1rm === "number" && primerE1rm > 0;
  if (needsPrimer) {
    // Välitä effektiivinen e1RM (joko historia-pohjainen tai seed) primer-näkymälle
    return renderReadinessPrimerScreen(exercise, { ...rec, _effectiveE1rmExternal: primerE1rm });
  }

  // Load display
  // v4.34.2: BW-näytön tarkennus — aiemmin loadKg===0 näytti aina "BW" + "kehonpaino",
  // mikä oli väärä mm. Dumbbell pullover -liikkeelle (joka EI ole BW-liike, käsipaino
  // valitsematta = 0 mutta ei "kehonpaino"). Nyt BW-näyttö triggeröityy vain kun
  // liikkeen nimi on selvästi BW-only (BW dippi, Hollow body hold, L-sit hold,
  // Räjähtävä leuka, Leuanveto (kehonpaino), Plank, Bird dog, Scapular pull-up jne.).
  // Muille loadKg===0 → "0 kg" (= kuorma ei vielä valittu).
  const loadKg = currentSet.loadKg;
  const isBwOnlyMovement = (() => {
    const name = exercise.name || "";
    if (/^BW /.test(name)) return true;
    if (name === "Räjähtävä leuka") return true;
    if (name === "Leuanveto (kehonpaino)") return true;
    if (/Hollow body/i.test(name)) return true;
    if (/L-sit/i.test(name)) return true;
    if (/^Plank/i.test(name)) return true;
    if (/^Bird dog/i.test(name)) return true;
    if (/Scapular (pull-up|hang)/i.test(name)) return true;
    if (/Wall sit/i.test(name)) return true;
    if (/Hanging hold/i.test(name)) return true;
    if (/Cossack/i.test(name)) return true;
    return false;
  })();
  const loadBig = loadKg !== null && loadKg !== undefined
    ? (loadKg === 0 ? (isBwOnlyMovement ? "BW" : "0") : String(loadKg))
    : "–";
  const loadUnit = loadKg === 0
    ? (isBwOnlyMovement ? "kehonpaino" : "kg (paina muokkaa)")
    : "kg lisäpainoa";
  const isLoadIncrease = exercise.progressSuggestion === "increase";

  // Rest time recommendation (compound accessories get longer rest than isolation)
  const restRec = pickRestForExercise(exercise, state.workout.dayType);

  // Completed sets (work sets only, warmup omitted)
  const completedWorkSets = exercise.sets.filter(s => s.completed && !s.isWarmup);

  // ── Pill ticker (replaces scroll-x exercise chips) ──
  // v4.34.12: skipped-tila erottuu (jos kaikki työsarjat skipped tai mix skipped+done
  // ilman ainoatakaan completed = käytännössä skipattu liike kokonaan).
  const pillsHTML = w.exercises.map((ex, i) => {
    const workSets = ex.sets.filter(s => !s.isWarmup);
    const allFinished = ex.sets.every(s => s.completed || s.skipped);
    const anyCompleted = workSets.some(s => s.completed);
    const anySkipped = workSets.some(s => s.skipped);
    const fullySkipped = anyCompleted === false && anySkipped === true;
    const active = i === currentExIdx;
    let cls = active ? "active" : "";
    if (!active) {
      if (fullySkipped) cls = "skipped";
      else if (allFinished && anyCompleted) cls = "done";
    }
    const name = (ex.name || "").split(" ")[0] || ex.name || "?";
    return `<div class="pill ${cls}" data-jump-idx="${i}" title="${ex.name || ""}${fullySkipped ? " (ohitettu)" : ""}">${name}</div>`;
  }).join("");

  // ── Exercise head ──
  const roleLabel = exercise.role === "primary" ? "⭐ Pääliike"
    : exercise.role === "backoff" ? "↩ Back-off"
    : exercise.role === "warmup" ? "🏆 Lämmittely"
    : exercise.role === "opener" ? "🏆 1. yritys"
    : exercise.role === "attempt2" ? "🏆 2. yritys"
    : exercise.role === "attempt3" ? "🏆 3. yritys"
    : exercise.role === "support" ? "🎯 Tukiliike"
    : exercise.role === "accessory" ? "💪 Apuliike"
    : exercise.role === "calibration" ? "🎯 Kalibrointi (AMRAP)"
    : (exercise.category || "");
  const progressTag = isLoadIncrease ? '<span class="text-ok">· Progressio ↑</span>' : "";
  const lockHTML = exercise.slotId
    ? `<span class="lock" id="btn-lock-slot" title="Lukitse/vapauta tämä tukiliike">${(state.mesocycle?.accessorySlotOverrides?.[exercise.slotId]?.locked) ? "🔒" : "🔓"}</span>`
    : "";
  const canSwapVariant = (exercise.role === "primary" || exercise.role === "backoff") && exercise.category === "vertikaaliveto";
  const swapHTML = `<span class="swap" id="btn-swap-exercise" title="Vaihda liike">🔄</span>`;
  let subBits = [];
  if (exercise.variantName) {
    const tempo = exercise.tempoNote ? ` · <span class="tempo">${exercise.tempoNote}</span>` : "";
    subBits.push(`🔀 ${exercise.variantName}${tempo}`);
  }
  if (exercise.slotFunction) {
    const src = exercise.slotSource === "stagnation-swap" ? ' <span class="text-warn">· auto-swap</span>'
      : exercise.slotSource === "user-locked" ? ' <span class="slot-source">· 🔒 lukittu</span>'
      : exercise.slotSource === "user-override" ? ' <span class="slot-source">· valittu</span>'
      : "";
    subBits.push(`🎯 ${exercise.slotFunction}${src}`);
  }
  // v4.25.1 (Enode): näytä velocity-zone-chip anchor-pistettä indikoimaan
  if (exercise.allowVelocityInput && exercise.velocityStop && !isWarmupSet) {
    const isMU2 = exercise.name === "Muscle-up" || exercise.name === "Muscle up";
    if (!isMU2) {
      subBits.push(`💎 <b>Velocity-ankkuri</b> · zone ≥ ${exercise.velocityStop.toFixed(2)} m/s`);
    }
  }
  const exSubHTML = subBits.length ? `<div class="ex-sub">${subBits.join("<br>")}</div>` : "";

  // v4.26.0: "💡 Miksi tämä liike?" -kortti — tekee näkyväksi mitä ohjelma on päättänyt
  const whyThisMovementHTML = isWarmupSet ? "" : buildWhyThisMovementHTML(exercise, state.mesocycle, state.recommendation);

  // ── Hero load card (work-set only; warmup uses simpler variant below) ──
  const priorSet = !isWarmupSet ? computePriorSet(exercise.movementId, w.sessionId) : null;
  let deltaChipHTML = "";
  if (priorSet && loadKg !== null && loadKg !== undefined && priorSet.loadKg !== null && priorSet.loadKg !== undefined) {
    const d = loadKg - priorSet.loadKg;
    if (Math.abs(d) >= 0.5) {
      const sign = d > 0 ? "+" : "–";
      const abs = Math.abs(d);
      const absStr = Number.isInteger(abs) ? String(abs) : abs.toFixed(1);
      const cls = d < 0 ? " down" : "";
      deltaChipHTML = `<span class="delta-chip${cls}">${sign}${absStr} kg vs. ${priorSetDaysAgoLabel(priorSet)}</span>`;
    }
  }
  // v4.34.29: targetReps/targetVx siirretty prev-ghost-koodin EDELLE (TDZ-bug-fix).
  // Aiempi v4.34.24 -bug: prev-ghost-trend-laskenta käytti `targetReps`-muuttujaa
  // ennen sen const-määrittelyä → ReferenceError "Cannot access 'targetReps' before
  // initialization" → koko workout-näkymä kraashasi kun prior-historiaa oli olemassa.
  // Käyttäjäpalaute: prev-ghost ei näkynyt TI kyykkytreenissä = render kraashasi.
  const targetReps = currentSet.targetReps ?? "?";
  const targetVx = currentSet.targetVx;
  // v4.34.32: Accessoryissa joissa targetVx on null (isolaatio: hauiskääntö, pohje,
  // tricep, core jne. — design-päätös data.js:ssä), näytetään "vapaa" Vx-vihje sen
  // sijaan että näytetään pelkkä "—". Käyttäjäpalaute: "miksi tukiliikkeissä ei näy
  // varoja?". Atleetti voi silti raportoida actualVx:n joka kirjautuu engineen.
  const targetVxStr = (targetVx !== null && targetVx !== undefined)
    ? `V${targetVx}`
    : (exercise.role === "accessory" || exercise.role === "support") ? "vapaa" : "—";

  // v4.34.24 (B-osio täydennetty): prev-ghost näyttää SEKÄ in-session edellisen sarjan
  // ETTÄ edellisen treenin koko yhteenvedon trend-indikaattorilla. Klikkaamalla edellistä
  // kertaa → modal viim. 3 session per-sarja-detaljilla. Trend lasketaan effortScorella
  // (load × reps × Vx-painokerroin), ei pelkällä load-erotuksella.
  let prevGhostHTML = "";
  if (!isWarmupSet) {
    const lastInSession = completedWorkSets[completedWorkSets.length - 1];
    const priorSummary = computePriorSessionSummary(exercise.movementId, w.sessionId);

    // Osa 1: Edellinen sarja tänään (vain S2+)
    let lastInSessionHTML = "";
    if (lastInSession) {
      const vel = lastInSession.velocity ? ` · ${lastInSession.velocity.toFixed(2)} m/s` : "";
      lastInSessionHTML = `<div class="prev-ghost">
        <div>
          <div class="label">Edellinen sarja tänään</div>
          <div class="vals"><b>${lastInSession.loadKg ?? "–"}kg × ${lastInSession.reps ?? "?"}</b> · V${lastInSession.actualVx ?? "?"}${vel}</div>
        </div>
        <div class="mark">✓</div>
      </div>`;
    }

    // Osa 2: Edellinen kerta (KOKO yhteenveto + trend, klikattava → modal)
    let priorSessionHTML = "";
    if (priorSummary) {
      const daysAgo = (() => {
        const today = new Date();
        const then = new Date(priorSummary.dateISO);
        const days = Math.max(0, Math.round((today - then) / (24 * 3600 * 1000)));
        if (days === 0) return "tänään";
        if (days === 1) return "eilen";
        if (days < 14) return `${days} pv sitten`;
        return `${Math.round(days / 7)} vk sitten`;
      })();
      let summaryText;
      if (priorSummary.uniformLoad && priorSummary.heaviest.externalLoadKg !== null) {
        const vxList = priorSummary.sets.map(s => `V${s.actualVx ?? "?"}`).join("/");
        const repsAllSame = priorSummary.sets.every(s => s.reps === priorSummary.sets[0].reps);
        const repsLabel = repsAllSame
          ? `${priorSummary.setCount}×${priorSummary.sets[0].reps}`
          : priorSummary.sets.map(s => s.reps).join("/");
        summaryText = `<b>${repsLabel} @ ${priorSummary.heaviest.externalLoadKg ?? "BW"}${priorSummary.heaviest.externalLoadKg ? "kg" : ""}</b> · ${vxList}`;
      } else {
        const setsStr = priorSummary.sets.slice(0, 4).map(s =>
          `${s.externalLoadKg ?? "BW"}${s.externalLoadKg ? "" : ""}×${s.reps ?? "?"}V${s.actualVx ?? "?"}`
        ).join(" · ");
        const moreCount = priorSummary.setCount > 4 ? ` +${priorSummary.setCount - 4}` : "";
        summaryText = `<b>${setsStr}${moreCount}</b>`;
      }
      // Trend-indikaattori: effortScore (load × reps × Vx-painokerroin) -vertailu.
      // Nykyinen target vs. edellisen session heaviest setti. ↑ jos ratio > 1.02,
      // ↓ jos < 0.98, → muuten. Tämä on plan-vs-actual ennakkoarvio: jos targetVx
      // saavutetaan sellaisenaan, mitä effort-erotus on aikaisempaan.
      let trendIcon = "";
      let trendTitle = "";
      if (loadKg !== null && loadKg !== undefined
          && priorSummary.heaviest.externalLoadKg !== null
          && targetReps !== null && targetReps !== undefined && targetReps !== "?") {
        const curEffort = effortScore(loadKg, targetReps, targetVx);
        const priorEffort = effortScore(
          priorSummary.heaviest.externalLoadKg,
          priorSummary.heaviest.reps,
          priorSummary.heaviest.actualVx
        );
        if (priorEffort > 0) {
          const ratio = curEffort / priorEffort;
          const pct = Math.round((ratio - 1) * 100);
          if (ratio > 1.02) {
            trendIcon = `<span style="color:var(--ok);font-size:14px;font-weight:700">↑</span>`;
            trendTitle = `+${pct}% effort vs. edellinen`;
          } else if (ratio < 0.98) {
            trendIcon = `<span style="color:var(--warn);font-size:14px;font-weight:700">↓</span>`;
            trendTitle = `${pct}% effort vs. edellinen`;
          } else {
            trendIcon = `<span style="color:var(--muted);font-size:14px;font-weight:700">→</span>`;
            trendTitle = `~sama effort vs. edellinen`;
          }
        }
      }
      // Klikattava: data-prior-sessions sisältää movementId:n, click-handler avaa modalin
      const safeName = (exercise.name || "").replace(/"/g, '&quot;');
      priorSessionHTML = `<div class="prev-ghost prev-ghost-clickable" data-prior-sessions="${exercise.movementId}" data-prior-name="${safeName}" title="${trendTitle || 'Avaa historia'}" style="cursor:pointer;${lastInSessionHTML ? 'margin-top:4px' : ''}">
        <div style="flex:1;min-width:0">
          <div class="label">Edellinen kerta · ${daysAgo} <span style="color:var(--dim);font-size:9px">· napauta historia</span></div>
          <div class="vals" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${summaryText}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${trendIcon}
          <span style="color:var(--dim);font-size:14px">›</span>
        </div>
      </div>`;
    }

    prevGhostHTML = lastInSessionHTML + priorSessionHTML;
  }

  // v4.34.29: targetReps/targetVx -määrittelyt siirretty prev-ghost-koodin edelle (TDZ-fix).
  // Tämä rivi ennen oli "const targetReps = currentSet.targetReps ?? '?';" jne., mutta
