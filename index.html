      <label>Laajuus</label>
      <select id="export-scope">
        <option value="mesocycle">Yksittäinen ohjelma</option>
        <option value="range">Aikaväli</option>
        <option value="all">Kaikki data</option>
      </select>

      <div id="export-scope-meso" style="margin-top:8px">
        <label>Valitse ohjelma</label>
        <select id="export-mesocycle">
          ${(state.allMesocycles || []).slice().sort((a,b) => (b.startDateISO || "").localeCompare(a.startDateISO || "")).map(m =>
            `<option value="${m.mesocycleId}">${m.name || m.type || "(nimetön)"} — ${m.startDateISO || "?"}</option>`
          ).join("") || '<option value="">(ei ohjelmia)</option>'}
        </select>
      </div>

      <div id="export-scope-range" style="display:none;margin-top:8px">
        <label>Alku</label>
        <input type="date" id="export-from">
        <label style="margin-top:6px">Loppu</label>
        <input type="date" id="export-to">
      </div>

      <div class="btn-group mt">
        <button class="btn btn-sm btn-primary" id="btn-export-csv">📊 Vie CSV</button>
        <button class="btn btn-sm btn-outline" id="btn-export-md">📝 Vie Markdown-raportti</button>
      </div>
      <div class="muted" style="font-size:11px;margin-top:6px">
        CSV: rivi per sarja (avaa Excelillä). Markdown-raportti vaatii "Yksittäinen ohjelma" -valinnan.
      </div>
    </div>

    <div class="card">
      <div class="card-title">Diagnostiikka</div>
      <div class="muted">
        Versio: 3.2.0 | Schema: 3<br>
        Sessioita: ${state.sessions.length} | Sarjoja: ${state.allSets.length}<br>
        Liikkeitä: ${state.movements.length}
      </div>
      <button class="btn btn-sm btn-outline mt" id="btn-run-tests">🧪 Aja testit</button>
    </div>

    <button class="btn btn-danger btn-full mt" id="btn-wipe">Poista kaikki data</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════

function bind() {
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // Navigation
  $$("[data-nav]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.view = btn.dataset.nav;
      render();
    });
  });

  // Accordion
  $$("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.toggle);
      if (target) target.classList.toggle("open");
    });
  });

  // Dashboard collapsibles — persist open/closed state
  $$("details[data-persist]").forEach(det => {
    det.addEventListener("toggle", () => {
      localStorage.setItem(det.dataset.persist, det.open ? "1" : "0");
    });
  });

  // Progress view — range tabs + volume filter
  $$("#progress-range-tabs button[data-range]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.progressRange = btn.dataset.range;
      render();
    });
  });
  $$("#progress-vol-filter button[data-vol-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.progressVolFilter = btn.dataset.volFilter;
      render();
    });
  });

  // Dashboard
  const startBtn = $("#btn-start-workout");
  if (startBtn) startBtn.addEventListener("click", () => { state.view = "workout"; render(); });

  const readinessBtn = $("#btn-readiness");
  if (readinessBtn) readinessBtn.addEventListener("click", () => { state.view = "readiness"; render(); });

  // Missed-session banner: "Tee nyt" → käynnistä treeni mennyt-päivän planilla
  $$("[data-backfill]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const iso = btn.dataset.backfill;
      if (!iso) return;
      if (state.workout) {
        showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
        return;
      }
      // Estä tupla-klikki
      btn.disabled = true;
      try {
        await startWorkout(iso);
        state.view = "workout";
        render();
      } catch (e) {
        console.error("Backfill startWorkout failed:", e);
        showToast("Virhe: treeniä ei voitu käynnistää", "bad");
        btn.disabled = false;
      }
    });
  });

  // Missed-session banner: "Jätä väliin" → merkitse skipatuksi
  $$("[data-skip-day]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const iso = btn.dataset.skipDay;
      if (!iso || !state.mesocycle) return;
      const skipped = new Set(state.mesocycle.skippedDays || []);
      skipped.add(iso);
      state.mesocycle.skippedDays = [...skipped].sort();
      await saveMesocycle(state.mesocycle);
      showToast("Päivä merkitty väliinjätetyksi", "ok");
      render();
    });
  });

  // Plan override: "Vaihda päivä" → modaali viikon muista päivistä
  const planOverrideBtn = $("#btn-plan-override");
  if (planOverrideBtn) planOverrideBtn.addEventListener("click", async () => {
    if (state.workout) {
      showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
      return;
    }
    const choice = await showPlanOverrideModal();
    if (!choice) return;
    try {
      state.planOverrideDateISO = choice.dateISO;
      await computeRecommendation(choice.dateISO);
      render();
      showToast(`Plani vaihdettu: ${choice.label}`, "ok");
    } catch (e) {
      console.error("Plan override failed:", e);
      state.planOverrideDateISO = null;
      await computeRecommendation();
      showToast("Virhe: planiä ei voitu vaihtaa", "bad");
      render();
    }
  });

  // Plan override reset
  const planOverrideResetBtn = $("#btn-plan-override-reset");
  if (planOverrideResetBtn) planOverrideResetBtn.addEventListener("click", async () => {
    state.planOverrideDateISO = null;
    await computeRecommendation();
    render();
    showToast("Palautettu tämän päivän plani", "");
  });

  // History view: "+ Lisää mennyt treeni"
  const backfillPastBtn = $("#btn-backfill-past");
  if (backfillPastBtn) backfillPastBtn.addEventListener("click", async () => {
    if (state.workout) {
      showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
      return;
    }
    const missed = collectAllMissedDays(28);
    if (missed.length === 0) {
      showToast("Ei tekemättömiä suunniteltuja päiviä (4 vk)", "");
      return;
    }
    const dayNames = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
    const options = missed.map(m => ({
      icon: "🕑",
      label: `${dayNames[m.dayOfWeek]} ${m.dateISO.slice(5).replace("-", ".")} · ${m.dayLabel || dayTypeLabel(m.dayType)}`,
      desc: `Vk ${m.weekNum}`,
    }));
    const idx = await showListModal("Lisää mennyt treeni", options);
    if (idx === null || idx < 0 || idx >= missed.length) return;
    const iso = missed[idx].dateISO;
    try {
      await startWorkout(iso);
      state.view = "workout";
      render();
    } catch (e) {
      console.error("Backfill past workout failed:", e);
      showToast("Virhe: treeniä ei voitu käynnistää", "bad");
    }
  });

  const deloadBtn = $("#btn-insert-deload");
  if (deloadBtn) deloadBtn.addEventListener("click", async () => {
    const meso = state.mesocycle;
    if (!meso) return;
    const today = todayISO();
    if (isDeloadOverrideWeek(meso, today)) {
      showToast("Olet jo kevennysviikolla", "warn");
      return;
    }
    const pos = resolveMesocyclePosition(meso, today);
    if (!pos) { showToast("Ei aktiivista mesosykliä", "bad"); return; }
    const currentProgWeek = pos.programWeek;
    const targetWeek = currentProgWeek + 1;
    if (targetWeek > (meso.weekCount || 16)) {
      showToast("Et voi korvata viimeistä viikkoa kevennyksellä", "warn");
      return;
    }
    const replaced = [...(meso.replacedWithDeload || [])];
    const alreadyReplaced = replaced.some(r => (typeof r === "number" ? r : r.programWeek) === targetWeek);
    if (alreadyReplaced) {
      showToast(`Vk ${targetWeek} on jo merkitty kevennykseksi`, "warn");
      return;
    }
    const targetWeekDef = meso.weekDefs?.find(w => w.week === targetWeek);
    const targetLabel = targetWeekDef?.label || `Vk ${targetWeek}`;
    const isAlreadyDeload = (targetWeekDef?.deltaPctBase ?? 0) < -0.1;
    if (isAlreadyDeload) {
      showToast(`Vk ${targetWeek} on jo suunniteltu deload (${targetLabel.split("—")[1]?.trim() || "deload"})`, "warn");
      return;
    }
    const ok = confirm(
      `Korvaa vk ${targetWeek} kevennyksellä?\n\n` +
      `• ${targetLabel}\n\n` +
      `TOIMINTA:\n` +
      `• Volyymi ~50 %, kuorma -20 %, Vx +2\n` +
      `• Vain kisaliikkeet + scapular/core-prehab\n` +
      `• Kisapäivä EI siirry\n\n` +
      `MENETYS:\n` +
      `• Kyseisen viikon adaptaatio (${targetLabel})\n` +
      `• Periodisointi palaa vk ${targetWeek + 1}:een kevennyksen jälkeen\n\n` +
      `Jatketaanko?`
    );
    if (!ok) return;
    replaced.push({ programWeek: targetWeek, invokedDateISO: today, reason: "user" });
    meso.replacedWithDeload = replaced;
    await saveMesocycle(meso);
    state.mesocycle = meso;
    await computeRecommendation();
    showToast(`Vk ${targetWeek} korvattu kevennyksellä 🌿`, "ok");
    render();
  });

  // v4.26.0: Luo backup nyt (dashboard-statuskortin nappi)
  const createBackupBtn = $("#btn-create-backup-now");
  if (createBackupBtn) createBackupBtn.addEventListener("click", async () => {
    createBackupBtn.disabled = true;
    createBackupBtn.textContent = "Luodaan…";
    try {
      await createBackupSnapshot("manual");
      state.backupStatus = await getBackupStatus();
      showToast("Backup luotu ✓", "ok");
      render();
    } catch (e) {
      console.error("Manual backup failed:", e);
      showToast("Backupin luonti epäonnistui", "bad");
      createBackupBtn.disabled = false;
      createBackupBtn.textContent = "Luo nyt";
    }
  });

  document.querySelectorAll(".preview-info-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.previewInfoIdx, 10);
      const slot = state.recommendation?.dayPlan?.slots?.[idx];
      if (!slot) return;
      const movName = slot.movementName || slot.defaultMovementName || slot.category;
      const desc = MOVEMENT_DESCRIPTIONS?.[movName] || null;
      const catalog = slot.slotId ? ACCESSORY_SLOT_CATALOG?.[slot.slotId] : null;
      const weekNum = state.recommendation?.weekNum || 1;
      const phase = slot.slotId ? phaseForWeek(weekNum) : null;
      showInfoModal({
        title: movName,
        howTo: desc?.howTo || null,
        cue: desc?.cue || null,
        slotFunction: catalog?.function || null,
        slotRationale: catalog?.rationale || null,
        slotPhase: phase,
        slotVariants: (catalog && phase) ? catalog.phaseVariants?.[phase] || null : null,
        currentVariant: movName,
      });
    });
  });

  // Readiness
  const saveReadinessBtn = $("#btn-save-readiness");
  if (saveReadinessBtn) saveReadinessBtn.addEventListener("click", async () => {
    const hrvInput = parseNumericInput($("#input-hrv")?.value);
    const velInput = parseNumericInput($("#input-vel")?.value);

    if (hrvInput !== null) {
      const hvr = validateHRV(hrvInput);
      if (!hvr.valid) { showToast(hvr.error, "bad"); return; }
      state.todayHRV = hvr.value;
      await saveMeasurement({
        dateISO: todayISO(), type: "HRV",
        value: hvr.value, valueTransformed: ouraHRVtoLnRMSSD(hvr.value),
        unit: "ms", device: "Oura",
      });
    }

    if (velInput !== null) {
      const vv = validateVelocity(velInput);
      if (!vv.valid) { showToast(vv.error, "bad"); return; }
      state.todayVelocity = vv.value;
    }

    await computeReadiness();
    await computeRecommendation();
    showToast("Readiness tallennettu", "ok");
    state.view = "dashboard";
    render();
  });

  // Workout setup
  const beginBtn = $("#btn-begin-workout");
  if (beginBtn) beginBtn.addEventListener("click", async () => {
    // Tallenna kehonpaino
    const bwInput = $("#input-bw-today");
    if (bwInput) {
      const bwVal = parseNumericInput(bwInput.value);
      if (bwVal !== null && bwVal >= 30 && bwVal <= 250) {
        await saveBodyweightEntry(bwVal, todayISO());
        state.latestBodyweight = bwVal;
        // Päivitä myös asetuksiin
        state.settings.bodyweightKg = bwVal;
        await saveSettings(state.settings);
      }
    }
    await startWorkout();
  });

  // Active workout
  bindWorkoutEvents();

  // Mesocycle — template chooser
  const newMesoBtn = $("#btn-new-meso");
  if (newMesoBtn) newMesoBtn.addEventListener("click", async () => {
    // Sort: suggested first, then the rest
    const currentType = state.mesocycle?.type || "default";
    const suggested = SUGGESTED_NEXT_TEMPLATE[currentType] || [];

    // Build ordered list: suggested templates first (with ⭐), then the rest
    const orderedTemplates = [];
    const usedIds = new Set();
    for (const id of suggested) {
      const tpl = MESOCYCLE_TEMPLATES.find(t => t.id === id);
      if (tpl) { orderedTemplates.push({ ...tpl, isSuggested: true }); usedIds.add(id); }
    }
    for (const tpl of MESOCYCLE_TEMPLATES) {
      if (!usedIds.has(tpl.id)) orderedTemplates.push({ ...tpl, isSuggested: false });
    }

    const options = orderedTemplates.map(tpl => ({
      label: `${tpl.isSuggested ? "⭐ " : ""}${tpl.label}`,
      desc: tpl.desc,
      icon: tpl.icon,
    }));

    const chosen = await showListModal("Valitse ohjelma", options);
    if (chosen === null) return;

    const template = orderedTemplates[chosen];

    // Peaking needs special handling (requires e1RM)
    if (template.id === "peaking") {
      const bw = state.settings?.bodyweightKg || 91;
      const primaryMov = state.movements.find(m => m.isPrimary);
      let e1rmExt = 93;
      if (primaryMov) {
        const sets = state.allSets.filter(s => s.movementId === primaryMov.movementId);
        const computed = computeMovementE1RM(sets, true, bw);
        if (computed !== null) e1rmExt = Math.max(0, computed - bw);
      }

      const confirmIdx = await showListModal(
        `🏆 Peaking-ohjelma`,
        [
          { label: "Aloita peaking", desc: `e1RM: +${e1rmExt.toFixed(1)} kg · Opener: +${roundToHalf(e1rmExt * 0.92)} kg`, icon: "🏆" },
          { label: "Peruuta", desc: "Palaa valikkoon", icon: "↩" },
        ]
      );
      if (confirmIdx !== 0) return;

      const peakMeso = createPeakingMesocycle(todayISO(), e1rmExt, bw);
      await saveMesocycle(peakMeso);
      state.mesocycle = peakMeso;
      await computeRecommendation();
      showToast("🏆 Peaking-ohjelma aloitettu!", "ok", 4000);
      render();
      return;
    }

    // v4.23 P4.3: Streetlifting 16 vk onboarding — yhden näkymän kalibrointi
    if (template.id === "streetlifting_16w") {
      const bw = state.settings?.bodyweightKg || 91;
      const cal = await showCalibrationModal(bw);
      if (!cal) return;
      const slMeso = createStreetlifting16WMesocycle(todayISO(), cal);
      await saveMesocycle(slMeso);
      state.mesocycle = slMeso;
      // Päivitä myös settings.bodyweightKg mikäli käyttäjä muutti sitä kalibroinnissa
      if (cal.bwKg && cal.bwKg !== state.settings.bodyweightKg) {
        state.settings.bodyweightKg = cal.bwKg;
        await saveSettings(state.settings);
      }
      await computeRecommendation();
      showToast("🏋️ Streetlifting 16 vk aloitettu!", "ok", 4000);
      render();
      return;
    }

    // All other templates
    const factory = MESO_FACTORIES[template.id];
    if (!factory) { showToast("Tuntematon malli", "bad"); return; }

    const meso = factory(todayISO());
    // Assign variant rotation (except templates with hardcoded variants like eksentrinen/siirtyma/streetlifting_16w)
    if (!["eksentrinen", "siirtyma", "streetlifting_16w"].includes(template.id)) {
      assignVariantRotation(meso.weekPlans);
    }
    await saveMesocycle(meso);
    state.mesocycle = meso;
    await computeRecommendation();
    showToast(`${template.icon} ${template.label} aloitettu!`, "ok", 3000);
    render();
  });

  // Edit day plan slots
  $$("[data-edit-day]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const [weekStr, dayStr] = btn.dataset.editDay.split("-");
      const weekNum = parseInt(weekStr);
      const dayOfWeek = parseInt(dayStr);
      const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
      if (!weekPlan) return;
      const day = weekPlan.days.find(d => d.dayOfWeek === dayOfWeek);
      if (!day) return;

      const dayNames = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };

      // Step 1: Choose action
      const action = await showListModal(
        `${dayNames[dayOfWeek]} — ${day.label || dayTypeLabel(day.dayType)}`,
        [
          { icon: "🔄", label: "Vaihda liike", desc: "Korvaa olemassa oleva liike toisella" },
          { icon: "➕", label: "Lisää liike", desc: "Lisää uusi liike päivään" },
          { icon: "🗑️", label: "Poista liike", desc: "Poista liike päivästä" },
          { icon: "✏️", label: "Muuta sarjoja/toistoja", desc: "Muokkaa sarjojen tai toistojen määrää" },
        ]
      );
      if (action === null) return;

      if (action === 0) {
        // Swap movement: choose which slot
        const slotIdx = await showListModal(
          "Minkä liikkeen vaihdat?",
          day.slots.map((s, i) => ({ icon: s.role === "primary" ? "🎯" : "🔸", label: s.defaultMovementName, desc: `${s.sets}×${s.reps} — ${s.category}` }))
        );
        if (slotIdx === null || slotIdx < 0 || slotIdx >= day.slots.length) return;
        const slot = day.slots[slotIdx];
        const sameCat = state.movements.filter(m => m.category === slot.category);
        const others = state.movements.filter(m => m.category !== slot.category);
        const options = [...sameCat, ...others];
        const movIdx = await showListModal(
          `Vaihda ${slot.defaultMovementName}`,
          options.map(m => ({ icon: sameCat.includes(m) ? "✅" : "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          slot.defaultMovementName = options[movIdx].name;
          slot.category = options[movIdx].category;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`Vaihdettu: ${options[movIdx].name}`, "ok");
          render();
        }
      } else if (action === 1) {
        // Add movement
        const options = state.movements;
        const movIdx = await showListModal(
          "Lisää liike",
          options.map(m => ({ icon: "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          const m = options[movIdx];
          const sr = await showSetsRepsModal(`${m.name} — Sarjat & toistot`);
          if (!sr) return;
          day.slots.push({
            role: "accessory",
            category: m.category,
            defaultMovementName: m.name,
            sets: sr.sets,
            reps: sr.reps,
            targetVx: null,
          });
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${m.name} lisätty`, "ok");
          render();
        }
      } else if (action === 2) {
        // Remove movement
        const removable = day.slots.map((s, i) => ({ s, i })).filter(x => x.s.role !== "primary");
        if (removable.length === 0) { showToast("Pääliikettä ei voi poistaa", "warn"); return; }
        const rIdx = await showListModal(
          "Poista liike",
          removable.map(x => ({ icon: "🗑️", label: x.s.defaultMovementName, desc: `${x.s.sets}×${x.s.reps}` }))
        );
        if (rIdx !== null && rIdx >= 0 && rIdx < removable.length) {
          const removed = day.slots.splice(removable[rIdx].i, 1);
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${removed[0].defaultMovementName} poistettu`, "ok");
          render();
        }
      } else if (action === 3) {
        // Edit sets/reps
        const slotIdx = await showListModal(
          "Muokkaa liikettä",
          day.slots.map(s => ({ icon: "✏️", label: s.defaultMovementName, desc: `${s.sets}×${s.reps}` }))
        );
        if (slotIdx !== null && slotIdx >= 0 && slotIdx < day.slots.length) {
          const slot = day.slots[slotIdx];
          const sr = await showSetsRepsModal(`${slot.defaultMovementName}`, slot.sets, slot.reps);
          if (!sr) return;
          slot.sets = sr.sets;
          slot.reps = sr.reps;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast("Päivitetty", "ok");
          render();
        }
      }
    });
  });

  // Movement detail view
  $$("[data-view-movement]").forEach(btn => {
    btn.addEventListener("click", () => {
      const movId = btn.dataset.viewMovement;
      const mov = state.movements.find(m => m.movementId === movId);
      if (!mov) return;
      showMovementDetail(mov);
    });
  });

  // Movements
  const addMovBtn = $("#btn-add-movement");
  if (addMovBtn) addMovBtn.addEventListener("click", () => {
    const form = $("#add-movement-form");
    if (form) form.classList.toggle("hidden");
  });

  const saveMovBtn = $("#btn-save-movement");
  if (saveMovBtn) saveMovBtn.addEventListener("click", async () => {
    const name = $("#new-mov-name")?.value?.trim();
    const category = $("#new-mov-category")?.value;
    const tutorialUrl = $("#new-mov-video")?.value?.trim() || "";
    if (!name) { showToast("Syötä liikkeen nimi", "bad"); return; }
    await addMovement(name, category, tutorialUrl);
    await refresh();
    showToast(`${name} lisätty`, "ok");
    render();
  });

  $$("[data-edit-video]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.editVideo;
      const mov = state.movements.find(m => m.movementId === id);
      const current = mov?.tutorialUrl || "";
      const url = prompt(`Tutoriaalivideon URL liikkeelle "${mov?.name}":`, current);
      if (url === null) return;
      await updateMovement(id, { tutorialUrl: url.trim() });
      await refresh();
      showToast(url.trim() ? "Videolinkki tallennettu" : "Videolinkki poistettu", "ok");
      render();
    });
  });

  $$("[data-delete-mov]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko liike?")) return;
      await deleteMovement(btn.dataset.deleteMov);
      await refresh();
      render();
    });
  });

  // History
  $$("[data-delete-session]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko treeni?")) return;
      await deleteSession(btn.dataset.deleteSession);
      await refresh();
      render();
    });
  });

  // PRs — näytä lomake
  const showAddPRBtn = $("#btn-show-add-pr");
  if (showAddPRBtn) showAddPRBtn.addEventListener("click", () => {
    state.showAddPRForm = true;
    render();
  });

  // PRs — peruuta
  const cancelPRBtn = $("#btn-cancel-pr");
  if (cancelPRBtn) cancelPRBtn.addEventListener("click", () => {
    state.showAddPRForm = false;
    render();
  });

  // PRs — tallenna
  const savePRBtn = $("#btn-save-pr");
  if (savePRBtn) savePRBtn.addEventListener("click", async () => {
    const dateISO = $("#pr-date")?.value;
    const movementName = $("#pr-movement")?.value;
    const load = parseNumericInput($("#pr-load")?.value);
    const bw = parseNumericInput($("#pr-bw")?.value);
    const context = ($("#pr-context")?.value || "").trim();
    const isComp = !!$("#pr-is-comp")?.checked;
    if (!dateISO) { showToast("Päivämäärä puuttuu", "bad"); return; }
    if (!movementName) { showToast("Valitse liike", "bad"); return; }
    if (load === null || load <= 0) { showToast("Anna kuorma (kg)", "bad"); return; }
    await savePR({
      dateISO, movementName, value: load,
      bodyweightKg: bw,
      context: context || null,
      isCompetition: isComp,
      source: "manual",
    });
    state.showAddPRForm = false;
    state.prs = await getAllPRs();
    showToast("PR tallennettu", "ok");
    render();
  });

  // PRs — poista
  $$("[data-delete-pr]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko PR?")) return;
      await deletePR(btn.dataset.deletePr);
      state.prs = await getAllPRs();
      render();
    });
  });

  // Settings
  const saveSettingsBtn = $("#btn-save-settings");
  if (saveSettingsBtn) saveSettingsBtn.addEventListener("click", async () => {
    const bw = parseNumericInput($("#set-bw")?.value);
    const bwValid = validateBodyweight(bw);
    if (bw !== null && !bwValid.valid) { showToast(bwValid.error, "bad"); return; }

    state.settings.bodyweightKg = bw || 91;
    state.settings.maxDelta = parseNumericInput($("#set-maxdelta")?.value) || 0.25;
    state.settings.vlStopPercent = parseNumericInput($("#set-vlstop")?.value) || 20;
    state.settings.readinessVelocityWindowN = parseNumericInput($("#set-velwindow")?.value) || 10;
    state.settings.readinessHrvWindowN = parseNumericInput($("#set-hrvwindow")?.value) || 14;
    state.settings.velocityEnabled = !!$("#set-velocity-enabled")?.checked;
    // Density mode read from button-pressed state (updated by click handler)
    // value already stored in state.settings.workoutDensity by handler below
    // Readiness primer (v4.21)
    state.settings.readinessPrimerEnabled = !!$("#set-primer-enabled")?.checked;
    const primerPctInput = parseNumericInput($("#set-primer-pct")?.value);
    if (primerPctInput !== null && primerPctInput >= 40 && primerPctInput <= 80) {
      state.settings.readinessPrimerPct = primerPctInput / 100;
    }
    const primerRepsInput = parseInt($("#set-primer-reps")?.value, 10);
    if (!isNaN(primerRepsInput) && primerRepsInput >= 1 && primerRepsInput <= 5) {
      state.settings.readinessPrimerReps = primerRepsInput;
    }
    // v4.23 P3.1: Päivitä kisaliikkeiden 1RM-kalibrointi streetlifting-mesosyklin
    // streetliftingConfig.calibration:iin. Seuraava computeRecommendation()
    // näkee uudet arvot ja slot.suggestedLoadKg-seed päivittyy niiden pohjalta.
    if (state.mesocycle?.type === "streetlifting_16w") {
      const cal = state.mesocycle.streetliftingConfig?.calibration || {};
      const calInputs = document.querySelectorAll("[data-cal-key]");
      let calChanged = false;
      calInputs.forEach(inp => {
        const key = inp.dataset.calKey;
        const val = parseNumericInput(inp.value);
        if (val !== null && val > 0 && val !== cal[key]) {
          cal[key] = val;
          calChanged = true;
        }
      });
      if (calChanged) {
        if (!state.mesocycle.streetliftingConfig) state.mesocycle.streetliftingConfig = {};
        state.mesocycle.streetliftingConfig.calibration = cal;
        await saveMesocycle(state.mesocycle);
      }
    }

    // Read variant load modifiers
    const variantModifiers = {};
    $$("[data-variant-mod]").forEach(inp => {
      const name = inp.dataset.variantMod;
      const val = parseInt(inp.value);
      if (!isNaN(val)) variantModifiers[name] = val / 100;
    });
    state.settings.variantModifiers = variantModifiers;
    await saveSettings(state.settings);
    applyDensityClass();
    await computeRecommendation();
    showToast("Asetukset tallennettu", "ok");
    render();
  });

  // v4.23 P4.2: Density-mode selection (Default / Focus / Compact)
  $$("[data-density]").forEach(btn => {
    btn.addEventListener("click", () => {
      const mode = btn.dataset.density;
      state.settings.workoutDensity = mode === "default" ? null : mode;
      $$("[data-density]").forEach(b => b.classList.toggle("active", b.dataset.density === mode));
      applyDensityClass();
    });
  });

  // Export scope — näytä/piilota alueet
  const scopeSelect = $("#export-scope");
  if (scopeSelect) {
    const updateScopeVisibility = () => {
      const v = scopeSelect.value;
      const meso = $("#export-scope-meso");
      const range = $("#export-scope-range");
      if (meso)  meso.style.display  = v === "mesocycle" ? "" : "none";
      if (range) range.style.display = v === "range"     ? "" : "none";
    };
    scopeSelect.addEventListener("change", updateScopeVisibility);
    updateScopeVisibility();
  }

  // Export CSV
  const exportCsvBtn = $("#btn-export-csv");
  if (exportCsvBtn) exportCsvBtn.addEventListener("click", () => {
    const scope = $("#export-scope")?.value || "mesocycle";
    const mesocycleId = $("#export-mesocycle")?.value || null;
    const fromISO = $("#export-from")?.value || null;
    const toISO = $("#export-to")?.value || null;
    if (scope === "mesocycle" && !mesocycleId) {
      showToast("Valitse ohjelma", "bad"); return;
    }
    const csv = buildCSVExport({ scope, mesocycleId, fromISO, toISO });
    const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
    const baseName = scope === "mesocycle" && meso
      ? (meso.name || meso.type || "ohjelma").replace(/[^\wäöåÄÖÅ-]+/g, "-")
      : scope === "range"
        ? `aikavali-${fromISO || "alku"}_${toISO || "loppu"}`
        : "kaikki-data";
    downloadFile(`leve-${baseName}-${todayISO()}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");
    showToast("CSV ladattu", "ok");
  });

  // Export Markdown
  const exportMdBtn = $("#btn-export-md");
  if (exportMdBtn) exportMdBtn.addEventListener("click", () => {
    const scope = $("#export-scope")?.value || "mesocycle";
    const mesocycleId = $("#export-mesocycle")?.value || null;
    if (scope !== "mesocycle" || !mesocycleId) {
      showToast("Valitse 'Yksittäinen ohjelma'", "bad"); return;
    }
    const md = buildMesocycleMarkdown(mesocycleId);
    const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
    const baseName = (meso?.name || meso?.type || "ohjelma").replace(/[^\wäöåÄÖÅ-]+/g, "-");
    downloadFile(`leve-raportti-${baseName}-${todayISO()}.md`, md, "text/markdown;charset=utf-8");
    showToast("Raportti ladattu", "ok");
  });

  // Backup
  const exportBtn = $("#btn-export-backup");
  if (exportBtn) exportBtn.addEventListener("click", async () => {
    const data = await exportFullBackup();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `leve-coach-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    showToast("Backup ladattu", "ok");
  });

  const importBtn = $("#btn-import-backup");
  if (importBtn) importBtn.addEventListener("click", () => $("#file-import")?.click());

  const fileInput = $("#file-import");
  if (fileInput) fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      // v4.26.0: pre-import safety — nykyisestä datasta snapshot ensin, jotta
      // käyttäjä voi palauttaa jos tuotu backup onkin väärä.
      const confirmed = confirm(
        "Tuo backup — tämä korvaa KAIKEN nykyisen datasi.\n\n" +
        "Turvaksi luodaan automaattinen snapshot nykyisestä tilasta ennen tuontia. " +
        "Löydät sen asetusten 'Auto-backup'-osiosta, josta voit palauttaa sen takaisin tarvittaessa.\n\n" +
        "Jatketaanko?"
      );
      if (!confirmed) return;
      try {
        await createBackupSnapshot("pre-import");
      } catch (backupErr) {
        console.warn("Pre-import backup failed:", backupErr);
      }
      await importFullBackup(data);
      await refresh();
      state.backupStatus = await getBackupStatus();
      showToast("Restore valmis", "ok");
      render();
    } catch (err) {
      showToast("Import epäonnistui: " + err.message, "bad");
    }
  });

  // CSV import
  const csvBtn = $("#btn-import-csv");
  if (csvBtn) csvBtn.addEventListener("click", () => $("#file-csv")?.click());

  const csvInput = $("#file-csv");
  if (csvInput) csvInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      // Simple auto-mapping: expects columns: date, movement, weight, reps, sets, vara
      const result = await importHistoricalCSV(text, {
        date: 0, movement: 1, weight: 2, reps: 3, sets: 4, vara: 5,
      });
      await refresh();
      showToast(`Import: ${result.sessionsImported} sessiota, ${result.setsImported} sarjaa`, "ok");
      render();
    } catch (err) {
      showToast("CSV import epäonnistui: " + err.message, "bad");
    }
  });

  // Wipe
  const wipeBtn = $("#btn-wipe");
  if (wipeBtn) wipeBtn.addEventListener("click", async () => {
    if (!confirm("Poistetaanko kaikki data pysyvästi?")) return;
    if (!confirm("Oletko varma? Tätä ei voi perua.")) return;
    await importFullBackup({}); // Clears everything
    await refresh();
    showToast("Data poistettu", "ok");
    render();
  });

  // v4.26.0: Auto-backup -osio asetuksissa (snapshot-lista + manuaalinen luonti)
  renderBackupSnapshotsList();
  const manualSnapBtn = $("#btn-manual-snapshot");
  if (manualSnapBtn) manualSnapBtn.addEventListener("click", async () => {
    manualSnapBtn.disabled = true;
    manualSnapBtn.textContent = "Luodaan…";
    try {
      await createBackupSnapshot("manual");
      state.backupStatus = await getBackupStatus();
      showToast("Snapshot luotu ✓", "ok");
      renderBackupSnapshotsList();
      manualSnapBtn.disabled = false;
      manualSnapBtn.textContent = "📦 Luo snapshot nyt";
    } catch (err) {
      showToast("Snapshotin luonti epäonnistui", "bad");
      manualSnapBtn.disabled = false;
      manualSnapBtn.textContent = "📦 Luo snapshot nyt";
    }
  });

  // Tests
  const testBtn = $("#btn-run-tests");
  if (testBtn) testBtn.addEventListener("click", () => {
    const url = new URL(window.location.href);
    url.searchParams.set("test", "1");
    window.location.href = url.toString();
  });
}

// ═══════════════════════════════════════════════════════════════
// WORKOUT ENGINE
// ═══════════════════════════════════════════════════════════════

async function startWorkout(backfillDateISO = null) {
  // Kun backfillDateISO on annettu, recomputataan suositus tuon päivän planille
  // ja session saa tuon päivämäärän. Normaali tänään-startissa käytetään nykyistä
  // state.recommendation'ia (joka voi olla planOverride-tilassa).
  if (backfillDateISO) {
    await computeRecommendation(backfillDateISO);
    // v4.22: jos backfill-päivä on ennen mesosyklin alkua, recommend() palauttaa
    // error-objektin. Estä workoutin luonti väärällä datalla ja palautu tänään.
    if (state.recommendation?.error === "before-start") {
      const msg = state.recommendation.errorMessage || "Päivämäärä on ennen mesosyklin alkua";
      showToast(msg, "bad", 5000);
      await computeRecommendation(); // palauta tänään
      throw new Error(`startWorkout: ${msg}`);
    }
  }
  const rec = state.recommendation;
  const bw = state.settings?.bodyweightKg || 91;
  const exercises = [];

  // Lukitaan mahdollinen plan-override workout-tilaan, sitten nollataan transient-kenttä
  const planSourceISO = backfillDateISO || state.planOverrideDateISO || todayISO();
  const usingPlanOverride = !backfillDateISO && !!state.planOverrideDateISO;
  state.planOverrideDateISO = null;

  // Build warm-up sets for primary movement (prepended to primary exercise below)
  const isPeakingMeso = state.mesocycle?.type === "peaking";
  let warmupSets = [];
  if (!isPeakingMeso) {
    const wuLoad = rec?.targetExternalLoad;
    const warmupPcts = wuLoad && wuLoad >= 60
      ? [0, 0.30, 0.55, 0.75, 0.90]
      : wuLoad && wuLoad >= 30
        ? [0, 0.50, 0.80]
        : wuLoad && wuLoad >= 20
          ? [0, 0.60]
          : null;
    if (warmupPcts) {
      warmupSets = warmupPcts.map((pct, i) => ({
        idx: i,
        targetReps: pct === 0 ? 5 : pct < 0.7 ? 3 : 2,
        targetVx: null,
        loadKg: roundToHalf(wuLoad * pct),
        reps: null,
        actualVx: null,
        velocity: null,
        completed: false,
        isWarmup: true,
      }));
    } else {
      // v4.22: Fallback — ensimmäisessä sessiossa rec.targetExternalLoad on
      // tyypillisesti null koska e1RM-historiaa ei ole. Generoi silti yleinen
      // kehonpaino-pohjainen ramp-up jotta käyttäjä ei heti hyppää työsarjoihin
      // kylmänä. Käytetään liikkeen primary-slotin defaultMovementNamea
      // tunnistamaan onko kyseessä lisäpainoliike (BW-based) vai tangolla
      // tehtävä (vanity rep warmup).
      const primarySlot = rec?.dayPlan?.slots?.find(s => s.role === "primary");
      const isBodyweightAdded = primarySlot && (
        primarySlot.category === "vertikaaliveto" ||
        primarySlot.category === "horisontaalityöntö" && primarySlot.defaultMovementName?.toLowerCase().includes("dippi")
      );
      warmupSets = isBodyweightAdded
        ? [
            { idx: 0, targetReps: 5, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Kehonpaino × 5" },
            { idx: 1, targetReps: 3, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Kehonpaino × 3 räjähtävästi" },
          ]
        : [
            { idx: 0, targetReps: 8, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Tyhjä tanko × 8" },
            { idx: 1, targetReps: 5, targetVx: null, loadKg: 0, reps: null, actualVx: null, velocity: null, completed: false, isWarmup: true, note: "Tee liike rauhassa, tunnustele" },
          ];
    }
  }

  // Build exercises from day plan
  if (rec?.dayPlan?.slots) {
    for (const slot of rec.dayPlan.slots) {
      const mov = state.movements.find(m => m.name === slot.defaultMovementName);
      const movId = mov?.movementId || null;
      const isPrimary = slot.role === "primary";
      const isAttempt = ["warmup", "opener", "attempt2", "attempt3"].includes(slot.role);

      let loadKg;
      const isBackoff = slot.role === "backoff";

      // Competition day: use computed attempt loads
      if (isAttempt && rec.attemptLoads) {
        if (slot.role === "warmup" && Array.isArray(slot.loadPctE1RM)) {
          // Warmup sets use slot-level percentages (handled per-set below)
          loadKg = rec.attemptLoads.warmupLoads[0] || 0;
        } else if (slot.role === "opener") {
          loadKg = rec.attemptLoads.opener;
        } else if (slot.role === "attempt2") {
          loadKg = rec.attemptLoads.second;
        } else if (slot.role === "attempt3") {
          loadKg = rec.attemptLoads.third;
        }
      } else if (isPrimary && rec.targetExternalLoad !== null) {
        // Apply variant load modifier (with athlete overrides)
        const vMod = variantLoadModifier(slot.variantName, state.settings?.variantModifiers);
        loadKg = roundToHalf(rec.targetExternalLoad * (1 + vMod));
      } else if (isBackoff && rec.targetExternalLoad !== null) {
        const vMod = variantLoadModifier(slot.variantName, state.settings?.variantModifiers);
        loadKg = roundToHalf(rec.targetExternalLoad * 0.85 * (1 + vMod));
      } else if (mov) {
        // Get movement progress for accessory
        const progress = await getMovementProgress(movId);
        if (progress?.suggestedLoadKg) {
          loadKg = progress.suggestedLoadKg;
        } else if (progress?.lastLoadKg) {
          loadKg = progress.lastLoadKg;
        } else {
          loadKg = null; // New movement — user will enter
        }
      } else {
        loadKg = null;
      }

      const progressInfo = mov ? await getMovementProgress(movId) : null;
      const progressSuggestion = progressInfo?.suggestedAction || "hold";

      // Variant tempo override
      const vOverride = variantRepOverride(slot.variantName);

      // Build per-set loads (warmup sets have different loads)
      const setsList = Array.from({ length: slot.sets }, (_, i) => {
        let setLoad = loadKg;
        if (isAttempt && slot.role === "warmup" && rec.attemptLoads) {
          setLoad = rec.attemptLoads.warmupLoads[i] || loadKg;
        }
        return {
          idx: i,
          targetReps: slot.reps,
          targetVx: slot.targetVx,
          loadKg: setLoad,
          reps: null,
          actualVx: null,
          velocity: null,
          completed: false,
        };
      });

      // Prepend warmup sets to primary exercise (not a separate exercise)
      const finalSets = (isPrimary && warmupSets.length > 0)
        ? [...warmupSets, ...setsList].map((s, i) => ({ ...s, idx: i }))
        : setsList;
      if (isPrimary && warmupSets.length > 0) warmupSets = []; // consume once

      exercises.push({
        movementId: movId,
        name: slot.defaultMovementName || slot.category,
        category: slot.category,
        originalCategory: slot.category,
        role: slot.role,
        variantName: slot.variantName || null,
        tempoNote: vOverride?.tempoNote || null,
        loadKg,
        progressSuggestion,
        sets: finalSets,
        // Slot metadata (v4.11) for smart swap/lock UI
        slotId: slot.slotId || null,
        slotFunction: slot._resolvedFrom?.slotFunction || null,
        slotSource: slot._resolvedFrom?.source || null,
        slotVariantIndex: slot._resolvedFrom?.variantIndex ?? null,
        slotVariants: slot._resolvedFrom?.availableVariants || null,
        // v4.25.1 (Enode): velocity-ankkuripisteet ja zone-kynnys
        allowVelocityInput: slot.allowVelocityInput === true,
        velocityStop: slot.velocityStop ?? null,
      });
    }
  } else {
    // Fallback: just primary movement
    exercises.push({
      movementId: null,
      name: "Lisäpainoleuanveto",
      category: "vertikaaliveto",
      originalCategory: "vertikaaliveto",
      role: "primary",
      loadKg: rec?.targetExternalLoad,
      progressSuggestion: "hold",
      sets: Array.from({ length: rec?.setCount || 3 }, (_, i) => ({
        idx: i,
        targetReps: rec?.targetReps || 3,
        targetVx: rec?.targetVx || 2,
        loadKg: rec?.targetExternalLoad,
        reps: null,
        actualVx: null,
        velocity: null,
        completed: false,
      })),
    });
  }

  state.workout = {
    sessionId: uid(),
    dateISO: backfillDateISO || todayISO(),
    isBackfill: !!backfillDateISO,
    planSourceDateISO: planSourceISO,
    isPlanOverride: usingPlanOverride,
    dayType: rec?.dayType || "heavy",
    exercises,
    currentExerciseIdx: 0,
    currentSetIdx: 0,
    startedAt: new Date().toISOString(),
    warmupProtocol: rec?.dayPlan?.warmup || [],
    warmupProtocolDone: false,
    // Readiness primer (v4.21): ennen ensimmäistä työsarjaa pääliikkeellä
    // Rakenne kun primer tehty: { done:true, skipped:false, velocities:[...],
    //   best, loadKg, movementId, timestamp }
    // Kun käyttäjä ohittaa: { done:false, skipped:true }
    primer: null,
  };

  // v4.22: hanki Wake Lock koko treenin ajaksi (näyttö pysyy auki).
  // AudioContext alustetaan käyttäjäinteraktion (tämä nappi) jälkeen jotta
  // rest-timer-beep voi soida ilman autoplay-blokkausta.
  ensureAudioCtx();
  ensureWakeLock();

  render();
}

function bindWorkoutEvents() {
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const w = state.workout;
  if (!w) return;

  let selectedReps = null;
  let selectedVara = null;

  // Reps buttons
  $$("[data-reps]").forEach(btn => {
    btn.addEventListener("click", () => {
      $$("[data-reps]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedReps = parseInt(btn.dataset.reps);
      checkNextSetEnabled();
    });
  });

  // Vara buttons
  $$("[data-vara]").forEach(btn => {
    btn.addEventListener("click", () => {
      $$("[data-vara]").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedVara = parseInt(btn.dataset.vara);
      // Näytä attemptedReps-kenttä vain kun V0 (failure)
      const attemptedContainer = $("#attempted-reps-container");
      if (attemptedContainer) {
        if (selectedVara === 0) {
          attemptedContainer.classList.remove("hidden");
        } else {
          attemptedContainer.classList.add("hidden");
        }
      }
      checkNextSetEnabled();
    });
  });

  function checkNextSetEnabled() {
    const nextBtn = $("#btn-next-set");
    if (!nextBtn) return;
    const ready = selectedReps !== null && selectedVara !== null;
    nextBtn.disabled = !ready;
    nextBtn.classList.toggle("ready", ready);
    if (ready) {
      nextBtn.textContent = `✓ Tallenna sarja · ${selectedReps} × V${selectedVara}`;
    } else if (selectedReps !== null) {
      nextBtn.textContent = "Valitse vara";
    } else if (selectedVara !== null) {
      nextBtn.textContent = "Valitse toistot";
    } else {
      nextBtn.textContent = "Valitse toistot ja vara";
    }
  }

  // Warmup done — advance to next warmup set (or first work set)
  const warmupDoneBtn = $("#btn-warmup-done");
  if (warmupDoneBtn) warmupDoneBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;
    currentSet.completed = true;
    currentSet.reps = currentSet.targetReps;
    currentSet.actualVx = null; // warmup — no Vara tracking
    // Capture readiness velocity from last warmup of primary lift
    const velInput = document.getElementById("input-warmup-velocity");
    if (velInput && velInput.value) {
      const vv = parseFloat(velInput.value);
      if (!isNaN(vv) && vv > 0.1 && vv < 2.0) {
        state.todayVelocity = vv;
        currentSet.velocity = vv;
        currentSet.setRole = "readiness_test";
      }
    }
    w.currentSetIdx++;
    selectedReps = null;
    selectedVara = null;
    render();
  });

  // Skip all remaining warmup sets
  const skipWarmupBtn = $("#btn-skip-warmup");
  if (skipWarmupBtn) skipWarmupBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    // Mark all warmup sets as completed and skip to first work set
    exercise.sets.forEach(s => {
      if (s.isWarmup && !s.completed) {
        s.completed = true;
        s.reps = s.targetReps;
        s.actualVx = null;
      }
    });
    const firstWorkIdx = exercise.sets.findIndex(s => !s.isWarmup);
    w.currentSetIdx = firstWorkIdx >= 0 ? firstWorkIdx : exercise.sets.length;
    selectedReps = null;
    selectedVara = null;
    render();
  });

  // Edit load
  const loadBtn = $("#btn-edit-load");
  if (loadBtn) loadBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;
    const input = await showInputModal("Muokkaa painoa", "Paino (kg)", String(currentSet.loadKg || ""), "number");
    if (input !== null) {
      const v = parseNumericInput(input);
      if (v !== null) {
        currentSet.loadKg = v;
        // Update all remaining sets too
        exercise.sets.forEach((s, i) => { if (i >= w.currentSetIdx) s.loadKg = v; });
        render();
      }
    }
  });

  // Next set
  const nextSetBtn = $("#btn-next-set");
  if (nextSetBtn) nextSetBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    const currentSet = exercise?.sets[w.currentSetIdx];
    if (!currentSet) return;

    const velocity = parseNumericInput($("#input-set-velocity")?.value);

    currentSet.reps = selectedReps;
    currentSet.actualVx = selectedVara;
    currentSet.velocity = velocity;
    currentSet.completed = true;

    // Tallenna attemptedReps (failure-tilanteessa)
    if (selectedVara === 0) {
      const attemptedInput = $("#input-attempted-reps");
      const attemptedVal = attemptedInput ? parseInt(attemptedInput.value) : null;
      currentSet.attemptedReps = (attemptedVal && attemptedVal > 0) ? attemptedVal : (selectedReps + 1);
    } else {
      currentSet.attemptedReps = null;
    }

    // Failure reaction
    if (selectedVara === 0) {
      const isPrimary = exercise.role === "primary";
      const consecutiveFailures = exercise.sets.slice(0, w.currentSetIdx + 1).filter(s => s.actualVx === 0).length;
      const reaction = failureReaction(currentSet.loadKg || 0, currentSet.targetReps, isPrimary, consecutiveFailures);

      if (reaction.shouldStop) {
        showToast("2× failure — lopetatko tähän liikkeeseen?", "bad", 5000);
      } else {
        showToast(reaction.message, "warn");
      }

      // Adjust remaining sets
      exercise.sets.forEach((s, i) => {
        if (i > w.currentSetIdx && !s.completed) {
          s.loadKg = reaction.nextSetLoad;
          s.targetReps = reaction.nextSetReps;
        }
      });
    } else if (currentSet.targetVx !== null && currentSet.targetVx !== undefined &&
               selectedVara <= currentSet.targetVx - 2) {
      // v4.22: Near-failure in-session varoitus. Jos todellinen Vx on 2+
      // luokkaa tavoitetta alempi (esim. tavoite V3 → todellinen V1),
      // kuorma on liian raskas. Kysy käyttäjältä: laskenko 5 % seuraavalle?
      const deltaVx = currentSet.targetVx - selectedVara;
      const isPrimary = exercise.role === "primary" || exercise.role === "backoff";
      // Vain primary/backoff skaalautuu — accessory-liikkeet eivät ole niin
      // kriittisiä ja saattavat olla tarkoituksella "lähellä failurea"
      if (isPrimary) {
        const suggestedDrop = deltaVx >= 3 ? 0.90 : 0.95;
        const remainingSets = exercise.sets.slice(w.currentSetIdx + 1).filter(s => !s.completed);
        const affectedCount = remainingSets.length;
        if (affectedCount > 0) {
          const newLoad = roundToHalf((currentSet.loadKg || 0) * suggestedDrop);
          const dropPct = Math.round((1 - suggestedDrop) * 100);
          const ok = confirm(
            `Tämä sarja meni V${selectedVara} (tavoite V${currentSet.targetVx}) — ${deltaVx} luokkaa liian lähellä failurea.\n\n` +
            `Laske kuorma ${dropPct} % seuraavissa ${affectedCount} sarjassa?\n` +
            `${currentSet.loadKg} kg → ${newLoad} kg`
          );
          if (ok) {
            exercise.sets.forEach((s, i) => {
              if (i > w.currentSetIdx && !s.completed) s.loadKg = newLoad;
            });
            showToast(`Kuorma laskettu ${newLoad} kg seuraaviin sarjoihin`, "ok");
          } else {
            showToast(`Pidätetty — V${selectedVara} kirjattu sellaisenaan`, "warn");
          }
        } else {
          showToast(`V${selectedVara} (tavoite V${currentSet.targetVx}) — paina paremmin seuraavana sessiona`, "warn");
        }
      }
    }

    // VL% calculation (prosenttipohjainen — laskee suhteessa 1. sarjan velocityyn)
    if (velocity && exercise.sets[0]?.velocity) {
      const vl = velocityLossPercent(exercise.sets[0].velocity, velocity);
      if (vl !== null && vl > (state.settings?.vlStopPercent || 20)) {
        showToast(`VL% = ${vl.toFixed(1)}% — yli rajan!`, "warn");
      }
    }

    // v4.23 P2.2: Absolute velocityStop per slot. Kun ohjelma-tekijä on
    // asettanut slot.velocityStop:n (esim. 0.50 m/s peaking-setille), ja
    // käyttäjä kirjaa sen ALITTAVAN velocityn, varoitetaan: seuraava sarja
    // olisi tehokkaampi kevyemmällä kuormalla. Eri kuin VL% — tämä on
    // absoluuttinen raja ohjelma-tekijän ennakoima "hyvä sarja" vs.
    // "rasittaa liikaa".
    const slotVelocityStop = (() => {
      // Hae slot jolta exercise muodostettu — matchataan dayPlanissa
      const rec = state.recommendation;
      const slot = rec?.dayPlan?.slots?.find(s =>
        s.role === exercise.role &&
        (s.defaultMovementName === exercise.name || s.category === exercise.category)
      );
      return slot?.velocityStop;
    })();
    if (velocity && slotVelocityStop && velocity < slotVelocityStop) {
      showToast(
        `⚠ Velocity ${velocity.toFixed(2)} m/s alittaa tavoitteen ${slotVelocityStop.toFixed(2)} m/s — harkitse kuorman laskua tai sarjan lopettamista`,
        "warn", 4500
      );
    }

    // Start rest timer
    startRestTimer();

    w.currentSetIdx++;
    selectedReps = null;
    selectedVara = null;
    render();
  });

  // Add extra set to current exercise
  const addSetBtn = $("#btn-add-set");
  if (addSetBtn) addSetBtn.addEventListener("click", () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const lastSet = exercise.sets[exercise.sets.length - 1];
    const maxIdx = exercise.sets.reduce((max, s) => Math.max(max, s.idx || 0), 0);
    exercise.sets.push({
      idx: maxIdx + 1,
      targetReps: lastSet?.targetReps || 3,
      targetVx: lastSet?.targetVx || 2,
      loadKg: lastSet?.loadKg || null,
      reps: null,
      actualVx: null,
      velocity: null,
      completed: false,
    });
    showToast("Lisäsarja lisätty", "ok");
    render();
  });

  // Add extra exercise
  const addExBtn = $("#btn-add-exercise");
  if (addExBtn) addExBtn.addEventListener("click", async () => {
    const options = state.movements.filter(m => !w.exercises.some(ex => ex.movementId === m.movementId));
    if (options.length === 0) { showToast("Kaikki liikkeet jo mukana", "warn"); return; }
    const movIdx = await showListModal(
      "Lisää liike",
      options.map(m => ({ icon: "🔹", label: m.name, desc: m.category }))
    );
    if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
      const m = options[movIdx];
      const sr = await showSetsRepsModal(`${m.name} — Sarjat & toistot`);
      if (!sr) return;
      w.exercises.push({
        movementId: m.movementId,
        name: m.name,
        category: m.category,
        originalCategory: m.category,
        role: "accessory",
        loadKg: null,
        progressSuggestion: "hold",
        sets: Array.from({ length: sr.sets }, (_, i) => ({
          idx: i,
          targetReps: sr.reps,
          targetVx: null,
          loadKg: null,
          reps: null,
          actualVx: null,
          velocity: null,
          completed: false,
        })),
      });
      showToast(`${m.name} lisätty`, "ok");
      render();
    }
  });

  // Swap variant
  const swapVarBtn = $("#btn-swap-variant");
  if (swapVarBtn) swapVarBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const allVariantNames = ["Kilpaveto (leveä vastaote)", "Korokeveto", "Nopeusveto kuminauhalla", "Myötäoteveto", "Neutraaliote", "2s ylipito", "1.5-toisto hiissaus"];
    const variantDescs = {
      "Kilpaveto (leveä vastaote)": "Kilpailuote, perusveto",
      "Korokeveto": "Supramaksimaalinen, peaking",
      "Nopeusveto kuminauhalla": "Nopeusvoima, räjähtävä",
      "Myötäoteveto": "Otevariaatio, volyymi/raskas",
      "Neutraaliote": "Otevariaatio, volyymi",
      "2s ylipito": "Isometrinen, yläasento 2s",
      "1.5-toisto hiissaus": "Tempo, eksentrisesti kontrolloitu",
    };
    const currentIdx = allVariantNames.indexOf(exercise.variantName);
    const idx = await showListModal(
      "Vaihda variaatio",
      allVariantNames.map(v => ({
        icon: v === exercise.variantName ? "✅" : "🔸",
        label: v,
        desc: `${variantDescs[v] || ""} — kuorma ${(variantLoadModifier(v, state.settings?.variantModifiers) * 100) > 0 ? "+" : ""}${Math.round(variantLoadModifier(v, state.settings?.variantModifiers) * 100)}%`,
      })),
      currentIdx >= 0 ? currentIdx : null
    );
    if (idx !== null && idx >= 0 && idx < allVariantNames.length) {
      const newVariant = allVariantNames[idx];
      exercise.variantName = newVariant;
      const vOverride = variantRepOverride(newVariant);
      exercise.tempoNote = vOverride?.tempoNote || null;
      // Recalculate remaining set loads with new variant modifier
      const vMod = variantLoadModifier(newVariant, state.settings?.variantModifiers);
      const rec = state.recommendation;
      if (rec?.targetExternalLoad !== null && (exercise.role === "primary" || exercise.role === "backoff")) {
        const basePct = exercise.role === "backoff" ? 0.85 : 1.0;
        const newLoad = roundToHalf(rec.targetExternalLoad * basePct * (1 + vMod));
        exercise.sets.forEach(s => { if (!s.completed) s.loadKg = newLoad; });
        exercise.loadKg = newLoad;
      }
      showToast(`Variaatio: ${newVariant}`, "ok");
      render();
    }
  });

  // Skip exercise
  const skipBtn = $("#btn-skip-exercise");
  if (skipBtn) skipBtn.addEventListener("click", () => {
    w.currentExerciseIdx++;
    w.currentSetIdx = 0;
    stopRestTimer();
    render();
  });

  // Warmup protocol done / skip
  const wupDoneBtn = $("#btn-warmup-protocol-done");
  if (wupDoneBtn) wupDoneBtn.addEventListener("click", () => {
    w.warmupProtocolDone = true;
    render();
  });
  const wupSkipBtn = $("#btn-skip-warmup-protocol");
  if (wupSkipBtn) wupSkipBtn.addEventListener("click", () => {
    w.warmupProtocolDone = true;
    render();
  });

  // Jump to exercise via clickable chips
  $$("[data-jump-idx]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.jumpIdx);
      if (isNaN(idx) || idx < 0 || idx >= w.exercises.length) return;
      w.currentExerciseIdx = idx;
      // Go to first non-completed set, or first set if all done
      const ex = w.exercises[idx];
      const firstIncomplete = ex.sets.findIndex(s => !s.completed);
      w.currentSetIdx = firstIncomplete >= 0 ? firstIncomplete : 0;
      stopRestTimer();
      render();
    });
  });

  // Next exercise
  const nextExBtn = $("#btn-next-exercise");
  if (nextExBtn) nextExBtn.addEventListener("click", () => {
    w.currentExerciseIdx++;
    w.currentSetIdx = 0;
    stopRestTimer();
    render();
  });

  // Notes char counter
  const notesInput = $("#input-session-notes");
  const notesCount = $("#notes-char-count");
  if (notesInput && notesCount) {
    notesInput.addEventListener("input", () => { notesCount.textContent = notesInput.value.length; });
  }

  // v4.23 P3.2: sRPE (session-level 1–10) — klikattava asteikko.
  // Tallennetaan state.workout.sRPE:hen josta saveWorkoutToDb() lukee.
  $$("#srpe-scale .srpe-btn").forEach(btn => {
    const val = parseInt(btn.dataset.srpe, 10);
    if (state.workout?.sRPE === val) btn.classList.add("selected");
    btn.addEventListener("click", () => {
      $$("#srpe-scale .srpe-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      if (state.workout) state.workout.sRPE = val;
    });
  });

  // Save workout
  const saveBtn = $("#btn-save-workout");
  if (saveBtn) saveBtn.addEventListener("click", async () => {
    const sessionNotes = ($("#input-session-notes")?.value || "").trim().slice(0, 500);
    await saveWorkoutToDb(sessionNotes);
    showToast("Treeni tallennettu!", "ok");
    state.workout = null;
    releaseWakeLock();
    await refresh();
    state.view = "dashboard";
    render();
  });

  // Discard workout
  const discardBtn = $("#btn-discard-workout");
  if (discardBtn) discardBtn.addEventListener("click", async () => {
    if (!confirm("Hylätäänkö treeni?")) return;
    const wasBackfill = !!state.workout?.isBackfill;
    const wasPlanOverride = !!state.workout?.isPlanOverride;
    state.workout = null;
    state.view = "dashboard";
    releaseWakeLock();
    if (wasBackfill || wasPlanOverride) await computeRecommendation();
    render();
  });

  // End workout early — open confirmation overlay
  const endBtn = $("#btn-end-workout");
  if (endBtn) endBtn.addEventListener("click", () => showEndWorkoutConfirm());

  // Rest timer action buttons (inline card)
  const restAdd30 = $("#btn-rest-add30");
  if (restAdd30) restAdd30.addEventListener("click", () => addRestSeconds(30));
  const restAdd60 = $("#btn-rest-add60");
  if (restAdd60) restAdd60.addEventListener("click", () => addRestSeconds(60));
  const restSkip = $("#btn-rest-skip");
  if (restSkip) restSkip.addEventListener("click", () => stopRestTimer());

  // Velocity panel toggle
  const velToggle = $("#btn-velocity-toggle");
  if (velToggle) velToggle.addEventListener("click", () => {
    const panel = $("#vel-panel");
    if (!panel) return;
    const isHidden = panel.style.display === "none" || !panel.style.display;
    panel.style.display = isHidden ? "block" : "none";
    velToggle.classList.toggle("on", isHidden);
    if (isHidden) {
      const inp = panel.querySelector("#input-set-velocity");
      if (inp) inp.focus();
    }
  });

  // ── Readiness primer (v4.21) ─────────────────────────────
  // Rep-inputit: live-päivitys tuloskorttiin ja complete-napin aktivointi
  $$("[data-primer-rep]").forEach(inp => {
    inp.addEventListener("input", () => updatePrimerResultUI());
    inp.addEventListener("change", () => updatePrimerResultUI());
  });

  const primerCompleteBtn = $("#btn-primer-complete");
  if (primerCompleteBtn) primerCompleteBtn.addEventListener("click", async () => {
    const inputs = [...document.querySelectorAll("[data-primer-rep]")];
    const vals = inputs.map(i => parseFloat(i.value)).filter(v => !isNaN(v) && v >= 0.1 && v <= 2.0);
    if (vals.length === 0) {
      showToast("Syötä vähintään yksi rep-arvo", "warn");
      return;
    }
    const best = Math.max(...vals);
    const exercise = w.exercises[w.currentExerciseIdx];
    const rec = state.recommendation;
    const pct = state.settings?.readinessPrimerPct || 0.60;
    const loadKg = computePrimerLoadKg(rec?.e1rmExternal, pct);

    w.primer = {
      done: true,
      skipped: false,
      velocities: vals,
      best,
      loadKg,
      pct,
      movementId: exercise?.movementId || null,
      timestamp: new Date().toISOString(),
    };
    state.todayVelocity = best;
    await computeReadiness();
    showToast(`Primer: parhain ${best.toFixed(2)} m/s`, "ok");
    render();
  });

  const primerSkipHandler = async () => {
    w.primer = { done: false, skipped: true, timestamp: new Date().toISOString() };
    showToast("Primer ohitettu — readiness mitataan vara-signaalista", "");
    render();
  };
  const primerSkipBtn = $("#btn-primer-skip");
  if (primerSkipBtn) primerSkipBtn.addEventListener("click", primerSkipHandler);
  const primerSkipInlineBtn = $("#btn-primer-skip-inline");
  if (primerSkipInlineBtn) primerSkipInlineBtn.addEventListener("click", primerSkipHandler);

  // v4.22 #9: Click-to-edit completed set
  $$("[data-edit-set-idx]").forEach(row => {
    row.addEventListener("click", async () => {
      const idx = parseInt(row.dataset.editSetIdx, 10);
      const exercise = w.exercises[w.currentExerciseIdx];
      if (!exercise) return;
      const setData = exercise.sets[idx];
      if (!setData) return;
      const edit = await showEditSetModal(setData);
      if (!edit) return;
      // Päivitä set in-place
      setData.reps = edit.reps;
      setData.actualVx = edit.actualVx;
      setData.loadKg = edit.loadKg;
      setData.velocity = edit.velocity;
      // Jos kyseessä V0 → attemptedReps ei ole enää relevantti (ellei käyttäjä
      // itse päivittänyt): jätetään vanha arvo kunnes käyttäjä syöttää uuden
      showToast(`Sarja ${idx + 1 - exercise.sets.filter(s => s.isWarmup).length} päivitetty`, "ok");
      render();
    });
  });

  // Swap exercise (slot-aware in v4.11)
  const swapBtn = $("#btn-swap-exercise");
  if (swapBtn) swapBtn.addEventListener("click", async () => {
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;

    // Slot-driven: offer slot variants first, then remainder of library
    if (exercise.slotId && exercise.slotVariants?.length) {
      const variants = exercise.slotVariants.filter(n => n !== exercise.name);
      const variantMovs = variants.map(n => state.movements.find(m => m.name === n)).filter(Boolean);
      const variantNames = new Set(variantMovs.map(m => m.name));
      const sameCat = state.movements.filter(m =>
        m.category === exercise.category && !variantNames.has(m.name) && m.name !== exercise.name
      );
      const others = state.movements.filter(m =>
        m.category !== exercise.category && !variantNames.has(m.name) && m.name !== exercise.name
      );
      const opts = [...variantMovs, ...sameCat, ...others];
      const idx = await showListModal(
        `Vaihda ${exercise.slotFunction || exercise.name}`,
        opts.map((m, i) => ({
          icon: i < variantMovs.length ? "🎯" : m.category === exercise.category ? "✅" : "🔹",
          label: m.name,
          desc: i < variantMovs.length ? "Slot-variantti (sama funktio)" : m.category,
        }))
      );
      if (idx !== null && idx >= 0 && idx < opts.length) {
        const chosen = opts[idx];
        exercise.name = chosen.name;
        exercise.movementId = chosen.movementId;
        exercise.category = chosen.category;
        exercise.slotSource = "user-override";
        // Persist override on mesocycle
        if (state.mesocycle) {
          if (!state.mesocycle.accessorySlotOverrides) state.mesocycle.accessorySlotOverrides = {};
          const existing = state.mesocycle.accessorySlotOverrides[exercise.slotId] || {};
          const variantIdx = exercise.slotVariants.indexOf(chosen.name);
          state.mesocycle.accessorySlotOverrides[exercise.slotId] = {
            ...existing,
            movementName: chosen.name,
            variantIndex: variantIdx >= 0 ? variantIdx : null,
            locked: existing.locked || false,
            swappedAt: todayISO(),
            reason: "Käyttäjän valinta",
          };
          await saveMesocycle(state.mesocycle);
          showToast(`Vaihdettu ${chosen.name} — tallennettu ohjelmaan`, "ok");
        }
        render();
      }
      return;
    }

    // Legacy path (non-slot exercises)
    const sameCategory = state.movements.filter(m => m.category === exercise.category && m.name !== exercise.name);
    const others = state.movements.filter(m => m.category !== exercise.category && m.name !== exercise.name);
    const options = [...sameCategory, ...others];
    const idx = await showListModal(
      "Vaihda liike",
      options.map(m => ({
        icon: sameCategory.includes(m) ? "✅" : "🔹",
        label: m.name,
        desc: m.category,
      }))
    );
    if (idx !== null && idx >= 0 && idx < options.length) {
      exercise.name = options[idx].name;
      exercise.movementId = options[idx].movementId;
      exercise.category = options[idx].category;
      render();
    }
  });

  // Info modal (v4.12) — liikeselostus + slot-perustelu
  const infoBtn = $("#btn-info-exercise");
  if (infoBtn) infoBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise) return;
    const desc = MOVEMENT_DESCRIPTIONS?.[exercise.name] || null;
    const catalog = exercise.slotId ? ACCESSORY_SLOT_CATALOG?.[exercise.slotId] : null;
    const weekNum = state.recommendation?.weekNum || 1;
    showInfoModal({
      title: exercise.name,
      howTo: desc?.howTo || null,
      cue: desc?.cue || null,
      slotFunction: catalog?.function || exercise.slotFunction || null,
      slotRationale: catalog?.rationale || null,
      slotPhase: exercise.slotId ? phaseForWeek(weekNum) : null,
      slotVariants: exercise.slotVariants || null,
      currentVariant: exercise.name,
    });
  });

  // Lock/unlock slot (v4.11)
  const lockBtn = $("#btn-lock-slot");
  if (lockBtn) lockBtn.addEventListener("click", async (e) => {
    e.stopPropagation();
    const exercise = w.exercises[w.currentExerciseIdx];
    if (!exercise?.slotId || !state.mesocycle) return;
    if (!state.mesocycle.accessorySlotOverrides) state.mesocycle.accessorySlotOverrides = {};
    const existing = state.mesocycle.accessorySlotOverrides[exercise.slotId] || {};
    const newLocked = !existing.locked;
    state.mesocycle.accessorySlotOverrides[exercise.slotId] = {
      ...existing,
      movementName: existing.movementName || exercise.name,
      locked: newLocked,
      variantIndex: existing.variantIndex ?? (exercise.slotVariants?.indexOf(exercise.name) ?? null),
      swappedAt: existing.swappedAt || todayISO(),
      reason: newLocked ? "Käyttäjä lukitsi" : "Käyttäjä vapautti",
    };
    await saveMesocycle(state.mesocycle);
    showToast(newLocked ? `🔒 ${exercise.name} lukittu koko ohjelman ajaksi` : `🔓 ${exercise.name} vapautettu auto-swapille`, "ok");
    render();
  });
}

/**
 * Tallentaa treenin tietokantaan.
 * @param {string} sessionNotes — käyttäjän muistiinpanot (max 500 merkkiä)
 */
async function saveWorkoutToDb(sessionNotes = "") {
  const w = state.workout;
  if (!w) return;

  const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;
  const rec = state.recommendation;

  // Save session — käytä backfill-päivämäärää jos asetettu, muuten tänään.
  // planSourceDateISO kertoo minkä päivän planiä seurattiin (audit, voi poiketa dateISO:sta)
  // sRPE (v4.23 P3.2): session-level Borg CR10 1–10, käytetään fatiikkatrendiin
  const session = {
    sessionId: w.sessionId,
    dateISO: w.dateISO || todayISO(),
    plannedDayType: w.dayType,
    mesocycleWeek: rec?.weekNum || null,
    mesocycleId: state.mesocycle?.mesocycleId || null,
    bodyweightKg: bw,
    sessionNotes: sessionNotes || "",
    readinessCapLevel: state.readiness.capLevel,
    readinessDetails: state.readiness,
    isBackfill: !!w.isBackfill,
    isPlanOverride: !!w.isPlanOverride,
    planSourceDateISO: w.planSourceDateISO || w.dateISO || todayISO(),
    sRPE: w.sRPE ?? null,
  };
  await saveSession(session);

  // Resolve variant IDs
  const variantCache = {};
  for (const exercise of w.exercises) {
    if (exercise.variantName && !variantCache[exercise.variantName]) {
      const v = await getVariantByName(exercise.variantName);
      variantCache[exercise.variantName] = v?.variantId || null;
    }
  }

  // Save sets (exclude warmup sets — they are not training data)
  const sets = [];

  // Readiness primer -tulos tallennetaan erillisenä setinä (setRole="readiness_test")
  // jotta baseline rakentuu (käytetään velocityReadiness()-baseline-arvona).
  if (w.primer && w.primer.done && w.primer.best > 0 && w.primer.movementId) {
    sets.push({
      setId: uid(),
      sessionId: w.sessionId,
      movementId: w.primer.movementId,
      variantId: null,
      setRole: "readiness_test",
      externalLoadKg: w.primer.loadKg,
      reps: 1,                          // best-of-N tiivistelmä
      targetReps: null,
      targetVx: null,
      actualVx: null,
      velocityMean: w.primer.best,
      velocityPeak: null,
      velocityRep1: w.primer.best,      // käytetään velocityReadiness-baselinessa
      velocityLossPercent: null,
      tempo: null,
      restSec: null,
      attemptedReps: null,
      deviceMeta: { primerReps: w.primer.velocities, pct: w.primer.pct },
      manualOverride: null,
      timestamp: w.primer.timestamp || new Date().toISOString(),
    });
  }

  for (const exercise of w.exercises) {
    for (const s of exercise.sets) {
      if (!s.completed || s.isWarmup) continue;
      sets.push({
        setId: uid(),
        sessionId: w.sessionId,
        movementId: exercise.movementId,
        variantId: variantCache[exercise.variantName] || null,
        setRole: exercise.role === "primary" ? "top" : exercise.role === "backoff" ? "backoff" : "accessory",
        externalLoadKg: s.loadKg,
        reps: s.reps,
        targetReps: s.targetReps,
        targetVx: s.targetVx,
        actualVx: s.actualVx,
        velocityMean: s.velocity,
        velocityPeak: null,
        velocityRep1: null,
        velocityLossPercent: null,
        tempo: null,
        restSec: null,
        attemptedReps: s.attemptedReps || null,
        deviceMeta: null,
        manualOverride: null,
        timestamp: new Date().toISOString(),
      });
    }

    // Update movement progress for accessories
    if (exercise.role !== "primary" && exercise.movementId) {
      const completedSets = exercise.sets.filter(s => s.completed).map(s => ({
        movementId: exercise.movementId,
        externalLoadKg: s.loadKg,
        reps: s.reps,
        targetReps: s.targetReps,
        actualVx: s.actualVx,
        targetVx: s.targetVx,
      }));
      if (completedSets.length > 0) {
        const existing = await getMovementProgress(exercise.movementId);
        const updated = updateMovementProgressFromSets(existing, completedSets, exercise.sets[0]?.targetReps, exercise.sets[0]?.targetVx);
        updated.movementId = exercise.movementId;
        await saveMovementProgress(updated);
      }
    }
  }

  await saveSets(sets);

  // PR detection: check if any movement hit a new e1RM record
  for (const exercise of w.exercises) {
    if (!exercise.movementId) continue;
    const completedSets = exercise.sets.filter(s => s.completed);
    if (completedSets.length === 0) continue;
    const isPrimary = exercise.role === "primary";
    const exSets = state.allSets.filter(s => s.movementId === exercise.movementId);
    const prevHistory = computeMovementE1RMHistory(exSets, state.sessions, isPrimary, bw);
    const prevBest = prevHistory.length > 0 ? Math.max(...prevHistory.map(h => h.e1rm)) : 0;
    // Compute current session e1RM
    const nowSets = completedSets.map(s => ({
      externalLoadKg: s.loadKg || 0, reps: s.reps || 1,
      actualVx: s.actualVx, targetVx: s.targetVx,
    }));
    const nowE1RMs = nowSets.map(s => isPrimary
      ? e1rmSystem(bw, s.externalLoadKg, s.reps, s.actualVx ?? 1)
      : e1rmAccessory(s.externalLoadKg, s.reps, s.actualVx)
    ).filter(v => v !== null);
    const nowBest = nowE1RMs.length > 0 ? Math.max(...nowE1RMs) : 0;
    if (nowBest > prevBest && prevBest > 0) {
      const delta = (nowBest - prevBest).toFixed(1);
      const label = isPrimary ? "system" : "";
      showToast(`🎉 PR! ${exercise.name}: ${nowBest.toFixed(1)} kg ${label} (+${delta})`, "ok", 5000);
    }
  }

  // Adaptive analysis: compare what was done vs what was planned
  if (rec?.dayPlan?.slots) {
    const adaptations = analyzeSessionAdaptation(w.exercises, rec.dayPlan.slots);
    if (adaptations.length > 0) {
      state.adaptationHistory.push(...adaptations);
      // Try to apply if enough history
      const result = applyAdaptations(state.mesocycle, state.adaptationHistory);
      if (result.applied) {
        await saveMesocycle(state.mesocycle);
        showToast(`Ohjelma optimoitu: ${result.changes[0]}`, "ok", 4000);
      }
    }
  }

  // Also update primary movement progress
  const primaryEx = w.exercises.find(ex => ex.role === "primary" && ex.movementId);
  if (primaryEx) {
    const completedSets = primaryEx.sets.filter(s => s.completed).map(s => ({
      movementId: primaryEx.movementId,
      externalLoadKg: s.loadKg,
      reps: s.reps,
      targetReps: s.targetReps,
      actualVx: s.actualVx,
      targetVx: s.targetVx,
    }));
    if (completedSets.length > 0) {
      const existing = await getMovementProgress(primaryEx.movementId);
      const updated = updateMovementProgressFromSets(existing, completedSets, primaryEx.sets[0]?.targetReps, primaryEx.sets[0]?.targetVx);
      updated.movementId = primaryEx.movementId;
      await saveMovementProgress(updated);
    }
  }

  stopRestTimer();
}

function showMovementDetail(mov) {
  const bw = state.settings?.bodyweightKg || 91;
  const sets = state.allSets.filter(s => s.movementId === mov.movementId);
  const history = computeMovementE1RMHistory(sets, state.sessions, mov.isPrimary, bw);
  const currentE1RM = history.length > 0 ? history[history.length - 1].e1rm : null;
  const totalSets = sets.length;
  const totalSessions = new Set(sets.map(s => s.sessionId)).size;

  const detailDiv = document.getElementById("movement-detail");
  if (!detailDiv) return;

  detailDiv.classList.remove("hidden");
  detailDiv.innerHTML = `<div class="card" style="border-color:var(--acc)">
    <div class="flex-between">
      <div>
        <div style="font-size:18px;font-weight:700">${mov.isPrimary ? "⭐ " : ""}${mov.name}</div>
        <div class="muted">${mov.category}</div>
      </div>
      <button class="btn btn-sm btn-outline" id="btn-close-detail">✕</button>
    </div>
    <div class="kpi-row mt">
      <div class="kpi-box"><div class="kpi">${currentE1RM !== null ? currentE1RM.toFixed(1) : "-"}</div><div class="kpi-label">e1RM (kg)</div></div>
      <div class="kpi-box"><div class="kpi">${totalSets}</div><div class="kpi-label">Sarjoja yhteensä</div></div>
      <div class="kpi-box"><div class="kpi">${totalSessions}</div><div class="kpi-label">Treenejä</div></div>
    </div>
    ${history.length > 1 ? renderMiniChart(history) : ""}
    ${history.length > 0 ? `<table class="mt">
      <tr><th>Pvm</th><th>Paino</th><th>Toistot</th><th>e1RM</th></tr>
      ${history.slice(-8).map(p => `<tr><td>${formatDateShort(p.dateISO)}</td><td>${p.load} kg</td><td>${p.reps}</td><td>${p.e1rm.toFixed(1)}</td></tr>`).join("")}
    </table>` : '<div class="muted mt">Ei dataa vielä</div>'}
  </div>`;

  document.getElementById("btn-close-detail")?.addEventListener("click", () => {
    detailDiv.classList.add("hidden");
    detailDiv.innerHTML = "";
  });
}

// ═══════════════════════════════════════════════════════════════
// URL PARAMS
// ═══════════════════════════════════════════════════════════════

function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("test") === "1") {
    import("./test-runner.js").then(mod => mod.runTests()).catch(() => {
      showToast("Test runner ei löytynyt", "bad");
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// PWA SERVICE WORKER
// ═══════════════════════════════════════════════════════════════

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(reg => {
    // Check for updates every 60 seconds
    setInterval(() => reg.update(), 60000);
    reg.addEventListener("updatefound", () => {
      const newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener("statechange", () => {
        if (newSW.state === "activated" && navigator.serviceWorker.controller) {
          // New version activated — reload to get fresh code
          showToast("Uusi versio ladattu — päivitetään...", "ok", 2000);
          setTimeout(() => location.reload(), 1500);
        }
      });
    });
  }).catch(() => {});
  // Also reload if controller changes (another tab triggered update)
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    location.reload();
  });
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════

init().then(() => checkUrlParams());

</script>
