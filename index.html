<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>LeVe Coach</title>
  <style>
    :root {
      --bg: #0b1220; --card: #121d33; --card2: #182744;
      --border: #26385d; --border2: #314976;
      --txt: #e8eefc; --muted: #8899bb; --dim: #5a6a8a;
      --acc: #4f8cff; --acc2: #3a6fd8;
      --ok: #22c55e; --ok2: #166534;
      --warn: #f59e0b; --warn2: #92400e;
      --bad: #ef4444; --bad2: #991b1b;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--txt);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      user-select: none; -webkit-user-select: none;
    }
    input, textarea, select { user-select: auto; -webkit-user-select: auto; }
    a { color: var(--acc); }
    /* ── Layout ── */
    .app { max-width: 600px; margin: 0 auto; padding: 12px; padding-bottom: 90px; }
    /* ── Nav ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13, 22, 40, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav button {
      background: none; border: none; color: var(--muted); font-size: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 10px; cursor: pointer; min-width: 60px; min-height: 48px;
    }
    .nav button.active { color: var(--acc); }
    .nav button .icon { font-size: 22px; }
    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .card-title { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--acc); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
      min-height: 48px; transition: background 0.15s;
    }
    .btn:active { background: var(--acc2); }
    .btn-full { width: 100%; }
    .btn-big { padding: 16px 24px; font-size: 18px; border-radius: var(--radius); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--txt); }
    .btn-outline:active { background: var(--card2); }
    .btn-danger { background: var(--bad); }
    .btn-danger:active { background: var(--bad2); }
    .btn-ok { background: var(--ok); }
    .btn-ok:active { background: var(--ok2); }
    .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 36px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    /* ── Inputs ── */
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2); background: #0f1a31; color: var(--txt);
      font-size: 16px; min-height: 44px;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--acc); }
    textarea { min-height: 80px; resize: vertical; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
    /* ── Grid ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    /* ── Tags / Chips ── */
    .chip {
      display: inline-flex; align-items: center; padding: 6px 12px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border2); background: var(--card2);
    }
    .chip-green { color: var(--ok); border-color: var(--ok); }
    .chip-yellow { color: var(--warn); border-color: var(--warn); }
    .chip-red { color: var(--bad); border-color: var(--bad); }
    /* ── KPI ── */
    .kpi { font-size: 28px; font-weight: 700; }
    .kpi-label { font-size: 12px; color: var(--muted); }
    .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .kpi-box { flex: 1; min-width: 80px; }
    /* ── Set buttons (touch-friendly) ── */
    .set-btns {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .set-btn {
      min-width: 56px; height: 56px; border-radius: var(--radius-sm);
      border: 2px solid var(--border2); background: var(--card);
      color: var(--txt); font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.1s; flex: 1;
    }
    .set-btn:active, .set-btn.selected {
      background: var(--acc); border-color: var(--acc); color: #fff;
      transform: scale(0.95);
    }
    .set-btn-vara { font-size: 15px; }
    /* ── Readiness indicator ── */
    .readiness-dot {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block;
    }
    .readiness-dot.green { background: var(--ok); }
    .readiness-dot.yellow { background: var(--warn); }
    .readiness-dot.red { background: var(--bad); }
    .readiness-dot.none { background: var(--dim); }
    /* ── Progress bar ── */
    .progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--acc); transition: width 0.3s; }
    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
    /* ── Accordion ── */
    .accordion-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; cursor: pointer; color: var(--muted); font-size: 13px;
    }
    .accordion-body { display: none; padding: 8px 0; }
    .accordion-body.open { display: block; }
    /* ── Helpers ── */
    .muted { color: var(--muted); font-size: 12px; }
    .dim { color: var(--dim); }
    .text-ok { color: var(--ok); }
    .text-warn { color: var(--warn); }
    .text-bad { color: var(--bad); }
    .text-center { text-align: center; }
    .mt { margin-top: 12px; }
    .mb { margin-bottom: 12px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-sm { gap: 6px; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* ── Notification toast ── */
    .toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--card2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 12px 20px; z-index: 200;
      font-size: 14px; max-width: 90%; text-align: center;
      animation: fadeIn 0.2s ease-in;
    }
    .toast.warn { border-color: var(--warn); }
    .toast.bad { border-color: var(--bad); }
    .toast.ok { border-color: var(--ok); }
    /* ── Section header ── */
    .section-header { font-size: 18px; font-weight: 700; margin: 16px 0 10px; }
    /* ── Exercise card in workout ── */
    .exercise-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .exercise-name {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
      cursor: pointer;
    }
    .exercise-meta { font-size: 12px; color: var(--muted); }
    .set-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }
    .set-number { font-size: 12px; color: var(--dim); width: 24px; text-align: center; }
    .load-display {
      background: var(--card2); border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 14px 20px; font-weight: 700; font-size: 22px;
      cursor: pointer; min-width: 100px; text-align: center;
      display: inline-block;
    }
    .load-display:active { background: var(--border); }
    .load-up { color: var(--ok); border-color: var(--ok); }
    /* ── Program slot ── */
    .program-slot {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .program-slot:last-child { border-bottom: none; }
    .program-slot-num { color: var(--dim); font-size: 13px; width: 20px; }
    .program-slot-name { font-weight: 600; font-size: 14px; flex: 1; }
    .program-slot-detail { text-align: right; font-size: 13px; }
    .program-slot-load { font-weight: 700; color: var(--acc); }
    .program-slot-sets { color: var(--muted); }
    /* ── Scrollable ── */
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* ── Workout set buttons row ── */
    .set-btns-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    @media (max-width: 360px) {
      .set-btns-row { grid-template-columns: repeat(4, 1fr); }
    }
    /* ── Bottom Sheet Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.15s ease-out;
    }
    .modal-sheet {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
      max-height: 80dvh; overflow-y: auto; padding: 16px 16px 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--dim); border-radius: 2px; margin: 0 auto 12px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .modal-option {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 6px; cursor: pointer; min-height: 48px;
      transition: background 0.1s;
    }
    .modal-option:active { background: var(--card2); }
    .modal-option.selected { border-color: var(--acc); background: rgba(79,140,255,0.1); }
    .modal-option-icon { font-size: 18px; width: 28px; text-align: center; }
    .modal-option-text { flex: 1; }
    .modal-option-label { font-weight: 600; font-size: 14px; }
    .modal-option-desc { font-size: 12px; color: var(--muted); }
    .modal-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .modal-input-row input { flex: 1; }
    .modal-input-row .btn { min-width: 80px; }
    .modal-category { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }
  </style>
</head>
<body>

<div class="app" id="app"></div>

<nav class="nav" id="nav"></nav>

<div id="toast-container"></div>

<script type="module">
import {
  initDB, uid, todayISO, parseNumericInput,
  getAllMovements, getMovementsByCategory, getPrimaryMovement, addMovement, updateMovement, deleteMovement,
  getVariantsForMovement, getVariantByName, getAllVariants,
  getAllSessions, getSession, saveSession, deleteSession,
  getSetsForSession, getAllSets, saveSet, saveSets, deleteSet,
  saveMeasurement, getMeasurementsByType, getLatestBodyweight, saveBodyweightEntry,
  getAllPRs, savePR, deletePR, seedHistoricalPRsIfNeeded,
  MESOCYCLE_TEMPLATES,
  getActiveMesocycle, saveMesocycle, createDefaultMesocycle, createPeakingMesocycle, getAllMesocycles,
  createHypertrofiaMesocycle, createMaksimivoimaMesocycle, createEksenterinenMesocycle,
  createDUPMesocycle, createSiirtymaMesocycle, createPalautuminenMesocycle, createStreetlifting16WMesocycle,
  getSettings, saveSettings,
  exportFullBackup, importFullBackup,
  parseCSV, importHistoricalCSV,
  getMovementProgress, getAllMovementProgress, saveMovementProgress,
  getTracesForRec,
  CATEGORIES, PULL_VOLUME_CATEGORIES, VARIANT_DAY_TYPE_MAP, ACCESSORY_SLOT_CATALOG,
  validateVelocity, validateLoad, validateReps, validateHRV, validateBodyweight,
  isVelocityTypo,
} from "./data.js";

import {
  recommend, e1rmSystem, e1rmExternal, e1rmAccessory,
  ouraHRVtoLnRMSSD,
  velocityReadiness, hrvReadiness, varaReadiness, combineReadiness,
  computeBaseline, median, avg, roundToHalf,
  failureReaction,
  accessoryProgression, updateMovementProgressFromSets, initialWeightFrom1RM,
  velocityLossPercent,
  weeklyStimulus, checkStagnation,
  getMesocycleWeek, getWeekDef, getTodayPlan,
  breakAnalysis, speedDayLoad,
  varaFeedback,
  analyzeSessionAdaptation, applyAdaptations,
  getFutureWorkouts,
  eliteVolumeCheck,
  computeMovementE1RM, computeMovementE1RMHistory,
  REST_RECOMMENDATIONS,
  DEFAULT_VARIANT_MODIFIERS,
  SUGGESTED_NEXT_TEMPLATE,
  readinessTestLoad,
  variantLoadModifier, variantRepOverride, assignVariantRotation,
  computeAttemptLoads,
  phaseForWeek, resolveAccessorySlot, resolveDayPlanSlots, suggestAccessorySwaps,
} from "./engine.js";

// ═══════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════

const state = {
  view: "dashboard",
  settings: null,
  movements: [],
  sessions: [],
  allSets: [],
  mesocycle: null,
  recommendation: null,
  readiness: { combined: "GREEN", capLevel: 0, channels: {} },
  // Active workout state
  workout: null, // { sessionId, dayType, exercises: [...], currentExerciseIdx, currentSetIdx, startedAt }
  // HRV & velocity readiness inputs for today
  todayHRV: null,
  todayVelocity: null,
  // Latest bodyweight
  latestBodyweight: null,
  // PR records (type:"pr" from measurements)
  prs: [],
  // Kaikki mesosyklit (export-valinnat)
  allMesocycles: [],
  // "Lisää PR" -lomakkeen näkyvyys
  showAddPRForm: false,
  // Adaptation history for volume optimization
  adaptationHistory: [],
  // Rest timer
  restTimerInterval: null,
  restTimerSeconds: 0,
};

// ═══════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════

async function init() {
  await initDB();
  state.settings = await getSettings();
  state.movements = await getAllMovements();
  state.sessions = await getAllSessions();
  state.allSets = await getAllSets();
  state.latestBodyweight = await getLatestBodyweight(state.settings);
  await seedHistoricalPRsIfNeeded();
  state.prs = await getAllPRs();
  state.allMesocycles = await getAllMesocycles();
  state.mesocycle = await getActiveMesocycle();
  if (!state.mesocycle) {
    state.mesocycle = createDefaultMesocycle(todayISO());
    assignVariantRotation(state.mesocycle.weekPlans);
    await saveMesocycle(state.mesocycle);
  } else if (!["peaking", "eksentrinen", "siirtyma"].includes(state.mesocycle.type)) {
    // Migrate existing mesocycle: add variants if missing
    const hasVariants = state.mesocycle.weekPlans?.some(wp =>
      wp.days?.some(d => d.slots?.some(s => s.variantName))
    );
    if (!hasVariants && state.mesocycle.weekPlans) {
      assignVariantRotation(state.mesocycle.weekPlans);
      await saveMesocycle(state.mesocycle);
    }
  }
  await computeReadiness();
  await computeRecommendation();
  render();
}

async function refresh() {
  state.movements = await getAllMovements();
  state.sessions = await getAllSessions();
  state.allSets = await getAllSets();
  state.latestBodyweight = await getLatestBodyweight(state.settings);
  state.prs = await getAllPRs();
  state.allMesocycles = await getAllMesocycles();
  state.mesocycle = await getActiveMesocycle();
  await computeReadiness();
  await computeRecommendation();
}

// ═══════════════════════════════════════════════════════════════
// READINESS COMPUTATION
// ═══════════════════════════════════════════════════════════════

async function computeReadiness() {
  const settings = state.settings;
  const bw = settings.bodyweightKg || 91;

  // Velocity baseline: readiness test velocities
  const readinessTestSets = state.allSets
    .filter(s => s.setRole === "readiness_test" && s.velocityRep1 !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const velValues = readinessTestSets.map(s => s.velocityRep1);
  const velR = velocityReadiness(state.todayVelocity, velValues, settings.readinessVelocityWindowN || 10);

  // HRV baseline
  const hrvMeasurements = await getMeasurementsByType("HRV");
  const lnRmssdValues = hrvMeasurements
    .sort((a, b) => (a.dateISO || "").localeCompare(b.dateISO || ""))
    .map(m => m.valueTransformed)
    .filter(v => v !== null && v !== undefined);
  const todayLn = state.todayHRV ? ouraHRVtoLnRMSSD(state.todayHRV) : null;
  const hrvR = hrvReadiness(todayLn, lnRmssdValues, settings.readinessHrvWindowN || 14);

  // Vara baseline: recent top sets
  const topSets = state.allSets
    .filter(s => s.setRole === "top" && s.actualVx !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const varaR = varaReadiness(topSets, settings.readinessVaraWindowN || 5);

  state.readiness = combineReadiness(velR, hrvR, varaR);
}

async function computeRecommendation() {
  const settings = state.settings;
  let primaryMov = state.movements.find(m => m.isPrimary);
  // Multi-lift mesocycles: primary movement changes each day
  if (state.mesocycle?.type === "streetlifting_16w") {
    primaryMov = getStreetliftingPrimaryMovement(state) || primaryMov;
  }
  state.recommendation = await recommend({
    settings,
    bodyweightKg: state.latestBodyweight || settings.bodyweightKg || 91,
    dateISO: todayISO(),
    mesocycle: state.mesocycle,
    sessions: state.sessions,
    allSets: state.allSets,
    readiness: state.readiness,
    primaryMovementId: primaryMov?.movementId || null,
    dryRun: true,
  });
}

// ═══════════════════════════════════════════════════════════════
// TOAST NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════

function showToast(message, type = "", duration = 3000) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}

// ═══════════════════════════════════════════════════════════════
// MODAL SYSTEM (replaces all prompt() calls)
// ═══════════════════════════════════════════════════════════════

/** Close any open modal */
function closeModal() {
  const existing = document.querySelector(".modal-overlay");
  if (existing) existing.remove();
}

/**
 * Show a list of options as a bottom sheet.
 * Returns a Promise that resolves to the selected index (0-based) or null if cancelled.
 * @param {string} title — modal title
 * @param {Array<{label:string, desc?:string, icon?:string}>} options
 * @param {number|null} selectedIdx — currently selected index (highlight)
 */
function showListModal(title, options, selectedIdx = null) {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <div class="modal-options-list"></div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const list = overlay.querySelector(".modal-options-list");
    options.forEach((opt, i) => {
      const el = document.createElement("div");
      el.className = `modal-option${i === selectedIdx ? " selected" : ""}`;
      el.innerHTML = `${opt.icon ? `<span class="modal-option-icon">${opt.icon}</span>` : ""}
        <div class="modal-option-text">
          <div class="modal-option-label">${opt.label}</div>
          ${opt.desc ? `<div class="modal-option-desc">${opt.desc}</div>` : ""}
        </div>`;
      el.addEventListener("click", () => { closeModal(); resolve(i); });
      list.appendChild(el);
    });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
  });
}

/**
 * Show an input modal (replaces prompt() for numeric/text input).
 * Returns a Promise that resolves to the entered string or null if cancelled.
 * @param {string} title — modal title
 * @param {string} placeholder — placeholder / label
 * @param {string} defaultValue — pre-filled value
 * @param {string} inputType — "number"|"text"
 */
function showInputModal(title, placeholder, defaultValue = "", inputType = "number") {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <label style="margin-top:0">${placeholder}</label>
        <div class="modal-input-row">
          <input type="${inputType}" inputmode="${inputType === "number" ? "decimal" : "text"}" value="${defaultValue}" autofocus />
          <button class="btn btn-ok" data-modal-ok>OK</button>
        </div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const inp = overlay.querySelector("input");
    const submit = () => { const v = inp.value.trim(); closeModal(); resolve(v || null); };
    overlay.querySelector("[data-modal-ok]").addEventListener("click", submit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
    setTimeout(() => inp.focus(), 50);
  });
}

function formatDate(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric", year: "numeric" });
  } catch { return iso; }
}

const DAY_TYPE_LABELS = { heavy: "Maksimivoima", volume: "Perusvoima", speed: "Nopeusvoima", competition: "Kilpailu", rest: "Lepo" };
function dayTypeLabel(dt) { return DAY_TYPE_LABELS[dt] || dt; }

const MESO_TYPE_LABELS = {
  default: "Perusjakso", hypertrofia: "Hypertrofiajakso", maksimivoima: "Maksimivoima-blokki",
  eksentrinen: "Eksentrinen blokki", dup: "DUP-jakso", siirtyma: "Siirtymäjakso",
  palautuminen: "Palautumisjakso", peaking: "Peaking", streetlifting_16w: "Streetlifting 16 vk 🏋️",
};

// Factory lookup for mesocycle creation
const MESO_FACTORIES = {
  default: createDefaultMesocycle,
  hypertrofia: createHypertrofiaMesocycle,
  maksimivoima: createMaksimivoimaMesocycle,

  palautuminen: createPalautuminenMesocycle,
  peaking: createPeakingMesocycle,
  streetlifting_16w: createStreetlifting16WMesocycle,
};

// Helper: find today's primary movement for multi-lift mesocycles (streetlifting_16w)
function getStreetliftingPrimaryMovement(state) {
  if (!state.mesocycle?.weekPlans || !state.mesocycle.startDateISO) return null;
  const start = new Date(state.mesocycle.startDateISO);
  const now = new Date();
  const weekNum = Math.floor((now - start) / (7 * 24 * 3600 * 1000)) + 1;
  if (weekNum < 1 || weekNum > 16) return null;
  const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
  if (!weekPlan) return null;
  const dow = now.getDay() || 7;
  const days = weekPlan.days || [];
  const dayPlan = days.find(d => d.dayOfWeek === dow) ||
    days.reduce((best, d) => {
      const dist = Math.min(Math.abs(d.dayOfWeek - dow), 7 - Math.abs(d.dayOfWeek - dow));
      const bestDist = best ? Math.min(Math.abs(best.dayOfWeek - dow), 7 - Math.abs(best.dayOfWeek - dow)) : Infinity;
      return dist < bestDist ? d : best;
    }, null);
  if (!dayPlan) return null;
  const primarySlot = dayPlan.slots?.find(s => s.role === "primary");
  if (!primarySlot?.defaultMovementName) return null;
  return state.movements.find(m => m.name === primarySlot.defaultMovementName) || null;
}

function formatDateShort(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric" });
  } catch { return iso; }
}

function dayOfWeekFi(iso) {
  if (!iso) return "";
  const days = ["Su", "Ma", "Ti", "Ke", "To", "Pe", "La"];
  return days[new Date(iso).getDay()];
}

function renderActiveWorkout() {
  const w = state.workout;
  if (!w) return "";

  // Pre-workout: general warmup protocol screen
  if (!w.warmupProtocolDone && w.warmupProtocol && w.warmupProtocol.length > 0) {
    return renderWorkoutWarmupIntro();
  }

  const totalExercises = w.exercises.length;
  const currentExIdx = w.currentExerciseIdx;
  const exercise = w.exercises[currentExIdx];
  if (!exercise) return renderWorkoutSummary();

  const totalSets = exercise.sets.length;
  const currentSetIdx = w.currentSetIdx;
  const currentSet = exercise.sets[currentSetIdx];

  if (!currentSet) {
    // Move to next exercise
    return renderWorkoutExerciseComplete(exercise);
  }

  const progressPct = ((currentExIdx * 100 + (currentSetIdx / totalSets) * 100) / totalExercises).toFixed(0);

  // Warmup detection
  const isWarmupSet = currentSet.isWarmup === true;
  const warmupCount = exercise.sets.filter(s => s.isWarmup).length;
  const workSetCount = exercise.sets.filter(s => !s.isWarmup).length;

  // Load display
  const loadStr = currentSet.loadKg !== null ? `${currentSet.loadKg === 0 ? "Kehonpaino" : currentSet.loadKg + " kg"}` : "–";

  // Rest time recommendation

    : `<div id="rest-timer-display" style="text-align:center;margin:8px 0;font-size:24px;font-weight:700;color:var(--acc);display:none"></div>`;

  // Completed sets summary (work sets only, warmup omitted)
  const completedWorkSets = exercise.sets.filter(s => s.completed && !s.isWarmup);
  const completedSetsHTML = completedWorkSets.map((s, i) =>

  ).join("");

  // Exercise list sidebar (clickable navigation)
  const exerciseListHTML = w.exercises.map((ex, i) => {
    const done = ex.sets.every(s => s.completed);

    return `<button class="ex-jump" data-jump-idx="${i}" style="display:inline-block;padding:5px 10px;border:none;border-radius:6px;font-size:11px;margin:2px;cursor:pointer;${active ? 'background:var(--acc);color:#fff' : done ? 'background:var(--ok2);color:var(--ok)' : 'background:var(--card2);color:var(--muted)'}">${i + 1}. ${ex.name.split(" ")[0]}</button>`;

  return `<div class="fade-in">

      <div class="muted">${currentExIdx + 1}/${totalExercises} liikettä</div>
      <div>
        <button class="btn btn-sm btn-outline" id="btn-skip-exercise" style="margin-right:4px">⏩ Ohita</button>

          <div class="exercise-meta">
            ${exercise.role === "primary" ? "⭐ Pääliike" : exercise.role === "backoff" ? "↩ Back-off" : ["warmup","opener","attempt2","attempt3"].includes(exercise.role) ? "🏆 " + (exercise.role === "warmup" ? "Lämmittely" : exercise.role === "opener" ? "1. yritys" : exercise.role === "attempt2" ? "2. yritys" : "3. yritys") : exercise.category}
            ${isLoadIncrease ? ' <span class="text-ok">↑ Progressio</span>' : ""}
          </div>
          ${exercise.slotFunction ? `<div class="muted" style="font-size:11px;margin-top:2px">🎯 ${exercise.slotFunction}${exercise.slotSource === "stagnation-swap" ? ' <span class="text-warn">· auto-swap stagnaatiosta</span>' : exercise.slotSource === "user-locked" ? ' <span class="text-acc">· 🔒 lukittu</span>' : exercise.slotSource === "user-override" ? ' <span class="text-acc">· käyttäjän valinta</span>' : ""}</div>` : ""}
          ${exercise.variantName ? `<div class="muted" style="font-size:11px;margin-top:2px">🔀 ${exercise.variantName}${exercise.tempoNote ? ` — <strong>${exercise.tempoNote}</strong>` : ""}</div>` : ""}
        </div>
      </div>

      ${completedWorkSets.length >= 2 ? renderVelocityTrendSVG(completedWorkSets) : ""}
      ${completedSetsHTML ? `<div style="margin-top:8px;padding:8px;background:var(--card2);border-radius:var(--radius-sm)">${completedSetsHTML}</div>` : ""}

      ${restTimerHTML}

      <div style="margin-top:12px">
        ${isWarmupSet ? `
        <div style="text-align:center;padding:12px 0">
          <div class="chip chip-yellow" style="margin-bottom:8px">🔥 Lämmittely ${warmupSetIdx}/${warmupCount}</div>
          <div class="load-display" style="font-size:36px">${loadStr}</div>
          <div class="muted mt">${currentSet.targetReps} toistoa — kontrolloidusti</div>
          <div class="muted" style="font-size:11px;margin-top:4px">Työsarjat alkavat tämän jälkeen (${workSetCount} sarjaa)</div>
          ${state.settings?.velocityEnabled && exercise.role === "primary" && warmupSetIdx === warmupCount ? `
          <div style="margin-top:14px;text-align:left">
            <label style="margin-top:0;font-size:12px;color:var(--acc)">📊 Velocity (max intent rep 1) — valinnainen</label>
            <input type="number" inputmode="decimal" step="0.01" id="input-warmup-velocity" placeholder="esim. 0.53 m/s" value="${state.todayVelocity || ''}">
          </div>` : ""}
        </div>
        <button class="btn btn-full btn-ok mt" id="btn-warmup-done">✓ Valmis — seuraava</button>
        <button class="btn btn-outline btn-full mt" id="btn-skip-warmup" style="font-size:13px">⏩ Ohita lämmittely</button>
        ` : `
        <div class="flex-between">
          <span class="muted">Sarja ${currentSetIdx + 1 - warmupCount}/${workSetCount}</span>
          <span class="muted">Tavoite: ${currentSet.targetReps} × V${currentSet.targetVx ?? "?"}</span>
        </div>

        <div style="text-align:center;margin:16px 0">
          <div id="btn-edit-load" class="load-display ${isLoadIncrease ? 'load-up' : ''}">${loadStr}</div>

        </div>

        ${state.settings?.velocityEnabled ? `<label style="margin-top:14px">Velocity (valinnainen)</label>
        <input type="number" inputmode="decimal" step="0.01" id="input-set-velocity" placeholder="Setin mean velocity m/s">` : `<input type="hidden" id="input-set-velocity" value="">`}

        <div id="attempted-reps-container" class="hidden">
          <label style="margin-top:14px">Yritetty toistoja (failure)</label>
          <input type="number" inputmode="numeric" min="1" max="30" id="input-attempted-reps" value="${(currentSet.targetReps || 3) + 1}" placeholder="esim. 3">
          <div class="muted" style="font-size:11px">Montako toistoa yritettiin? (epäonnistunut yritys mukaan)</div>
        </div>
        `}
      </div>

      ${!isWarmupSet ? `
      <button class="btn btn-full mt" id="btn-next-set" disabled>→ Seuraava sarja</button>
      <button class="btn btn-outline btn-full mt" id="btn-add-set" style="font-size:13px">+ Lisäsarja</button>
      ` : ""}
    </div>

    ${(exercise.role === "primary" || exercise.role === "backoff") && exercise.category === "vertikaaliveto" ? '<button class="btn btn-outline btn-full mt" id="btn-swap-variant" style="font-size:13px">🔀 Vaihda variaatio</button>' : ""}
    <button class="btn btn-outline btn-full mt" id="btn-add-exercise" style="font-size:14px">+ Lisää liike</button>
  </div>`;
}

function formatRestTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s < 10 ? "0" : ""}${s}`;
}

function startRestTimer() {
  stopRestTimer();
  // Get recommended rest time (countdown from min recommendation)
  const dayType = state.workout?.dayType || "heavy";
  const exercise = state.workout?.exercises[state.workout.currentExerciseIdx];
  const restRec = (exercise?.role === "primary" || exercise?.role === "backoff")
    ? REST_RECOMMENDATIONS[dayType] || REST_RECOMMENDATIONS.heavy
    : REST_RECOMMENDATIONS.accessory;
  const targetSec = restRec.minSec || 120;
  state.restTimerSeconds = targetSec;
  state.restTimerInterval = setInterval(() => {
    state.restTimerSeconds--;
    const el = document.getElementById('rest-timer-display');
    if (el) {
      if (state.restTimerSeconds >= 0) {
        el.textContent = formatRestTime(state.restTimerSeconds);
        el.style.display = '';
        el.style.color = state.restTimerSeconds <= 10 ? 'var(--ok)' : 'var(--acc)';
      } else {
        // Overtime: count up past 0
        el.textContent = `+${formatRestTime(Math.abs(state.restTimerSeconds))}`;
        el.style.color = 'var(--warn)';
      }
    }
    // Haptic/vibration alert at 0
    if (state.restTimerSeconds === 0 && navigator.vibrate) {
      navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function stopRestTimer() {
  if (state.restTimerInterval) {
    clearInterval(state.restTimerInterval);
    state.restTimerInterval = null;
  }
  state.restTimerSeconds = 0;
}

/**
 * Piirtää minimaisen SVG velocity-trendikuvaajan tehtyjen sarjojen velocity-arvoista.
 * X: sarjanumero, Y: velocity. Värikoodaus suhteessa 1. sarjaan.
 * @param {Array} completedSets — tehdyt sarjat joilla on velocity-arvo
 * @returns {string} SVG-merkkijono tai tyhjä
 */
function renderVelocityTrendSVG(completedSets) {
  const velSets = completedSets.filter(s => s.velocity !== null && s.velocity !== undefined && s.velocity > 0);
  if (velSets.length < 2) return "";
  const w = 200, h = 60, pad = 6;
  const vels = velSets.map(s => s.velocity);
  const first = vels[0];
  const minV = Math.min(...vels) * 0.9;
  const maxV = Math.max(...vels) * 1.1;
  const rangeV = maxV - minV || 0.1;
  const xStep = (w - 2 * pad) / (vels.length - 1);

  const points = vels.map((v, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((v - minV) / rangeV) * (h - 2 * pad);
    return { x, y, v };
  });

  const polyline = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const dots = points.map(p => {
    const pct = p.v / first;
    const color = pct >= 0.90 ? "var(--ok)" : pct >= 0.75 ? "var(--warn)" : "var(--bad)";
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${color}"/>`;
  }).join("");

  return `<div style="margin-top:6px">
    <div class="muted" style="font-size:10px;margin-bottom:2px">Velocity-trendi</div>
    <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:block">
      <polyline points="${polyline}" fill="none" stroke="var(--dim)" stroke-width="1.5" stroke-linejoin="round"/>
      ${dots}
    </svg>
  </div>`;
}

function renderWorkoutSummary() {
  const w = state.workout;
  if (!w) return "";

  const totalSets = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.completed && !s.isWarmup).length, 0);
  const warmupSets = w.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.completed && s.isWarmup).length, 0);
  const bw = state.settings?.bodyweightKg || 91;
  const totalTonnageExt = w.exercises.reduce((sum, ex) =>
    sum + ex.sets.filter(s => s.completed && !s.isWarmup).reduce((ss, s) => ss + (s.loadKg || 0) * (s.reps || 0), 0), 0);
  // System tonnage includes bodyweight for primary/backoff movements (työsarjat only)
  const totalTonnageSys = w.exercises.reduce((sum, ex) => {
    const isPull = ex.role === "primary" || ex.role === "backoff";
    return sum + ex.sets.filter(s => s.completed && !s.isWarmup).reduce((ss, s) => {
      const load = isPull ? (bw + (s.loadKg || 0)) : (s.loadKg || 0);
      return ss + load * (s.reps || 0);
    }, 0);
  }, 0);

  // Adaptation preview
  const rec = state.recommendation;
  let adaptationPreview = "";
  if (rec?.dayPlan?.slots) {
    const adaptations = analyzeSessionAdaptation(w.exercises, rec.dayPlan.slots);
    if (adaptations.length > 0) {
      adaptationPreview = `<div class="card" style="border-color:var(--acc)">
        <div class="card-title">🧠 Adaptiivinen analyysi</div>
        ${adaptations.map(a => `<div class="muted" style="padding:4px 0">${a.type === "volume_up" ? "📈" : a.type === "volume_down" ? "📉" : "➕"} ${a.reason}</div>`).join("")}
      </div>`;
    }
  }

  return `<div class="fade-in">
    <div class="card text-center">
      <div style="font-size:48px;margin-bottom:12px">💪</div>
      <div style="font-size:20px;font-weight:700">Treeni valmis!</div>
      <div class="kpi-row mt">
        <div class="kpi-box"><div class="kpi">${totalSets}</div><div class="kpi-label">Työsarjat</div></div>
        <div class="kpi-box"><div class="kpi">${Math.round(totalTonnageSys)}</div><div class="kpi-label">Tonnage sys</div></div>
        <div class="kpi-box"><div class="kpi">${Math.round(totalTonnageExt)}</div><div class="kpi-label">Tonnage lisäp.</div></div>
      </div>
      ${warmupSets > 0 ? `<div class="muted" style="font-size:11px;margin-top:6px">+ ${warmupSets} lämmittelysarjaa (ei laskettu mukaan)</div>` : ""}
    </div>

    ${w.exercises.map(ex => {
      const completedSets = ex.sets.filter(s => s.completed);
      if (completedSets.length === 0) return "";
      const warmups = completedSets.filter(s => s.isWarmup);
      const workSets = completedSets.filter(s => !s.isWarmup);
      const firstWork = workSets[0];
      const isPri = ex.role === "primary" || ex.role === "backoff";
      const exE1RM = firstWork ? (isPri
        ? e1rmExternal(bw, firstWork.loadKg || 0, firstWork.reps || 3, firstWork.actualVx ?? 1)
        : e1rmAccessory(firstWork.loadKg || 0, firstWork.reps || 3, firstWork.actualVx ?? 1)) : null;
      const isAttempt = ["warmup","opener","attempt2","attempt3"].includes(ex.role);
      const icon = ex.role === "primary" ? "⭐ " : ex.role === "backoff" ? "↩ " : isAttempt ? "🏆 " : "";
      const attemptLabel = isAttempt ? ` (${ex.role === "warmup" ? "Lämmittely" : ex.role === "opener" ? "1. yritys" : ex.role === "attempt2" ? "2. yritys" : "3. yritys"})` : "";
      const renderSet = s => `<div class="muted">${s.loadKg} kg × ${s.reps}${s.isWarmup ? "" : ` @ V${s.actualVx ?? "?"}`}${s.velocity ? ` (${s.velocity} m/s)` : ""}</div>`;
      return `<div class="card">
        <div class="flex-between">
          <div style="font-weight:600">${icon}${ex.name}${attemptLabel}</div>
          ${exE1RM !== null ? `<span class="muted">e1RM: ${exE1RM.toFixed(1)} kg</span>` : ""}
        </div>
        ${warmups.length > 0 ? `<div style="font-size:10px;color:var(--dim);margin-top:6px;text-transform:uppercase;letter-spacing:0.5px">Lämmittely</div>${warmups.map(renderSet).join("")}` : ""}
        ${workSets.length > 0 ? `<div style="font-size:10px;color:var(--acc);margin-top:6px;text-transform:uppercase;letter-spacing:0.5px">Työsarjat</div>${workSets.map(renderSet).join("")}` : ""}
      </div>`;
    }).join("")}

    ${adaptationPreview}

    <div class="card">
      <label style="margin-top:0">Muistiinpanot (valinnainen)</label>
      <textarea id="input-session-notes" maxlength="500" placeholder="Esim. kyynärpää kiristi, ote lipesi 3. sarjassa..." style="min-height:60px"></textarea>
      <div class="muted" style="text-align:right;font-size:11px"><span id="notes-char-count">0</span>/500</div>
    </div>

    <button class="btn btn-ok btn-full mb" id="btn-save-workout">💾 Tallenna treeni</button>
    <button class="btn btn-outline btn-full" id="btn-discard-workout">Hylkää</button>
  </div>`;
}

function renderPerLiftAutoregStatus(meso) {
  if (meso.type !== "streetlifting_16w") return "";
  const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;
  const lifts = [
    { name: "Lisäpainoleuanveto", label: "⭐ Leuka",   icon: "🎯" },
    { name: "Takakyykky",         label: "⭐ Kyykky",  icon: "🎯" },
    { name: "Lisäpainodippi",     label: "⭐ Dippi",   icon: "🎯" },
    { name: "Muscle-up",          label: "⭐ Muscle-up", icon: "🎯" },
  ];

  const renderOne = (l) => {
    const mov = state.movements.find(m => m.name === l.name);
    if (!mov) return `<div class="muted" style="font-size:11px">${l.label}: ei löydy</div>`;
    const sets = state.allSets
      .filter(s => s.movementId === mov.movementId && s.setRole === "top")
      .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
    const last = sets[sets.length - 1];
    const e1rm = computeMovementE1RM(sets, mov.isPrimary, bw);

    const recentN = sets.slice(-6).filter(s => s.actualVx !== null && s.targetVx !== null);
    let trendLabel = "—", trendColor = "var(--muted)";
    if (recentN.length >= 3) {
      const meanOvr = recentN.reduce((sum, s) => sum + (s.targetVx - s.actualVx), 0) / recentN.length;
      if (meanOvr < -0.5) { trendLabel = "🚀 Kiihdytys"; trendColor = "var(--acc, #4cd964)"; }
      else if (meanOvr > 0.5) { trendLabel = "⚠ Hidastus"; trendColor = "var(--warn, #ff9500)"; }
      else { trendLabel = "➡ Vakaa"; trendColor = "var(--muted)"; }
    }
    const e1rmHistory = sets.slice(-5).map(s => {
      const loadTotal = mov.isPrimary ? (s.externalLoadKg + bw) : s.externalLoadKg;
      const eff = (s.reps || 0) + (s.actualVx ?? 0);
      return loadTotal * (1 + eff / 30);
    });
    let prTag = "";
    if (e1rmHistory.length >= 4) {
      const [a, b, c, latest] = e1rmHistory.slice(-4);
      const priorMax = Math.max(a, b, c);
      if (priorMax > 0 && latest >= priorMax * 1.02 && b > a && c > b && latest > c) {
        prTag = `<span style="padding:1px 5px;border-radius:3px;background:#8a3e3e;color:#fff;font-size:10px;margin-left:4px">PR 🔥</span>`;
      }
    }
    const lastDate = last?.timestamp ? new Date(last.timestamp).toLocaleDateString("fi-FI", { day: "numeric", month: "numeric" }) : "-";
    return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div class="flex-between">
        <span style="font-weight:600;font-size:12px">${l.label}${prTag}</span>
        <span style="font-size:11px;color:${trendColor};font-weight:600">${trendLabel}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--muted);margin-top:2px">
        <span>e1RM: <strong>${e1rm !== null ? e1rm.toFixed(1) + " kg" : "-"}</strong></span>
        <span>Viim: ${lastDate}</span>
        <span>Sarjoja: ${sets.length}</span>
      </div>
    </div>`;
  };

  return `<div class="card">
    <div class="card-title">🎯 Per-liike autoregulaatio</div>
    ${lifts.map(renderOne).join("")}
    <div class="muted mt" style="font-size:10px">Kiihdytys = Vx:t helpompia kuin target → seuraava treeni saa +kuorma. Hidastus = vaikeampia → kevennys.</div>
  </div>`;
}

function renderProgramOverviewTable(meso, currentWeek) {
  const days = [1, 2, 4, 6];

    return `${p.sets}×${p.reps}${p.targetVx != null ? ` V${p.targetVx}` : ""}`;
  };
  const blockColor = (w) => {
    if (w <= 4) return "#3a6b5c";
    if (w <= 8) return "#5a4e7a";
    if (w <= 12) return "#7a5a3e";
    return "#8a3e3e";

  return `<div class="card">
    <div class="card-title">📋 Koko 16 vk — yleiskatsaus</div>

            return `<tr style="border-bottom:1px solid var(--border);${isCurrent ? 'background:rgba(100,180,255,0.08)' : isPast ? 'opacity:0.55' : ''}">

              ${days.map(d => {
                const day = wp.days.find(x => x.dayOfWeek === d);
                return `<td style="text-align:center;padding:5px 4px;color:var(--muted)">${summarizeDay(day)}</td>`;
              }).join("")}

            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
    <div class="muted mt" style="font-size:10px">Solu: primary-sarjat × toistot V-tavoite</div>
  </div>`;
}

function renderVolumeDashboard(meso) {
  const CAT_LABELS = {
    vertikaaliveto: "Leuka/MU",
    alaraaja: "Kyykky",
    "horisontaalityöntö": "Dippi/penkki",
    "horisontaaliveto": "Rivaukset",
    hauisfleksio: "Hauis",
    "vertikaalityöntö": "Pystypunn.",
    ojentajaekstensio: "Ojentaja",
    core: "Core",
  };
  const blocks = [
    { name: "Hypertrofia", color: "#3a6b5c", weeks: [1,2,3,4] },
    { name: "Voima",       color: "#5a4e7a", weeks: [5,6,7,8] },
    { name: "Intensifikaatio", color: "#7a5a3e", weeks: [9,10,11,12] },
    { name: "Realization/Peak", color: "#8a3e3e", weeks: [13,14,15,16] },
  ];
  const weeklyTotals = (weeks) => {
    const totals = {};
    weeks.forEach(w => {
      const wp = (meso.weekPlans || []).find(x => x.week === w);
      if (!wp) return;
      wp.days.forEach(d => {
        (d.slots || []).forEach(s => {
          if (!s.category) return;
          totals[s.category] = (totals[s.category] || 0) + (s.sets || 0);
        });
      });
    });
    return totals;
  };

  return `<div class="card">
    <div class="card-title">📊 Volyymi-dashboard (sarjat/blokki)</div>
    <div style="display:grid;grid-template-columns:1fr;gap:12px">
      ${blocks.map(b => {
        const totals = weeklyTotals(b.weeks);
        const perWeek = {};
        Object.keys(totals).forEach(k => perWeek[k] = (totals[k] / b.weeks.length).toFixed(1));
        const keys = Object.keys(totals).filter(k => totals[k] > 0).sort((a, b) => totals[b] - totals[a]);
        if (!keys.length) return "";
        const max = Math.max(...keys.map(k => totals[k]));
        return `<div>
          <div style="font-weight:600;margin-bottom:6px;color:#fff;background:${b.color};padding:4px 8px;border-radius:4px;font-size:12px">${b.name} (vk ${b.weeks[0]}–${b.weeks[b.weeks.length-1]})</div>
          ${keys.map(k => {
            const pct = (totals[k] / max) * 100;
            return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px">
              <div style="width:90px;color:var(--muted)">${CAT_LABELS[k] || k}</div>
              <div style="flex:1;background:var(--border);border-radius:3px;overflow:hidden;height:14px">
                <div style="width:${pct}%;height:100%;background:${b.color}"></div>
              </div>
              <div style="width:80px;text-align:right;color:var(--muted)">${totals[k]} (${perWeek[k]}/vk)</div>
            </div>`;
          }).join("")}
        </div>`;
      }).join("")}
    </div>
    <div class="muted mt" style="font-size:10px">Benchmark: 6–10 working sets/liike/vk eliittitasoa (KoW/Heavyweight Cali)</div>
  </div>`;
}

// TRENDS VIEW (placeholder)
// ═══════════════════════════════════════════════════════════════

function renderTrends() {
  const bw = state.settings?.bodyweightKg || 91;

  // Compute e1RM for all movements that have data
  const movementTrends = [];
  for (const m of state.movements) {
    const sets = state.allSets.filter(s => s.movementId === m.movementId);
    if (sets.length === 0) continue;
    const history = computeMovementE1RMHistory(sets, state.sessions, m.isPrimary, bw);
    if (history.length === 0) continue;
    const current = history[history.length - 1].e1rm;
    const first = history[0].e1rm;
    const change = history.length > 1 ? current - first : 0;
    movementTrends.push({ movement: m, history, current, change, totalSets: sets.length });
  }

  // Sort: primary first, then by total sets descending
  movementTrends.sort((a, b) => {
    if (a.movement.isPrimary && !b.movement.isPrimary) return -1;
    if (!a.movement.isPrimary && b.movement.isPrimary) return 1;
    return b.totalSets - a.totalSets;
  });

  return `<div class="fade-in">
    <div class="section-header">Trendit</div>

    ${movementTrends.length === 0 ? '<div class="card"><div class="muted">Ei dataa — tee treenejä nähdäksesi trendit</div></div>' : ""}

    ${movementTrends.map(mt => {
      const changeStr = mt.change > 0 ? `<span class="text-ok">+${mt.change.toFixed(1)}</span>` : mt.change < 0 ? `<span class="text-bad">${mt.change.toFixed(1)}</span>` : `<span class="dim">±0</span>`;
      const isPrimary = mt.movement.isPrimary;
      const label = isPrimary ? "e1RM system (kg)" : "e1RM (kg)";

      return `<div class="card">
        <div class="flex-between">
          <div>
            <div style="font-weight:600">${isPrimary ? "⭐ " : ""}${mt.movement.name}</div>
            <div class="muted" style="font-size:11px">${mt.movement.category} | ${mt.totalSets} sarjaa</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700">${mt.current.toFixed(1)}</div>
            <div class="muted" style="font-size:11px">${label} ${changeStr}</div>
          </div>
        </div>
        ${mt.history.length > 1 ? renderMiniChart(mt.history) : ""}
        <div class="accordion-header" data-toggle="trend-${mt.movement.movementId}">
          <span class="muted">Historia (${mt.history.length})</span><span>▼</span>
        </div>
        <div class="accordion-body" id="trend-${mt.movement.movementId}">
          <table>
            <tr><th>Pvm</th><th>Paino</th><th>Toistot</th><th>e1RM</th></tr>
            ${mt.history.slice(-10).map(p => `<tr><td>${formatDateShort(p.dateISO)}</td><td>${p.load} kg</td><td>${p.reps}</td><td>${p.e1rm.toFixed(1)}</td></tr>`).join("")}
          </table>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderMiniChart(history) {
  // Simple CSS bar chart
  if (history.length < 2) return "";
  const values = history.slice(-12).map(h => h.e1rm);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  return `<div style="display:flex;align-items:end;gap:2px;height:40px;margin:8px 0">
    ${values.map(v => {
      const pct = ((v - min) / range) * 100;
      const h = Math.max(4, pct * 0.4);
      return `<div style="flex:1;height:${h}px;background:var(--acc);border-radius:2px 2px 0 0;min-width:4px" title="${v.toFixed(1)}"></div>`;
    }).join("")}
  </div>`;
}

function csvEscape(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (/[",\n;]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function dayOfWeekShort(iso) {
  if (!iso) return "";
  const d = ["Su","Ma","Ti","Ke","To","Pe","La"];
  return d[new Date(iso).getDay()];
}

function filterSessionsForExport(scope, mesocycleId, fromISO, toISO) {
  let sessions = [...state.sessions];
  if (scope === "mesocycle" && mesocycleId) {
    sessions = sessions.filter(s => s.mesocycleId === mesocycleId);
  } else if (scope === "range") {
    if (fromISO) sessions = sessions.filter(s => (s.dateISO || "") >= fromISO);
    if (toISO)   sessions = sessions.filter(s => (s.dateISO || "") <= toISO);
  }
  return sessions.sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
}

function buildCSVExport({ scope, mesocycleId, fromISO, toISO }) {
  const sessions = filterSessionsForExport(scope, mesocycleId, fromISO, toISO);
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));
  const mesoById = new Map((state.allMesocycles || []).map(m => [m.mesocycleId, m]));
  const sessById = new Map(sessions.map(s => [s.sessionId, s]));

  const header = [
    "Pvm","Vk","Mesosykli","Päivä","Päivätyyppi","Liike","Rooli",
    "Sarja #","Toistot","Toistotavoite","Kuorma (kg)","BW (kg)","System load",
    "Vx tavoite","Vx toteutunut","Velocity (m/s)",
    "e1RM ext","e1RM sys","Readiness cap","Muistiinpano","Aikaleima",
  ];
  const rows = [header.map(csvEscape).join(",")];

  // Sarjat päivä+sessio+timestamp-järjestyksessä, sarjanumerointi per (sessio, liike)
  const sortedSets = [...sets].sort((a,b) => {
    const sa = sessById.get(a.sessionId), sb = sessById.get(b.sessionId);
    const da = (sa?.dateISO || ""), db = (sb?.dateISO || "");
    if (da !== db) return da.localeCompare(db);
    return (a.timestamp || "").localeCompare(b.timestamp || "");
  });

  const setCounter = new Map(); // key = sessionId+movementId
  for (const set of sortedSets) {
    const sess = sessById.get(set.sessionId);
    if (!sess) continue;
    const mov = movById.get(set.movementId);
    const meso = mesoById.get(sess.mesocycleId);
    const key = `${set.sessionId}|${set.movementId}`;
    const n = (setCounter.get(key) || 0) + 1;
    setCounter.set(key, n);
    const isPrimary = mov?.isPrimary;
    const bw = sess.bodyweightKg || state.latestBodyweight || 91;
    const load = set.externalLoadKg || 0;
    const systemLoad = isPrimary ? (bw + load) : load;
    const e1rmExt = isPrimary ? e1rmExternal(bw, load, set.reps, set.actualVx)
                              : e1rmAccessory(load, set.reps, set.actualVx);
    const e1rmSys = isPrimary ? e1rmSystem(bw, load, set.reps, set.actualVx)
                              : e1rmAccessory(load, set.reps, set.actualVx);
    const readinessLabel = sess.readinessCapLevel === 2 ? "RED"
                         : sess.readinessCapLevel === 1 ? "YELLOW"
                         : sess.readinessCapLevel === 0 ? "GREEN" : "";

    const row = [
      sess.dateISO || "",
      sess.mesocycleWeek ?? "",
      meso?.name || meso?.type || "",
      dayOfWeekShort(sess.dateISO),
      sess.plannedDayType || "",
      mov?.name || "",
      set.setRole || "",
      n,
      set.reps ?? "",
      set.targetReps ?? "",
      load,
      bw,
      systemLoad.toFixed(1),
      set.targetVx ?? "",
      set.actualVx ?? "",
      set.velocityMean ?? set.velocityRep1 ?? "",
      e1rmExt !== null ? e1rmExt.toFixed(2) : "",
      e1rmSys !== null ? e1rmSys.toFixed(2) : "",
      readinessLabel,
      (sess.sessionNotes || "").replace(/\n/g, " "),
      set.timestamp || "",
    ];
    rows.push(row.map(csvEscape).join(","));
  }
  return rows.join("\n");
}

function buildMesocycleMarkdown(mesocycleId) {
  const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
  if (!meso) return "# Ohjelmaa ei löytynyt\n";
  const sessions = state.sessions
    .filter(s => s.mesocycleId === mesocycleId)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));

  const firstDate = sessions[0]?.dateISO || meso.startDateISO || "?";
  const lastDate = sessions[sessions.length - 1]?.dateISO || "?";
  const plannedWeeks = (meso.weekPlans || []).length || null;
  const plannedSessions = (meso.weekPlans || []).reduce((n, wp) => n + (wp.days?.length || 0), 0);

  // Tonnage per liike
  const byMov = new Map();
  for (const set of sets) {
    const mov = movById.get(set.movementId);
    if (!mov) continue;
    if (!byMov.has(mov.movementId)) byMov.set(mov.movementId, { mov, sets: [], tonnage: 0 });
    const rec = byMov.get(mov.movementId);
    rec.sets.push(set);
    rec.tonnage += (set.externalLoadKg || 0) * (set.reps || 0);
  }

  // e1RM first vs last per primary movement
  const e1rmLines = [];
  for (const { mov, sets: ms } of byMov.values()) {
    if (ms.length < 2) continue;
    const isPrimary = mov.isPrimary;
    const sorted = [...ms].sort((a,b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
    const compute = (s) => {
      const sess = sessions.find(ss => ss.sessionId === s.sessionId);
      const bw = sess?.bodyweightKg || 91;
      return isPrimary ? e1rmExternal(bw, s.externalLoadKg || 0, s.reps, s.actualVx)
                       : e1rmAccessory(s.externalLoadKg || 0, s.reps, s.actualVx);
    };
    const firstE = compute(sorted[0]);
    const lastE = compute(sorted[sorted.length - 1]);
    const maxE = Math.max(...sorted.map(s => compute(s) ?? 0));
    if (firstE === null || lastE === null) continue;
    const delta = lastE - firstE;
    const sign = delta > 0 ? "+" : "";
    e1rmLines.push(`- **${mov.name}**: ${firstE.toFixed(1)} → ${lastE.toFixed(1)} kg (${sign}${delta.toFixed(1)}), huippu ${maxE.toFixed(1)} kg`);
  }

  // PR:t aikavälillä
  const prs = (state.prs || [])
    .filter(p => (p.dateISO || "") >= firstDate && (p.dateISO || "") <= lastDate)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));

  // Readiness-jakauma
  const rCounts = { GREEN: 0, YELLOW: 0, RED: 0 };
  for (const s of sessions) {
    const l = s.readinessCapLevel;
    if (l === 2) rCounts.RED++;
    else if (l === 1) rCounts.YELLOW++;
    else rCounts.GREEN++;
  }

  const totalSets = sets.length;
  const totalTonnage = [...byMov.values()].reduce((n, r) => n + r.tonnage, 0);

  const lines = [];
  lines.push(`# ${meso.name || meso.type || "Ohjelma"}`);
  lines.push("");
  lines.push(`**Aikaväli:** ${firstDate} → ${lastDate}`);
  lines.push(`**Treenit:** ${sessions.length}${plannedSessions ? ` / ${plannedSessions} suunniteltu` : ""}`);
  lines.push(`**Viikot:** ${plannedWeeks || "?"}`);
  lines.push(`**Sarjat yhteensä:** ${totalSets}`);
  lines.push(`**Tonnage (external):** ${(totalTonnage / 1000).toFixed(1)} t`);
  lines.push("");
  lines.push(`## Readiness-jakauma`);
  lines.push(`- 🟢 GREEN: ${rCounts.GREEN}`);
  lines.push(`- 🟡 YELLOW: ${rCounts.YELLOW}`);
  lines.push(`- 🔴 RED: ${rCounts.RED}`);
  lines.push("");
  if (e1rmLines.length > 0) {
    lines.push(`## e1RM-kehitys per liike`);
    lines.push(...e1rmLines);
    lines.push("");
  }
  if (prs.length > 0) {
    lines.push(`## PR:t ohjelman aikana`);
    for (const pr of prs) {
      const comp = pr.isCompetition ? " 🏅" : "";
      const bw = pr.bodyweightKg ? ` @ ${pr.bodyweightKg} kg BW` : "";
      const ctx = pr.context ? ` — ${pr.context}` : "";
      lines.push(`- **${pr.dateISO}**${comp} ${pr.movementName}: ${pr.value} kg${bw}${ctx}`);
    }
    lines.push("");
  }

  // Muistiinpanot (jos on)
  const notes = sessions.filter(s => s.sessionNotes && s.sessionNotes.trim());
  if (notes.length > 0) {
    lines.push(`## Treenimuistiinpanot`);
    for (const s of notes) {
      lines.push(`- **${s.dateISO}** (${dayOfWeekShort(s.dateISO)}): ${s.sessionNotes.trim()}`);
    }
    lines.push("");
  }

  // Sarjat per liike tiiviisti
  lines.push(`## Sarjat per liike`);
  const movRows = [...byMov.values()]
    .sort((a,b) => b.tonnage - a.tonnage)
    .map(r => `- ${r.mov.name}: ${r.sets.length} sarjaa, ${(r.tonnage/1000).toFixed(2)} t`);
  lines.push(...movRows);
  lines.push("");
  lines.push(`---`);
  lines.push(`*Luotu LeVe Coach -sovelluksesta ${todayISO()}*`);
  return lines.join("\n");
}

// EVENT BINDING
// ═══════════════════════════════════════════════════════════════

function bind() {
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  // Navigation
  $$("[data-nav]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.view = btn.dataset.nav;
      render();
    });
  });

  // Accordion
  $$("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.toggle);
      if (target) target.classList.toggle("open");
    });
  });

  // Dashboard
  const startBtn = $("#btn-start-workout");
  if (startBtn) startBtn.addEventListener("click", () => { state.view = "workout"; render(); });

  const readinessBtn = $("#btn-readiness");
  if (readinessBtn) readinessBtn.addEventListener("click", () => { state.view = "readiness"; render(); });

  // Readiness
  const saveReadinessBtn = $("#btn-save-readiness");
  if (saveReadinessBtn) saveReadinessBtn.addEventListener("click", async () => {
    const hrvInput = parseNumericInput($("#input-hrv")?.value);
    const velInput = parseNumericInput($("#input-vel")?.value);

    if (hrvInput !== null) {
      const hvr = validateHRV(hrvInput);
      if (!hvr.valid) { showToast(hvr.error, "bad"); return; }
      state.todayHRV = hvr.value;
      await saveMeasurement({
        dateISO: todayISO(), type: "HRV",
        value: hvr.value, valueTransformed: ouraHRVtoLnRMSSD(hvr.value),
        unit: "ms", device: "Oura",
      });
    }

    if (velInput !== null) {
      const vv = validateVelocity(velInput);
      if (!vv.valid) { showToast(vv.error, "bad"); return; }
      state.todayVelocity = vv.value;
    }

    await computeReadiness();
    await computeRecommendation();
    showToast("Readiness tallennettu", "ok");
    state.view = "dashboard";
    render();
  });

  // Workout setup
  const beginBtn = $("#btn-begin-workout");
  if (beginBtn) beginBtn.addEventListener("click", async () => {
    // Tallenna kehonpaino
    const bwInput = $("#input-bw-today");
    if (bwInput) {
      const bwVal = parseNumericInput(bwInput.value);
      if (bwVal !== null && bwVal >= 30 && bwVal <= 250) {
        await saveBodyweightEntry(bwVal, todayISO());
        state.latestBodyweight = bwVal;
        // Päivitä myös asetuksiin
        state.settings.bodyweightKg = bwVal;
        await saveSettings(state.settings);
      }
    }
    await startWorkout();
  });

  // Active workout
  bindWorkoutEvents();

  // Mesocycle — template chooser
  const newMesoBtn = $("#btn-new-meso");
  if (newMesoBtn) newMesoBtn.addEventListener("click", async () => {
    // Sort: suggested first, then the rest
    const currentType = state.mesocycle?.type || "default";
    const suggested = SUGGESTED_NEXT_TEMPLATE[currentType] || [];

    // Build ordered list: suggested templates first (with ⭐), then the rest
    const orderedTemplates = [];
    const usedIds = new Set();
    for (const id of suggested) {
      const tpl = MESOCYCLE_TEMPLATES.find(t => t.id === id);
      if (tpl) { orderedTemplates.push({ ...tpl, isSuggested: true }); usedIds.add(id); }
    }
    for (const tpl of MESOCYCLE_TEMPLATES) {
      if (!usedIds.has(tpl.id)) orderedTemplates.push({ ...tpl, isSuggested: false });
    }

    const options = orderedTemplates.map(tpl => ({
      label: `${tpl.isSuggested ? "⭐ " : ""}${tpl.label}`,
      desc: tpl.desc,
      icon: tpl.icon,
    }));

    const chosen = await showListModal("Valitse ohjelma", options);
    if (chosen === null) return;

    const template = orderedTemplates[chosen];

    // Peaking needs special handling (requires e1RM)
    if (template.id === "peaking") {
      const bw = state.settings?.bodyweightKg || 91;
      const primaryMov = state.movements.find(m => m.isPrimary);
      let e1rmExt = 93;
      if (primaryMov) {
        const sets = state.allSets.filter(s => s.movementId === primaryMov.movementId);
        const computed = computeMovementE1RM(sets, true, bw);
        if (computed !== null) e1rmExt = Math.max(0, computed - bw);
      }

      const confirmIdx = await showListModal(
        `🏆 Peaking-ohjelma`,
        [
          { label: "Aloita peaking", desc: `e1RM: +${e1rmExt.toFixed(1)} kg · Opener: +${roundToHalf(e1rmExt * 0.92)} kg`, icon: "🏆" },
          { label: "Peruuta", desc: "Palaa valikkoon", icon: "↩" },
        ]
      );
      if (confirmIdx !== 0) return;

      const peakMeso = createPeakingMesocycle(todayISO(), e1rmExt, bw);
      await saveMesocycle(peakMeso);
      state.mesocycle = peakMeso;
      await computeRecommendation();
      showToast("🏆 Peaking-ohjelma aloitettu!", "ok", 4000);
      render();
      return;
    }

    // Streetlifting 16 vk needs calibration dialog
    if (template.id === "streetlifting_16w") {
      const bw = state.settings?.bodyweightKg || 91;
      const confirmIdx = await showListModal(
        "🏋️ Streetlifting 16 vk — Kalibraatio",
        [
          { label: "Oletusarvoilla (suositeltu)", desc: `Leuka: +85 kg · Dippi: +75 kg · Kyykky: 160 kg · Paino: ${bw} kg`, icon: "✅" },
          { label: "Syötä omat e1RM-arvot", desc: "Tarkempi — syötä jokainen erikseen", icon: "✏️" },
          { label: "Peruuta", desc: "", icon: "↩" },
        ]
      );
      if (confirmIdx === null || confirmIdx === 2) return;

      let cal = { bwKg: bw, leukaExtKg: 85, dippiExtKg: 75, kyykkyExtKg: 160 };

      if (confirmIdx === 1) {
        const lStr = await showInputModal("Leuanveto e1RM (lisäpaino kg)", "esim. 85", "85", "number");
        if (lStr === null) return;
        const dStr = await showInputModal("Dippi e1RM (lisäpaino kg) — arvio ok", "esim. 75", "75", "number");
        if (dStr === null) return;
        const kStr = await showInputModal("Takakyykky 1RM (kg tanko)", "esim. 160", "160", "number");
        if (kStr === null) return;
        cal = {
          bwKg: bw,
          leukaExtKg: parseFloat(lStr) || 85,
          dippiExtKg: parseFloat(dStr) || 75,
          kyykkyExtKg: parseFloat(kStr) || 160,
        };
      }

      const slMeso = createStreetlifting16WMesocycle(todayISO(), cal);
      await saveMesocycle(slMeso);
      state.mesocycle = slMeso;
      await computeRecommendation();
      showToast("🏋️ Streetlifting 16 vk aloitettu!", "ok", 4000);
      render();
      return;
    }

    // All other templates
    const factory = MESO_FACTORIES[template.id];
    if (!factory) { showToast("Tuntematon malli", "bad"); return; }

    const meso = factory(todayISO());
    // Assign variant rotation (except templates with hardcoded variants like eksentrinen/siirtyma/streetlifting_16w)
    if (!["eksentrinen", "siirtyma", "streetlifting_16w"].includes(template.id)) {
      assignVariantRotation(meso.weekPlans);
    }
    await saveMesocycle(meso);
    state.mesocycle = meso;
    await computeRecommendation();
    showToast(`${template.icon} ${template.label} aloitettu!`, "ok", 3000);
    render();
  });

  // Edit day plan slots
  $$("[data-edit-day]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const [weekStr, dayStr] = btn.dataset.editDay.split("-");
      const weekNum = parseInt(weekStr);
      const dayOfWeek = parseInt(dayStr);
      const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
      if (!weekPlan) return;
      const day = weekPlan.days.find(d => d.dayOfWeek === dayOfWeek);
      if (!day) return;

      const dayNames = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };

      // Step 1: Choose action
      const action = await showListModal(
        `${dayNames[dayOfWeek]} — ${day.label || dayTypeLabel(day.dayType)}`,
        [
          { icon: "🔄", label: "Vaihda liike", desc: "Korvaa olemassa oleva liike toisella" },
          { icon: "➕", label: "Lisää liike", desc: "Lisää uusi liike päivään" },
          { icon: "🗑️", label: "Poista liike", desc: "Poista liike päivästä" },
          { icon: "✏️", label: "Muuta sarjoja/toistoja", desc: "Muokkaa sarjojen tai toistojen määrää" },
        ]
      );
      if (action === null) return;

      if (action === 0) {
        // Swap movement: choose which slot
        const slotIdx = await showListModal(
          "Minkä liikkeen vaihdat?",
          day.slots.map((s, i) => ({ icon: s.role === "primary" ? "🎯" : "🔸", label: s.defaultMovementName, desc: `${s.sets}×${s.reps} — ${s.category}` }))
        );
        if (slotIdx === null || slotIdx < 0 || slotIdx >= day.slots.length) return;
        const slot = day.slots[slotIdx];
        const sameCat = state.movements.filter(m => m.category === slot.category);
        const others = state.movements.filter(m => m.category !== slot.category);
        const options = [...sameCat, ...others];
        const movIdx = await showListModal(
          `Vaihda ${slot.defaultMovementName}`,
          options.map(m => ({ icon: sameCat.includes(m) ? "✅" : "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          slot.defaultMovementName = options[movIdx].name;
          slot.category = options[movIdx].category;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`Vaihdettu: ${options[movIdx].name}`, "ok");
          render();
        }
      } else if (action === 1) {
        // Add movement
        const options = state.movements;
        const movIdx = await showListModal(
          "Lisää liike",
          options.map(m => ({ icon: "🔹", label: m.name, desc: m.category }))
        );
        if (movIdx !== null && movIdx >= 0 && movIdx < options.length) {
          const m = options[movIdx];
          const sr = await showSetsRepsModal(`${m.name} — Sarjat & toistot`);
          if (!sr) return;
          day.slots.push({
            role: "accessory",
            category: m.category,
            defaultMovementName: m.name,
            sets: sr.sets,
            reps: sr.reps,
            targetVx: null,
          });
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${m.name} lisätty`, "ok");
          render();
        }
      } else if (action === 2) {
        // Remove movement
        const removable = day.slots.map((s, i) => ({ s, i })).filter(x => x.s.role !== "primary");
        if (removable.length === 0) { showToast("Pääliikettä ei voi poistaa", "warn"); return; }
        const rIdx = await showListModal(
          "Poista liike",
          removable.map(x => ({ icon: "🗑️", label: x.s.defaultMovementName, desc: `${x.s.sets}×${x.s.reps}` }))
        );
        if (rIdx !== null && rIdx >= 0 && rIdx < removable.length) {
          const removed = day.slots.splice(removable[rIdx].i, 1);
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast(`${removed[0].defaultMovementName} poistettu`, "ok");
          render();
        }
      } else if (action === 3) {
        // Edit sets/reps
        const slotIdx = await showListModal(
          "Muokkaa liikettä",
          day.slots.map(s => ({ icon: "✏️", label: s.defaultMovementName, desc: `${s.sets}×${s.reps}` }))
        );
        if (slotIdx !== null && slotIdx >= 0 && slotIdx < day.slots.length) {
          const slot = day.slots[slotIdx];
          const sr = await showSetsRepsModal(`${slot.defaultMovementName}`, slot.sets, slot.reps);
          if (!sr) return;
          slot.sets = sr.sets;
          slot.reps = sr.reps;
          await saveMesocycle(state.mesocycle);
          await computeRecommendation();
          showToast("Päivitetty", "ok");
          render();
        }
      }
    });
  });

  // Movement detail view
  $$("[data-view-movement]").forEach(btn => {

  // Movements
  const addMovBtn = $("#btn-add-movement");

    showToast(`${name} lisätty`, "ok");

  $$("[data-edit-video]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.editVideo;
      const mov = state.movements.find(m => m.movementId === id);
      const current = mov?.tutorialUrl || "";
      const url = prompt(`Tutoriaalivideon URL liikkeelle "${mov?.name}":`, current);
      if (url === null) return;
      await updateMovement(id, { tutorialUrl: url.trim() });
      await refresh();
      showToast(url.trim() ? "Videolinkki tallennettu" : "Videolinkki poistettu", "ok");
      render();
    });
  });

  $$("[data-delete-mov]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko liike?")) return;
      await deleteMovement(btn.dataset.deleteMov);
      await refresh();
      render();
    });
  });

  // History
  $$("[data-delete-session]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko treeni?")) return;
      await deleteSession(btn.dataset.deleteSession);
      await refresh();
      render();
    });
  });

  // PRs — näytä lomake
  const showAddPRBtn = $("#btn-show-add-pr");
  if (showAddPRBtn) showAddPRBtn.addEventListener("click", () => {
    state.showAddPRForm = true;

  });

  // PRs — peruuta

  if (cancelPRBtn) cancelPRBtn.addEventListener("click", () => {

  const savePRBtn = $("#btn-save-pr");
  if (savePRBtn) savePRBtn.addEventListener("click", async () => {

    const bw = parseNumericInput($("#pr-bw")?.value);
    const context = ($("#pr-context")?.value || "").trim();
    const isComp = !!$("#pr-is-comp")?.checked;
    if (!dateISO) { showToast("Päivämäärä puuttuu", "bad"); return; }
    if (!movementName) { showToast("Valitse liike", "bad"); return; }
    if (load === null || load <= 0) { showToast("Anna kuorma (kg)", "bad"); return; }
    await savePR({
      dateISO, movementName, value: load,
      bodyweightKg: bw,
      context: context || null,
      isCompetition: isComp,
      source: "manual",
    });
    state.showAddPRForm = false;
    state.prs = await getAllPRs();
    showToast("PR tallennettu", "ok");
    render();
  });

  // PRs — poista
  $$("[data-delete-pr]").forEach(btn => {
    btn.addEventListener("click", async () => {
      if (!confirm("Poistetaanko PR?")) return;
      await deletePR(btn.dataset.deletePr);
      state.prs = await getAllPRs();
      render();
    });

    state.settings.bodyweightKg = bw || 91;
    state.settings.maxDelta = parseNumericInput($("#set-maxdelta")?.value) || 0.25;
    state.settings.vlStopPercent = parseNumericInput($("#set-vlstop")?.value) || 20;
    state.settings.readinessVelocityWindowN = parseNumericInput($("#set-velwindow")?.value) || 10;
    state.settings.readinessHrvWindowN = parseNumericInput($("#set-hrvwindow")?.value) || 14;
    state.settings.velocityEnabled = !!$("#set-velocity-enabled")?.checked;
    // Read variant load modifiers
    const variantModifiers = {};
    $$("[data-variant-mod]").forEach(inp => {
      const name = inp.dataset.variantMod;
      const val = parseInt(inp.value);
      if (!isNaN(val)) variantModifiers[name] = val / 100;
    });
    state.settings.variantModifiers = variantModifiers;
    await saveSettings(state.settings);
    await computeRecommendation();

  // Export scope — näytä/piilota alueet
  const scopeSelect = $("#export-scope");
  if (scopeSelect) {

      const v = scopeSelect.value;
      const meso = $("#export-scope-meso");
      const range = $("#export-scope-range");
      if (meso)  meso.style.display  = v === "mesocycle" ? "" : "none";
      if (range) range.style.display = v === "range"     ? "" : "none";
    };
    scopeSelect.addEventListener("change", updateScopeVisibility);
    updateScopeVisibility();
  }

  // Export CSV

  if (exportCsvBtn) exportCsvBtn.addEventListener("click", () => {

    if (scope === "mesocycle" && !mesocycleId) {
      showToast("Valitse ohjelma", "bad"); return;
    }
    const csv = buildCSVExport({ scope, mesocycleId, fromISO, toISO });
    const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
    const baseName = scope === "mesocycle" && meso
      ? (meso.name || meso.type || "ohjelma").replace(/[^\wäöåÄÖÅ-]+/g, "-")
      : scope === "range"
        ? `aikavali-${fromISO || "alku"}_${toISO || "loppu"}`
        : "kaikki-data";
    downloadFile(`leve-${baseName}-${todayISO()}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");

  // Export Markdown

  if (exportMdBtn) exportMdBtn.addEventListener("click", () => {

      showToast("Valitse 'Yksittäinen ohjelma'", "bad"); return;

    const md = buildMesocycleMarkdown(mesocycleId);
    const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
    const baseName = (meso?.name || meso?.type || "ohjelma").replace(/[^\wäöåÄÖÅ-]+/g, "-");
    downloadFile(`leve-raportti-${baseName}-${todayISO()}.md`, md, "text/markdown;charset=utf-8");
    showToast("Raportti ladattu", "ok");

  // Backup
  const exportBtn = $("#btn-export-backup");

    a.href = url; a.download = `leve-coach-backup-${todayISO()}.json`;

  const importBtn = $("#btn-import-backup");
  if (importBtn) importBtn.addEventListener("click", () => $("#file-import")?.click());

  const fileInput = $("#file-import");
  if (fileInput) fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();

      await importFullBackup(data);

  if (csvBtn) csvBtn.addEventListener("click", () => $("#file-csv")?.click());

  const csvInput = $("#file-csv");
  if (csvInput) csvInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      // Simple auto-mapping: expects columns: date, movement, weight, reps, sets, vara
      const result = await importHistoricalCSV(text, {
        date: 0, movement: 1, weight: 2, reps: 3, sets: 4, vara: 5,

      await refresh();
      showToast(`Import: ${result.sessionsImported} sessiota, ${result.setsImported} sarjaa`, "ok");

      showToast("CSV import epäonnistui: " + err.message, "bad");

  // Wipe
  const wipeBtn = $("#btn-wipe");
  if (wipeBtn) wipeBtn.addEventListener("click", async () => {
    if (!confirm("Poistetaanko kaikki data pysyvästi?")) return;
    if (!confirm("Oletko varma? Tätä ei voi perua.")) return;
    await importFullBackup({}); // Clears everything
    await refresh();
    showToast("Data poistettu", "ok");
    render();

  // Tests
  const testBtn = $("#btn-run-tests");
  if (testBtn) testBtn.addEventListener("click", () => {
    const url = new URL(window.location.href);
    url.searchParams.set("test", "1");
    window.location.href = url.toString();
  });
}
