              <button class="btn btn-sm btn-outline" data-edit-video="${m.movementId}" style="font-size:11px;padding:4px 8px;min-height:28px" title="Lisää/muokkaa tutoriaalivideolinkki">🔗</button>

      </select>

// ─── Historia-apufunktiot (v4.27.6) ────────────────────────────────

/**
 * Readiness chip session-tasolla (samat säännöt kuin dashboardilla).
 * Palauttaa { label, cls } tai null jos dataa ei ole.
 */
function readinessChipForSession(sess) {
  if (!sess) return null;
  const lvl = sess.readinessCapLevel;
  if (lvl === 2) return { label: "RED", cls: "chip-red" };
  if (lvl === 1) return { label: "YELLOW", cls: "chip-yellow" };
  if (lvl === 0) return { label: "GREEN", cls: "chip-green" };
  return null;
}

/**
 * Kuinka monta työsettiä sessio sisälsi (ilman lämmittelyjä ja
 * readiness_test-primeriä). setRole:lla: "top"|"backoff"|"accessory" on
 * työsetti; "readiness_test"/"warmup" eivät.
 */
function workSetCountForSession(sessionId) {
  return state.allSets.filter(s =>
    s.sessionId === sessionId &&
    s.setRole !== "readiness_test" &&
    s.setRole !== "warmup"
  ).length;
}

/**
 * Palauttaa listan movementId:stä joille tämä sessio teki uuden
 * raaka-PR:n (loadKg × reps — ensimmäinen session/PR-set joka ylitti
 * kaikki aiemmat). Heuristiikka: per movement, session e1RM ylittää
 * kaikkien aiempien sessioiden korkeimman e1RM:n. Palauttaa
 * movementName-arrayn.
 */
function findPRsForSession(sessionId) {
  const sess = state.sessions.find(s => s.sessionId === sessionId);
  if (!sess) return [];
  const sessDate = sess.dateISO;
  const sessSets = state.allSets.filter(s => s.sessionId === sessionId && s.setRole !== "readiness_test" && s.setRole !== "warmup");
  if (sessSets.length === 0) return [];
  const byMovement = new Map();
  for (const s of sessSets) {
    if (!s.movementId) continue;
    const load = s.externalLoadKg || 0;
    const reps = s.reps || 0;
    if (load <= 0 || reps <= 0) continue;
    const vx = s.actualVx ?? 0;
    // Epley + Vara: load × (1 + (reps + Vx)/30)
    const e1 = load * (1 + (reps + vx) / 30);
    const cur = byMovement.get(s.movementId);
    if (!cur || e1 > cur) byMovement.set(s.movementId, e1);
  }
  const prs = [];
  for (const [movId, e1] of byMovement) {
    // Hae aiemmat e1RM:t tälle liikkeelle
    const earlier = state.allSets.filter(s =>
      s.movementId === movId &&
      s.sessionId !== sessionId &&
      s.setRole !== "readiness_test" &&
      s.setRole !== "warmup" &&
      (s.externalLoadKg || 0) > 0 &&
      (s.reps || 0) > 0
    );
    const earlierSessions = earlier.map(s => {
      const ses = state.sessions.find(x => x.sessionId === s.sessionId);
      return { dateISO: ses?.dateISO || "", e1: (s.externalLoadKg || 0) * (1 + ((s.reps || 0) + (s.actualVx ?? 0)) / 30) };
    }).filter(x => x.dateISO && x.dateISO < sessDate);
    if (earlierSessions.length === 0) continue; // ei vertailudataa → ei laskea PR:ksi
    const maxBefore = Math.max(...earlierSessions.map(x => x.e1));
    if (e1 > maxBefore + 0.1) {
      const mov = state.movements.find(m => m.movementId === movId);
      if (mov) prs.push(mov.name);
    }
  }
  return prs;
}

/**
 * Palauttaa true jos sessio vastaa nykyistä historyFilter-suodatinta.
 */
function matchesHistoryFilter(sess) {
  const f = state.historyFilter;
  if (!f) return true;
  if (f.dayType && sess.plannedDayType !== f.dayType) return false;
  if (f.mesocycleId && sess.mesocycleId !== f.mesocycleId) return false;
  if (f.dateFrom && (sess.dateISO || "") < f.dateFrom) return false;
  if (f.dateTo && (sess.dateISO || "") > f.dateTo) return false;
  if (f.movementId) {
    const has = state.allSets.some(s => s.sessionId === sess.sessionId && s.movementId === f.movementId);
    if (!has) return false;
  }
  return true;
}

/** Ryhmittele setit movementId:n mukaan, säilyttää järjestyksen. */
function groupSetsByMovement(sets) {
  const map = new Map();
  for (const s of sets) {
    const key = s.movementId || "__unknown__";
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(s);
  }
  return map;
}

function setRoleLabel(role) {
  switch (role) {
    case "top": return "Top";
    case "backoff": return "Back-off";
    case "accessory": return "Apuliike";
    case "readiness_test": return "Primer";
    case "warmup": return "Lämmittely";
    default: return role || "-";
  }
}

 */
/**
 * v4.34.45 — Mesosykli-detail-modaali (Historia-välilehden ohjelmakortin klikkaus).
 * Näyttää: nimi, alkupäivä, viikko-status, sessio-määrä, sessiolista.
 * Mahdollistaa: "Aktivoi tämä uudelleen" jos ohjelma ei ole aktiivinen.
 *
 * Atletin alkuperäinen huoli: "Ei riskiä että ohjelma vaihtuisi ja alkuperäinen
 * katoaisi" — tämä modaali näyttää että vanha ohjelma on tallessa ja antaa
 * yhden klikkauksen palauttaa sen.
 */
async function showMesocycleDetailModal(mesocycleId) {
  const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
  if (!meso) { showToast("Mesosykliä ei löydy", "bad"); return; }
  const tpl = MESOCYCLE_TEMPLATES.find(t => t.id === meso.type);
  const icon = tpl?.icon || "📋";
  const label = tpl?.label || meso.type || "Tuntematon";
  const isActive = meso.mesocycleId === state.mesocycle?.mesocycleId;
  const sessions = state.sessions
    .filter(s => s.mesocycleId === mesocycleId)
    .sort((a, b) => (b.dateISO || "").localeCompare(a.dateISO || ""));
  const sessionCount = sessions.length;
  const weekNum = isActive ? getMesocycleWeek(meso, todayISO()) : null;
  const weekStr = weekNum != null && weekNum > 0
    ? `Vk ${weekNum}/${meso.weekCount || "?"}`
    : (sessionCount > 0 ? "Arkistoitu" : "Ei aloitettu");

  // CFG-DRIFT-historiaa jos on (streetlifting tai movementCfg)
  const cfgDriftEntries = [
    ...((meso.streetliftingConfig?.cfgDriftHistory || [])),
    ...((meso.cfgDriftHistory || [])),
  ];

  // Movement-kalibrointi (uusi, custom-mesoille)
  const movementCfgEntries = Object.entries(meso.movementCfg || {});

  const sessionListHTML = sessions.length === 0
    ? `<div class="muted" style="font-size:12px;padding:8px;text-align:center">Ei sessioita tässä ohjelmassa</div>`
    : sessions.slice(0, 10).map(s => {
      const setCount = state.allSets.filter(set => set.sessionId === s.sessionId && set.setRole !== "readiness_test" && set.setRole !== "warmup").length;
      return `<div style="padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:4px;font-size:12px;margin-bottom:4px;cursor:pointer" data-meso-session="${s.sessionId}">
        <span style="font-weight:600">${formatDateShort(s.dateISO)}</span>
        <span class="muted">${setCount} sarjaa${s.mesocycleWeek ? ` · Vk ${s.mesocycleWeek}` : ""}</span>
      </div>`;
    }).join("") + (sessions.length > 10 ? `<div class="muted" style="font-size:11px;text-align:center;margin-top:4px">…ja ${sessions.length - 10} sessiota lisää</div>` : "");

  const calHTML = movementCfgEntries.length > 0
    ? `<div style="margin-top:10px;padding:8px;background:rgba(79,140,255,0.06);border-radius:4px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px">📊 Kalibrointi</div>
        ${movementCfgEntries.map(([name, cfg]) => `<div style="font-size:12px">${name}: <b>${cfg.e1rmExternal} kg</b></div>`).join("")}
      </div>`
    : (meso.streetliftingConfig?.calibration ? `<div style="margin-top:10px;padding:8px;background:rgba(79,140,255,0.06);border-radius:4px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px">📊 Kalibrointi</div>
        ${meso.streetliftingConfig.calibration.leukaExtKg ? `<div style="font-size:12px">Lisäpainoleuanveto: <b>${meso.streetliftingConfig.calibration.leukaExtKg} kg</b></div>` : ""}
        ${meso.streetliftingConfig.calibration.dippiExtKg ? `<div style="font-size:12px">Lisäpainodippi: <b>${meso.streetliftingConfig.calibration.dippiExtKg} kg</b></div>` : ""}
        ${meso.streetliftingConfig.calibration.kyykkyExtKg ? `<div style="font-size:12px">Takakyykky: <b>${meso.streetliftingConfig.calibration.kyykkyExtKg} kg</b></div>` : ""}
      </div>` : "");

  const driftHTML = cfgDriftEntries.length > 0
    ? `<div style="margin-top:10px;padding:8px;background:rgba(34,197,94,0.06);border-radius:4px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px">🚀 Engine oppi (${cfgDriftEntries.length})</div>
        ${cfgDriftEntries.slice(-3).reverse().map(d => `<div style="font-size:11px">${formatDateShort(d.dateISO)}: ${d.movName} ${d.fromCfg?.toFixed(1) || '?'} → <b>${d.toCfg?.toFixed(1) || '?'} kg</b> (+${(d.driftPct*100).toFixed(1)}%)</div>`).join("")}
      </div>`
    : "";

  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-sheet" style="max-width:480px;max-height:90vh;overflow-y:auto">
      <div class="modal-handle"></div>
      <div class="modal-title">${icon} ${label}</div>
      <div style="padding:0 4px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          ${isActive
            ? `<span class="chip chip-green" style="font-size:11px;padding:3px 10px">🟢 Aktiivinen</span>`
            : `<span class="chip" style="font-size:11px;padding:3px 10px;background:rgba(255,255,255,0.06)">📦 Arkistoitu</span>`}
          <span class="chip chip-acc" style="font-size:11px;padding:3px 10px">${weekStr}</span>
          <span class="chip chip-acc" style="font-size:11px;padding:3px 10px">${sessionCount} sessio${sessionCount === 1 ? "" : "ta"}</span>
        </div>
        <div class="muted" style="font-size:12px;margin-bottom:10px">

        </div>

        ${calHTML}
        ${driftHTML}

          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px">📅 Sessiot</div>

            ? `<button class="btn" disabled style="opacity:0.5;cursor:not-allowed">Jo aktiivinen</button>`
            : `<button class="btn" data-meso-activate>🔄 Aktivoi tämä uudelleen</button>`}
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => closeModal());
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

  // Sessio-kortin klikkaus → avaa session detail
  overlay.querySelectorAll("[data-meso-session]").forEach(el => {
    el.addEventListener("click", () => {
      const sid = el.dataset.mesoSession;
      closeModal();
      openSessionDetail(sid);
    });
  });

  // Aktivointi-painike
  const activateBtn = overlay.querySelector("[data-meso-activate]");
  if (activateBtn) {
    activateBtn.addEventListener("click", async () => {
      const oldTpl = MESOCYCLE_TEMPLATES.find(t => t.id === state.mesocycle?.type);
      const oldLabel = oldTpl?.label || state.mesocycle?.type || "Aktiivinen ohjelma";
      const ok = confirm(
        `Aktivoidaanko ohjelma uudelleen?\n\n` +
        `Nykyinen aktiivinen:\n  ${oldLabel}\n\n` +
        `Uusi aktiivinen:\n  ${label}\n\n` +
        `Nykyinen ohjelma säilyy Historia-välilehdellä. Voit vaihtaa milloin tahansa.`
      );
      if (!ok) return;
      try {
        await setActiveMesocycle(meso.mesocycleId);
        state.mesocycle = meso;
        await computeRecommendation();
        closeModal();
        showToast(`${icon} ${label} aktivoitu uudelleen`, "ok", 4000);
        render();
      } catch (e) {
        console.error("Mesosyklin aktivointi epäonnistui:", e);
        showToast("Aktivointi epäonnistui: " + e.message, "bad", 5000);
      }
    });
  }
}

async function openSessionDetail(sessionId) {
  const sess = state.sessions.find(s => s.sessionId === sessionId);
  if (!sess) { showToast("Sessiota ei löydy", "bad"); return; }
  const sets = state.allSets
    .filter(s => s.sessionId === sessionId)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));

  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";

  const rChip = readinessChipForSession(sess);
  const prs = findPRsForSession(sessionId);
  const workSets = sets.filter(s => s.setRole !== "readiness_test" && s.setRole !== "warmup");
  const primerSets = sets.filter(s => s.setRole === "readiness_test");

  // Ryhmittele työsetit liikkeen mukaan
  const grouped = groupSetsByMovement(workSets);

  const headerChips = [];
  if (rChip) headerChips.push(`<span class="chip ${rChip.cls}" style="font-size:10px;padding:1px 7px">${rChip.label}</span>`);

  if (sess.mesocycleWeek) headerChips.push(`<span class="chip chip-acc" style="font-size:10px;padding:1px 7px">Vk ${sess.mesocycleWeek}</span>`);

/**
 * Kerää mesosyklin mennet suunnitellut päivät joiden plan on toteutumatta.
 * v4.34.8 KÄYTTÄJÄPALAUTE: backfill ei toiminut kun mesosykli oli "ei ohjelmaa tänään"
 * -tilassa (mesocycle.startDateISO oli today, edellisen 7 päivän päivät putosivat ulos
 * weekNum=null -takia). Korjaus: palautetaan KAIKKI viimeisen 7 päivän päivät, status-
 * lipulla ("planned" / "out-of-range" / "no-mesocycle"). Modaali näyttää molemmat
 * kategoriat → out-of-range-päivien klikki tarjoaa auto-fix-säädön.
 *
 * Käyttäjäpalaute (suora lainaus): "ohjelmassa tulisi kyetä lisäämään edellisen 7
 * päivän treenit, mikäli on unohtunut. muuta tämä ominaisuus jotta ei lukisi 'ei
 * ohjelmaa tänään'"
 *
 * @param {number} daysBack — oletus 7 (= viimeinen viikko, käyttäjäpalauten mukaan)
 */
function collectAllMissedDays(daysBack = 7) {
  const executedPlans = new Set();
  for (const s of state.sessions) {
    const planISO = s.planSourceDateISO || s.dateISO;
    if (planISO) executedPlans.add(planISO);
  }
  const skipped = new Set(state.mesocycle?.skippedDays || []);
  const today = todayISO();
  const base = new Date(today);
  const out = [];
  for (let d = 1; d <= daysBack; d++) {
    const date = new Date(base);
    date.setDate(date.getDate() + -d);
    const iso = date.toISOString().slice(0, 10);
    if (executedPlans.has(iso)) continue;
    if (skipped.has(iso)) continue;
    const dow = date.getDay() || 7;
    // v4.34.8: AINA palautetaan päivä — status kertoo onko mesosyklissä vai ei
    if (!state.mesocycle) {
      out.push({ dateISO: iso, dayOfWeek: dow, weekNum: null, dayType: null, dayLabel: null, status: "no-mesocycle" });
      continue;
    }
    const weekNum = getMesocycleWeek(state.mesocycle, iso);
    if (weekNum === null) {
      // Päivä on mesosyklin ulkopuolella (ennen alkua tai jälkeen lopun)
      out.push({ dateISO: iso, dayOfWeek: dow, weekNum: null, dayType: null, dayLabel: null, status: "out-of-range" });
      continue;
    }
    const weekPlan = state.mesocycle.weekPlans?.find(w => w.week === weekNum);
    const dayPlan = weekPlan?.days?.find(x => x.dayOfWeek === dow);
    if (!dayPlan) {
      // Mesosyklin sisällä mutta tälle dayOfWeek:lle ei ole suunniteltu day plania
      // (esim. KE/PE/SU streetlifting_16w:ssä)
      out.push({ dateISO: iso, dayOfWeek: dow, weekNum, dayType: null, dayLabel: null, status: "no-day-plan" });
      continue;
    }
    out.push({ dateISO: iso, dayOfWeek: dow, weekNum, dayType: dayPlan.dayType, dayLabel: dayPlan.label || null, status: "planned" });
  }
  return out;
}

const KISALIIKKEET_NAMES = ["Lisäpainoleuanveto", "Muscle-up", "Lisäpainodippi", "Takakyykky"];

function isoWeekKey(dateISO) {
  if (!dateISO) return null;
  const d = new Date(dateISO.slice(0, 10) + "T00:00:00Z");
  const day = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - day + 3);
  const firstThu = d.getTime();
  const yStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const yDay = (yStart.getUTCDay() + 6) % 7;
  yStart.setUTCDate(yStart.getUTCDate() - yDay + 3);
  const week = 1 + Math.round((firstThu - yStart.getTime()) / 604800000);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2, "0")}`;
}

function daysAgoISO(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function linearRegressionSlope(ys) {
  const n = ys.length;
  if (n < 2) return 0;
  const xs = ys.map((_, i) => i);
  const mx = xs.reduce((a, b) => a + b, 0) / n;
  const my = ys.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (ys[i] - my); den += (xs[i] - mx) ** 2; }
  return den === 0 ? 0 : num / den;
}

function resampleWeeklyMaxE1RM(history) {
  const byWeek = new Map();
  for (const p of history) {
    const wk = isoWeekKey(p.dateISO);
    if (!wk) continue;
    const cur = byWeek.get(wk);
    if (!cur || p.e1rm > cur.e1rm) byWeek.set(wk, { wk, e1rm: p.e1rm, dateISO: p.dateISO });
  }
  return [...byWeek.values()].sort((a, b) => a.wk.localeCompare(b.wk));
}

function annotatePRs(weekly) {
  let max = -Infinity;
  return weekly.map(p => {
    const isPR = p.e1rm > max;
    if (isPR) max = p.e1rm;
    return { ...p, isPR };
  });
}

/**
 * Piirrä e1RM sparkline SVG inline. Series: [{ e1rm, isPR }], opts: { height, downturn }
 */
function drawE1RMSparkline(series, opts = {}) {
  const w = 362, h = opts.height || 110, padL = 6, padR = 6, padT = 16, padB = 10;
  const iw = w - padL - padR, ih = h - padT - padB;
  if (series.length < 2) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei riittävästi dataa</text></svg>`;
  }
  const vals = series.map(p => p.e1rm);
  const min = Math.min(...vals) * 0.97;
  const max = Math.max(...vals) * 1.03;
  const range = max - min || 1;
  const xStep = iw / (series.length - 1);

  const points = series.map((p, i) => ({
    x: padL + i * xStep,
    y: padT + ih - ((p.e1rm - min) / range) * ih,
    isPR: p.isPR,
  }));
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  const areaD = pathD + ` L${points[points.length-1].x.toFixed(1)},${(padT+ih)} L${padL},${padT+ih} Z`;

  // 4-week moving avg
  const avgPts = points.map((p, i) => {
    const s = Math.max(0, i - 3);
    const slice = vals.slice(s, i + 1);
    const avg = slice.reduce((a, b) => a + b, 0) / slice.length;
    return { x: p.x, y: padT + ih - ((avg - min) / range) * ih };
  });
  const avgD = avgPts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");

  const downturn = !!opts.downturn;
  const line = downturn ? "var(--bad)" : "var(--acc)";
  const fill0 = downturn ? "#ef4444" : "#4f8cff";
  const gid = "spark-grad-" + Math.random().toString(36).slice(2, 8);
  const prPts = points.filter(p => p.isPR);
  const last = points[points.length - 1];

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${fill0}" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="${fill0}" stop-opacity="0"/>
    </linearGradient></defs>
    ${[0.25, 0.5, 0.75].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1"/>`).join("")}
    <path d="${areaD}" fill="url(#${gid})"/>
    <path d="${avgD}" fill="none" stroke="var(--dim)" stroke-width="1.3" stroke-dasharray="3 3"/>
    <path d="${pathD}" fill="none" stroke="${line}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${prPts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--ok)" stroke="var(--bg)" stroke-width="1.5"/>`).join("")}
    <circle cx="${last.x}" cy="${last.y}" r="4" fill="${line}" stroke="var(--bg)" stroke-width="2"/>
  </svg>`;
}

/**
 * Piirrä kehonpaino-sparkline (ei PR-merkkejä, pelkkä trendi)
 */
function drawBodyweightSparkline(series) {
  const w = 362, h = 86, padL = 6, padR = 6, padT = 10, padB = 10;
  const iw = w - padL - padR, ih = h - padT - padB;
  if (series.length < 2) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei riittävästi dataa</text></svg>`;
  }
  const vals = series.map(p => p.v);
  const mn = Math.min(...vals) - 0.3, mx = Math.max(...vals) + 0.3;
  const range = mx - mn || 1;
  const xStep = iw / (series.length - 1);
  const pts = series.map((p, i) => ({ x: padL + i * xStep, y: padT + ih - ((p.v - mn) / range) * ih }));
  const pathD = pts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    ${[0.5].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 3"/>`).join("")}
    <path d="${pathD}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="3.5" fill="var(--acc)" stroke="var(--bg)" stroke-width="2"/>
  </svg>`;
}

/**
 * Stack-palkkikaavio viikkovolyymille. volByWeek: [{ wk, byCat: {cat: sets} }]
 * filter: "all" tai kategorian nimi. Jos yksittäinen, näyttää MRV-viivan.
 */
function drawVolumeStack(volByWeek, filter) {
  const w = 362, h = 170, padL = 18, padR = 6, padT = 10, padB = 18;
  const iw = w - padL - padR, ih = h - padT - padB;
  const n = volByWeek.length;
  if (n === 0) {
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"><text x="${w/2}" y="${h/2}" fill="var(--dim)" font-size="11" text-anchor="middle">Ei dataa</text></svg>`;
  }
  const isAll = filter === "all";
  const cats = Object.keys(CATEGORY_COLORS);

  const totals = volByWeek.map(wk => isAll
    ? cats.reduce((a, c) => a + (wk.byCat[c] || 0), 0)
    : (wk.byCat[filter] || 0));
  const mrv = isAll ? 0 : (MRV_SETS_PER_CATEGORY[filter] || 20);
  const barMax = isAll
    ? Math.max(...totals, 1) * 1.08
    : Math.max(mrv * 1.25, Math.max(...totals, 1) * 1.1);

  const xStep = iw / n;
  const barW = Math.min(22, xStep * 0.72);

  const bars = volByWeek.map((wk, i) => {
    let yCursor = padT + ih;
    const x = padL + i * xStep + (xStep - barW) / 2;
    const segs = isAll ? cats : [filter];
    const stacks = segs.map(cat => {
      const v = wk.byCat[cat] || 0;
      if (v === 0) return "";
      const segH = (v / barMax) * ih;
      yCursor -= segH;
      let color = CATEGORY_COLORS[cat] || "#5a6a8a";
      if (!isAll && v > mrv) color = "var(--bad)";
      return `<rect x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${barW}" height="${segH.toFixed(1)}" fill="${color}" rx="1"/>`;
    }).join("");
    const isLast = i === n - 1;
    const topLabel = isLast && totals[i] > 0
      ? `<text x="${(padL + i * xStep + xStep/2).toFixed(1)}" y="${(yCursor - 3).toFixed(1)}" font-size="10" fill="var(--fg)" font-weight="700" text-anchor="middle">${totals[i]}</text>`
      : "";
    const lbl = i % 2 === 0
      ? `<text x="${(padL + i * xStep + xStep/2).toFixed(1)}" y="${h - 4}" font-size="9" fill="var(--dim)" text-anchor="middle">${i + 1}</text>`
      : "";
    return stacks + topLabel + lbl;
  }).join("");

  let mrvLine = "", mrvLabel = "";
  if (!isAll && mrv > 0) {
    const mrvY = padT + ih - (mrv / barMax) * ih;
    mrvLine = `<line x1="${padL}" x2="${w-padR}" y1="${mrvY}" y2="${mrvY}" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="4 3"/>`;
    mrvLabel = `<text x="${w-padR-2}" y="${mrvY - 4}" font-size="9" fill="var(--warn)" text-anchor="end" font-weight="700">MRV ${mrv}</text>`;
  }

  const yTicks = [
    { v: 0, y: padT + ih },
    { v: Math.round(barMax), y: padT },
  ];
  const yAxis = yTicks.map(t => `<text x="${padL - 3}" y="${(t.y + 3).toFixed(1)}" font-size="9" fill="var(--dim)" text-anchor="end">${t.v}</text>`).join("");

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${[0.25, 0.5, 0.75].map(f => `<line x1="${padL}" x2="${w-padR}" y1="${padT+ih*f}" y2="${padT+ih*f}" stroke="var(--border)" stroke-width="1"/>`).join("")}
    ${yAxis}
    ${bars}
    ${mrvLine}${mrvLabel}
    <line x1="${padL}" x2="${w-padR}" y1="${padT+ih}" y2="${padT+ih}" stroke="var(--border2)" stroke-width="1"/>
    <text x="${padL}" y="${h-4}" font-size="9" fill="var(--dim)">vk</text>
  </svg>`;
}

function renderProgress() {
  const range = state.progressRange || "16";
  const rangeWeeks = range === "all" ? 999 : parseInt(range);
  const filter = state.progressVolFilter || "all";
  const bw = state.latestBodyweight || state.settings?.bodyweightKg || 91;

  // ── KPI strip ──
  const weekAgo = daysAgoISO(7);
  const prs7 = (state.prs || []).filter(p => (p.dateISO || "") >= weekAgo).length;
  const sessionMap = new Map(state.sessions.map(s => [s.sessionId, s]));
  const recentSets = state.allSets.filter(s => {
    const sess = sessionMap.get(s.sessionId);
    return sess && (sess.dateISO || "") >= weekAgo;
  });
  const sessionsSet = new Set(recentSets.map(s => s.sessionId));
  const sessions7 = sessionsSet.size;
  const tonnage7 = recentSets.reduce((sum, s) => sum + (s.externalLoadKg || 0) * (s.reps || 0), 0);
  const tonnageStr = tonnage7 >= 1000 ? `${(tonnage7/1000).toFixed(1)}t` : `${Math.round(tonnage7)}kg`;

  // v4.32.5 (#4): Treenin keskimääräinen kesto (outlier-suoja: trimmataan
  // ylin + alin 10 % jos sessioita >= 5). Koskee sessioita joilla durationMin
  // on numerollinen ja > 0. Katkaisu 5 min - 240 min suojaa selvistä virheistä
  // (puhelin auki yön yli yms.).
  const durationsAll = (state.sessions || [])
    .map(s => s.durationMin)
    .filter(d => typeof d === "number" && d >= 5 && d <= 240);
  let avgDurationMin = null;
  let avgDurationN = 0;
  if (durationsAll.length >= 1) {
    let trimmed = [...durationsAll];
    if (durationsAll.length >= 5) {
      // Trimmaa ylin + alin 10 % outlier-suoja
      trimmed = [...durationsAll].sort((a, b) => a - b);
      const k = Math.floor(durationsAll.length * 0.1);
      trimmed = trimmed.slice(k, durationsAll.length - k);
    }
    avgDurationMin = Math.round(trimmed.reduce((a, b) => a + b, 0) / trimmed.length);
    avgDurationN = trimmed.length;
  }
  const durationStr = avgDurationMin != null ? `${avgDurationMin}` : "–";

  // ── e1RM sparklines for kisaliike ──
  const moveCards = KISALIIKKEET_NAMES.map(name => {
    const mov = state.movements.find(m => m.name === name);
    if (!mov) return null;
    const sets = state.allSets.filter(s => s.movementId === mov.movementId);
    if (sets.length === 0) return null;
    // v4.34.34 BUG 1 -fix: anna mov-objekti
    const history = computeMovementE1RMHistory(sets, state.sessions, mov, bw);
    if (history.length === 0) return null;
    const weekly = resampleWeeklyMaxE1RM(history);
    const sliced = rangeWeeks >= weekly.length ? weekly : weekly.slice(-rangeWeeks);
    const annotated = annotatePRs(sliced);
    return { mov, sets, annotated, fullWeekly: weekly };
  }).filter(Boolean);

  const moveCardsHTML = moveCards.map(({ mov, sets, annotated, fullWeekly }) => {
    const n = annotated.length;
    const current = n > 0 ? annotated[n-1].e1rm : 0;
    const first = n > 0 ? annotated[0].e1rm : 0;
    const delta = current - first;
    const allVals = annotated.map(p => p.e1rm);
    const minV = allVals.length ? Math.min(...allVals) : 0;
    const maxV = allVals.length ? Math.max(...allVals) : 0;

    // PR: find last isPR across entire history (not just range)
    const fullAnn = annotatePRs(fullWeekly);
    const lastPR = [...fullAnn].reverse().find(p => p.isPR);

    // Stagnation: weeks since last PR
    let stagnWeeks = 0;
    if (lastPR) {
      const lastPRIdx = fullAnn.lastIndexOf(lastPR);
      stagnWeeks = fullAnn.length - 1 - lastPRIdx;
    }
    const isStagnated = stagnWeeks >= 3;
    const trendDown = n >= 2 && annotated[n-1].e1rm < annotated[Math.max(0, n-3)].e1rm;
    const showRed = isStagnated || trendDown;

    const deltaHTML = isStagnated
      ? `<div class="d down">↓ stagnaatio ${stagnWeeks} vk</div>`
      : delta > 0.1
        ? `<div class="d up">↑ +${delta.toFixed(1)} kg</div>`
        : delta < -0.1
          ? `<div class="d down">↓ ${delta.toFixed(1)} kg</div>`
          : `<div class="d" style="color:var(--muted)">±0</div>`;

    const prStr = lastPR
      ? `PR <b class="text-ok">${lastPR.e1rm.toFixed(1)} kg</b>`
      : `PR <b class="muted">–</b>`;

    return `<div class="card move-card">
      <div class="move-head">
        <div>
          <div class="move-name"><span class="star">⭐</span>${mov.name}</div>
          <div class="move-cat">${mov.category} · ${sets.length} sarjaa</div>
        </div>
        <div class="move-cur">
          <div class="v">${current.toFixed(1)}<small>kg</small></div>
          ${deltaHTML}
        </div>
      </div>
      <div class="sparkline-wrap">${drawE1RMSparkline(annotated, { downturn: showRed })}</div>
      <div class="spark-x-labels"><span>Vk 1</span><span>Vk ${Math.ceil(n/2)}</span><span>Vk ${n}</span></div>
      <div class="spark-stats">
        <span>Min <b>${minV.toFixed(1)}</b></span>
        <span>${prStr}</span>
        <span>Viim. <b>${current.toFixed(1)}</b></span>
      </div>
    </div>`;
  }).join("");

  // ── Volume stack ──
  // Group sets by ISO week + category. Count only non-warmup sets.
  const movementMap = new Map(state.movements.map(m => [m.movementId, m]));
  const volMap = new Map(); // wk -> { cat: sets }
  for (const s of state.allSets) {
    if (s.isWarmup) continue;
    const sess = sessionMap.get(s.sessionId);
    if (!sess) continue;
    const wk = isoWeekKey(sess.dateISO);
    if (!wk) continue;
    const mov = movementMap.get(s.movementId);
    const cat = mov?.category || "muu";
    if (!volMap.has(wk)) volMap.set(wk, {});
    const byCat = volMap.get(wk);
    byCat[cat] = (byCat[cat] || 0) + 1;
  }
  const allWeeks = [...volMap.entries()].map(([wk, byCat]) => ({ wk, byCat })).sort((a, b) => a.wk.localeCompare(b.wk));
  const volWeeks = rangeWeeks >= allWeeks.length ? allWeeks : allWeeks.slice(-rangeWeeks);

  const volFilterBtns = ["all", ...Object.keys(CATEGORY_COLORS)].map(cat => {
    const label = cat === "all" ? "Kaikki" : CATEGORY_LABELS_SHORT[cat] || cat;
    const active = filter === cat ? "active" : "";
    return `<button class="${active}" data-vol-filter="${cat}">${label}</button>`;
  }).join("");

  const volSvg = drawVolumeStack(volWeeks, filter);

  let volLegend = "";
  if (filter === "all") {
    volLegend = Object.keys(CATEGORY_COLORS).map(cat =>
      `<span class="lg"><span class="sw" style="background:${CATEGORY_COLORS[cat]}"></span>${CATEGORY_LABELS_SHORT[cat] || cat}</span>`
    ).join("");
  } else {
    const mrv = MRV_SETS_PER_CATEGORY[filter] || 20;
    volLegend = `<span class="lg"><span class="sw" style="background:${CATEGORY_COLORS[filter]}"></span>${CATEGORY_LABELS_SHORT[filter]} (MRV ${mrv})</span>
      <span class="lg"><span class="sw" style="background:var(--bad)"></span>Yli MRV</span>`;
  }

  const latestTotals = volWeeks.length ? volWeeks[volWeeks.length - 1].byCat : {};
  const overCount = Object.keys(CATEGORY_COLORS).filter(cat => (latestTotals[cat] || 0) > (MRV_SETS_PER_CATEGORY[cat] || 99)).length;
  const overChip = overCount > 0
    ? `<span class="chip" style="color:var(--bad);border-color:var(--bad)">⚠ ${overCount} yli MRV</span>`
    : "";

  // ── Bodyweight card ──
  const bwMeasurements = (state.allBodyweights || []).filter(m => m.dateISO && m.value)
    .sort((a, b) => a.dateISO.localeCompare(b.dateISO));
  let bwHTML = "";
  if (bwMeasurements.length >= 2) {
    const bwByWeek = new Map();
    for (const m of bwMeasurements) {
      const wk = isoWeekKey(m.dateISO);
      if (!bwByWeek.has(wk)) bwByWeek.set(wk, []);
      bwByWeek.get(wk).push(m.value);
    }
    const bwWeekly = [...bwByWeek.entries()]
      .map(([wk, vals]) => ({ wk, v: vals.reduce((a, b) => a + b, 0) / vals.length }))
      .sort((a, b) => a.wk.localeCompare(b.wk));
    const bwSliced = rangeWeeks >= bwWeekly.length ? bwWeekly : bwWeekly.slice(-rangeWeeks);
    const current = bwSliced[bwSliced.length - 1].v;
    const first = bwSliced[0].v;
    const dlt = current - first;
    const slope = linearRegressionSlope(bwSliced.map(p => p.v));
    const slopeCls = slope < -0.02 ? "text-ok" : slope > 0.02 ? "text-bad" : "";
    const last7 = bwMeasurements.slice(-7).map(m => m.value);
    const avg7 = last7.reduce((a, b) => a + b, 0) / last7.length;
    const variance = Math.sqrt(last7.reduce((a, b) => a + (b - avg7) ** 2, 0) / last7.length);

    bwHTML = `<div class="section-header">Kehonpaino</div>
      <div class="card" style="padding:12px 14px">
        <div class="flex-between" style="align-items:baseline">
          <div>
            <div class="card-title" style="margin-bottom:0">KEHONPAINO · ${bwSliced.length} VK</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${first.toFixed(1)} → ${current.toFixed(1)} kg · <span class="${dlt < 0 ? 'text-ok' : dlt > 0 ? 'text-bad' : ''}">${dlt > 0 ? '+' : ''}${dlt.toFixed(1)} kg</span></div>
          </div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">${current.toFixed(1)}<small style="font-size:11px;color:var(--muted);font-weight:600;margin-left:2px">kg</small></div>
        </div>
        <div class="sparkline-wrap">${drawBodyweightSparkline(bwSliced)}</div>
        <div class="spark-stats">
          <span>7pv ka <b>${avg7.toFixed(1)}</b></span>
          <span>Vaihtelu <b>±${variance.toFixed(1)}</b></span>
          <span>Trend <b class="${slopeCls}">${slope >= 0 ? '↑' : '↓'} ${Math.abs(slope).toFixed(2)} kg/vk</b></span>
        </div>
      </div>`;
  }

  return `<div class="fade-in">
    <div class="section-header">📈 Edistyminen</div>

    <div class="kpi-strip">
      <div class="kpi-card-p ${prs7 >= 1 ? 'ok' : ''}">
        <div class="k">${prs7}</div>
        <div class="kl">PR · 7 pv</div>
      </div>
      <div class="kpi-card-p ${sessions7 >= 3 ? 'ok' : sessions7 >= 1 ? 'warn' : ''}">
        <div class="k">${sessions7}<small>tr</small></div>
        <div class="kl">Treenit · 7 pv</div>
      </div>
      <div class="kpi-card-p">
        <div class="k">${tonnageStr}</div>
        <div class="kl">Tonnage · 7 pv</div>
      </div>
      <div class="kpi-card-p" title="${avgDurationN > 0 ? `Keskiarvo ${avgDurationN} treenistä (outlier-suoja: ylin+alin 10 % trimmattu kun N≥5)` : "Ei kestodataa vielä"}">
        <div class="k">${durationStr}<small>min</small></div>
        <div class="kl">Kesto ka${avgDurationN >= 5 ? " ✂" : ""}</div>
      </div>
    </div>

    <div class="range-tabs" id="progress-range-tabs">
      ${["4", "8", "16", "all"].map(r =>
        `<button class="${range === r ? 'active' : ''}" data-range="${r}">${r === "all" ? "Kaikki" : r + " vk"}</button>`
      ).join("")}
    </div>

    ${moveCardsHTML || '<div class="card"><div class="muted">Ei e1RM-dataa kisaliikkeille. Tee sarjoja nähdäksesi trendit.</div></div>'}

    ${(() => {
      // v4.30.3: Ennuste kisaan -kortti — vain streetlifting_16w-mesosyklin yhteydessä
      const meso = state.mesocycle;
      if (!meso || meso.type !== "streetlifting_16w") return "";
      const rec = state.recommendation;
      const currentWeek = typeof rec?.weekNum === "number" ? rec.weekNum : null;
      if (!currentWeek) return "";
      const totalWeeks = meso.weekCount || 16;
      // Kerää e1RM-historia per kilpailuliike — streetlifting-kisaliikkeet (MU + Leuka + Dippi + Kyykky).
      // v4.32.7 bugfix: aiemmassa listassa oli Maastaveto (väärin) mutta ei Muscle-upia (väärin).
      // v4.32.4 (F): jos sets-historia tyhjä, fallback PR-rekisteriin → ennuste-kortti
      // aktivoituu vk 1:llä yhdellä mittauspisteellä (PR), ei vasta 3+ treenin jälkeen.
      const COMP_LIFTS = KISALIIKKEET_NAMES;
      const historyByMovement = {};
      const todayStr = todayISO();
      for (const liftName of COMP_LIFTS) {
        const mov = state.movements.find(m => m.name === liftName);
        if (!mov) continue;
        const liftSets = state.allSets.filter(s => s.movementId === mov.movementId);
        let hist = [];
        if (liftSets.length > 0) {
          // v4.34.34 BUG 1 -fix: anna mov-objekti
          hist = computeMovementE1RMHistory(liftSets, state.sessions, mov, bw);
        }
        // Fallback: jos historia tyhjä mutta PR-rekisterissä on liike, lisää PR-piste
        if (hist.length === 0) {
          const prs = (state.prs || [])
            .filter(p => p.movementName === liftName && p.value > 0)
            .sort((a, b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
          if (prs.length > 0) {
            const bestPR = prs[prs.length - 1]; // viimeisin
            hist = [{ dateISO: bestPR.dateISO || todayStr, e1rm: bestPR.value, load: bestPR.value, reps: 1 }];
          }
        }
        if (hist.length > 0) historyByMovement[liftName] = hist;
      }
      const projection = computeStreetliftingFinalProjection(historyByMovement, currentWeek, totalWeeks);
      if (!projection) return "";
      const liftLabels = {
        "Lisäpainoleuanveto": "Leuanveto",
        "Muscle-up": "MU",
        "Lisäpainodippi": "Dippi",
        "Takakyykky": "Kyykky",
      };
      const confidenceLabels = {
        "high": "vahva",
        "medium": "kohtalainen",
        "low": "alustava",
        "exact": "tarkka",
      };
      const rowsHTML = Object.entries(projection).map(([liftName, p]) => {
        const gainSign = p.gainKg >= 0 ? "+" : "";
        const gainCls = p.gainKg > 0 ? "text-ok" : p.gainKg < 0 ? "text-bad" : "";
        return `<div style="padding:10px 0;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">
            <div style="font-weight:700;font-size:14px">${liftLabels[liftName] || liftName}</div>
            <div style="font-size:11px;color:var(--muted)">Ennuste ${confidenceLabels[p.confidence] || p.confidence} · ${p.weeksRemaining} vk jäljellä</div>
          </div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
            <div style="font-size:12px;color:var(--muted)">Nyt</div>
            <div style="font-weight:600;font-size:15px">${p.current} kg</div>
            <div style="font-size:12px;color:var(--muted)">→</div>
            <div style="font-weight:800;font-size:18px;color:var(--acc)">${p.predicted} kg</div>
            <div style="font-size:12px" class="${gainCls}">${gainSign}${p.gainKg} kg (${gainSign}${p.gainPct} %)</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:6px;font-size:12px">
            <div style="background:rgba(255,255,255,0.03);padding:6px;border-radius:6px;text-align:center">
              <div style="font-size:10px;color:var(--muted)">Kisa-opener</div>
              <div style="font-weight:700">${p.opener} kg</div>
            </div>
            <div style="background:rgba(255,255,255,0.03);padding:6px;border-radius:6px;text-align:center">
              <div style="font-size:10px;color:var(--muted)">2. yritys</div>
              <div style="font-weight:600">${p.second} kg</div>
            </div>
            <div style="background:rgba(245,158,11,0.08);padding:6px;border-radius:6px;text-align:center;border:1px solid rgba(245,158,11,0.3)">
              <div style="font-size:10px;color:var(--muted)">3. yritys (PR)</div>
              <div style="font-weight:800;color:var(--acc)">${p.third} kg</div>
            </div>
          </div>
        </div>`;
      }).join("");
      return `<div class="card" style="margin-top:12px;border-color:rgba(139,92,246,0.4);background:linear-gradient(135deg,rgba(139,92,246,0.06),rgba(59,130,246,0.04))">
        <div class="card-title" style="display:flex;align-items:center;gap:6px">🎯 Ennuste kisaan
          <span style="font-size:11px;font-weight:400;color:var(--muted)">(vk ${currentWeek}/${totalWeeks})</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.4">
          Block-aware ennuste käyttäjäsi todellisesta etenemistahdista. Peaking-vaiheessa (viim. 4 vk) gain-rate puolitetaan — realization toteuttaa olemassa olevia gainsia, ei tuota uusia. Deload-viikot (4, 8, 12) eivät kasvata e1RM:ää.
        </div>
        ${rowsHTML}
        <div style="font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.4">
          💡 Ennuste perustuu historialliseen tahtiisi (jos ≥3 mittauspistettä) tai oletukseen 0,5 % / vk edistyneelle harjoittelijalle. Vahva ennuste = 6+ mittauspistettä. Kisa-yritysten kuormat = 88 % / 95 % / 102 % ennustetusta loppu-e1RM:stä (Helms, IPF World Classic 2021 -voittaja-aineisto).
        </div>
      </div>`;
    })()}

    <div class="section-header">Viikkovolyymi (hard sets)</div>
    <div class="card vol-card">
      <div class="flex-between" style="margin-bottom:6px">
        <div class="card-title" style="margin:0">SARJAT KATEGORIOITTAIN</div>
        ${overChip}
      </div>
      <div class="vol-filter" id="progress-vol-filter">${volFilterBtns}</div>
      ${volSvg}
      <div class="vol-legend">${volLegend}</div>
    </div>

    ${bwHTML}

    <div class="muted" style="text-align:center;margin-top:14px;font-size:11px">
      Per-liike-detalji: <button class="btn btn-sm btn-outline" data-nav="trends" style="font-size:11px">Trendit per liike →</button>
    </div>
  </div>`;
}

function renderTrends() {
  const bw = state.settings?.bodyweightKg || 91;

  // Compute e1RM for all movements that have data
  // v4.34.34 BUG 1 -fix: anna koko movement-objekti computeMovementE1RMHistory:lle
  const movementTrends = [];
  for (const m of state.movements) {
    const sets = state.allSets.filter(s => s.movementId === m.movementId);
    if (sets.length === 0) continue;
    const history = computeMovementE1RMHistory(sets, state.sessions, m, bw);
    if (history.length === 0) continue;
    const current = history[history.length - 1].e1rm;
    const first = history[0].e1rm;
    const change = history.length > 1 ? current - first : 0;
    movementTrends.push({ movement: m, history, current, change, totalSets: sets.length });
  }

  // Sort: primary first, then by total sets descending
  movementTrends.sort((a, b) => {
    if (a.movement.isPrimary && !b.movement.isPrimary) return -1;
    if (!a.movement.isPrimary && b.movement.isPrimary) return 1;
    return b.totalSets - a.totalSets;
  });

  return `<div class="fade-in">
    <div class="section-header">Trendit</div>

    ${movementTrends.length === 0 ? '<div class="card"><div class="muted">Ei dataa — tee treenejä nähdäksesi trendit</div></div>' : ""}

    ${movementTrends.map(mt => {
      const changeStr = mt.change > 0 ? `<span class="text-ok">+${mt.change.toFixed(1)}</span>` : mt.change < 0 ? `<span class="text-bad">${mt.change.toFixed(1)}</span>` : `<span class="dim">±0</span>`;
      // v4.34.34 BUG 1 -fix: e1RM-label tunnistus loadType-kentästä (system/external),
      // tähti-emoji säilyy isPrimary-flagilla (= UI-merkintä "tämä on Lisäpainoleuanveto").
      const isStarred = mt.movement.isPrimary;
      const isSysLoad = isSystemLoadMovement(mt.movement);
      const label = isSysLoad ? "e1RM system (kg)" : "e1RM (kg)";

      return `<div class="card">
        <div class="flex-between">
          <div>
            <div style="font-weight:600">${isStarred ? "⭐ " : ""}${mt.movement.name}</div>
            <div class="muted" style="font-size:11px">${mt.movement.category} | ${mt.totalSets} sarjaa</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700">${mt.current.toFixed(1)}</div>
            <div class="muted" style="font-size:11px">${label} ${changeStr}</div>
          </div>
        </div>
        ${mt.history.length > 1 ? renderMiniChart(mt.history) : ""}
        <div class="accordion-header" data-toggle="trend-${mt.movement.movementId}">
          <span class="muted">Historia (${mt.history.length})</span><span>▼</span>
        </div>
        <div class="accordion-body" id="trend-${mt.movement.movementId}">
          <table>
            <tr><th>Pvm</th><th>Paino</th><th>Toistot</th><th>e1RM</th></tr>
            ${mt.history.slice(-10).map(p => `<tr><td>${formatDateShort(p.dateISO)}</td><td>${p.load} kg</td><td>${p.reps}</td><td>${p.e1rm.toFixed(1)}</td></tr>`).join("")}
          </table>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderMiniChart(history) {
  // Simple CSS bar chart
  if (history.length < 2) return "";
  const values = history.slice(-12).map(h => h.e1rm);
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  return `<div style="display:flex;align-items:end;gap:2px;height:40px;margin:8px 0">
    ${values.map(v => {
      const pct = ((v - min) / range) * 100;
      const h = Math.max(4, pct * 0.4);
      return `<div style="flex:1;height:${h}px;background:var(--acc);border-radius:2px 2px 0 0;min-width:4px" title="${v.toFixed(1)}"></div>`;
    }).join("")}
  </div>`;
}

function csvEscape(v) {
  if (v === null || v === undefined) return "";
  const s = String(v);
  if (/[",\n;]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

const BLOCK_TUNING_HISTORY_KEY = "leve-coach-block-tuning-history";
const BLOCK_TUNING_HISTORY_MAX = 5;

function loadBlockTuningHistory() {
  try {
    const raw = localStorage.getItem(BLOCK_TUNING_HISTORY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return [];
  }
}

function saveBlockTuningSnapshot(pkg) {
  try {
    const history = loadBlockTuningHistory();
    history.unshift({
      meta: pkg.meta,
      markdown: pkg.markdown,
      json: pkg.json,
      prompt: pkg.prompt,
      savedAt: new Date().toISOString(),
    });
    const trimmed = history.slice(0, BLOCK_TUNING_HISTORY_MAX);
    localStorage.setItem(BLOCK_TUNING_HISTORY_KEY, JSON.stringify(trimmed));
  } catch (e) {
    console.warn("[BlockTuning] history save failed:", e);
  }
}

function copyToClipboard(text, successMsg = "Kopioitu") {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast(successMsg, "ok", 2000),
      () => fallbackCopy(text, successMsg)
    );
  } else {
    fallbackCopy(text, successMsg);
  }
}

function fallbackCopy(text, successMsg) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); showToast(successMsg, "ok", 2000); }
  catch (e) { showToast("Kopiointi epäonnistui — kopioi manuaalisesti", "bad"); }
  document.body.removeChild(ta);
}

function dayOfWeekShort(iso) {
  if (!iso) return "";
  const d = ["Su","Ma","Ti","Ke","To","Pe","La"];
  return d[new Date(iso).getDay()];
}

function filterSessionsForExport(scope, mesocycleId, fromISO, toISO) {
  let sessions = [...state.sessions];
  if (scope === "mesocycle" && mesocycleId) {
    sessions = sessions.filter(s => s.mesocycleId === mesocycleId);
  } else if (scope === "range") {
    if (fromISO) sessions = sessions.filter(s => (s.dateISO || "") >= fromISO);
    if (toISO)   sessions = sessions.filter(s => (s.dateISO || "") <= toISO);
  }
  return sessions.sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
}

function buildCSVExport({ scope, mesocycleId, fromISO, toISO }) {
  const sessions = filterSessionsForExport(scope, mesocycleId, fromISO, toISO);
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));
  const mesoById = new Map((state.allMesocycles || []).map(m => [m.mesocycleId, m]));
  const sessById = new Map(sessions.map(s => [s.sessionId, s]));

  const header = [
    "Pvm","Vk","Mesosykli","Päivä","Päivätyyppi","Liike","Rooli",
    "Sarja #","Toistot","Toistotavoite","Kuorma (kg)","BW (kg)","System load",
    "Vx tavoite","Vx toteutunut","Velocity (m/s)",
    "e1RM ext","e1RM sys","Readiness cap","Muistiinpano","Aikaleima",
  ];
  const rows = [header.map(csvEscape).join(",")];

  // Sarjat päivä+sessio+timestamp-järjestyksessä, sarjanumerointi per (sessio, liike)
  const sortedSets = [...sets].sort((a,b) => {
    const sa = sessById.get(a.sessionId), sb = sessById.get(b.sessionId);
    const da = (sa?.dateISO || ""), db = (sb?.dateISO || "");
    if (da !== db) return da.localeCompare(db);
    return (a.timestamp || "").localeCompare(b.timestamp || "");
  });

  const setCounter = new Map(); // key = sessionId+movementId
  for (const set of sortedSets) {
    const sess = sessById.get(set.sessionId);
    if (!sess) continue;
    const mov = movById.get(set.movementId);
    const meso = mesoById.get(sess.mesocycleId);
    const key = `${set.sessionId}|${set.movementId}`;
    const n = (setCounter.get(key) || 0) + 1;
    setCounter.set(key, n);
    // v4.34.34 BUG 1 -fix: CSV-export käyttää loadType:ta, ei isPrimary-flagia.
    // Aiempi rivi sekoitti UI-tason "tämä on leuka" -flagin ja teknisen
    // "lisätäänkö BW e1RM-laskuun" -kysymyksen.
    const isSystemRow = isSystemLoadMovement(mov);
    const bw = sess.bodyweightKg || state.latestBodyweight || 91;
    const load = set.externalLoadKg || 0;
    const systemLoad = isSystemRow ? (bw + load) : load;
    const e1rmExt = isSystemRow ? e1rmExternal(bw, load, set.reps, set.actualVx)
                                : e1rmAccessory(load, set.reps, set.actualVx);
    const e1rmSys = isSystemRow ? e1rmSystem(bw, load, set.reps, set.actualVx)
                                : e1rmAccessory(load, set.reps, set.actualVx);
    const readinessLabel = sess.readinessCapLevel === 2 ? "RED"
                         : sess.readinessCapLevel === 1 ? "YELLOW"
                         : sess.readinessCapLevel === 0 ? "GREEN" : "";

    const row = [
      sess.dateISO || "",
      sess.mesocycleWeek ?? "",
      meso?.name || meso?.type || "",
      dayOfWeekShort(sess.dateISO),
      sess.plannedDayType || "",
      mov?.name || "",
      set.setRole || "",
      n,
      set.reps ?? "",
      set.targetReps ?? "",
      load,
      bw,
      systemLoad.toFixed(1),
      set.targetVx ?? "",
      set.actualVx ?? "",
      set.velocityMean ?? set.velocityRep1 ?? "",
      e1rmExt !== null ? e1rmExt.toFixed(2) : "",
      e1rmSys !== null ? e1rmSys.toFixed(2) : "",
      readinessLabel,
      (sess.sessionNotes || "").replace(/\n/g, " "),
      set.timestamp || "",
    ];
    rows.push(row.map(csvEscape).join(","));
  }
  return rows.join("\n");
}

function buildMesocycleMarkdown(mesocycleId) {
  const meso = (state.allMesocycles || []).find(m => m.mesocycleId === mesocycleId);
  if (!meso) return "# Ohjelmaa ei löytynyt\n";
  const sessions = state.sessions
    .filter(s => s.mesocycleId === mesocycleId)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));
  const sessionIds = new Set(sessions.map(s => s.sessionId));
  const sets = state.allSets.filter(s => sessionIds.has(s.sessionId));
  const movById = new Map(state.movements.map(m => [m.movementId, m]));

  const firstDate = sessions[0]?.dateISO || meso.startDateISO || "?";
  const lastDate = sessions[sessions.length - 1]?.dateISO || "?";
  const plannedWeeks = (meso.weekPlans || []).length || null;
  const plannedSessions = (meso.weekPlans || []).reduce((n, wp) => n + (wp.days?.length || 0), 0);

  // Tonnage per liike
  const byMov = new Map();
  for (const set of sets) {
    const mov = movById.get(set.movementId);
    if (!mov) continue;
    if (!byMov.has(mov.movementId)) byMov.set(mov.movementId, { mov, sets: [], tonnage: 0 });
    const rec = byMov.get(mov.movementId);
    rec.sets.push(set);
    rec.tonnage += (set.externalLoadKg || 0) * (set.reps || 0);
  }

  // e1RM first vs last per primary movement
  // v4.34.34 BUG 1 -fix: tunnistus loadType:sta, ei isPrimary-flagista.
  const e1rmLines = [];
  for (const { mov, sets: ms } of byMov.values()) {
    if (ms.length < 2) continue;
    const movIsSys = isSystemLoadMovement(mov);
    const sorted = [...ms].sort((a,b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
    const compute = (s) => {
      const sess = sessions.find(ss => ss.sessionId === s.sessionId);
      const bw = sess?.bodyweightKg || 91;
      return movIsSys ? e1rmExternal(bw, s.externalLoadKg || 0, s.reps, s.actualVx)
                      : e1rmAccessory(s.externalLoadKg || 0, s.reps, s.actualVx);
    };
    const firstE = compute(sorted[0]);
    const lastE = compute(sorted[sorted.length - 1]);
    const maxE = Math.max(...sorted.map(s => compute(s) ?? 0));
    if (firstE === null || lastE === null) continue;
    const delta = lastE - firstE;
    const sign = delta > 0 ? "+" : "";
    e1rmLines.push(`- **${mov.name}**: ${firstE.toFixed(1)} → ${lastE.toFixed(1)} kg (${sign}${delta.toFixed(1)}), huippu ${maxE.toFixed(1)} kg`);
  }

  // PR:t aikavälillä
  const prs = (state.prs || [])
    .filter(p => (p.dateISO || "") >= firstDate && (p.dateISO || "") <= lastDate)
    .sort((a,b) => (a.dateISO || "").localeCompare(b.dateISO || ""));

  // Readiness-jakauma
  const rCounts = { GREEN: 0, YELLOW: 0, RED: 0 };
  for (const s of sessions) {
    const l = s.readinessCapLevel;
    if (l === 2) rCounts.RED++;
    else if (l === 1) rCounts.YELLOW++;
    else rCounts.GREEN++;
  }

  const totalSets = sets.length;
  const totalTonnage = [...byMov.values()].reduce((n, r) => n + r.tonnage, 0);

  const lines = [];
  lines.push(`# ${meso.name || meso.type || "Ohjelma"}`);
  lines.push("");
  lines.push(`**Aikaväli:** ${firstDate} → ${lastDate}`);
  lines.push(`**Treenit:** ${sessions.length}${plannedSessions ? ` / ${plannedSessions} suunniteltu` : ""}`);
  lines.push(`**Viikot:** ${plannedWeeks || "?"}`);
  lines.push(`**Sarjat yhteensä:** ${totalSets}`);
  lines.push(`**Tonnage (external):** ${(totalTonnage / 1000).toFixed(1)} t`);
  lines.push("");
  lines.push(`## Readiness-jakauma`);
  lines.push(`- 🟢 GREEN: ${rCounts.GREEN}`);
  lines.push(`- 🟡 YELLOW: ${rCounts.YELLOW}`);
  lines.push(`- 🔴 RED: ${rCounts.RED}`);
  lines.push("");
  if (e1rmLines.length > 0) {
    lines.push(`## e1RM-kehitys per liike`);
    lines.push(...e1rmLines);
    lines.push("");
  }
  if (prs.length > 0) {
    lines.push(`## PR:t ohjelman aikana`);
    for (const pr of prs) {
      const comp = pr.isCompetition ? " 🏅" : "";
      const bw = pr.bodyweightKg ? ` @ ${pr.bodyweightKg} kg BW` : "";
      const ctx = pr.context ? ` — ${pr.context}` : "";
      lines.push(`- **${pr.dateISO}**${comp} ${pr.movementName}: ${pr.value} kg${bw}${ctx}`);
    }
    lines.push("");
  }

  // Muistiinpanot (jos on)
  const notes = sessions.filter(s => s.sessionNotes && s.sessionNotes.trim());
  if (notes.length > 0) {
    lines.push(`## Treenimuistiinpanot`);
    for (const s of notes) {
      lines.push(`- **${s.dateISO}** (${dayOfWeekShort(s.dateISO)}): ${s.sessionNotes.trim()}`);
    }
    lines.push("");
  }

  // Sarjat per liike tiiviisti
  lines.push(`## Sarjat per liike`);
  const movRows = [...byMov.values()]
    .sort((a,b) => b.tonnage - a.tonnage)
    .map(r => `- ${r.mov.name}: ${r.sets.length} sarjaa, ${(r.tonnage/1000).toFixed(2)} t`);
  lines.push(...movRows);
  lines.push("");
  lines.push(`---`);
  lines.push(`*Luotu LeVe AI -sovelluksesta ${todayISO()}*`);
  return lines.join("\n");
}

  const $$ = (sel) => document.querySelectorAll(sel);

  // Navigation
  $$("[data-nav]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.view = btn.dataset.nav;
      render();
    });
  });

  // Accordion
  $$("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = document.getElementById(btn.dataset.toggle);
      if (target) target.classList.toggle("open");
    });
  });

  // Dashboard collapsibles — persist open/closed state
  $$("details[data-persist]").forEach(det => {
    det.addEventListener("toggle", () => {
      localStorage.setItem(det.dataset.persist, det.open ? "1" : "0");
    });
  });

  // Progress view — range tabs + volume filter
  $$("#progress-range-tabs button[data-range]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.progressRange = btn.dataset.range;
      render();
    });
  });
  $$("#progress-vol-filter button[data-vol-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.progressVolFilter = btn.dataset.volFilter;
      render();
    });
  });

  // Dashboard
  const startBtn = $("#btn-start-workout");
  if (startBtn) startBtn.addEventListener("click", () => { state.view = "workout"; render(); });

  const readinessBtn = $("#btn-readiness");
  if (readinessBtn) readinessBtn.addEventListener("click", () => { state.view = "readiness"; render(); });

  // Missed-session banner: "Tee nyt" → käynnistä treeni mennyt-päivän planilla
  $$("[data-backfill]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const iso = btn.dataset.backfill;
      if (!iso) return;
      if (state.workout) {
        showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
        return;
      }
      // Estä tupla-klikki
      btn.disabled = true;
      try {
        await startWorkout(iso);
        state.view = "workout";
        render();
      } catch (e) {
        console.error("Backfill startWorkout failed:", e);
        showToast("Virhe: treeniä ei voitu käynnistää", "bad");
        btn.disabled = false;
      }
    });
  });

  // Missed-session banner: "Jätä väliin" → merkitse skipatuksi
  $$("[data-skip-day]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const iso = btn.dataset.skipDay;
      if (!iso || !state.mesocycle) return;
      const skipped = new Set(state.mesocycle.skippedDays || []);
      skipped.add(iso);
      state.mesocycle.skippedDays = [...skipped].sort();
      await saveMesocycle(state.mesocycle);
      showToast("Päivä merkitty väliinjätetyksi", "ok");
      render();
    });
  });

  // Plan override: "Vaihda päivä" → modaali viikon muista päivistä
  // v4.34.11 (KÄYTTÄJÄPALAUTE): selkeä ero plan-override vs backfill, kun käyttäjä
  // valitsee menneen päivän. Käyttäjän raportoima ongelma: "täytin Ma:n tänään
  // (Vaihda päivä → Ma) → CTA lukittui 'TÄNÄÄN TEHTY' → en voinut tehdä TO-treeniä".
  // Korjaus: kun chosen.dateISO < today, kysytään käyttäjältä:
  //   - BACKFILL: session.dateISO = chosen.dateISO (treeni KIRJATAAN menneenä päivänä)
  //   - PLAN-OVERRIDE: session.dateISO = today (treeni TEHDÄÄN tänään, plan toiselta päivältä)
  const planOverrideBtn = $("#btn-plan-override");
  if (planOverrideBtn) planOverrideBtn.addEventListener("click", async () => {
    if (state.workout) {
      showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
      return;
    }
    const choice = await showPlanOverrideModal();
    if (!choice) return;

    // v4.34.8: jos chosen date on ENNEN mesocycle.startDateISO:a → tarjoa auto-fix
    if (state.mesocycle?.startDateISO && choice.dateISO < state.mesocycle.startDateISO) {
      const start = state.mesocycle.startDateISO;
      const snapped = snapToMostRecentMonday(choice.dateISO);
      const fixIdx = await showListModal(
        `Päivä ${choice.dateISO} on ennen mesosyklin alkua (${start})`,
        [
          { icon: "✓", label: `Säädä mesosyklin aloituspäivä → ${snapped}`, desc: "Sallii planin lataamisen tälle päivälle (auto-snap MA)" },
          { icon: "✗", label: "Peruuta", desc: "Ei muutoksia" },
        ]
      );
      if (fixIdx !== 0) return;
      try { await createPreRebuildSnapshot(`pre-startdate-fix-planoverride-${start}-to-${snapped}`); } catch (e) {}
      state.mesocycle.startDateISO = snapped;
      await saveMesocycle(state.mesocycle);
    }

    // v4.34.11: jos chosen.dateISO on MENNYT (< today), kysy backfill vs plan-override
    const today = todayISO();
    if (choice.dateISO < today) {
      const intentIdx = await showListModal(
        `${choice.label} — mitä haluat tehdä?`,
        [
          { icon: "🕑", label: "Kirjaa MENNEEN PÄIVÄN treeni (backfill)", desc: `Treeni tallennetaan ${choice.dateISO}-päivälle, EI tänään. TO-treeni pysyy tekemättä tänään.` },
          { icon: "🔀", label: "Tee TÄNÄÄN tämän päivän plani", desc: `Treeni tallennetaan tänään (${today}), planSourceDateISO ${choice.dateISO}. CTA lukittuu kun valmis.` },
          { icon: "✗", label: "Peruuta", desc: "Ei muutoksia" },
        ]
      );
      if (intentIdx === 2 || intentIdx === null) return;
      if (intentIdx === 0) {
        // BACKFILL — käytä startWorkout(backfillDateISO) -polkua
        try {
          await startWorkout(choice.dateISO);
          state.view = "workout";
          render();
        } catch (e) {
          console.error("Backfill startWorkout failed:", e);
          showToast("Virhe: treeniä ei voitu käynnistää", "bad");
        }
        return;
      }
      // intentIdx === 1 → plan-override (jatka alle)
    }

    try {
      state.planOverrideDateISO = choice.dateISO;
      await computeRecommendation(choice.dateISO);
      render();
      showToast(`Plani vaihdettu: ${choice.label}`, "ok");
    } catch (e) {
      console.error("Plan override failed:", e);
      state.planOverrideDateISO = null;
      await computeRecommendation();
      showToast("Virhe: planiä ei voitu vaihtaa", "bad");
      render();
    }
  });

  // Plan override reset
  const planOverrideResetBtn = $("#btn-plan-override-reset");
  if (planOverrideResetBtn) planOverrideResetBtn.addEventListener("click", async () => {
    state.planOverrideDateISO = null;
    await computeRecommendation();
    render();
    showToast("Palautettu tämän päivän plani", "");
  });

  // History view: "+ Lisää mennyt treeni"
  // v4.34.8: KÄYTTÄJÄPALAUTE — backfill-toiminto näyttää AINA viimeisen 7 päivän treenit,
  // myös ne jotka ovat mesosyklin ulkopuolella. Out-of-range-päivät klikatessa ehdotetaan
  // mesosyklin aloituspäivän siirto taaksepäin (auto-fix). "Ei ohjelmaa tänään" -tilan
  // poistamiseksi.
  const backfillPastBtn = $("#btn-backfill-past");
  if (backfillPastBtn) backfillPastBtn.addEventListener("click", async () => {
    if (state.workout) {
      showToast("Keskeneräinen treeni — tallenna tai hylkää ensin", "warn");
      return;
    }
    const missed = collectAllMissedDays(7);  // viim. 7 päivää käyttäjäpalauten mukaan
    if (missed.length === 0) {
      showToast("Ei tekemättömiä päiviä (7 pv)", "");
      return;
    }
    const dayNames = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
    const options = missed.map(m => {
      const dayLabel = `${dayNames[m.dayOfWeek]} ${m.dateISO.slice(5).replace("-", ".")}`;
      if (m.status === "planned") {
        return {
          icon: "🕑",
          label: `${dayLabel} · ${stripRedundantDayPrefix(m.dayLabel) || dayTypeLabel(m.dayType)}`,
          desc: `Vk ${m.weekNum} · suunniteltu`,
        };
      }
      // out-of-range / no-mesocycle / no-day-plan
      const reasonText = m.status === "out-of-range" ? "Ulkopuolella mesosykliä — säädä aloituspäivä"
        : m.status === "no-mesocycle" ? "Ei mesosykliä — aloita mesosykli ensin"
        : "Ei suunniteltua plania tällä viikonpäivällä";
      return {
        icon: "⚠",
        label: `${dayLabel} · ad-hoc`,
        desc: reasonText,
      };
    });
    const idx = await showListModal("Lisää mennyt treeni — viim. 7 pv", options);
    if (idx === null || idx < 0 || idx >= missed.length) return;
    const chosen = missed[idx];
    const iso = chosen.dateISO;

    // v4.34.8: jos päivä on out-of-range (ennen mesosyklin alkua), tarjoa auto-fix
    if (chosen.status === "out-of-range" && state.mesocycle) {
      const start = state.mesocycle.startDateISO;
      // Snap most-recent-Monday from chosen date itself (so it lands in week 1)
      const snappedToMonday = snapToMostRecentMonday(iso);
      const fixIdx = await showListModal(
        `Päivä ${iso} on ennen mesosyklin alkua (${start})`,
        [
          { icon: "✓", label: `Säädä mesosyklin aloituspäivä → ${snappedToMonday}`, desc: `Sallii backfillin tälle päivälle (auto-snap MA)` },
          { icon: "✗", label: "Peruuta", desc: "Ei muutoksia" },
        ]
      );
      if (fixIdx !== 0) return;
      // Pre-change snapshot
      try { await createPreRebuildSnapshot(`pre-startdate-fix-${start}-to-${snappedToMonday}`); } catch (e) {}
      state.mesocycle.startDateISO = snappedToMonday;
      await saveMesocycle(state.mesocycle);
      await computeRecommendation();
      showToast(`✓ Aloituspäivä → ${snappedToMonday}. Käynnistä treeni uudelleen valikosta.`, "ok", 5000);
      render();
      return;
    }

    if (chosen.status === "no-mesocycle") {
      showToast("Aloita ensin mesosykli (Sykli → Vaihda ohjelma)", "warn", 5000);
      return;
    }

    if (chosen.status === "no-day-plan") {
      showToast(`${dayNames[chosen.dayOfWeek]} ei ole suunniteltu treenipäivä — valitse mesosyklin sisältä`, "warn", 5000);
      return;
    }

    // chosen.status === "planned" → käynnistä workout normaalisti
    try {
      await startWorkout(iso);
      state.view = "workout";
      render();
    } catch (e) {
      console.error("Backfill past workout failed:", e);
      showToast("Virhe: treeniä ei voitu käynnistää", "bad");
    }
  });

  const deloadBtn = $("#btn-insert-deload");
  if (deloadBtn) deloadBtn.addEventListener("click", async () => {
    const meso = state.mesocycle;
    if (!meso) return;
    const today = todayISO();
    const pos = resolveMesocyclePosition(meso, today);
    if (!pos) { showToast("Ei aktiivista mesosykliä", "bad"); return; }
    const currentProgWeek = pos.programWeek;
    const replaced = [...(meso.replacedWithDeload || [])];

    // v4.31.2: Peruutuslogiikka — jos olet aktiivisesti kevennysviikolla TAI tuleva
    // viikko on merkitty kevennykseksi (esim. vahingossa-klikkaus), tarjoa peruuttamista.
    // Aiemmin painikkeessa oli "↩ Peru kevennys" -teksti mutta klikkaus näytti vain
    // toastin — todellinen peruutus puuttui.
    if (isDeloadOverrideWeek(meso, today)) {
      const undo = confirm(
        `Olet kevennysviikolla (vk ${currentProgWeek}).\n\n` +
        `Perutaanko kevennys ja palautetaan alkuperäinen ohjelma?\n\n` +
        `(Tehdyt treenit säilyvät — vain päivän plani palautuu)`
      );
      if (!undo) return;
      meso.replacedWithDeload = replaced.filter(r => (typeof r === "number" ? r : r.programWeek) !== currentProgWeek);
      await saveMesocycle(meso);
      state.mesocycle = meso;
      await computeRecommendation();
      showToast(`Vk ${currentProgWeek} kevennys peruutettu`, "ok");
      render();
      return;
    }
    const targetWeek = currentProgWeek + 1;
    if (targetWeek > (meso.weekCount || 16)) {
      showToast("Et voi korvata viimeistä viikkoa kevennyksellä", "warn");
      return;
    }
    const alreadyReplaced = replaced.some(r => (typeof r === "number" ? r : r.programWeek) === targetWeek);
    if (alreadyReplaced) {
      // v4.31.2: tarjoa peruuttamista vahingossa-klikkauksen tapauksessa
      const undo = confirm(
        `Vk ${targetWeek} on merkitty kevennykseksi.\n\n` +
        `Perutaanko ja palautetaan alkuperäinen ohjelma?\n\n` +
        `(Käytä jos klikkasit vahingossa Kevennys-painiketta)`
      );
      if (!undo) return;
      meso.replacedWithDeload = replaced.filter(r => (typeof r === "number" ? r : r.programWeek) !== targetWeek);
      await saveMesocycle(meso);
      state.mesocycle = meso;
      await computeRecommendation();
      showToast(`Vk ${targetWeek} kevennys peruutettu`, "ok");
      render();
      return;
    }
    const targetWeekDef = meso.weekDefs?.find(w => w.week === targetWeek);
    const targetLabel = targetWeekDef?.label || `Vk ${targetWeek}`;
    const isAlreadyDeload = (targetWeekDef?.deltaPctBase ?? 0) < -0.1;
    if (isAlreadyDeload) {
      showToast(`Vk ${targetWeek} on jo suunniteltu deload (${targetLabel.split("—")[1]?.trim() || "deload"})`, "warn");
      return;
    }
    const ok = confirm(
      `Korvaa vk ${targetWeek} kevennyksellä?\n\n` +
      `• ${targetLabel}\n\n` +
      `TOIMINTA:\n` +
      `• Volyymi ~50 %, kuorma -20 %, Vx +2\n` +
      `• Vain kisaliikkeet + scapular/core-prehab\n` +
      `• Kisapäivä EI siirry\n\n` +
      `MENETYS:\n` +
      `• Kyseisen viikon adaptaatio (${targetLabel})\n` +
      `• Periodisointi palaa vk ${targetWeek + 1}:een kevennyksen jälkeen\n\n` +
      `Jatketaanko?`
    );
    if (!ok) return;
    replaced.push({ programWeek: targetWeek, invokedDateISO: today, reason: "user" });
    meso.replacedWithDeload = replaced;
    await saveMesocycle(meso);
    state.mesocycle = meso;
    await computeRecommendation();
    showToast(`Vk ${targetWeek} korvattu kevennyksellä 🌿`, "ok");
    render();
  });

  // v4.26.0: Luo backup nyt (dashboard-statuskortin nappi)
  const createBackupBtn = $("#btn-create-backup-now");
  if (createBackupBtn) createBackupBtn.addEventListener("click", async () => {
    createBackupBtn.disabled = true;
    createBackupBtn.textContent = "Luodaan…";
    try {
      await createBackupSnapshot("manual");
      state.backupStatus = await getBackupStatus();
      showToast("Backup luotu ✓", "ok");
      render();
    } catch (e) {
      console.error("Manual backup failed:", e);
      showToast("Backupin luonti epäonnistui", "bad");
      createBackupBtn.disabled = false;
      createBackupBtn.textContent = "Luo nyt";
    }
  });

  // v4.34.28: Vk 14 peaking decision-tree -kortin painikkeet
  const vk14Btn93 = $("#btn-vk14-decide-93");
  if (vk14Btn93) vk14Btn93.addEventListener("click", () => {
    recordVk14Decision("@93%", "Konservatiivinen valinta — pidetään peak-intensity opener-rehearsalissa");
  });
  const vk14Btn95 = $("#btn-vk14-decide-95");
  if (vk14Btn95) vk14Btn95.addEventListener("click", () => {
    recordVk14Decision("@95%", "Aggressiivinen valinta — datapisteet tukevat korkeampaa intensity-tasoa");
  });
  const vk14ResetBtn = $("#btn-vk14-reset");
  if (vk14ResetBtn) vk14ResetBtn.addEventListener("click", () => {
    localStorage.removeItem("leve_vk14_decision");
    showToast("Vk 14 päätös resetoitu", "warn");
    render();
  });

  // v4.34.26: External backup reminder -bannerin napit (Dashboard yläosa)
  const shareBackupBtn = $("#btn-share-backup");
  if (shareBackupBtn) shareBackupBtn.addEventListener("click", () => {
    showBackupShareModal();
  });
  const snoozeBackupBtn = $("#btn-snooze-backup");
  if (snoozeBackupBtn) snoozeBackupBtn.addEventListener("click", () => {
    snoozeBackupReminder();
    showToast("Muistutus snoozattu 2 vk", "ok");
    render();
  });

  document.querySelectorAll(".preview-info-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.previewInfoIdx, 10);
      const slot = state.recommendation?.dayPlan?.slots?.[idx];
      if (!slot) return;
      const movName = slot.movementName || slot.defaultMovementName || slot.category;
      const desc = MOVEMENT_DESCRIPTIONS?.[movName] || null;
      const catalog = slot.slotId ? ACCESSORY_SLOT_CATALOG?.[slot.slotId] : null;
      const weekNum = state.recommendation?.weekNum || 1;
      const phase = slot.slotId ? phaseForWeek(weekNum) : null;
      showInfoModal({
        title: movName,
        howTo: desc?.howTo || null,
        cue: desc?.cue || null,
        slotFunction: catalog?.function || null,
        slotRationale: catalog?.rationale || null,
        slotPhase: phase,
        slotVariants: (catalog && phase) ? catalog.phaseVariants?.[phase] || null : null,
        currentVariant: movName,
      });
    });
  });

  // Readiness
  const saveReadinessBtn = $("#btn-save-readiness");
  if (saveReadinessBtn) saveReadinessBtn.addEventListener("click", async () => {
    const hrvInput = parseNumericInput($("#input-hrv")?.value);
    const velInput = parseNumericInput($("#input-vel")?.value);

    if (hrvInput !== null) {
      const hvr = validateHRV(hrvInput);
      if (!hvr.valid) { showToast(hvr.error, "bad"); return; }
      state.todayHRV = hvr.value;
      await saveMeasurement({
        dateISO: todayISO(), type: "HRV",
        value: hvr.value, valueTransformed: ouraHRVtoLnRMSSD(hvr.value),
        unit: "ms", device: "Oura",
      });
    }

    if (velInput !== null) {
      const vv = validateVelocity(velInput);
      if (!vv.valid) { showToast(vv.error, "bad"); return; }
      state.todayVelocity = vv.value;
    }

    await computeReadiness();
    await computeRecommendation();
    showToast("Readiness tallennettu", "ok");
    state.view = "dashboard";
    render();
  });

  // Workout setup
  const beginBtn = $("#btn-begin-workout");
  if (beginBtn) beginBtn.addEventListener("click", async () => {
    // Tallenna kehonpaino
    const bwInput = $("#input-bw-today");
    if (bwInput) {
      const bwVal = parseNumericInput(bwInput.value);
      if (bwVal !== null && bwVal >= 30 && bwVal <= 250) {
        await saveBodyweightEntry(bwVal, todayISO());
        state.latestBodyweight = bwVal;
        // Päivitä myös asetuksiin
        state.settings.bodyweightKg = bwVal;
        await saveSettings(state.settings);
      }
    }
    await startWorkout();
  });

  // Active workout
  bindWorkoutEvents();

  // Mesocycle — template chooser
  const newMesoBtn = $("#btn-new-meso");
  if (newMesoBtn) newMesoBtn.addEventListener("click", async () => {
    // Sort: suggested first, then the rest
    const currentType = state.mesocycle?.type || "default";
    const suggested = SUGGESTED_NEXT_TEMPLATE[currentType] || [];

    // Build ordered list: suggested templates first (with ⭐), then the rest
    const orderedTemplates = [];
    const usedIds = new Set();
    for (const id of suggested) {
      const tpl = MESOCYCLE_TEMPLATES.find(t => t.id === id);
      if (tpl) { orderedTemplates.push({ ...tpl, isSuggested: true }); usedIds.add(id); }
    }
    for (const tpl of MESOCYCLE_TEMPLATES) {
      if (!usedIds.has(tpl.id)) orderedTemplates.push({ ...tpl, isSuggested: false });
    }

    const options = orderedTemplates.map(tpl => ({
      label: `${tpl.isSuggested ? "⭐ " : ""}${tpl.label}`,
      desc: tpl.desc,
      icon: tpl.icon,
    }));

    const chosen = await showListModal("Valitse ohjelma", options);
    if (chosen === null) return;

    const template = orderedTemplates[chosen];

    // v4.34.45: vahvistus jos vaihdetaan toisesta aktiivisesta ohjelmasta.
    // Atletti saa varmuuden että vanha ohjelma säilyy Historia-välilehdellä ja
    // voi aktivoida sen uudelleen — ei riskiä että alkuperäinen kadottaa.
    if (state.mesocycle) {
      const oldType = state.mesocycle.type;
      const oldTpl = MESOCYCLE_TEMPLATES.find(t => t.id === oldType);
      const oldLabel = oldTpl?.label || oldType || "Aktiivinen ohjelma";
      const ok = confirm(
        `Vaihdetaanko ohjelmaa?\n\n` +
        `Aktiivinen ohjelma:\n  ${oldLabel}\n\n` +
        `Uusi ohjelma:\n  ${template.label}\n\n` +
        `Aktiivinen ohjelma säilyy Historia-välilehdellä — voit aktivoida sen uudelleen koska tahansa.`
      );
      if (!ok) return;
    }

    // Peaking needs special handling (requires e1RM)
    if (template.id === "peaking") {
      const bw = state.settings?.bodyweightKg || 91;
      const primaryMov = state.movements.find(m => m.isPrimary);
      let e1rmExt = 93;
      if (primaryMov) {
        const sets = state.allSets.filter(s => s.movementId === primaryMov.movementId);
        const computed = computeMovementE1RM(sets, true, bw);
        if (computed !== null) e1rmExt = Math.max(0, computed - bw);
      }

      const confirmIdx = await showListModal(
        `🏆 Peaking-ohjelma`,
        [
          { label: "Aloita peaking", desc: `e1RM: +${e1rmExt.toFixed(1)} kg · Opener: +${roundToHalf(e1rmExt * 0.92)} kg`, icon: "🏆" },
          { label: "Peruuta", desc: "Palaa valikkoon", icon: "↩" },
        ]
      );
      if (confirmIdx !== 0) return;

      const peakMeso = createPeakingMesocycle(todayISO(), e1rmExt, bw);
      await saveMesocycle(peakMeso);
      await setActiveMesocycle(peakMeso.mesocycleId);
      state.mesocycle = peakMeso;
      await computeRecommendation();
      showToast("🏆 Peaking-ohjelma aloitettu!", "ok", 4000);
      render();
      return;
    }

    // v4.23 P4.3: Streetlifting 16 vk onboarding — yhden näkymän kalibrointi
    if (template.id === "streetlifting_16w") {
      const bw = state.settings?.bodyweightKg || 91;
      const cal = await showCalibrationModal(bw);
      if (!cal) return;
      const slMeso = createStreetlifting16WMesocycle(todayISO(), cal);
      await saveMesocycle(slMeso);
      await setActiveMesocycle(slMeso.mesocycleId);
      state.mesocycle = slMeso;
      // Päivitä myös settings.bodyweightKg mikäli käyttäjä muutti sitä kalibroinnissa
      if (cal.bwKg && cal.bwKg !== state.settings.bodyweightKg) {
        state.settings.bodyweightKg = cal.bwKg;
        await saveSettings(state.settings);
      }
      // v4.34.45: säilytä kaikki vanhat ohjelmat (preserveUserChoices=true) — atletti
      // voi aktivoida ne uudelleen Historia-välilehdeltä. Aiempi v4.34.7 -käyttäytyminen

      try {
        const cleanup = await cleanupOrphanMesocycles(slMeso.mesocycleId, { preserveUserChoices: true });
        if (cleanup.deleted > 0) {
          console.info(`[LeVe] Vaihda ohjelma: poistettu ${cleanup.deleted} orphan-mesosyklia`);
        }
      } catch (e) {
        console.warn("[LeVe] cleanupOrphanMesocycles failed (jatketaan):", e);
      }
      await computeRecommendation();
      showToast("🏋️ Streetlifting 16 vk aloitettu!", "ok", 4000);
      render();
      return;
