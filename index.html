<!doctype html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>LeVe AI</title>
  <style>
    :root {
      --bg: #0b1220; --card: #121d33; --card2: #182744;
      --border: #26385d; --border2: #314976;
      --txt: #e8eefc; --muted: #8899bb; --dim: #5a6a8a;
      --acc: #4f8cff; --acc2: #3a6fd8;
      --ok: #22c55e; --ok2: #166534;
      --warn: #f59e0b; --warn2: #92400e;
      --bad: #ef4444; --bad2: #991b1b;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--txt);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      user-select: none; -webkit-user-select: none;
    }
    input, textarea, select { user-select: auto; -webkit-user-select: auto; }
    a { color: var(--acc); }
    /* ── Layout ── */
    .app { max-width: 600px; margin: 0 auto; padding: 12px; padding-bottom: 90px; }
    /* ── Nav ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13, 22, 40, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav button {
      background: none; border: none; color: var(--muted); font-size: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 10px; cursor: pointer; min-width: 60px; min-height: 48px;
    }
    .nav button.active { color: var(--acc); }
    .nav button .icon { font-size: 22px; }
    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .card-title { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--acc); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
      min-height: 48px; transition: background 0.15s;
    }
    .btn:active { background: var(--acc2); }
    .btn-full { width: 100%; }
    .btn-big { padding: 16px 24px; font-size: 18px; border-radius: var(--radius); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--txt); }
    .btn-outline:active { background: var(--card2); }
    .btn-danger { background: var(--bad); }
    .btn-danger:active { background: var(--bad2); }
    .btn-ok { background: var(--ok); }
    .btn-ok:active { background: var(--ok2); }
    .btn-sm { padding: 8px 12px; font-size: 13px; min-height: 36px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    /* ── Inputs ── */
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2); background: #0f1a31; color: var(--txt);
      font-size: 16px; min-height: 44px;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--acc); }
    textarea { min-height: 80px; resize: vertical; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
    /* ── Grid ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    /* ── Tags / Chips ── */
    .chip {
      display: inline-flex; align-items: center; padding: 6px 12px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border2); background: var(--card2);
    }
    .chip-green { color: var(--ok); border-color: var(--ok); }
    .chip-yellow { color: var(--warn); border-color: var(--warn); }
    .chip-red { color: var(--bad); border-color: var(--bad); }
    /* ── KPI ── */
    .kpi { font-size: 28px; font-weight: 700; }
    .kpi-label { font-size: 12px; color: var(--muted); }
    .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .kpi-box { flex: 1; min-width: 80px; }
    /* ── Set buttons (touch-friendly) ── */
    .set-btns {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .set-btn {
      min-width: 56px; height: 56px; border-radius: var(--radius-sm);
      border: 2px solid var(--border2); background: var(--card);
      color: var(--txt); font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.1s; flex: 1;
    }
    .set-btn:active, .set-btn.selected {
      background: var(--acc); border-color: var(--acc); color: #fff;
      transform: scale(0.95);
    }
    .set-btn-vara { font-size: 15px; }
    /* v4.34.14: touch-action: manipulation kaikkiin interaktiivisiin elementteihin.
       Korjaa Android Chrome -nappitarkkuusongelman jossa double-tap-zoom-detection
       viivästytti tap-eventia ja sotki click-koordinaatteja. Käyttäjäpalaute LA-
       treenistä: "täytyi painaa n. sentin napin yläpuolelta että osui nappiin". */
    button, .pill, .load-display, .reps-row button, .vara-row button,
    .set-btn, [role="button"], a.btn, label.btn, input[type="button"] {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    /* ── Readiness indicator ── */
    .readiness-dot {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block;
    }
    .readiness-dot.green { background: var(--ok); }
    .readiness-dot.yellow { background: var(--warn); }
    .readiness-dot.red { background: var(--bad); }
    .readiness-dot.none { background: var(--dim); }
    /* ── Progress bar ── */
    .progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--acc); transition: width 0.3s; }
    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
    /* ── Accordion ── */
    .accordion-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; cursor: pointer; color: var(--muted); font-size: 13px;
    }
    .accordion-body { display: none; padding: 8px 0; }
    .accordion-body.open { display: block; }
    /* ── Helpers ── */
    .muted { color: var(--muted); font-size: 12px; }
    .dim { color: var(--dim); }
    .text-ok { color: var(--ok); }
    .text-warn { color: var(--warn); }
    .text-bad { color: var(--bad); }
    .text-center { text-align: center; }
    .mt { margin-top: 12px; }
    .mb { margin-bottom: 12px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-sm { gap: 6px; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* ── Notification toast ── */
    .toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--card2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 12px 20px; z-index: 200;
      font-size: 14px; max-width: 90%; text-align: center;
      animation: fadeIn 0.2s ease-in;
    }
    .toast.warn { border-color: var(--warn); }
    .toast.bad { border-color: var(--bad); }
    .toast.ok { border-color: var(--ok); }
    /* ── Section header ── */
    .section-header { font-size: 18px; font-weight: 700; margin: 16px 0 10px; }
    /* ── Exercise card in workout ── */
    .exercise-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .exercise-name {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
      cursor: pointer;
    }
    .exercise-meta { font-size: 12px; color: var(--muted); }
    .set-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .set-row:last-child { border-bottom: none; }
    .set-number { font-size: 12px; color: var(--dim); width: 24px; text-align: center; }
    .load-display {
      background: var(--card2); border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 18px 28px; font-weight: 700; font-size: 44px;
      cursor: pointer; min-width: 100px; text-align: center;
      letter-spacing: -0.5px;
      display: inline-block;
    }
    .load-display:active { background: var(--border); }
    .load-up { color: var(--ok); border-color: var(--ok); }
    /* ── Program slot ── */
    .program-slot {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .program-slot:last-child { border-bottom: none; }
    .program-slot-num { color: var(--dim); font-size: 13px; width: 20px; }
    .program-slot-name { font-weight: 600; font-size: 14px; flex: 1; }
    .program-slot-detail { text-align: right; font-size: 13px; }
    .program-slot-load { font-weight: 700; color: var(--acc); }
    .program-slot-sets { color: var(--muted); }
    /* ── Scrollable ── */
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* ── Workout set buttons row ── */
    .set-btns-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    @media (max-width: 360px) {
      .set-btns-row { grid-template-columns: repeat(4, 1fr); }
    }
    /* ── Bottom Sheet Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.15s ease-out;
    }
    .modal-sheet {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
      max-height: 80dvh; overflow-y: auto; padding: 16px 16px 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--dim); border-radius: 2px; margin: 0 auto 12px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

    /* ── v4.34.38 LIIKEHISTORIA-MODAALI (Claude Design) ────────────────────── */
    .lh-head { display:flex; align-items:center; justify-content:space-between; padding:0 4px 12px; }
    .lh-title-row { display:flex; align-items:center; gap:10px; }
    .lh-title-icon { width:32px; height:32px; border-radius:9px; background:rgba(79,140,255,0.14); color:var(--acc); display:flex; align-items:center; justify-content:center; border:1px solid rgba(79,140,255,0.25); font-size:16px; }
    .lh-title-h { font-size:16px; font-weight:700; letter-spacing:-.2px; }
    .lh-title-s { font-size:11px; color:var(--muted); margin-top:1px; }
    .lh-trio { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .lh-trio-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; }
    .lh-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; margin-bottom:8px; }
    .lh-e1rm-row { display:flex; align-items:baseline; gap:6px; }
    .lh-e1rm-num { font-size:30px; font-weight:800; letter-spacing:-1px; line-height:1; font-variant-numeric:tabular-nums; }
    .lh-e1rm-unit { font-size:12px; color:var(--muted); font-weight:600; }
    .lh-delta { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 7px; border-radius:6px; margin-top:8px; font-variant-numeric:tabular-nums; }
    .lh-delta.up { color:var(--ok); background:rgba(34,197,94,0.14); }
    .lh-delta.down { color:#ff5d5d; background:rgba(255,93,93,0.12); }
    .lh-delta.flat { color:var(--muted); background:rgba(138,152,192,0.10); }
    .lh-vx-row { display:flex; align-items:center; gap:8px; }
    .lh-vx-from { font-size:18px; font-weight:700; color:var(--muted); }
    .lh-vx-arrow { color:var(--ok); font-size:14px; }
    .lh-vx-to { font-size:26px; font-weight:800; color:var(--ok); letter-spacing:-.5px; }
    .lh-vx-to.harder { color:var(--warn); }
    .lh-vx-to.flat { color:var(--muted); }
    .lh-vx-arrow.harder { color:var(--warn); }
    .lh-vx-arrow.flat { color:var(--muted); }
    .lh-vx-note { font-size:11px; color:var(--muted); margin-top:6px; }
    .lh-engine-card { grid-column:1 / -1; background:linear-gradient(135deg, rgba(79,140,255,0.10), rgba(79,140,255,0.02)); border:1px solid rgba(79,140,255,0.30); border-radius:14px; padding:12px 14px; position:relative; }
    .lh-engine-card::before { content:""; position:absolute; left:0; top:12px; bottom:12px; width:3px; background:var(--acc); border-radius:0 3px 3px 0; }
    .lh-engine-lbl { font-size:10px; color:var(--acc); text-transform:uppercase; letter-spacing:0.6px; font-weight:700; margin-bottom:6px; }
    .lh-engine-load { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
    .lh-engine-load .num { font-size:28px; font-weight:800; letter-spacing:-.8px; line-height:1; font-variant-numeric:tabular-nums; }
    .lh-engine-load .unit { font-size:13px; color:var(--muted); font-weight:600; }
    .lh-engine-load .scheme { font-size:13px; font-weight:700; color:var(--txt); padding:3px 8px; border-radius:6px; background:rgba(255,255,255,0.04); border:1px solid var(--border); }
    .lh-engine-delta { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; color:var(--ok); margin-top:4px; font-variant-numeric:tabular-nums; }
    .lh-engine-delta.down { color:#ff7676; }
    .lh-engine-delta.flat { color:var(--muted); }
    .lh-tabs { display:grid; grid-template-columns:1fr 1fr; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:3px; margin:14px 0 10px; }
    .lh-tabs button { background:transparent; border:none; color:var(--muted); font-size:12px; font-weight:600; padding:8px; border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:inherit; transition:background .15s, color .15s; }
    .lh-tabs button.active { background:var(--card2); color:var(--txt); }
    .lh-tabs .dot { width:6px; height:6px; border-radius:999px; }
    .lh-tabs .dot.primary { background:var(--warn); }
    .lh-tabs .dot.accessory { background:#6b7896; }
    .lh-sess { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px 12px; margin-bottom:8px; }
    .lh-sess.primary { border-left:3px solid var(--warn); }
    .lh-sess.accessory { border-left:3px solid #6b7896; }
    .lh-sess-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
    .lh-sess-date { font-size:13px; font-weight:700; }
    .lh-sess-rel { font-size:11px; color:var(--muted); margin-top:1px; }
    .lh-sess-tags { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
    .lh-tag { font-size:10px; font-weight:700; padding:3px 7px; border-radius:5px; text-transform:uppercase; letter-spacing:0.4px; border:1px solid transparent; }
    .lh-tag.primary { color:var(--warn); background:rgba(245,158,11,0.14); border-color:rgba(255,149,0,0.25); }
    .lh-tag.accessory { color:#8a98c0; background:rgba(107,120,150,0.12); border-color:rgba(107,120,150,0.25); }
    .lh-tag.day { color:var(--muted); background:rgba(255,255,255,0.03); border-color:var(--border); }
    .lh-set-row { display:grid; grid-template-columns:22px 1fr auto; align-items:center; gap:8px; font-size:13px; padding:4px 0; }
    .lh-set-row .sn { color:var(--dim); font-size:11px; font-weight:700; }
    .lh-set-row .load { font-weight:700; font-variant-numeric:tabular-nums; }
    .lh-set-row .reps { color:var(--muted); margin-left:2px; }
    .lh-set-row.bw .load { color:#8a98c0; }
    .lh-vx { font-size:11px; font-weight:700; padding:2px 6px; border-radius:4px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--muted); font-variant-numeric:tabular-nums; }
    .lh-vx.target { color:var(--ok); border-color:rgba(34,197,94,0.30); background:rgba(34,197,94,0.14); }
    .lh-vx.over { color:var(--acc); border-color:rgba(79,140,255,0.30); background:rgba(79,140,255,0.14); }
    .lh-vx.under { color:#ff7676; border-color:rgba(255,93,93,0.30); background:rgba(255,93,93,0.10); }
    .lh-sess-summary { margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); font-size:11px; color:var(--muted); line-height:1.4; }
    .lh-sess-summary strong { color:var(--txt); font-weight:600; }
    .lh-why { margin-top:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .lh-why-toggle { width:100%; background:transparent; border:none; color:var(--txt); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-family:inherit; text-align:left; }
    .lh-why-toggle .lh-why-l { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; }
    .lh-why-toggle .chev { transition:transform .25s ease; color:var(--muted); }
    .lh-why.open .lh-why-toggle .chev { transform:rotate(180deg); }
    .lh-why-body { overflow:hidden; max-height:0; transition:max-height .35s cubic-bezier(.4,0,.2,1); }
    .lh-why.open .lh-why-body { max-height:600px; }
    .lh-why-inner { padding:0 14px 14px; border-top:1px solid var(--border); padding-top:12px; }
    .lh-trace { display:grid; grid-template-columns:28px 1fr auto; gap:10px; align-items:center; padding:8px 0; border-bottom:1px dashed var(--border); }
    .lh-trace:last-child { border-bottom:none; }
    .lh-trace-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
    .lh-trace-icon.plan { background:rgba(79,140,255,0.14); color:var(--acc); border:1px solid rgba(79,140,255,0.25); }
    .lh-trace-icon.cap { background:rgba(245,158,11,0.10); color:var(--warn); border:1px solid rgba(255,149,0,0.25); }
    .lh-trace-icon.bonus { background:rgba(34,197,94,0.14); color:var(--ok); border:1px solid rgba(34,197,94,0.25); }
    .lh-trace-icon.final { background:var(--card2); color:var(--txt); border:1px solid var(--border); }
    .lh-trace-msg { font-size:12px; color:var(--muted); line-height:1.4; }
    .lh-trace-msg strong { color:var(--txt); font-weight:600; }
    .lh-trace-val { font-size:12px; font-weight:700; color:var(--txt); font-variant-numeric:tabular-nums; white-space:nowrap; }
    .lh-trace.final .lh-trace-msg strong { color:var(--acc); }
    .lh-trace.final .lh-trace-val { color:var(--acc); font-size:14px; }
    .lh-empty { text-align:center; color:var(--dim); font-size:12px; padding:30px 10px; }
    .modal-option {
      display: flex; align-items: center; gap: 10px; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 6px; cursor: pointer; min-height: 48px;
      transition: background 0.1s;
    }
    .modal-option:active { background: var(--card2); }
    .modal-option.selected { border-color: var(--acc); background: rgba(79,140,255,0.1); }
    .modal-option-icon { font-size: 18px; width: 28px; text-align: center; }
    .modal-option-text { flex: 1; }
    .modal-option-label { font-weight: 600; font-size: 14px; }
    .modal-option-desc { font-size: 12px; color: var(--muted); }
    .modal-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .modal-input-row input { flex: 1; }

    /* ── Dashboard redesign v4.17 ─────────────────────────────── */

    .dash-collapsible { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }

  // Säilytä viim. 90 päivää (~3 sykliä), purge ajetaan max 1×/vk localStorage-checkillä.
  try {
    const purgeResult = await maybeAutoPurgeTraces(state.settings?.traceRetentionDays || 90);
    if (purgeResult && purgeResult.purged > 0) {
      console.info(`[LeVe] ✓ Decision traces auto-purged: ${purgeResult.purged}/${purgeResult.total} (cutoff ${purgeResult.cutoffISO})`);
    }
  } catch (e) {
    console.warn("[LeVe] decisionTraces auto-purge failed:", e);
  }
  // v4.26.0: backup-status dashboard-indikaattoria varten
  state.backupStatus = await getBackupStatus();
  state.settings = await getSettings();
  state.movements = await getAllMovements();
  state.sessions = await getAllSessions();
  state.allSets = await getAllSets();
  state.latestBodyweight = await getLatestBodyweight(state.settings);
  state.allBodyweights = await getMeasurementsByType("bodyweight");
  await seedHistoricalPRsIfNeeded();
  state.prs = await getAllPRs();
  state.allMesocycles = await getAllMesocycles();
  state.mesocycle = await getActiveMesocycle();
  if (!state.mesocycle) {
    state.mesocycle = createDefaultMesocycle(todayISO());
    assignVariantRotation(state.mesocycle.weekPlans);
    await saveMesocycle(state.mesocycle);
  } else {
    // v4.30.2: AUTO-REBUILD jos ohjelma on päivittynyt sitten mesocyclen luomisen
    if (state.mesocycle.type === "streetlifting_16w" &&
        state.mesocycle.programVersion !== PROGRAM_BUILD_VERSION) {
      const oldVersion = state.mesocycle.programVersion || "ennen-v4.30.2";
      console.info(`[LeVe] Mesocycle program version mismatch: ${oldVersion} → ${PROGRAM_BUILD_VERSION}. Rebuilding weekPlans, säilytetään edistys.`);
      // v4.34.6: PRE-REBUILD SNAPSHOT — varmistus että rebuild EI VOI rikkoa mitään.
      // Ennen weekPlans-rakenteen korvaamista, tallenna täysi snapshot recovery-pisteeksi.
      // Tämän puuttuminen oli yksi syy v4.34.5-tilanteen päättymiseen datakatoon.
      try {
        await createPreRebuildSnapshot(`pre-rebuild-${oldVersion}-to-${PROGRAM_BUILD_VERSION}`);
      } catch (e) {
        console.warn("[LeVe] Pre-rebuild snapshot epäonnistui (jatketaan rebuildilla):", e);
      }
      state.mesocycle = rebuildStreetlifting16WMesocycle(state.mesocycle);
      await saveMesocycle(state.mesocycle);
      // Toast näytetään checkPendingWorkoutRecoveryn jälkeen jotta UI on valmis.
      // Käytetään globaalia merkkiä jotta ensimmäisessä render():issa näytetään ilmoitus.
      state._rebuildNoticeFromVersion = oldVersion;
    } else if (!["peaking", "eksentrinen", "siirtyma"].includes(state.mesocycle.type)) {
      // Migrate existing mesocycle: add variants if missing
      const hasVariants = state.mesocycle.weekPlans?.some(wp =>
        wp.days?.some(d => d.slots?.some(s => s.variantName))
      );
      if (!hasVariants && state.mesocycle.weekPlans) {
        assignVariantRotation(state.mesocycle.weekPlans);
        await saveMesocycle(state.mesocycle);
      }
    }
  }
  await computeReadiness();
  await computeRecommendation();
  applyDensityClass();
  // v4.28.1: tarkista onko keskeneräinen treeni edellisestä sessiosta. Jos on,
  // tarjoa käyttäjälle jatkoa tai hylkäämistä ennen dashboardin renderöintiä.
  await checkPendingWorkoutRecovery();
  render();
  // v4.30.2: ilmoita käyttäjälle auto-rebuild:sta render:in jälkeen (UI valmis)
  if (state._rebuildNoticeFromVersion) {
    setTimeout(() => {
      showToast(`Ohjelma päivitetty automaattisesti (${state._rebuildNoticeFromVersion} → ${PROGRAM_BUILD_VERSION}). Vk-numerosi ja kalibrointisi säilyivät.`, "ok", 6000);
      delete state._rebuildNoticeFromVersion;
    }, 500);
  }
}

// v4.28.1: keskeneräisen treenin palautus localStorage-pendingWorkout-avaimesta.
// v4.32.4 (H): Korvattu window.confirm omalla modaalilla joka näyttää treenin
// tilan kuvallisesti — paremmin mobiilissa, näyttää enemmän tietoa kerrallaan.
async function checkPendingWorkoutRecovery() {
  const pending = loadPendingWorkoutLocal();
  if (!pending?.workout) return;
  const w = pending.workout;
  // Laske progress kerronta käyttäjälle
  let doneSets = 0, totalSets = 0;
  let lastCompletedSet = null;
  for (const ex of (w.exercises || [])) {
    for (const s of (ex.sets || [])) {
      if (s.isWarmup) continue;
      totalSets++;
      if (s.completed) {
        doneSets++;
        if (s.reps != null && s.loadKg != null) {
          lastCompletedSet = { exName: ex.name, reps: s.reps, vx: s.actualVx, loadKg: s.loadKg };
        }
      }
    }
  }
  const savedAt = pending.savedAt ? new Date(pending.savedAt) : null;
  const savedAtStr = savedAt
    ? `${savedAt.toLocaleDateString("fi-FI")} klo ${savedAt.toLocaleTimeString("fi-FI", { hour: "2-digit", minute: "2-digit" })}`
    : "tuntematon ajankohta";
  const dateStr = w.dateISO || "";
  const progressPct = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;
  const lastSetHTML = lastCompletedSet
    ? `<div style="font-size:12px;color:var(--muted);padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:6px;margin-top:8px">
        <div style="font-weight:600;margin-bottom:2px">Viimeinen kirjattu sarja:</div>
        <div>${lastCompletedSet.exName} · ${lastCompletedSet.loadKg} kg × ${lastCompletedSet.reps}${lastCompletedSet.vx != null ? ` V${lastCompletedSet.vx}` : ""}</div>
      </div>` : "";

  const wantContinue = await new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" style="display:flex;align-items:center;gap:8px">⏸ Keskeneräinen treeni</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-top:4px">Sovellus tallensi treenisi automaattisesti. Voit jatkaa siitä mihin jäit.</div>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between;font-size:13px"><span class="muted">Päivä</span><span style="font-weight:600">${dateStr}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span class="muted">Tallennettu</span><span>${savedAtStr}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px"><span class="muted">Edistyminen</span><span style="font-weight:700;color:var(--acc)">${doneSets}/${totalSets} sarjaa (${progressPct} %)</span></div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:2px"><div style="width:${progressPct}%;height:100%;background:var(--acc);transition:width 0.3s"></div></div>
        </div>
        ${lastSetHTML}
        <div class="btn-group" style="margin-top:14px">
          <button class="btn btn-ok" style="flex:2" data-modal-ok>▶ Jatka treeniä</button>
          <button class="btn btn-outline" style="flex:1" data-modal-cancel>🗑 Hylkää</button>
        </div>
      </div>`;
    overlay.querySelector("[data-modal-ok]").addEventListener("click", () => { closeModal(); resolve(true); });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(false); });
    document.body.appendChild(overlay);
  });

  if (wantContinue) {
    state.workout = w;
    state.view = "workout";
    // Wake Lock + AudioContext vaativat käyttäjäinteraktion — modal-painikkeen
    // klikkaus on tällainen interaktio, joten voimme yrittää.
    ensureAudioCtx();
    ensureWakeLock();
  } else {
    clearPendingWorkoutLocal();
  }
}

// ═══════════════════════════════════════════════════════════════
// READINESS COMPUTATION
// ═══════════════════════════════════════════════════════════════

async function computeReadiness() {
  const settings = state.settings;
  const bw = settings.bodyweightKg || 91;

  // Velocity baseline: readiness test velocities
  const readinessTestSets = state.allSets
    .filter(s => s.setRole === "readiness_test" && s.velocityRep1 !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const velValues = readinessTestSets.map(s => s.velocityRep1);
  const velR = velocityReadiness(state.todayVelocity, velValues, settings.readinessVelocityWindowN || 10);

  // HRV baseline
  const hrvMeasurements = await getMeasurementsByType("HRV");
  const lnRmssdValues = hrvMeasurements
    .sort((a, b) => (a.dateISO || "").localeCompare(b.dateISO || ""))
    .map(m => m.valueTransformed)
    .filter(v => v !== null && v !== undefined);
  const todayLn = state.todayHRV ? ouraHRVtoLnRMSSD(state.todayHRV) : null;
  const hrvR = hrvReadiness(todayLn, lnRmssdValues, settings.readinessHrvWindowN || 14);

  // Vara baseline: recent top sets
  const topSets = state.allSets
    .filter(s => s.setRole === "top" && s.actualVx !== null)
    .sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
  const varaR = varaReadiness(topSets, settings.readinessVaraWindowN || 5);

  state.readiness = combineReadiness(velR, hrvR, varaR);
}

async function computeRecommendation(forDateISO = null) {
  const settings = state.settings;
  const dateISO = forDateISO || todayISO();
  let primaryMov = state.movements.find(m => m.isPrimary);
  // Multi-lift mesocycles: primary movement changes each day — käytä forDateISO:ta
  // kun backfillataan mennyttä päivää, jotta saadaan oikea pv:n primary.
  if (state.mesocycle?.type === "streetlifting_16w") {
    primaryMov = getStreetliftingPrimaryMovement(state, dateISO) || primaryMov;
  }
  state.recommendation = await recommend({
    settings,
    bodyweightKg: state.latestBodyweight || settings.bodyweightKg || 91,
    dateISO,
    mesocycle: state.mesocycle,
    sessions: state.sessions,
    allSets: state.allSets,
    readiness: state.readiness,
    primaryMovementId: primaryMov?.movementId || null,
    dryRun: true,
  });

  // v4.34.43: CFG-DRIFT persistointi. Engine ehdottaa cfg-arvon nostoa
  // jos atletti ylittää baseline:n toistuvasti (vx-overshoot tai velocity-trend).
  // Persistoi vain jos drift > 0 ja cfg muuttuu merkittävästi (>0.5 kg).
  await persistCfgDriftIfApplicable(state.recommendation);
}

async function persistCfgDriftIfApplicable(rec) {
  if (!rec?.cfgDriftApplied) return;
  const drift = rec.cfgDriftApplied;
  if (!drift.driftPct || drift.driftPct <= 0 || !drift.key || !drift.toCfg) return;

  const meso = state.mesocycle;
  if (!meso) return;

  // v4.34.44: Hybridi-haarautuminen drift.source-kentän mukaan.
  // - 'streetliftingConfig' (legacy, streetlifting_16w) → cfg.calibration[key]
  // - 'movementCfg' (uusi, kaikki muut mesot) → movementCfg[key].e1rmExternal
  let currentCfg = null;
  let writeBack = null; // funktio joka tallentaa newCfg:n oikeaan rakenteeseen
  let driftHistoryArr = null;

  if (drift.source === 'streetliftingConfig') {
    if (meso.type !== "streetlifting_16w") return; // turvasaranat: source ja type yhdenmukaiset
    if (!meso.streetliftingConfig) meso.streetliftingConfig = {};
    if (!meso.streetliftingConfig.calibration) meso.streetliftingConfig.calibration = {};
    const cal = meso.streetliftingConfig.calibration;
    currentCfg = cal[drift.key];
    writeBack = (val) => { cal[drift.key] = val; };
    if (!Array.isArray(meso.streetliftingConfig.cfgDriftHistory)) {
      meso.streetliftingConfig.cfgDriftHistory = [];
    }
    driftHistoryArr = meso.streetliftingConfig.cfgDriftHistory;
  } else if (drift.source === 'movementCfg') {
    if (!meso.movementCfg) meso.movementCfg = {};
    if (!meso.movementCfg[drift.key]) {
      meso.movementCfg[drift.key] = { e1rmExternal: null, dateISO: null, source: 'cfg-drift' };
    }
    currentCfg = meso.movementCfg[drift.key].e1rmExternal;
    writeBack = (val) => {
      meso.movementCfg[drift.key].e1rmExternal = val;
      meso.movementCfg[drift.key].dateISO = todayISO();
    };
    if (!Array.isArray(meso.cfgDriftHistory)) meso.cfgDriftHistory = [];
    driftHistoryArr = meso.cfgDriftHistory;
  } else {
    return; // tuntematon source — ei persistointia
  }

  // Idempotency-suoja: jos cfg on jo lähellä toCfg:tä, älä persistoi
  if (currentCfg && Math.abs(currentCfg - drift.toCfg) < 0.5) return;

  // Päivitä cfg
  const newCfg = Math.round(drift.toCfg * 2) / 2; // 0.5 kg tarkkuus
  writeBack(newCfg);

  driftHistoryArr.push({
    dateISO: drift.dateISO || todayISO(),
    movName: drift.movName,
    key: drift.key,
    fromCfg: currentCfg,
    toCfg: newCfg,
    driftPct: drift.driftPct,
    signal: drift.signal,
    source: drift.source,
    counter: drift.counter,
    velDeltaPct: drift.velDeltaPct ?? null,
  });

  await saveMesocycle(meso);
  console.info(`[CFG-DRIFT] ${drift.movName} ${currentCfg?.toFixed(1) || '?'} → ${newCfg.toFixed(1)} kg (+${(drift.driftPct*100).toFixed(1)}%, signal=${drift.signal}, source=${drift.source})`);
}

/**
 * Strip redundant weekday prefix from a day label (v4.27.5).
 *
 * Osa streetlifting_16w- ja muista ohjelma-factoryista tallentaa labeleihin
 * päiväprefiksin ("MA — Leuka 4×6 @65%"), mutta näkymät prependoivat oman
 * `dayNames[d.dayOfWeek]`-prefiksin → lopputulos on "Ma — MA — Leuka 4×6 @65%".
 * Tämä apuri poistaa labelin alusta redundantin "MA — ", "TI — ", … prefiksin
 * ennen renderointia. Toimii myös jo IDB:hen tallennetuille mesosykleille
 * ilman migraatiota.
 */
function stripRedundantDayPrefix(label) {
  if (!label || typeof label !== "string") return label;
  return label.replace(/^(MA|TI|KE|TO|PE|LA|SU)\s*[—–-]\s*/, "");
}

/** Close any open modal */
function closeModal() {
  const existing = document.querySelector(".modal-overlay");
  if (existing) existing.remove();
}

/**
 * Show a list of options as a bottom sheet.
 * Returns a Promise that resolves to the selected index (0-based) or null if cancelled.
 * @param {string} title — modal title
 * @param {Array<{label:string, desc?:string, icon?:string}>} options
 * @param {number|null} selectedIdx — currently selected index (highlight)
 */
function showListModal(title, options, selectedIdx = null) {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <div class="modal-options-list"></div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const list = overlay.querySelector(".modal-options-list");
    options.forEach((opt, i) => {
      const el = document.createElement("div");
      el.className = `modal-option${i === selectedIdx ? " selected" : ""}`;
      el.innerHTML = `${opt.icon ? `<span class="modal-option-icon">${opt.icon}</span>` : ""}
        <div class="modal-option-text">
          <div class="modal-option-label">${opt.label}</div>
          ${opt.desc ? `<div class="modal-option-desc">${opt.desc}</div>` : ""}
        </div>`;
      el.addEventListener("click", () => { closeModal(); resolve(i); });
      list.appendChild(el);
    });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
  });
}

/**
 * Show an input modal (replaces prompt() for numeric/text input).
 * Returns a Promise that resolves to the entered string or null if cancelled.
 * @param {string} title — modal title
 * @param {string} placeholder — placeholder / label
 * @param {string} defaultValue — pre-filled value
 * @param {string} inputType — "number"|"text"
 */
function showInputModal(title, placeholder, defaultValue = "", inputType = "number") {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        <label style="margin-top:0">${placeholder}</label>
        <div class="modal-input-row">
          <input type="${inputType}" inputmode="${inputType === "number" ? "decimal" : "text"}" value="${defaultValue}" autofocus />
          <button class="btn btn-ok" data-modal-ok>OK</button>
        </div>
        <button class="btn btn-outline btn-full" style="margin-top:8px" data-modal-cancel>Peruuta</button>
      </div>`;
    const inp = overlay.querySelector("input");
    const submit = () => { const v = inp.value.trim(); closeModal(); resolve(v || null); };
    overlay.querySelector("[data-modal-ok]").addEventListener("click", submit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    document.body.appendChild(overlay);
    setTimeout(() => inp.focus(), 50);
  });
}

        if (!leukaVal || leukaVal < 0 || leukaVal > 300) { showToast("Leuka 1RM puuttuu tai epärealistinen", "warn"); return; }
        if (!dippiVal || dippiVal < 0 || dippiVal > 300) { showToast("Dippi 1RM puuttuu tai epärealistinen", "warn"); return; }
        if (!kyykkyVal || kyykkyVal < 0 || kyykkyVal > 400) { showToast("Kyykky 1RM puuttuu tai epärealistinen", "warn"); return; }
      }
      closeModal();
      resolve({
        bwKg: bwVal,
        leukaExtKg: leukaVal || 85,
        dippiExtKg: dippiVal || 75,
        kyykkyExtKg: kyykkyVal || 160,
      });
    };
    overlay.querySelector("[data-modal-ok]").addEventListener("click", () => submit(false));
    overlay.querySelector("#cal-use-defaults").addEventListener("click", () => submit(true));
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    // Autofocus first input
    setTimeout(() => overlay.querySelector("#cal-leuka")?.focus(), 50);
  });
}

/**
 * v4.34.44 — Yleinen 1RM-kalibrointimodaali kaikille ei-streetlifting-mesoille.
 *
 * Kysyy käyttäjältä nykyisen 1RM-arvion kullekin uniikille päälikkeelle. Tulos
 * tallennetaan mesocycle.movementCfg-tauluun (avain = liike-nimi). Engine
 * (getCfgBaselineForMovement TASO 1) käyttää tätä baseline-arvona INFLATION_CAP
 * + CFG-DRIFT -laskennassa.
 *
 * Streetlifting_16w käyttää edelleen showCalibrationModal:ia + streetliftingConfig
 * -rakennetta — tätä funktiota EI kutsuta sieltä.
 *
 * @param {Array} primaries - [{ name, category }, ...] uniikit päälikkeet
 * @param {number} defaultBw - oletuskehopaino
 * @returns {Promise<{ bwKg, movementCfg } | null>} cfg-objekti tai null peruutus
 */
function showGenericCalibrationModal(primaries, defaultBw = 80) {
  return new Promise(resolve => {
    closeModal();

    // Kategorisoi liike: tanko-pohjaiset (2.5 kg step) vs lisäpaino/lisäkuorma (0.5 kg step)
    const BAR_CATEGORIES = new Set(["alaraaja"]);
    const BAR_NAMES_HINT = /penkki|kyykky|maast|pysty|romanian|hauisk|ojennus|jalkaprässi|hip thrust/i;
    const isBarLike = (p) => BAR_CATEGORIES.has(p.category) || BAR_NAMES_HINT.test(p.name);

    // Kohtuulliset placeholder-arviot kategorian mukaan (käyttäjä korvaa omillaan)
    const placeholderHint = (p) => {
      const n = p.name.toLowerCase();
      if (n.includes("penkkip"))    return "esim. 100";
      if (n.includes("takakyykky")) return "esim. 140";
      if (n.includes("etukyykky"))  return "esim. 110";
      if (n.includes("maast"))      return "esim. 160";
      if (n.includes("romanian"))   return "esim. 130";
      if (n.includes("pysty"))      return "esim. 60";
      if (n.includes("leuka") || n.includes("leuanveto")) return "esim. 30 (lisäpaino)";
      if (n.includes("dippi"))      return "esim. 30 (lisäpaino)";
      if (n.includes("hauis"))      return "esim. 40";
      return "kg";
    };

    const inputRows = primaries.map((p, i) => {
      const step = isBarLike(p) ? 2.5 : 0.5;
      const id = `gencal-${i}`;
      return `
        <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-top:10px">${p.name} 1RM (kg)</label>
        <input type="number" inputmode="decimal" id="${id}" data-mov="${p.name.replace(/"/g, '&quot;')}" value="" placeholder="${placeholderHint(p)}" step="${step}" min="0" max="500">
      `;
    }).join("");

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:480px;max-height:90vh;overflow-y:auto">
        <div class="modal-handle"></div>
        <div class="modal-title">🎯 Ohjelman kalibrointi</div>
        <div style="padding:0 4px">
          <div class="muted" style="font-size:12px;margin-bottom:14px;line-height:1.55">
            Anna nykyinen 1RM-arvio kullekin päälikkeelle. Sovellus käyttää näitä laskemaan jokaisen viikon kuormat. <b>Epätarkkuus ei ole kohtalokasta</b> — sovellus oppii suorituksistasi automaattisesti ja kalibroi itsensä uudelleen muutaman session jälkeen.
          </div>

          <label style="margin-top:0;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted)">Kehonpaino (kg)</label>
          <input type="number" inputmode="decimal" id="gencal-bw" value="${defaultBw}" step="0.5" min="30" max="200">

          ${inputRows}

          <div class="muted" style="font-size:11px;margin:12px 0;padding:10px;background:rgba(79,140,255,0.08);border-radius:6px;line-height:1.5">
            💡 <b>Vinkki:</b> jos et ole testannut 1RM:ää viime aikoina, anna konservatiivinen arvio (-2.5–5 kg). Sovellus nostaa tasoa automaattisesti kun suoriudut hyvin, ja varoittaa jos targetit alkavat tuntua liian raskailta.
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
            <button class="btn btn-outline" data-modal-cancel>Peruuta</button>
            <button class="btn" data-modal-ok>Aloita ohjelma</button>
          </div>
          <button class="btn-sm" id="gencal-skip" style="background:none;border:none;color:var(--muted);font-size:11px;margin-top:10px;width:100%;cursor:pointer;padding:6px">Aloita ilman kalibrointia (sovellus oppii suorituksistasi muutaman session jälkeen)</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const submit = (skipCal = false) => {
      const bwVal = parseFloat(overlay.querySelector("#gencal-bw")?.value) || defaultBw;
      const movementCfg = {};
      const dateISO = todayISO();

      if (!skipCal) {
        for (let i = 0; i < primaries.length; i++) {
          const p = primaries[i];
          const inp = overlay.querySelector(`#gencal-${i}`);
          const val = parseFloat(inp?.value);
          if (!val || val <= 0 || val > 500) {
            showToast(`${p.name}: anna realistinen 1RM-arvio (1-500 kg)`, "warn");
            inp?.focus();
            return;
          }
          movementCfg[p.name] = {
            e1rmExternal: val,
            dateISO,
            source: 'manual-calibration',
          };
        }
      }

      closeModal();
      resolve({ bwKg: bwVal, movementCfg });
    };

    overlay.querySelector("[data-modal-ok]").addEventListener("click", () => submit(false));
    overlay.querySelector("#gencal-skip").addEventListener("click", () => submit(true));
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
    setTimeout(() => overlay.querySelector("#gencal-0")?.focus(), 50);
  });
}

        <!-- Q4: Week count -->

        <!-- Q5: Recovery -->
        <div style="margin-bottom:14px">
          <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin:0 0 6px 0;display:block">5. Palautumiskyky</label>
          <div id="wiz-recovery" class="wiz-chips"></div>
          <div class="muted" id="wiz-recovery-desc" style="font-size:11px;margin-top:4px;font-style:italic"></div>
        </div>

        <!-- Summary -->
        <div id="wiz-summary" style="background:rgba(79,140,255,0.08);border-left:3px solid #4f8cff;padding:10px 12px;border-radius:4px;font-size:12px;line-height:1.55;margin-bottom:14px"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="btn btn-outline" data-modal-cancel>Peruuta</button>
          <button class="btn" data-modal-ok>Luo ohjelma</button>
        </div>
      </div>
      <style>
        .wiz-chips { display:flex; flex-wrap:wrap; gap:6px; }
        .wiz-chip { padding:8px 12px; border-radius:20px; border:1px solid var(--border, #33405a); background:rgba(255,255,255,0.03); cursor:pointer; font-size:12px; user-select:none; transition:all 0.15s; }
        .wiz-chip:hover { background:rgba(79,140,255,0.12); }
        .wiz-chip.selected { background:#4f8cff; color:#fff; border-color:#4f8cff; font-weight:600; }
        .wiz-chip.disabled { opacity:0.4; cursor:not-allowed; }
      </style>`;
    document.body.appendChild(overlay);

    const GOAL_META = {
      yhdistelma:    { label: "Yhdistelmä",     icon: "⚡", desc: "Maksimivoima + perusvoima + nopeusvoima samassa viikossa. Soveltuu useimmille." },
      hypertrofia:   { label: "Hypertrofia",    icon: "💪", desc: "Korkea volyymi, 6-8 toistoa. Lihasmassan kasvatus ensisijaisena." },
      maksimivoima:  { label: "Maksimivoima",   icon: "🏋️", desc: "1-3 toistoa maksimikuormilla, hermostollinen. Vaatii hyvää palautumista." },
      undulating:    { label: "DUP (undulating)", icon: "🔄", desc: "Intensiteetti vaihtuu joka päivä (raskas/volyymi/nopeus kierto)." },
    };
    const DAYS_META = { 2: "2×/vk — kevyt/kiireinen", 3: "3×/vk — vakio", 4: "4×/vk — runsas" };
    const WEEKS_META = {
      4:  "4 vk — klassinen mesosykli (vk 1-3 kuorma nousee, vk 4 deload)",
      8:  "8 vk — kaksi 4 vk blokkia, toinen +2% raskaampi",
      12: "12 vk — kolme blokkia (pohja → lataus → peak), blokkiperiodisaatio (Issurin 2010)",
    };
    const REC_META = {
      hyva:    { label: "Hyvä",    desc: "Nukut 8h, ei stressiä työssä, alle 35v → accessory 100%" },
      keski:   { label: "Keski",   desc: "Normaali arki, jonkin verran stressiä → accessory 85% (oletus)" },
      heikko:  { label: "Heikko",  desc: "Iäkkäämpi, korkea työstressi, uni heikko → accessory 70%" },
    };

    const buildChips = (containerId, items, isSelected, onClick, disabledFn = null) => {
      const cont = overlay.querySelector("#" + containerId);
      cont.innerHTML = "";
      for (const item of items) {
        const chip = document.createElement("div");
        const disabled = disabledFn ? disabledFn(item) : false;
        chip.className = "wiz-chip" + (isSelected(item) ? " selected" : "") + (disabled ? " disabled" : "");
        chip.innerHTML = item.html || item.label;
        if (!disabled) chip.addEventListener("click", () => onClick(item));
        cont.appendChild(chip);
      }
    };

    const render = () => {
      // Goals
      buildChips("wiz-goals",
        Object.entries(GOAL_META).map(([key, m]) => ({ key, html: `${m.icon} ${m.label}` })),
        (it) => it.key === st.goal,
        (it) => { st.goal = it.key; render(); }
      );
      overlay.querySelector("#wiz-goal-desc").textContent = GOAL_META[st.goal].desc;

      // Primaries (multi-select, max 3)
      buildChips("wiz-primaries",
        WIZARD_PRIMARY_OPTIONS.map(p => ({ key: p.name, html: `${p.icon} ${p.shortLabel}`, ref: p })),
        (it) => st.selectedPrimaryNames.includes(it.key),
        (it) => {
          const idx = st.selectedPrimaryNames.indexOf(it.key);
          if (idx >= 0) {
            if (st.selectedPrimaryNames.length <= 1) return; // pidä vähintään 1
            st.selectedPrimaryNames.splice(idx, 1);
          } else {
            if (st.selectedPrimaryNames.length >= 3) return; // max 3
            st.selectedPrimaryNames.push(it.key);
          }
          render();
        },
        (it) => !st.selectedPrimaryNames.includes(it.key) && st.selectedPrimaryNames.length >= 3
      );

      // Days/week
      buildChips("wiz-days",
        [2, 3, 4].map(d => ({ key: d, html: `${d}× <span style="font-size:10px;opacity:0.7">${DAYS_META[d].split('—')[1]?.trim() || ''}</span>` })),
        (it) => it.key === st.daysPerWeek,
        (it) => { st.daysPerWeek = it.key; render(); }
      );

      // Week count
      buildChips("wiz-weeks",
        [4, 8, 12].map(w => ({ key: w, html: `${w} vk` })),
        (it) => it.key === st.weekCount,
        (it) => { st.weekCount = it.key; render(); }
      );
      overlay.querySelector("#wiz-weeks-desc").textContent = WEEKS_META[st.weekCount];

      // Recovery
      buildChips("wiz-recovery",
        Object.entries(REC_META).map(([key, m]) => ({ key, html: m.label })),
        (it) => it.key === st.recoveryCapacity,
        (it) => { st.recoveryCapacity = it.key; render(); }
      );
      overlay.querySelector("#wiz-recovery-desc").textContent = REC_META[st.recoveryCapacity].desc;

      // Summary + live preview (v4.27.1): aja generaattori nykyisillä valinnoilla
      // ja näytä vk1:n päivät — käyttäjä näkee konkreettisesti mitä saa.
      const primariesLabel = st.selectedPrimaryNames.join(" + ");
      const goalLabel = GOAL_META[st.goal].label.toLowerCase();
      let previewHTML = "";
      let balanceWarningHTML = "";
      try {
        const answerPreview = {
          goal: st.goal,
          primaries: st.selectedPrimaryNames.map(name => {
            const opt = WIZARD_PRIMARY_OPTIONS.find(p => p.name === name);
            return { name: opt.name, category: opt.category };
          }),
          daysPerWeek: st.daysPerWeek,
          weekCount: st.weekCount,
          recoveryCapacity: st.recoveryCapacity,
        };
        const previewMeso = generateCustomMesocycle(answerPreview, todayISO());
        const DOW = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
        const wk1 = previewMeso.weekPlans.find(w => w.week === 1);
        if (wk1) {
          const dayLines = wk1.days.map(d => {
            const primary = d.slots.find(s => s.role === "primary");
            const accessoryCount = d.slots.filter(s => s.role === "accessory").length;
            const primaryLbl = primary ? `${primary.defaultMovementName} (${primary.sets}×${primary.reps}${primary.targetVx != null ? ` @Vx${primary.targetVx}` : ""})` : "—";
            return `<div style="margin-top:4px"><b>${DOW[d.dayOfWeek] || "?"}</b> <span class="muted">${d.dayType}</span> — ${primaryLbl} <span class="muted">+ ${accessoryCount} accessory</span></div>`;
          }).join("");
          previewHTML = `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,0.15)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:4px">Vk 1 esikatselu</div>${dayLines}</div>`;
        }

        // Volyymibalanssi-varoitus: vertaile category-sarjoja ja huomauta jos >2×
        const setsByCat = {};
        for (const wp of previewMeso.weekPlans) {
          for (const d of wp.days) {
            for (const s of d.slots) {
              setsByCat[s.category] = (setsByCat[s.category] || 0) + (s.sets || 0);
            }
          }
        }
        const pushSets = (setsByCat["horisontaalityöntö"] || 0) + (setsByCat["vertikaalityöntö"] || 0) + (setsByCat["ojentajaekstensio"] || 0);
        const pullSets = (setsByCat["vertikaaliveto"] || 0) + (setsByCat["horisontaaliveto"] || 0) + (setsByCat["hauisfleksio"] || 0);
        if (pushSets > 0 && pullSets > 0) {
          const ratio = Math.max(pushSets, pullSets) / Math.min(pushSets, pullSets);
          if (ratio >= 2.0) {
            const dominant = pushSets > pullSets ? "push" : "pull";
            balanceWarningHTML = `<div style="margin-top:8px;padding:8px 10px;background:rgba(245,158,11,0.12);border-left:3px solid #f59e0b;border-radius:4px;font-size:11px;line-height:1.5">⚠ <b>Volyymi-epätasapaino:</b> ${dominant}-volyymi ${ratio.toFixed(1)}× toista. Harkitse lisä-päälikettä vastakkaiselle puolelle.</div>`;
          }
        }

        // v4.27.2: Liike-spesifit taajuusvaroitukset.
        // Tutkimus: Helms "MSP Volume", Bromley "Base Strength", Pritchett 2025 — raskas
        // maaveto > 2×/vk on useimmille liikaa palautumiskapasiteetin puolesta; yksi
        // päälike 4+ päivänä viikossa ylittää Prilepin MRV-lukuja.
        const freqWarnings = [];
        const maavePrimaryPresent = st.selectedPrimaryNames.includes("Maastaveto");
        if (maavePrimaryPresent && st.selectedPrimaryNames.length === 1 && st.daysPerWeek >= 3) {
          freqWarnings.push(`Maastaveto ${st.daysPerWeek}×/vk on palautumiskapasiteetin rajoilla — hermosto + alaselkä kuormittuu enemmän kuin kyykky. Harkitse 2×/vk + accessoryt, tai lisää penkki/leuka rotaatioon.`);
        } else if (maavePrimaryPresent && st.daysPerWeek >= 4 && st.selectedPrimaryNames.length <= 2) {
          freqWarnings.push(`Maaveto-primaryn taajuus on ${Math.ceil(st.daysPerWeek / st.selectedPrimaryNames.length)}×/vk — tutkimus suosittelee raskaalle DL:lle max 2×/vk. Voit jatkaa jos palautumiskykysi sietää.`);
        }
        if (st.selectedPrimaryNames.length === 1 && st.daysPerWeek >= 4) {
          freqWarnings.push(`Yksi päälike ${st.daysPerWeek}×/vk on erittäin korkea taajuus (Prilepin-table raja useimmille). Lisää variantteja rotaatioon tai laske päiviä.`);
        }
        // Alaraaja-overload: 2+ alaraaja-primarya + 4+ päivää
        const alaraajaPrimaryCount = st.selectedPrimaryNames.filter(n => {
          const opt = WIZARD_PRIMARY_OPTIONS.find(p => p.name === n);
          return opt && opt.category === "alaraaja";
        }).length;
        if (alaraajaPrimaryCount >= 2 && st.daysPerWeek >= 4) {
          freqWarnings.push(`${alaraajaPrimaryCount} alaraaja-päälikettä + ${st.daysPerWeek}×/vk = systeeminen ylikuorma-riski (alaselkä, CNS). Harkitse ${st.daysPerWeek - 1}×/vk tai jätä toinen alaraaja-liike accessory-tasolle.`);
        }
        if (freqWarnings.length > 0) {
          balanceWarningHTML += freqWarnings.map(w =>
            `<div style="margin-top:6px;padding:8px 10px;background:rgba(245,158,11,0.12);border-left:3px solid #f59e0b;border-radius:4px;font-size:11px;line-height:1.5">⚠ <b>Taajuus:</b> ${w}</div>`
          ).join("");
        }
      } catch (err) {
        previewHTML = `<div style="margin-top:8px;color:#f87171;font-size:11px">⚠ Esikatselu epäonnistui: ${err.message}</div>`;
      }

      const rotation = st.selectedPrimaryNames.length > 1
        ? ` Päälikkeet rotatoidaan ${st.daysPerWeek} päivälle.`
        : ` Sama päälike kaikilla ${st.daysPerWeek} treenipäivällä.`;
      overlay.querySelector("#wiz-summary").innerHTML = `
        <b>Yhteenveto:</b> ${st.weekCount} vk ${goalLabel}-mesosykli, ${st.daysPerWeek}×/vk, päälikkeet: <b>${primariesLabel}</b>.${rotation} Accessory-volyymi ${st.recoveryCapacity === "hyva" ? "100%" : st.recoveryCapacity === "keski" ? "85%" : "70%"}.
        ${balanceWarningHTML}
        ${previewHTML}
      `;
    };
    render();

    overlay.querySelector("[data-modal-ok]").addEventListener("click", () => {
      if (st.selectedPrimaryNames.length === 0) {
        showToast("Valitse vähintään 1 päälike", "warn");
        return;
      }
      const primaries = st.selectedPrimaryNames.map(name => {
        const opt = WIZARD_PRIMARY_OPTIONS.find(p => p.name === name);
        return { name: opt.name, category: opt.category };
      });
      closeModal();
      resolve({
        goal: st.goal,
        primaries,
        daysPerWeek: st.daysPerWeek,
        weekCount: st.weekCount,
        recoveryCapacity: st.recoveryCapacity,
      });
    });
    overlay.querySelector("[data-modal-cancel]").addEventListener("click", () => { closeModal(); resolve(null); });
    overlay.addEventListener("click", e => { if (e.target === overlay) { closeModal(); resolve(null); } });
  });
}

/**
 * Plan-override modal — listaa tämän viikon suunnitellut päivät ja palauttaa
 * valitun päivän { dateISO, label, dayType } tai null jos peruutus.
 * Käytetään "Vaihda päivä" -toiminnossa: käyttäjä valitsee minkä viikonpäivän
 * planin haluaa tehdä tänään.
 */
async function showPlanOverrideModal() {
  const meso = state.mesocycle;
  if (!meso || !meso.weekPlans) {
    showToast("Ei aktiivista mesosykliä", "warn");
    return null;
  }
  const today = todayISO();
  const todayDow = new Date(today).getDay() || 7;
  const currentWeek = getMesocycleWeek(meso, today);
  if (!currentWeek) {
    showToast("Mesosykli ei ole aktiivinen tänään", "warn");
    return null;
  }
  const weekPlan = meso.weekPlans.find(w => w.week === currentWeek);
  if (!weekPlan?.days?.length) return null;

  // Laske ISO-päivä kullekin viikon planille (Ma = tämän viikon Ma, Ke = Ke jne.)
  // Todayn dayOfWeek käytetään ankkurina; siirto (targetDow - todayDow) päivää.
  const base = new Date(today);
  const dayNamesShort = { 1: "Ma", 2: "Ti", 3: "Ke", 4: "To", 5: "Pe", 6: "La", 7: "Su" };
  const DAY_TYPE_LABELS_MAP = { heavy: "Maksimivoima", volume: "Perusvoima", speed: "Nopeusvoima", competition: "Kilpailu", rest: "Lepo" };
  const options = [];
  for (const d of weekPlan.days) {
    const offset = d.dayOfWeek - todayDow;
    const date = new Date(base);
    date.setDate(date.getDate() + offset);
    const iso = date.toISOString().slice(0, 10);
    const dayLabel = stripRedundantDayPrefix(d.label) || DAY_TYPE_LABELS_MAP[d.dayType] || d.dayType || "?";
    const isToday = d.dayOfWeek === todayDow;
    const descBits = [];
    if (isToday) descBits.push("alkuperäinen (tänään)");
    if (offset < 0) descBits.push(`${Math.abs(offset)} pv sitten`);
    else if (offset > 0) descBits.push(`${offset} pv eteenpäin`);
    options.push({
      icon: isToday ? "📍" : "📅",
      label: `${dayNamesShort[d.dayOfWeek]} · ${dayLabel}`,
      desc: descBits.join(" · "),
      _dateISO: iso,
      _dayOfWeek: d.dayOfWeek,
      _dayType: d.dayType,
      _isToday: isToday,
    });
  }
  if (options.length === 0) return null;

  const idx = await showListModal("Vaihda tämän päivän plani", options.map(o => ({ icon: o.icon, label: o.label, desc: o.desc })));
  if (idx === null || idx < 0 || idx >= options.length) return null;
  const chosen = options[idx];
  if (chosen._isToday) {
    // Käyttäjä valitsi oman päivänsä — ei tarvita overrideä, palauta null
    showToast("Tämä on jo tämän päivän plani", "");
    return null;
  }
  return { dateISO: chosen._dateISO, label: chosen.label, dayType: chosen._dayType };
}

function formatDate(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric", year: "numeric" });
  } catch { return iso; }
}

const DAY_TYPE_LABELS = { heavy: "Maksimivoima", volume: "Perusvoima", speed: "Nopeusvoima", competition: "Kilpailu", rest: "Lepo" };
function dayTypeLabel(dt) { return DAY_TYPE_LABELS[dt] || dt; }

  default: "Perusjakso", hypertrofia: "Hypertrofiajakso", maksimivoima: "Maksimivoima-blokki",
  eksentrinen: "Eksentrinen blokki", dup: "DUP-jakso", siirtyma: "Siirtymäjakso",
  palautuminen: "Palautumisjakso", peaking: "Peaking", streetlifting_16w: "Streetlifting 16 vk 🏋️",
};

// Factory lookup for mesocycle creation

  hypertrofia: createHypertrofiaMesocycle,

  peaking: createPeakingMesocycle,

};

// Helper: find primary movement for multi-lift mesocycles (streetlifting_16w).
// Optional forDateISO — default "now"; käytetään mennyt-päivän backfillissä.
function getStreetliftingPrimaryMovement(state, forDateISO = null) {
  if (!state.mesocycle?.weekPlans || !state.mesocycle.startDateISO) return null;
  const start = new Date(state.mesocycle.startDateISO);
  const now = forDateISO ? new Date(forDateISO) : new Date();
  const weekNum = Math.floor((now - start) / (7 * 24 * 3600 * 1000)) + 1;
  if (weekNum < 1 || weekNum > 16) return null;
  const weekPlan = state.mesocycle.weekPlans.find(wp => wp.week === weekNum);
  if (!weekPlan) return null;
  const dow = now.getDay() || 7;
  const days = weekPlan.days || [];
  const dayPlan = days.find(d => d.dayOfWeek === dow) ||
    days.reduce((best, d) => {
      const dist = Math.min(Math.abs(d.dayOfWeek - dow), 7 - Math.abs(d.dayOfWeek - dow));
      const bestDist = best ? Math.min(Math.abs(best.dayOfWeek - dow), 7 - Math.abs(best.dayOfWeek - dow)) : Infinity;
      return dist < bestDist ? d : best;
    }, null);
  if (!dayPlan) return null;
  const primarySlot = dayPlan.slots?.find(s => s.role === "primary");
  if (!primarySlot?.defaultMovementName) return null;
  return state.movements.find(m => m.name === primarySlot.defaultMovementName) || null;
}

function formatDateShort(iso) {
  if (!iso) return "-";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("fi-FI", { timeZone: "Europe/Helsinki", weekday: "short", day: "numeric", month: "numeric" });
  } catch { return iso; }
}

function dayOfWeekFi(iso) {
  if (!iso) return "";
  const days = ["Su", "Ma", "Ti", "Ke", "To", "Pe", "La"];
  return days[new Date(iso).getDay()];
}
